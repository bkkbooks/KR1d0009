body:
  text: 周官總義卷十四宋易袚撰樂師掌國學之政以教國子小舞凡舞有帗舞有羽舞有皇舞有旄舞有干舞有人舞舞有小大大舞見于大司樂雲門大卷大咸大㲈大夏大濩大武是已此樂師所教止于小舞小舞小學也古者國子十三學樂誦詩舞勺成童舞象學射御無非教也勺者周告成大武之詩也象者武王告成象武之詩也播為樂章以教國子則有是六者之舞帗舞者謂析衆繒以為舞飾也羽舞者謂析衆羽以為舞飾也皇舞者謂雜五采羽以象鳳凰來儀者也旄舞者謂執氂牛之尾以象百獸率舞者也干舞兵舞也人舞手舞也此六者小舞而謂之國學之政者以無非教國子者也然地官舞師但教兵舞帗舞羽舞皇舞而不及旄舞人舞者教其所當用者而已非國子之小舞也若舞師先教兵舞則以祭祀大小為先後樂師先教帗舞則以所教之序為先後以人舞非舞之正故列於數者之末教樂儀行以肆夏趨以采齊車亦如之環拜以鐘鼓為節行趍者接賔之儀環拜者賔拜之儀樂師於是教國子之樂儀欲君臣上下之無違於禮也爾雅曰堂上謂之行門外謂之趍是王出既服至堂而肆夏作出路門而采齊作齊侯曰朝覲宗遇饗食皆乗金路各以其等為車送逆之節是王者有車出迎賔之禮亦因車之行趍而為之歌肆夏采齊盖肆夏之樂其聲舒以緩采齊之樂其聲數以疾此王者接賔之樂儀也至於朝㑹諸侯於外朝之位與夫合諸侯於國門外方眀壇之位則有環拜之禮其禮雖不詳見賈氏於方眀壇之位則曰公奠玉於上等䧏拜於中等侯伯奠玉於中等䧏拜於下等子男奠玉於下等䧏拜於地此禮之大者有禮必有樂必有鐘鼔節之作止之節也凡射王以騶虞爲節諸侯以貍首為節大夫以采蘋為節士以采蘩為節凡樂掌其序事治其樂政凡國之小事用樂者令奏鐘鼓凡樂成則告備詔來鼔臯舞及徹帥學士而歌徹令相饗食諸侯序其樂事令奏鐘鼓令相如祭之儀樂有政有事序事則陳列之先後節奏之次第也樂政則聲音律吕六代樂舞之關於大政者也樂師以貳大司樂為職故皆得以掌其序事治其樂政若言其職則大司樂掌大事之樂樂師掌小事之樂先儒謂小事為小祭祀然舞師言小祭祀不興舞而此下文言臯舞則非舞師所謂小祭祀者也謂大神大示大鬼之外則皆小事之樂也令奏鐘鼓嚴其始而已凡樂成者所奏一竟為一成不特大神大示大鬼之樂為然據大司樂所言則凡天神皆六成凡地示皆八成凡人鬼皆九成每一成則樂師皆為之告其備皆有舞以節其樂詔瞽使來則貴其習之精也名曰臯舞則貴其儀之緩也及祭將徹則帥學士而歌徹學士謂國子也歌徹謂歌雍以徹也令相則令眡瞭相瞽示之以其所當止也其始終樂節從容不廹如此饗食諸侯則奉賔猶承神其樂之儀亦可以類推矣燕射帥射夫以弓矢舞燕射則王與羣臣燕而行射禮者也凡王燕射則大夫以下為三耦所謂射夫是已弓矢舞之義見大司樂樂出入令奏鐘鼓大司樂職曰王出入令奏王夏尸出入令奏肆夏牲出入令奏昭夏此三夏皆瞽所歌之詩有歌必有牲有牲必有舞如此之類皆樂之出入也令奏鐘鼓所以節之凡軍大獻教愷歌遂倡之大司樂言王師大獻則令奏愷樂言樂則歌在焉此言教愷歌特歌而已以凡軍大獻則小於王師大獻故也凡樂有倡則有和故樂師倡之而瞽矇和之凡喪陳樂噐則帥樂官及序哭亦如之凡樂官掌其政令聽其治訟樂官謂大胥至司干大胥掌學士之版以待致諸子公卿大夫列於王朝者其子弟謂之國子以其衆言之則謂諸子以其學言之則謂學士樂師言帥學士而歌徹則帥國子之已致者此言學士之版則待國子之未致者版謂所籍之名數與其齒位未致者以此致之已致者以此合之春入學舎采合舞秋頒學合聲先儒謂春入學者入學宫而學秋頒學者頒其才藝之高下一學字而分二義理或未然嘗以文王世子篇攷當時之學有三上庠有虞氏之學也東序夏后氏之學也瞽宗殷學也瞽宗與上庠東序並立然當時學舞者在東序學書者在上庠學禮學樂者皆在瞽宗此言合舞於入學之後合聲於頒學之後是知其為瞽宗之學也葢瞽宗見於大司樂有所謂成均之法又有所謂樂祖之祭皆所以為禮樂之教春入學舍采者即入瞽宗之學而舍采於樂祖秋頒學者即以成均之法而頒之於瞽宗之學入學舍采而後合舞者春為木木主貌故合舞頒學而後合聲者秋為金金主言故合聲鄭氏謂學禮樂於殷學功成治定與己同也其說是已然文王世子篇又曰春誦夏弦鄭氏以誦為歌弦為絲陽用事則學之以聲是春未嘗不學聲也又曰春夏學干戈秋冬學羽籥鄭氏謂干戈武舞用動作之時學之羽籥文舞用安静之時學之是秋未嘗不學舞也此言合舞於春而合聲於秋何也合舞者大合舞也與平日之學舞者異合聲者大合聲也與平日之合聲者異文王世子篇所言者主教國子也此所言者主合國子平日之所教者也兹其所以辨以六樂之㑹正舞位以序出入舞者比樂官展樂噐凡祭祀之用樂者以鼔徴學士序宫中之事上經言合舞合聲則教之序也此經則教之成者也故言六樂之㑹所謂㑹者其列衆其變繁必先正其左右先後之位焉正其位則舞之行綴不可以無序故又為之序其出入何謂序其出入黄帝堯舜禹湯之樂弗可詳矣姑以大武之樂言之武舞之位以象大司馬之四表大閲以四表為卒伍出入坐作進退之節舞位亦然周都殷之西南殷都周之東北武始而北出則至二表矣此三歩以見方者也再成而滅商則至三表矣此再始以著徃者也三成而南則至四表矣四成而南國是疆則又自北而南至三表矣五成而分周公左召公右則至二表矣此復亂以飭歸者也六成而復綴以崇則復初表矣此樂終而德尊者也葢始而北出則出表之東北以殷居東北故也三成而南則出表之西南以周居西南故也疆南國而後可以分治分治而後可以復綴分治係於臣故散而為二復綴統於君故合而為一此樂記言復綴以崇而繼之以夾振之而駟伐者又本其始也周人武舞之位出入如此其兼用堯舜禹湯之樂舞則亦可以此而類推焉比樂官則比叙其所教之人以攷其藝之精粗展樂噐則展視其所用之噐而審其聲之完否人與器俱善則樂舞可知矣小胥掌學士之徴令而比之觵其不敬者廵舞列而撻其怠慢者正樂縣之位王宫縣諸侯軒縣卿大夫判縣士特縣辨其聲凡鼓鏄鐘磬皆有縣下經言凡縣鐘磬則以鍾磬為主此梓人所以有鐘虡磬虡之制也王宫縣則謂四面之縣以象宫室之四圍諸侯軒縣則去其一而為三面是闕其南面矣卿大夫判縣則又去其一而為兩面是併去其北面矣士特縣則非西即東一面而已矣按大射曰樂人宿縣於阼階之東笙磬西面其南笙鐘其南鎛皆南陳西階之西頌磬東面其南鐘其南鎛皆南陳是阼階西階其位皆北其面在南者無縣也然又曰建一鼓在西階之東南面何耶說者謂諸侯與其臣大射其縣三面所謂南面特皷而已鐘磬則無縣焉知此則知大夫判縣士特縣皆無南面所以尊天子也辨其聲則鐘磬鼓鎛其聲不一必待辨而後正凡縣鍾磬半爲堵全爲肆堵如宫墻之堵肆如牲體之肆此言凡縣鐘磬則其文非連上經之樂縣矣鄭氏謂縣鐘磬者編縣之二八十六枚而在一虡謂之堵鐘一堵磬一堵謂之肆半之者諸侯之卿大夫士也諸侯之卿大夫半天子之卿大夫西縣鐘東縣磬士亦半天子之士縣磬而已其言諸侯之卿大夫西縣鐘東縣磬則是十六枚在一虡何以謂之半士有磬無鐘則又何爲聲樂之和其數既差不盡與古合要所謂半天子之卿大夫士則可據也昔鄭賄普侯歌鐘二肆普侯以樂之半賜魏絳於是始有金石之樂禮也禮也者謂其半天子之卿大夫而合於古之禮也此可以見半為堵全為肆之義盖天子宫縣每面鐘磬各十六枚則四面各六十四枚諸侯以下䧏殺焉諸侯三面則鐘磬各四十八枚卿大夫兩面則鐘磬各三十二枚士一面則鐘磬各十有六枚雖尊卑多寡不同而每面皆各十六枚故謂之肆若諸侯之卿大夫判縣則每面鐘磬各八枚兩面共鐘磬各十有六士特縣則各八枚而已惟其得每面之半故謂之堵大師掌六律六同以合陰陽之聲陽聲黄鍾太簇姑洗㽔賔夷則無射陰聲大呂應鍾南呂函鍾小吕夾鍾六律六同以合陰陽之聲天地自然之理也盖日月所㑹在天為十有二舍在地為十有二辰而律同生焉所以言陰陽之合冬至之節日月㑹於星紀其位在丑氣合於子所以為黄鐘大寒之節日月㑹於𤣥􅑎其位在子氣合於丑所以為大吕雨水之節日月㑹於娵訾其位在亥氣合於寅所以為大簇春分之節日月㑹於䧏婁其位在戍氣合於卯所以為夾鐘榖雨之節日月㑹於大梁其位在酉氣合於辰所以為姑洗小滿之節日月㑹於實沈其位在申氣合於己所以為仲吕夏至之節日月㑹於鶉首其位在未氣合於午所以為㽔賔大暑之節日月㑹於鶉火其位在午氣合於未所以為函鐘處暑之節日月㑹於鶉尾其位在已氣合於申所以為夷則秋分之節日月㑹於夀星其位在辰氣合於酉所以為南吕霜降之節日月㑹於大火其位在卯氣合於戍所以為無射小雪之節日月㑹於析木其位在寅氣合於亥所以為應鐘陽道常饒故其律順而左旋陰道常乏故其律逆而右轉無非應乎日月所㑹而為天地之自然之合合陰陽之聲其本諸此乎皆文之以五聲宫商角徴羽皆播之以八音金石土革絲木匏竹上經言六律六同以陰之同乎陽故謂之同所以合陰陽之聲總而言之則十有二律也十有二律各具五聲而五聲實本於黄鐘黄鐘為宫其管九寸九之則其數八十一三分宫而去其一故下生徴而其數五十四又三分徴而益其一故上生商而其數七十二又三分商而去其一故下生羽而其數四十八又三分羽而益其一故上生角而其數六十四多而濁者大少而清者細故大不踰宫細不踰羽徴之聲清於角角之聲清於商惟五聲相比而成文故曰皆文之以五聲然五聲寓於八音而八音實直乎八卦金鐘也属乎兌石磬也属乎乾土塤也属乎坤革鼓也属乎坎絲琴瑟也属乎離木柷敔也属乎巽匏笙簧也属乎艮竹簫管也属乎震金石土為陰陰逆推其所始是以先金石而後土匏竹木為陽陽順序其所生是以先匏竹而後木革絲居陰陽之正是以先革而後絲故曰皆播之以八音五聲八音間奏迭舉而樂成焉要其所本則聲音皆出於十有二律者也教六詩曰風曰賦曰比曰興曰雅曰頌以六德為之本以六律為之音詩之大序曰詩有六義焉以六義求詩則不必專指關雎以下謂之風不必專指鹿鳴以下謂之小雅不必專指文王以下謂之大雅亦不必專指清廟以下謂之三頌盖風者風也其風肆好見於崧髙穆如清風見於烝民則雅頌亦風也雅者正也頌者羙也緇衣所好巷伯所惡未嘗不陳其正理于嗟麟兮于嗟騶虞未嘗不美其盛德風亦雅頌也賦者詠述其事若甘棠言召伯所茇之類比者因物取類若狼䟦言公孫碩膚之類興者因物寓意若淇澳言緑竹猗猗之類是賦比興固以義而取而風雅頌亦互見其義不可以定體求也餘見籥章義六詩之教鄭氏以為教瞽矇非也瞽矇賤工也知有六律之音而已何知乎六德之本必待六德之成而使之明六詩之義非教國子不可也何以知之以大司樂所言而知之大司樂之職曰以樂德教國子中和秪庸孝友是六德之本出於大司樂所教而後大師播之於六律之音則知大師之教六詩其為國子而非為瞽矇也眀矣大祭祀帥瞽登歌令奏撃拊下管播樂器令奏鼓朄大饗亦如之先王作樂有堂上堂下之辨堂上之樂必曰帥瞽登歌者謂登歌清廟貴人聲也大師必令奏撃拊以導之堂下之樂必曰下管播樂器者謂衆樂皆作而以下管為倡貴人氣也大師必令奏鼓朄以導之鄭氏謂拊形如鼔以韋為之著之以穅然書言撃石拊石則謂其有當大撃者有當小拊者此言令奏擊拊則正所謂擊石拊石也鄭氏又謂鼓􅉧猶言擊􅉧然詩言應􅉧縣鼓則鼔為大􅉧為小此言令奏鼔朄則令奏大鼔與小朄也奏擊拊以導歌而後瞽者歌焉奏鼓􅉧以導管而後樂器播焉樂之與歌必有所導而後從必有所令而後奏此節奏之序也大射帥瞽而歌射節射節謂騶虞貍首采蘋采蘩之節大師執同律以聽軍聲而詔吉凶六律陽聲也六同陰聲也即陰陽以候其氣則葭風一動而八風從律以十二律應十二風而後可以察天地之和大師以是而聽軍聲冝其吉凶應焉春秋襄十八年普人聞有楚師師曠曰不害吾驟歌北風又歌南風南風不競多死聲楚必無功古之人所以望敵而知吉凶者用此道也且占軍旅之勝者無過於天時太史抱天時與大師同車則亦以同律之所聽者可信不誣故爾大喪帥瞽而廞作匶諡凡國之瞽矇正焉匶柩也考列先王之德行而誄之以言謂之諡小師掌教鼓鼗柷敔塤簫管絃歌有堂上之樂有堂下之樂有上下兼用而不可闕者絃歌用之於堂上者也鼓鼗塤簫用之於堂下者也柷敔則堂上堂下皆用之以為作止之節者書曰戛擊鳴球摶拊琴瑟戛擊柷敔用之節堂上之樂者也又曰下管鼗鼔合止柷敔用之以節堂下之樂者也堂上言其聲堂下言其器而已若小師所言登歌下管則歌者在上匏竹在下此不易之定制而小師以絃歌列於塤簫之下者是小師所言者教樂之序而大師所言者用樂之序也大祭祀登歌擊拊下管擊應鼓徹歌大饗亦如之大喪與廞凡小祭祀小樂事鼓􅉧此皆所以賛大師也大師言大祭祀帥瞽登歌擊拊此復言之者謂登歌則瞽矇也擊拊則小師也大師則令其奏而已大師言下管令奏鼓􅉧而此言下管擊應鼓徹者擊應以道之又歌雍以徹之小師舉其詳而大師總其要者也掌六樂聲音之節與其和六樂聲音者謂以六代之樂而文之以五聲播之以八音者也五聲若大不踰宫細不踰羽之類八音若升歌在上匏竹在下之類是之謂節然上下大小欲其周旋而相應故曰和瞽矇掌播鼗柷敔塤簫管絃歌諷誦詩世奠繫鼔琴瑟掌九德六詩之歌以役大師眡瞭掌凡樂事播鼗擊頌磬笙磬掌大師之縣凡樂事相瞽眡視也視之眀者為瞭以矇瞽無所見故設三百人以扶工謂之眡瞭因使之掌樂故曰掌凡樂事播鼗者賛鼓矇也擊頌磬笙磬者或曰東方之磬曰笙取象乎物之生西方之磬曰頌取象乎物之成非也頌鏞也大射禮曰樂人宿縣於阼階東笙磬西面是應笙之磬也又曰西階之西頌磬東面是應鏞之磬也書曰笙鏞以間是已凡樂事相瞽者正周人設眡瞭扶工之意大喪廞樂器大旅亦如之賔射皆奏其鐘皷鼜愷獻亦如之大喪廞樂噐戚也大旅亦如之者國有大故亦如大喪之致其戚也賓射皆奏其鐘鼔者所以節樂也鼜愷獻亦如之者雖喜樂戒懼之際未嘗無樂之節也典同掌六律六同之和以辨天地四方陰陽之聲以為樂噐凡聲髙聲䃂正聲緩下聲肆陂聲散險聲歛逹聲贏微聲韽囬聲衍侈聲筰弇聲鬱薄聲甄厚聲石凡為樂噐以十有二律為之數度以十有二聲爲之齊量凡和樂亦如之掌六律六同之和以辨天地四方陰陽之聲者即大師所言陽聲黄鐘大簇姑洗㽔賔夷則無射陰聲大呂應鍾南呂林鐘中呂夾鍾是已以為樂器則自然之中聲也繼之以凡聲則聲之病也其凡聲十有二偶合乎天地陰陽四方之數或者遂以此數而求天地四方陰陽之氣然高與下對正與陂對侈與弇對薄與厚對其文皆錯雜不一何者為天地何者為四方要之言凡聲則决非所謂天地四方陰陽之聲也如鳬氏為鍾亦曰薄厚之所震動清濁之所由出侈弇之所由興其言侈弇厚薄與此同而髙下正陂險逹㣲囬之八聲雖若闕而不載然言清濁之所由出則髙正㣲回乃其聲之清者下陂險逹乃其聲之濁者是八聲亦可類推也終之曰鍾已厚則石已薄則播侈則筰弇則鬱此皆言鍾之病而求其所以為聲之中典同之言為樂噐以至和樂亦然由是以十有二律為之數度以十有二聲為之齊量數即多寡之數度即長短之度得其數度則十有二律無非陰陽之中氣齊即大小之齊量即廣狹之量得其齊量則十有二聲無非陰陽之和氣以氣騐聲以聲審形則樂無不善矣磬師掌教擊磬擊編鍾教縵樂燕樂之鍾磬凡祭祀奏縵樂擊磬不言編者以磬無不編故不言編鍾言編則有不編者編鍾同於編磬故磬師擊之其不編者鍾師擊之縵如縵錦之縵學記曰不學操縵不能安弦以其錯雜成文則知其為雜聲之和樂者也燕樂即房中之樂以房中為燕閑之所如二南托后妃以風喻君子則知其為房中之樂也二者皆有鍾磬故教眡瞭奏之凡祭祀奏縵樂亦取其和而已鍾師掌金奏此節鍾師自撃不編之鍾凡作樂先擊鍾故曰金奏乃擊鍾以為奏樂之節繼之鍾鼓奏九夏則知奏樂未嘗無鼓鼓人亦曰以普鼓鼔金奏是其樂雖用鼓特以金為主故名官曰鍾師凡樂事以鍾鼓奏九夏王夏肆夏昭夏納夏章夏齊夏族夏祴夏驁夏鍾師不擊鼓而云鼓者以見鼔鍾皆所以奏九夏故兼言之也九夏詩也堂上歌之堂下鍾應之鄭賄普侯歌鍾二肆謂歌與鍾相應而已九夏者樂之大歌有九王出入奏王夏尸出入奏肆夏牲出入奏昭夏此三夏者見於大司樂葢王夏昭夏惟王出入牲出入得用之若肆夏則天子或用之於行趨或用之於車或用之以享元侯兩元侯或得以自相享若左氏傳所言普侯享穆叔金奏肆夏郊特牲所言大夫之奏肆夏自趙文子始皆僣禮者也納夏章夏齊夏族夏雖無所經見而杜子春曰四方賔來奏納夏臣有功奏章夏夫人祭奏齊夏族人侍奏族夏後鄭亦從其說或者漢為近古典籍可攷也又曰賔醉而出奏陔夏者鄉飲酒鄉射燕射大射皆奏之陔言陔切之欲其不失禮也又曰公出入奏驁夏者乃大射之文公入奏驁夏謂諸侯射于西郊自外入奏之出入同禮故兼言出入也此九夏者皆詩之篇名以肆夏而知之所謂晉侯金奏肆夏之三工歌文王之三歌鹿鳴之三以類而言文王鹿鳴為詩則肆夏之三亦詩也肆夏為詩則九夏之奏亦詩也國語曰金奏肆夏樊遏渠杜預援之則云樂曲名其二肆夏一名樊其三昭夏一名遏其四納夏一名渠擊鍾而奏此三夏曲葢詩之載在樂章者為曲其實一而已凡祭祀饗食奏燕樂燕樂謂之奏亦以鍾鼓奏之也且燕以示慈惠而祭禮主乎敬饗禮主乎肅祭祀饗食何以奏燕樂王與諸侯行饗食之禮若饗元侯則升歌肆夏頌合大雅享五等諸侯則升歌大雅合小雅饗同乎燕故謂之燕樂其禮在廟故與祭祀同其樂兇足以見先王之仁鬼神仁賔客也凡射王奏騶虞諸侯奏貍首卿大夫奏采蘋士奏采蘩凡射則大射賔射燕射也樂師皆言以騶虞貍首采蘋采蘩為之節大師則帥瞽而歌射節鍾師乃掌此四詩之奏葢歌則人聲也奏則鐘鼓也鍾師言奏而不言節以主其節者樂師也掌鼙鼓縵樂縵樂即雜聲之和樂者鼙鼓又用之以和縵樂者鍾師掌金奏者也何取乎二者之和樂以磬師奏縵樂鍾師擊鼙以和之而已笙師掌教龡竽笙塤籥簫箎篴管舂牘應雅以教祴樂此亦教眡瞭也衆樂並作而以笙名官笙在東方有始事之意焉竽三十六簧宫管在中長四尺二寸其管頦以竹參差以象鳥翼笙長四尺十三管宫管在左以匏為之亦如鳥翼之形塤與管見小師籥如篴三孔主中聲而上下之簫編竹為之長一尺四寸大者二十四管小者十六管其形象鳳翼其聲象鳳鳴箎長尺四寸圍三寸一孔上出寸三分􅐟笛也長三尺四寸六孔舂牘以大竹長七尺為之短者一二尺其端有兩孔髹畫以兩手築地應長六尺五寸其中有椎雅如漆桶而弇口大二圍長五尺六寸以羊韋輓之兩紐䟽畫以教祴樂謂賔醉而出為之奏陔夏以此三噐築地為之明不失禮也凡祭祀饗射共其鍾笙之樂燕樂亦如之鍾笙之樂鄭氏謂鍾聲相應之笙大射禮云樂人宿縣於阼階之東其南笙鍾是鍾之與笙堂下之樂也葢升歌在上鐘既歌笙應鍾謂之鍾笙大喪廞其樂噐及葬奉而藏之大旅則陳之鎛師掌金奏之鼓凡祭祀鼓其金奏之樂饗食賓射亦如之軍大獻則鼓其愷樂凡軍之夜三鼜皆鼓之守鼜亦如之大喪廞其樂噐奉而藏之鎛小鍾也與鍾師所擊不編之鍾皆有金奏掌金奏之鼔即鼔人所謂以普鼓鼓金奏者也鎛師與鼓人聨職故云金奏之鼔又云祭祀饗食賔射皆鼓其金奏之樂所謂軍大獻則鼓其愷樂者愷樂亦以晉鼓鼓金奏鎛師則奏愷樂之金聲而已鼜者鼖鼓鼓軍事是也鼜其聲也司馬法曰昏鼔四通為大鼜夜半三通為辰戒旦明五通為𤼵煦此奏所謂三鼜及守鼜皆鼓之者皆鼔其金者也韎師掌教韎樂祭祀則帥其属而舞之大饗亦如之東夷之樂曰韎則韎師掌東夷之樂者也下經鞮鞻氏固掌四夷之樂矣而韎師何獨先於東夷之樂周自文王之世西有昆夷之患北有玁狁之難惟東南先服王化以基王業祭祀大饗帥其属而舞韎樂乃所以昭先王之德也旄人掌教舞散樂舞夷樂凡四方之以舞仕者屬焉凡祭祀賔客舞其燕樂旄人者執牛之尾以為舞者也所掌者旄舞而所教者散樂夷樂葢散樂者野人之舞夷樂者四夷之舞其用甚廣所以舞者至於衆寡無數祭祀賔客舞其燕樂則散樂夷樂咸在以燕樂示燕閒之意欲其樂之無所不備故也籥師掌教國子舞羽龡籥祭祀則鼓羽籥之舞賔客饗食則亦如之大喪廞其樂噐奉而藏之籥如􅐟三孔主中聲而上下律吕龡籥持羽則為羽籥之舞文舞也今攷成周樂舞之制有文舞有武舞文舞羽籥則籥師掌之武舞干戈則司干掌之固周人設官之定制然文王世子之篇曰小學正學干大胥賛之籥師學戈籥司丞賛之是籥師亦教干戈歟嘗考之文舞未嘗無干故舜之格有苗而兼取乎干羽武舞未嘗無羽故詩之言萬舞而及於左手執籥右手秉翟是知文舞之用干者干不勝羽也武舞之用羽者羽不勝干也二者雖兼用而各以其所尚者為主此樂師之教國子所以專言舞羽龡籥祭祀賔客饗食之時以鼓作之故曰鼓籥章掌土鼓豳籥中春晝撃土鼔龡豳詩以逆暑中秋夜迎寒亦如之凡國祈年於田祖龡豳雅擊土鼓以樂田畯國祭蜡則龡豳頌擊土鼓以息老物籥章所掌者豳籥言王業之所自始者也葢周自后稷以播種而封於邰至公劉居豳大王因之無非以農事開國及至於成王之世周公遭變作七月之詩謂之豳風凡以天時紀民事者皆所以著先公之風化而為一代艱難之業此豳籥之掌所以專設籥章之職而何取乎土鼓記曰土鼔蕢桴葦籥伊耆氏之樂也或謂伊耆即神農氏始教民耕者也以土鼓應豳籥示不忘本而已然民事之終始實關乎天時之消長故必先之以迎寒逆暑逆如逆女之義自外而入於内以我為主謂陽常居大夏而主歲功故也迎如迎賔之義自内而出於外以彼為客謂陰常居大冬時出而佐陽故也逆暑必於中春之晝迎寒必於中秋之夜者中春為歳陽之中晝為日陽之中如是而逆暑與堯典所謂日中星鳥寅賔出日同意中秋為嵗陰之中夜為宵陰之中如是而迎寒與堯典所謂宵中星虚寅餞内日同意夫寒暑有異氣春秋有異候而均取於擊土鼓龡豳詩者皆以人心之和而召天時之和者也故民事之始終係焉於此而祈年即詩所謂春秋之祈於此而祭蜡即詩所謂秋冬之報然噫嘻於春夏則祈於上帝此則祈於田祖而已豐年於秋冬則報於上帝此則報於八蜡而已祈年雖主於田祖而所謂龡豳雅擊土鼓者乃在於樂田畯田畯喜而後民得以耕饁順民事之始者也祭蜡雖主於索饗萬物而所謂龡豳頌擊土鼓者乃在於息老物老物息而後民得以室處順民事之終者也土鼔之用一也而豳籥則有三詩之異鄭氏皆以為豳風七月之詩謂其詩八章殆及公子同歸以上三章為豳詩為此春酒以介眉夀以上四章為豳雅稱彼兕觥萬夀無疆一章為豳頌詩所以道其氣雅所以作其情頌所以告其成三者雖不同皆所以發逹乎天地之和聲夫是以聲和而氣和氣和而天地之和應孰謂土鼓豳籥為聲樂之末鞮鞻氏掌四夷之樂與其聲歌祭祀則龡而歌之燕亦如之鞮鞻者樂工所履之屨名官以鞮鞻而使之掌四夷之樂言其際天所覆薄海内外凡有足履無不至也葢周自文王之世西有昆夷之患北有玁狁之難而東南獨先賔服故專設韎師之職以掌東夷之樂矣至武王克殷遂通道於九夷八蠻而西旅貢獒肅慎氏貢楛矢四夷左衽罔不臣妾於是始備四夷之樂其樂名之見於孝經緯鉤命决者東夷之樂曰韎持矛助時生南夷之樂曰任持弓助時養西夷之樂曰株離持鉞助時殺北夷之樂曰禁持楯助時藏皆所以昭先王服逺之功薦之宗廟之中亦所以彰聖德之無不被也所謂與其聲歌祭祀則龡而歌之燕亦如之者主乎舞而已然鞮鞻於四夷之樂初未嘗舞也旄人掌舞夷樂而祭祀賓客舞其燕樂是旄人掌舞而鞮鞻氏之職乃以聲音節之而已

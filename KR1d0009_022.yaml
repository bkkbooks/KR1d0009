body:
  text: 周官總義卷二十二宋易祓撰士師之職掌國之五禁之法以左右刑罰一曰宫禁二曰官禁三曰國禁四曰野禁五曰軍禁皆以木鐸徇之于朝書而縣于門閭以五戒先後刑罰毋使罪麗于民一曰誓用之于軍旅二曰誥用之于會同三曰禁用諸田役四曰糾用諸國中五曰憲用諸都鄙鄭氏曰宫王宫官官府國城中也先後即左右之意古者有五刑無五罰五罰自周穆王始而古所謂罰則刑之輕者也舜之象以典刑則常刑也以常刑為重故以五流之法宥之猶以為重焉又設為三等之輕刑曰鞭作官刑撲作教刑金作贖刑贖刑即後世所謂罰而其輕又居三等輕刑之下至周人設刑官之職初無五罰之法而司圜所謂罰人不虧財則知舜之贖刑即此所謂虧財者也輕亦甚矣考之士師則成王周公之心非特欲其無刑亦欲其無罰何其仁也故左右刑罰則有五禁先後刑罰則有五戒凡以此而已聖人立法之意以謂禁者使之知所止故於禁言左右是欲左右輔之使之不至于刑罰也戒者使之知所守故于戒言先後是欲先後導之使之不至于刑罰也蓋禁所以防之徇以木鐸而縣其書于門閭則其所防為甚嚴戒所以警之毋使罪麗于民則其所警為甚切若是而斯民猶陷于刑罰者無有也後世人情日薄而抵冒滋衆穆王於是作五罰之法以損五刑之舊司刑所掌五刑之屬二千五百而穆王之三千以枚數之雖增于前然墨劓所增者各五百皆輕刑也宫所損者二百大辟所損者三百皆重刑也惟其禁戒不立而左右先後之無術觀其目則哀矜之意固可見觀其凡則文勝俗弊亦可推矣掌鄉合州黨族閭比之聫與其民人之什伍使之相安相受以比追胥之事以施刑罰慶賞六鄉之內其居則有州黨族閭比之聫其民人則有什伍之聫皆合其聫以待征斂調發之事此鄉官之職也而士師又掌之者使之相安相受故耳蓋人之有罪過未麗于法而害于州里者去之則不善者逺焉而後善者得以相安上罪期役以至下罪三月役任于州里者舍之則不善者反焉而後善者得以相受相安相受是與衆同欲也與衆同欲則與衆同惡也以是比追胥之事則出入相友守望相助是有利存焉以施刑罰慶賞則賞一人而同所勸罰一人而同所戒是有義存焉此士師所以掌鄉而弼六鄉之教也掌官中之政令察獄訟之辭以詔司冦斷獄弊訟致邦令官中之政令即刑所行之政令也察獄訟之辭則刑官之屬若鄉士遂士縣士方士各上其獄訟之不決者而致其辭于士師士師因其辭而察之以詔司冦斷獄弊訟獄訟既審合于邦令士師則又以其邦令而致之于鄉士遂士縣士方士上下聫事精察如此此獄訟之所以得其中也掌士之八成一曰邦汋二曰邦賊三曰邦諜四曰犯邦令五曰嬌邦令六曰為邦盜七曰為邦朋八曰為邦誣成定也八成言士則士之八成而已汋酌也謂刺探邦之機密以遺于外者賊毁則者也謂毁棄王略而潛為變者邦諜謂為敵國反間以亂我邦者犯邦令謂故作狠傲以觸邦令者嬌邦令謂輒為詐冒以擅邦令者為邦盜謂竊持邦柄以作威福者為邦朋謂朋淫匪人相比為惡者為邦誣謂妄作妖祥惑衆亂俗者八者罪所不貸聖人于是有一定之法故曰八成若邦凶荒則以荒辨之法治之令移民通財紏守緩刑凡言邦國則諸侯也單言邦單言國則天子也此經若邦凶荒則非為天子畿內而設何者大司徒以荒政十二聚萬民初不言移民通財而移民通財乃見于大荒大札令邦國之後則移民通財諸侯之事也荒政無糾守而此則有糾守是責諸侯以守也荒政言緩刑而其後令邦國亦言緩刑是緩刑所以恤災凶民命所關天子諸侯之所同也若是則此經言邦者亦可以為諸侯之邦矣小行人曰若國凶荒則令賙委之其救荒同而其單言國又同非諸侯而何凡以財獄訟者正之以傅别約劑以財獄訟謂獄訟而爭財者也正小宰八成所謂聽稱責與買賣者是已故正之以傅别約劑之法傳謂地傅以為之保别謂判書以為之合約謂書其期約者劑謂為之要書者四者皆稽之以為決以此正獄訟則片言可折而爭心息矣若祭勝國之社稷則為之尸宗廟社稷七祀皆有尸初不命刑官而此以刑官為尸者特見于勝國之社或曰以其不靈于亡國而妖邪附之故威之以刑官非也郊特牲曰社祭土而主隂氣也又曰天子大社必受霜露風雨以達天地之氣喪國之社屋之不受天陽也亳社北牖使隂明也言亳社則勝國之社也亳社以隂為主而刑乃隂之類媒氏以男女之隂訟而聽之于勝國之社類也此祭勝國之社而刑官為之尸亦類也王燕出入則前驅而辟自治朝而退居于內者謂之燕朝自燕朝而退居寢者謂之燕寢此出入所以謂之燕出入也士師前驅而辟則王者燕間之際無一節之不謹車謂之道車者其意亦可推矣祀五帝則沃尸及王盥洎鑊水凡刉珥則奉犬牲祀五帝者謂五人帝之祀而士師言沃尸者何也致其潔而已方尸之入門也以盤匜盥水及王有獻尸之禮亦奉水以盥故皆言沃鑊水本小司冦所實士師則洎而增之凡此皆取其明清于用刑所以使之沃使之洎也諸侯為賓則帥其屬而蹕于王宫大喪亦如之大師帥其屬而禁逆軍旅者與犯師禁者而戮之諸侯為賓則有燕享之禮大喪則有廬舍之居帥其屬而蹕王宫所以肅朝廷之儀師而不從令是謂逆軍旅臨陳而不用命是謂犯師禁帥其屬而行其戮所以正軍旅之法凡此皆以刑官之士師任其職重其事也歲終則令正要會正歲帥其屬而憲禁令于國及郊野小司寇于正歲命其屬入會乃致事者入此歲終所正之要會也至于小司冦憲禁令于四方而此則憲禁令于國及郊野則亦二與考之辨焉爾鄉士掌國中各掌其鄉之民數而糾戒之聽其獄訟察其辭辨其獄訟異其死刑之罪而要之旬而職聽于朝司冦聽之斷其獄弊其訟于朝羣士司刑皆在各麗其法以議獄訟獄訟成士師受中協日刑殺肆之三日若欲免之則王會其期大祭祀大喪紀大軍旅大賓客則各掌其鄉之禁令帥其屬夾道而蹕三公若有邦事則為之前驅而辟其喪亦如之凡國有大事則戮其犯命者遂士掌四郊各掌其遂之民數而糾其戒令聽其獄訟察其辭辨其獄訟異其死刑之罪而要之二旬而職聽于朝司冦聽之斷其獄弊其訟于朝羣士司刑皆在各麗其法以議獄訟獄訟成士師受中協日就郊而刑殺各于其罪肆之三日若欲免之則王令三公會其期若邦有大事聚衆庶則各掌其遂之禁令帥其屬而蹕六卿若有邦事則為之前驅而辟其喪亦如之凡郊有大事則戮其犯命者縣士掌野各掌其縣之民數糾其戒令而聽其獄訟察其辭辨其獄訟異其死刑之罪而要之三旬而職聽于朝司冦聽之斷其獄弊其訟于朝羣士司刑皆在各麗其法以議獄訟獄訟成士師受中協日刑殺各就其縣肆之三日若欲免之則王令六卿會其期若邦有大役聚衆庶則各掌其縣之禁令若大夫有邦事則為之前驅而辟其喪亦如之凡野有大事則戮其犯命者古之典刑者謂之士故周人專設士師之職以統羣士羣士則各分其職以掌所治之刑獄若鄉士掌鄉之民數而曰掌國中遂士掌遂之民數而曰掌四郊縣士掌縣之民數而曰掌野鄭氏六鄉之獄在國中六遂之獄在四郊縣之獄在野蓋聖人謹于刑獄以其所掌者逺則察之欲其近非使之掌其地也或謂國中亦鄉地四郊亦遂地縣亦野地此殆非周人設羣士之意考載師任地之法有所謂國中之地近郊之地逺郊之地是指王城以至于六鄉之內外而言也有所謂甸地稍地縣地疆地是指六鄉內外以達于王畿而言也蓋王城謂之國中距王城五十里為近郊百里為逺郊二百里以外至三百里曰野三百里以外至四百里曰縣四百里以外至五百里曰都都縣野之地其為公邑者亦謂之縣是鄉之獄近于王城遂之獄近于鄉公邑之獄近于遂所居之地以近為主而所掌之民數則各從其職可知矣夫所謂民數者實地官司徒之任而亦掌之鄉士遂士縣士者非專掌民數也掌其夫家衆寡而以刑獄之法糾之戒之令之而已蓋聖人之于刑獄非得已而用之者分職降典而後折民惟刑相我受民而後能和其庶獄自上失其道而後曽子有民散之嘆放僻邪侈之陷于罪而後孟子有罔民之譏則夫戒之糾之令之毋使罪麗于民聖人之本心也然鄉士言糾戒之而遂士縣士言糾其戒令者鄉治詳故不特糾之而又戒焉遂縣治略故遂士縣士無所戒或違遂縣吏之戒令則糾之而已聽其獄訟察其辭者獄訟以辭為主書曰師聽五辭五辭簡孚正于五刑又曰察辭惟差非從惟從則察獄訟之辭者亦求以盡其情而已辨其獄訟謂訟有曲直而獄有輕重故辨之也異其死刑之罪者謂一死四刑其罪亦異故異之也輕重既審乃取其要辭而書其實然後以斷刑之職而聽斷于外朝王制云正以獄成告于大司冦大司冦聽之棘木之下正即羣士也棘木即外朝也蓋外朝之位羣臣羣士西面諸侯羣吏東面而三公北面州長衆庶在其後職聽于此則將以盡人之情焉然鄉士以一旬遂士以二旬縣士以三旬因其逺近而為之久速致謹于刑獄也司冦聽之斷其獄弊其訟于朝者蓋外朝之際羣士司刑皆在故司冦斷獄弊訟于此是又欲盡羣士司刑之情也于是羣士司刑各麗其法以議獄訟則若司刑掌五刑之法而司刺又有三刺三宥三赦之法各為之麗其法以議獄訟獄訟成則具書謂之中者若書所謂咸中有慶小司冦所謂登中于天府蓋獄訟至于中則無不當焉士師于此受中則其刑當于罪一定不易然後叶日而行刑殺肆之三日所以懲衆也若欲免之則上之人非以私意免之也羣臣合于八議萬民合于三赦三宥則又非斷獄訟者之職乃所以示一人之恩故于鄉之獄則王親會其期于遂之獄則王命三公會其期于縣之獄則王命六卿會其期是又以其逺近而為之差者也鄉士于祭祀喪紀軍旅賓客之大者遂士于邦之大事縣士于邦之大役皆掌其禁令而蹕者欲人之毋敢犯也三公卿大夫之有邦事則為之前驅而辟辟行人而使之知所避為邦事設也國也郊也縣也有大事則戮其犯命者又為師田設也大司馬之大閲而斬其不用命者大師而比軍衆則誅後至皆犯命者也于是大司冦則為之涖大軍旅之戮小司冦則為之涖小軍旅之戮士師又有犯師禁者之戮然則戮其犯命者非師田而何方士掌都家聽其獄訟之辭辨其死刑之罪而要之三月而上獄訟于國司冦聽其成于朝羣士司刑皆在各麗其法以議獄訟獄訟成士師受中書其刑殺之成與其聽獄訟者凡都家之大事聚衆庶則各掌其方之禁令以時修其縣法若歲終則省之而誅賞焉凡都家之士所上治則主之掌都家之獄訟者謂之都士家士獄訟成則告于方士方士掌都家亦以都家在王畿之四方故也都謂王子弟及公卿所食之采地家謂大夫所食之采地聽其獄訟之辭則聽都士家士所告之辭辨其死刑之罪而要之則又辨其一死四刑輕重之書三月而上獄訟于國以都家又逺于鄉遂及縣也言上于國而不言聽于朝者蓋鄉士遂士縣士自以其職而列于九棘之下故曰職聽于朝方士掌都家不必職聽上獄訟于國而已至司冦受其成然後為之聽于朝于是羣士司刑亦各麗其法以議獄訟獄訟成士師受中前所謂成則都家聽獄訟之成後所謂成則司冦羣士司刑聽議之成也書其刑殺之成則知其所犯之罪書其聽獄訟者則知其所聽之人先王欲其獄成而孚蓋如此也然不言協日刑殺與免之而會其期者亦以鄉士遂士縣士互文推之耳凡都家之大事聚衆庶則各掌其方之禁令者方士以中士十有六人為之則四人而分主一方故也以時修其縣法者王畿之縣也縣師掌之以方士而修縣法則縣之法而已縣師掌邦國稍甸郊里之地域與其人民田萊夫家之數六畜車輦之稽以待國之作民所謂縣法者此也為之修其縣法則民之登耗多寡器之良窳備乏吏之勤惰功過可得而計焉故于歲終則親省而巡視之以行其誅賞然則方士之所言誅賞即縣師之所言廢置者也方士所掌止于都家故以誅賞言縣師所掌及于邦國稍甸郊里故以廢置言而必詔之于上也凡都家所上治則謂都士家士上所治之獄方士主之以上于國焉訝士掌四方之獄訟諭罪刑于邦國凡四方之有治于士者造焉四方有亂獄則往而成之以言逆人謂之訝訝士以逆賓客為職而曰掌四方之獄訟者謂四方諸侯之獄訟亦以言而逆之也故曰諭罪刑于邦國上言四方而下言邦國則以邦國在四方故也謂之諭罪刑者以其議刑之法明其所坐之罪也四方之有治于士者謂疑獄未決先造于訝士訝士則達于士師以斷之亂獄有干名犯分之刑訝士則往而成之謂往而竟其獄也邦有賓客則與行人送逆之入于國則為之前驅而辟野亦如之居館則帥其屬而為之蹕誅戮暴客者客出入則道之有治則贊之邦有賓客與行人送逆之是行人以禮言訝士以刑言刑以肅其禮而已送逆謂其來與往也出入謂朝覲之時也掌訝曰若將有國賓客至則與士逆賓于疆為前驅而入凡賓客之治令訝訝治之凡從者出則使人道之掌訝與訝士逆賓于疆而訝士與行人送逆不及疆至野而已掌訝與訝士逆賓于疆為前驅而入訝士與行人入于國野則為前驅而辟客出入訝士道之從者之出掌訝使人道之訝士掌訝皆中士八人而掌訝正以送逆賓客名官訝士刑官而與行人肅送逆之儀其詳略輕重如此凡邦之大事聚衆庶則讀其誓禁大事謂王國征伐之事為之讀其誓命與五禁之法朝士掌建邦外朝之法左九棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位焉羣吏在其後面三槐三公位焉州長衆庶在其後朝士掌建邦外朝之法而小司冦掌外朝之政者政所以正其法者也然而朝位不同者小司冦主于詢天下之政故其位止于公卿大夫庶民而已若朝士專掌外朝之法則諸侯以至羣士羣吏咸在焉欲肅其儀所以必建其法今觀外朝之法其位必有取于九棘三槐者何也庫門之外謂之外朝植三槐于前植九棘于左右初非有取于託物之義或者以三槐象三公之德九棘象羣臣諸侯之德是有見三公羣臣諸侯而無見于天子外朝之法也蓋孤卿大夫則待之以臣道故列其位于九棘之左公侯伯子男則待之以賓道故列其位于九棘之右三公北面則以答王為義故列其位于三槐之前以至羣士羣吏州長衆庶之徒皆所以斷庶民獄訟之中故亦各以位序而列于後所謂外朝之法其嚴蓋如此然刑官于此聽獄訟必待諸侯羣臣咸集而後為之聽則外朝之禮不常舉不幾于淹延乎是不然諸侯羣臣之並列于位者外朝之法斷獄弊訟于九棘之下者外朝之位初不必諸侯羣臣之咸集而後聽之也不然小司冦言詢臣民而王位為南鄉此不列王南鄉之位則知其不待外朝之時明矣左嘉石平罷民焉右肺石達窮民焉庫門外朝之地臣民咸集所以左嘉石平罷民而使之有愧悔之心君尊甚近所以右肺石達窮民而使之無壅遏之患義見大司冦帥其屬而以鞭呼趨且辟禁慢朝錯立族談者王朝有三皆所以聽政而此經言外朝之政特詳于治朝燕朝者何也燕朝在路門之內治朝在路門之外又外而應門又外而雉門則有中門之禁焉以至尊所居儀衛嚴肅幾其出入不可踰越惟庫門在雉門之外而外朝又在庫門之外不特諸侯羣臣之咸在雖州長衆庶與夫窮民罷民之類皆得以羣至于左右前後之列其可忽乎當外朝聽政之時固有雜遝于道路而莫知其所避者亦有差紊其行列而莫知其所嚮者朝士以鞭呼趨則呼朝者之趨于位也且為之辟則使人避焉而正其位也位定然後為之禁其慢朝者錯立者族談者尊君故也此外朝所建之法所以為甚嚴若夫孟子所謂不厯位而言不踰階而相揖則三朝之禮一而已凡得獲貨賄人民六畜者委于朝告于士旬而舉之大者公之小者庶民私之古者建國面朝後市蓋市近于利而朝近義惟義可以正天下之利也況庫門外朝之地州長衆庶窮民罷民之類皆得以羣至于左右前後之列則夫得獲之法尤不可廢蓋人民有常業而或至于亡逸者貨賄六畜有常守而或至于遺失者於是乎有朝士之法凡得獲貨賄人民六畜則委于聽獄訟之朝告于議獄訟之士而不敢私焉以待其人而反之不使人之見利而忘義也至于旬則亦既久矣物不可反亦不可棄于是舉之大者入于公小者歸于庶民之私是又以上下輕重而制其義若司市言得貨賄六畜者三日而舉之與此經異者市民之所集其亡易得其求易速故三日而舉若外朝之所委則求者或逺亡不易得待之宜緩故必至于旬而後舉各當于義而已凡士之治有期日國中一旬郊二旬野三旬都三月邦國期期內之治聽期外不聽凡士之治謂士之各以獄訟職聽於朝司冦聽之為之斷其獄弊其訟者也逺近不一而所治之事皆有期日防稽緩而已國中一旬謂鄉士也郊二旬謂遂士也野三旬謂縣士也都三月謂方士也邦國期謂訝士也期內聽者固所以防稽緩之失期外不聽者乃所以革煩擾之弊是亦聖人息獄訟之一端凡有責者有判書以治則聽凡民同貨財者令以國法行之犯令者刑罰之凡屬責者以其地傅而聽其辭小宰八成之法聽稱責以傅别别判書也人執其一書其所豫之數凡責償則合之以為驗故為之聽其治凡民同貨財者謂二人同運貨財以分利令以國法行之則行之以門關司市之法犯令者刑罰則並舉其貨而罪止于犯令一人而已傅謂其人之有地著而書之以附其事者也凡以已財屬于人而使之責者有地傅則追證為不誣故為之聽其辭此小宰八成之法與夫門關司市之法而必書之于朝士者謂其訟之至于外朝而未附于獄未麗于法非羣士司刑之所議故朝士聽之凡盜賊軍鄉邑及家人殺之無罪凡報仇讎者書于士殺之無罪專殺固聖人之所禁凡盜賊結集徒黨已成軍伍而害及鄉邑及家人者茍禁其殺則其勢將猖獗而不可禦殺之無罪去天下之害也仇讎之報雖曰私復然已書于士則罪狀明白國法所不貸茍禁其殺則亦有負罪逃匿而幸免者殺之無罪除天下之惡也捨是則殺人者死乃萬世至公之法若邦凶荒札喪冦戎之故則令邦國都家縣鄙慮刑貶凶荒札喪冦戎之故非小變也朝士為之慮刑貶者先事而思患之謂慮慮刑則慮其刑之所當釋而可以濟一時之宜者慮貶則慮其財之所當損而可以紓一時之急者皆所以逆制其變故云爾司民掌登萬民之數自生齒以上皆書于版辨其國中與其都鄙及其郊野異其男女歲登下其死生及三年大比以萬民之數詔司冦司冦及孟冬祠司民之日獻其數于王王拜受之登于天府內史司會冡宰二之以贊王治周人設司民之官以象司民之星與天府所言祭天之司民而獻民數者同義其所書生齒之數即大司徒人民之數小司徒夫家之數鄉師鄉大夫夫家衆寡之數一也其職不列于地官而列于秋官者何也秋官以刑為主歲以死生為登下之數是使之敬吾刑以敬吾民也及三年大比以萬民之數詔司冦即小司冦所謂及大比登民數是已然小司冦又云孟冬祀司民獻民數于王而此云大比詔司冦司冦及孟冬祀司民之日獻其數于王者蓋小司冦于每歲之祀司民則獻每歲之常數此則于大比之歲以民數詔司冦然後小司冦又于三歲之祠司民而獻三歲之大數王拜受之登于天府內史司會冡宰二之則見其民數之不可忽此言二之以贊王治而小司冦則言二之以制國用者蓋財之豐耗出于民民之繁簡係乎刑小司冦既敬刑以為民之本故冡宰資之以制國用若司民專掌萬民之數故泛言贊王治而已司刑掌五刑之法以麗萬民之罪墨罪五百劓罪五百宫罪五百刖罪五百殺罪五百若司冦斷獄弊訟則以五刑之法往詔刑罰而以辨罪之輕重五刑非聖人之得已也論其法則墨輕于劓劓輕于宫宫輕于刖刖輕于殺至于殺則教之所不可存者借之以止殺而已然周官五刑各五百其屬為二千五百穆王之五刑則其屬三千又以五等而為其屬之重輕輕者屬多如墨劓之屬各千是已重者屬少如宫屬三百大辟之屬二百而已周公之輕刑入重穆王之重刑入輕所謂世重世輕惟齊非齊有倫有要者同義然惟法惟察其審克之則以五刑詔刑罰之意上下比罪上刑適輕下服下刑適重上服則辨其罪之輕重之意是其刑雖以世為輕重而所以麗罪于刑者一也司刺掌三刺三宥三赦之法以贊司冦聽獄訟一刺曰訊羣臣再刺曰訊羣吏三刺曰訊萬民一宥曰不識再宥曰過失三宥曰遺忘一赦曰幼弱再赦曰老耄三赦曰蠢愚以此三法者求民情斷民中而施上服下服之罪然後刑殺刺殺也不曰殺而曰刺者刺取人情之當否而後加以刑殺故有三刺之法其罪亦有加于五刑為重而出于五刑為輕者于是乎為之宥以寬之故又有三宥之法至于其情可矜而五刑疑于無罪則從而赦之故又有三赦之法兼掌此三者而獨以刺名官乃所以見先王之重于刑殺也此司刺之職所以掌此三者之目以贊司冦之聽獄訟所謂三刺者一曰訊羣臣二曰訊羣吏三曰訊萬民小司冦所謂斷庶民獄訟之中者是已然小司冦言刺而兼及于宥此言三刺三宥而復及于三赦則先王謹刑之意尤詳焉何謂三宥一曰不識若以甲為乙而殺之者也二曰過失若斫伐他物而誤傷于人者也三曰遺忘若遺忘法禁之所在而偶有所犯者也何謂三赦一曰幼弱則幼而又弱所謂七年曰悼是也二曰老耄則老而又耄所謂八十九十曰耄是也三曰蠢愚則蠢而又愚所謂下愚不移者是也以此三法者贊司冦聽獄訟則贊之以赦宥刑殺之未定者蓋正以獄成告于大司冦大司冦聽于棘木之下然後小司冦以三刺斷之而施上服下服之刑司刺以三刺三宥三赦贊之而施上服下服之罪因法以議罪因罪以施刑上下相承所謂中者如此至此而言然後刑殺則先王不得已之意司約掌邦國及萬民之約劑治神之約為上治民之約次之治地之約次之治功之約次之治器之約次之治摯之約次之司約之約劑自邦國以至萬民皆用焉然萬民謂之小約劑邦國謂之大約劑此言治神以至治摯凡六者則大約劑也而六者之中又有輕重存焉蓋宗廟有位山川有域有社稷之壝有五祀之次所以事神者不待約矣至于非其所祀而命之祀則書其所以命之者以為約若魯用郊禘之類是也分鄉以寓軍制邑以授農以旌節而辨遷徙以萃逋逃為顯戮所以容民者不待約矣至於非其所當有而分以授之則書其所以分之者以為約若分衛以殷民七族是也自百里至五百里以為諸侯之等自食者半至食者四之一以為分土之法所以列地者不待約矣至至于非其所有而使取之則書其所以取之者以為約若取于相土之東都以會王搜之屬是也自王功以至事勞治力皆㫝功之輕重以為賞銘于大常祭于大蒸則所以著其功者不待約矣至于功之大而報之異則書其所以異者以為約若虢仲虢叔勳在王室藏于盟府是也大路少帛綪茷旃旌密須之鼓闕鞏之甲則所以受彞器者不待約矣至於非所當用而頒之則書其所以頒者以為約若魯得用四代之器是也玉帛禽鳥之物榛栗棗修之物以至工商庶人亦皆有名則所以為摯者不待約矣至于禮之可以合驗者異焉則書其所以為異者以為約若公孫黑使強委禽之屬是也是六者皆邦國之大信王業由之建焉後世子孫守其約而不可渝則治之宜不可緩即大以推小則萬民之約劑亦可知矣凡大約劑書于宗彝小約劑書于丹圖若有訟者則珥而辟藏其不信者服墨刑若大亂則六官辟藏其不信者殺大約劑者邦國之約也書于宗廟之六彞所以幽託于神也小約劑者萬民之約也書于雕器之有丹圖者所以明著于人也若有訟者則辟户而出其所藏之約辟藏而云珥珥讀為弭即小祝弭兵災之祭以約劑有訟乃兵災之漸重之也不信者服墨刑謂其墨而不明也大亂謂僣約之邦六官辟藏明罪大也不信而至于殺則約劑之重也可知司盟掌盟載之法凡邦國有疑會同則掌其盟約之載及其禮儀北面詔明神既盟則二之盟萬民之犯命者詛其不信者亦如之凡民之有約劑者其二在司盟有獄訟者則使之盟詛凡盟詛各以其地域之衆庶共其牲而致焉既盟則為司盟共祈酒脯歃血以詔明神者盟也載者盟之辭也盟者書其辭于䇿殺牲取血坎其牲加書于上而埋之謂之載書以法行之謂之盟載之法盟而加之以約又謂之盟約之載其來尚矣吕刑曰民興胥漸泯泯棼棼罔中于信以覆詛盟則盟約之事固已見于堯舜之世左氏傳曰昔召康公命我先君股肱周室夾輔成王成王勞之而賜之盟是盟約之書復見于成周之時榖梁子以為盟詛不及三王非也于是司盟之職有所謂邦國之盟約有所謂萬民之盟約凡邦國有疑會同則掌其盟約之載及其禮儀北面詔明神既盟則二之此邦國之盟約也盟萬民之犯命者詛其不信者亦如之凡萬民之有約劑者其二在司盟此萬民之盟約也凡此二者若有獄訟皆使之盟詛所謂盟者託神以結其信而使之知所敬所謂詛者託神以禍其不信而使之知所畏皆所以善人心而已凡盟詛各以其地域之衆庶共其牲而致焉既盟則為司盟共祈酒脯此雖禮文之末而皆至信之所由寓後世慢神于上誣人于下區區之牲血酒脯不足以勝背誕之俗此君子屢盟詩人以為長亂小國爭盟左氏知其必亡故春秋一書有書求盟有書同盟有書涖盟然信不由中盟無益也其與先王之盟約異矣

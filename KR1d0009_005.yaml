body:
  text: 周官總義卷五宋易袚撰大府周制天下之財皆受令於大宰而總於大府大府一職雖為主藏之長而非有司出納之任乃所以總有司之岀納者也何謂總有司之出納玉府則專掌王之器物内府則受財賄以待大用外府則掌邦布之入岀以共百物至於司㑹司書職内職嵗職幣莫不各有其職而其出内盡總於大府然後大府以大宰之式法頒之受之是大宰提其綱大府總其目而羣有司共命於其下大小有紀本末有序纎悉委曲具有條理此周制之良也鄭氏於大府之序官註曰若今之司農夫司農豈大府比哉漢之設官惟無大府一職是以上無所統下無所受一代之制無足觀焉近世先儒謂漢之司農掌榖貨以共軍國之用則猶外府也少府掌山海陂池之税以給天子之私飬則猶玉府内府也雖無大府一職以總其出内而當時所謂計相則猶司㑹之任計相與司農少府盡屬於丞相御史則猶冡宰制國用之舊自計相罷不復置而司農少府不相統屬以比周之大府豈其然乎以史証經固為不類因鄭氏之説而知周官設太府之職其出内有制而事無乏用與漢制異矣掌九貢九賦九功之貳以受其貨賄之入頒其貨于受藏之府頒其賄于受用之府凡官府都鄙之吏及執事者受財用焉大宰以九職任萬民以九賦斂財賄以九貢資邦國之用九功則九職之功也是三者太宰總之每事為一書每書皆有貳大宰總是書而責其入于征者司徒之屬按是書而征之以入于掌者大府之職又執是書貳舉其貨賄之入而頒之于所當用者頒其貨于受藏之府則若玉府内府之類頒其賄于受用之府則若外府之類盖玉府掌王之金玉及良貨賄之藏是擇四方之精美者以共王之服食好賜内府掌受天下之貨賄良兵良器是又擇四方精美之次者以待邦之大用至外府掌邦布之入出以共百物則凡四方之物皆所以待天下之經費是數者皆所謂府也若司㑹以至職幣乃糾察鈎攷之任則非府矣受藏受用其府各異及其用也凡官府都鄙之吏及執事者受式法于大府而請之于有司若云某物頒于某官某用取于某所利權散主而政本實一此周人制用之良法凡頒財以式灋授之闗市之賦以待王之膳服邦中之賦以待賔客四郊之賦以待稍秣家削之賦以待匪頒邦甸之賦以待工事邦縣之賦以待幣帛邦都之賦以待祭祀山澤之賦以待喪紀幣餘之賦以待賜予此經自關市以至幣餘則大宰之九賦也自膳服以至賜予則大宰之九式也九式之法專用于九賦此正大宰總國用之大者大府所謂式法則以大宰九賦之式法而頒之于有司然以某物共某頒盖有深意存焉古者關市雖有征然凶荒札喪則關門有征而猶㡬市無征而作布非常賦也以之待膳服則足以見先王之薄于自奉也邦中之賦百物所聚園則共果蓏之物㕓則共珍異之物乃常賦也以之待賔客則足以見先王之厚于待人也外是則鄉遂矣四郊百里在六鄉之外其賦則以待稍秣邦甸二百里乃六遂之餘地其賦則以待工事近者使之輸重逺者使之輸輕故也外是則都鄙矣家削乃大夫所食之采地其賦則以待匪頒邦縣乃卿所食之采地其賦則以之待幣帛邦都乃公所食之采地其賦則以之待祭祀卑者共其禮之常尊者共其禮之大故也委人以下皆山澤之職所共者薪蒸茶炭之類以其賦而待喪紀冝也職幣所謂斂邦財者之幣振掌事者之餘財以其賦而待賜予冝也曰賔客曰稍秣曰工事曰匪頒曰幣帛曰祭祀曰喪紀七事者皆有一定之式而用經常之賦不可易者若夫王之膳服乃至尊所御故大府于九式則列之于始王之賜予乃非常之恩故大府于九式則列之于終然關市之賦初未嘗强無以為有幣餘之賦亦本吾所自有之物是約已以厚民者也夫豈厲民以自飬哉凡邦國之貢以待弔用凡萬民之貢以充府庫天下財賦之原有三而皆總之于大宰一曰以九職任萬民則自三農以至閒民是也二曰以九賦斂財賄則自邦中以至幣餘是也三曰以九貢致邦國之用則自祀貢以至物貢是也今大府之頒財以式法授之考其式法則皆九賦之財賄是九賦之用固有定法矣若夫邦國之貢以待弔用萬民之貢以充府庫則非國用之經費故未嘗用焉盖嘗攷之二者不列于九式之中其果未嘗用耶是不然王制曰冢宰制國用必于歳之杪五穀皆入然後制國用用地小大視年之豐耗繼之曰國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國也三年耕必有一年之食九年耕必有三年之食以三十年之通則雖有凶旱水溢民無菜色知冢宰有三十年之制又知有國者必有九年之蓄然後邦國之所謂貢者于三年之中常㽞一年之蓄以待弔用萬民之所貢者亦于三年之中常㽞一年之蓄以充府庫其歳蓄之外皆以給國之用如軍旅之費田役之費百官有司廪餼之費凡九式所不載者皆取具于此是則三十年之所通者既使國家之無乏用所謂九年之所蓄者又常使邦國之有餘用此大宰兼制國用之要也不然則内府之職何以掌受九貢九賦九功之貨賄以待邦之大用邦用既出于九貢九賦九功之貨賄即所謂三十年之通者也不特内府而已司㑹以九貢九功之法而聼其㑹計司書以九職九正之數而周知入出百物是邦國之貢果盡以待弔用萬民之貢果盡以充府庫耶由是觀之歲蓄之餘既以待邦之大用而邦用之外又以其餘者共王玩好之用司書掌其數司㑹掌其計内府掌其物而總之于大府制之于大宰上下有制而斂散有度王者道御之方如此凡式貢之餘財以供玩好之用玩好之用聖人不廢也聖人處此亦必有道矣故大府之職以式貢之餘財共其用所謂式者即九賦之式所謂貢者即邦國萬民之貢盖待弔用充府庫之外而後有邦之大用大用之外而後有式貢之餘財夫豈玩物害民者哉然此言式貢之餘財以共玩好之用而上經又言幣餘之賦以待賜予是賜予則公于玩好者也幣餘則公于餘財者也幣餘之賦寔在九式之末而此言式貢之餘則又是幣餘之餘財以此見先王之不急于玩好者也况所謂餘財者非必曰取辦于式貢之當用必待式貢之餘財然後共之若其無餘則亦無所共矣凡邦之賦用取具焉歳終則以貨賄之入出㑹之凡邦之賦用即九賦之見于大宰之式九貢九功之見于大宰之所制者也賦謂當入之數用謂當出之數取其一歳賦用之具數以為之本然後歳終則以受藏受用之府所入所出而㑹之㑹之于歳終乃冢宰制國用之時也冢宰制國用于歳杪大府于此而㑹九賦九貢九功之入出上下之相承如此玉府掌王之金玉玩好兵器凡良貨賄之藏玉府𨽻于大府所謂受藏之府此其一也以玉名官則王者之服用好賜在焉以其職掌觀之大府頒其貨于受藏之府鄭氏于大宰之九職註曰金玉曰貨是金玉固玉府掌之矣獸人曰皮毛筋骨入于玉府􅘋人曰凡􅘋征入于玉府㕓人曰斂其皮角筋骨入于玉府澤虞曰掌國澤之政令守其財物以時入之于玉府職金亦曰入其金錫于為兵器之府入其玉石丹青于受藏之府此其玩好兵器良貨賄之物玉府皆掌而藏之矣盖貨賄有二有貨賄之良者有貨賄之常者常者出于九賦九貢九功之中内府掌之以待邦之大用若其良貨賄則大府擇其精美者藏之玉府專以共王之服用好賜其與常貨賄異矣共王之服玉佩玉珠玉王齊則共食玉大䘮共含玉復衣裳角枕角柶掌王之燕衣服祍席牀第凡䙝器周官所掌有王之玉國之玉則寳器也瑞器也寳器藏于天府非共王者也瑞器掌于典瑞亦非專于共王者也共王之玉不過服玉佩玉珠玉含玉是數者璞王而已玉人之事曰大圭長三尺杼上終葵首天子服之非服玉歟玉府共之既為服玉則典瑞掌之也玉藻曰君子于玉比徳焉天子佩白玉而𤣥組綬非佩玉歟玉府共之既為佩玉則司服掌之也弁師曰王之五冕玉十有二玉笄朱紘非琢玉為珠以飾之者歟玉府共之既為珠玉則弁師掌之也食玉所以飬至陽之氣書所謂惟辟玉食是也含玉所以為死者口實大宰所謂大䘮共含玉是也喪而及于復衣裳角枕角柶燕而及于燕衣服衽席牀第凡䙝器亦以良貨賄之所飾焉故也凡此皆服所用故玉府兼掌焉若合諸侯則共珠槃玉敦此謂諸侯㑹同或有盟焉則為壇三成割牛耳取血以㰱之珠槃所以盛耳玉敦所以盛血或謂三王不及盟誓而周官有司盟之職則疑周禮非成周之全書是不然文王之時虢仲虢叔勲在盟府成王之時周公太公賜之盟者出于由中之信所以親之也以共王玩好之官而共珠槃玉敦其親為可知君子屢盟亂是用長豈足為盛世言哉凡王之獻金玉兵器文織良貨賄之物受而藏之或謂内府言凡四方之幣獻則諸侯獻于天子者此謂王之獻則天子獻于賔客者獻者以下獻上之謂天子安得有獻既有獻于賔客玉府安得而受之且藏之耶王之獻與獻王同以王為先故也凡王之好賜共其貨賄此謂王之好于羣臣而有貨賄之賜玉府則以所藏之良貨賄共之共其貨賄而不共玩好金玉兵器君臣上下相率以禮不貴異物賤用物也内府掌受九貢九賦九功之貨賄良兵良器以待邦之大用大府頒其貨于受藏之府則玉府其一也内府又其一也二者有異職則計冝有異守今也玉府掌貨賄而内府亦掌貨賄玉府掌兵器而内府亦掌兵器玉府掌金玉而内府亦掌金玉是三者内府既取之九賦九貢九功之貳則大府所以頒之于玉府者果何所取耶以經意攷之玉府一官特掌王之服用好賜而已如獸人􅘋人㕓人澤虞之職各以其物而專入玉府其外則亦九貢九賦九功之所入者也何以知之以大府頒財而知之盖大府掌九貢九賦九功之貳受其貨賄之入先擇其珍美可以共王之服用好賜者頒之于玉府而邦之大用所謂朝覲班賜等物不與焉又擇其次珍美者可以為朝覲班賜之費而為邦之大用者然後頒之于内府其外則皆四方幣獻之物是則貨賄也兵器也金玉也内府之與玉府寜非職聯而用異者乎凡四方之幣獻之金玉齒革兵器凡良貨賄入焉凡適四方使者共其所受之物而奉之四方之幣獻即諸侯來朝而奉天子者内府于此入之四方使者即天子遣使以遺諸侯者内府又于此共而奉之入之者此物也共而奉之者亦此物也以其所獻者共其所遺者王者豈擅天下之利以為一己之私哉凡王及冢宰之好賜予則共之王之好賜玉府共之非常之恩不可以法拘也今也内府共王之好賜予而冢宰亦同乎王冢宰雖尊得毋偪乎是不然共王則謂之好賜共王及冢宰則謂之好賜予是冢宰聴賔客之小治不能無賔客之須以式法予之非冢宰之私予也不然大宰八柄之法曰予以馭其幸者大宰且以之詔王奚嫌于同外府掌邦布之入出以共百物而待邦之用凡有灋者外府名官對内府而言二官所掌不同皆出于九貢九賦九功之法内府掌其貨賄即大府所謂頒其貨于受藏之府者也外府掌邦布之入出以共百物而待邦之大用即大府所謂頒其賄于受用之府者也然外府所掌以邦布為主以共百物為用不知何從而取之謂其取于九貢九賦九功則九貢各有其名九賦各有其地九功各有其職固不可强其所無有而亦非其所盡有也鄭氏求其説而不得則于大宰之九賦註曰賦為口率出泉今之算泉民或謂之賦此漢法也在漢已不勝其弊地不能皆為鑪冶人不能皆為鼓鑄不因其所有周人何其厲民哉盖嘗攷之禹别九州有賦有貢有篚無非本色之物以當時未有泉布之用也自太公為周立九府圜法以通財貨輕重之權則凡九貢九賦九功皆可以邦布行之攷之于經成周所謂邦布者不過載師之里布閭師之夫布㕓人之絘布緫布質布罰布㕓布如是而已邦用取具不一而足豈此數者之布所能給之耶盖外府以掌邦布為名而曰掌其入出以共百物是以邦布易之也夫通功易事古之常理而周人復權之以圜法邦布之出既以易百物則凡九貢九賦九功之所入亦當權之以邦布何以明之下經言凡祭祀賔客喪紀㑹同軍旅共其財用幣齎賈氏謂外府共其泉布泉布可以為幣而言齎則九貢九賦九功其可盡以本物言耶不然則小宗伯大賔客受將幣之齎鄭氏亦謂所齎貢獻之財物泉布之類也是知貨賄之可以致于王朝者玉府内府受之其或人力之艱地里之逺物繁且重而不能致于王朝而易之以邦布者外府受之則曰掌邦之入出先言入而後言出者泉布皆入于外府大宰則量入以為出也以共百物而待邦之用凡有法者有大宰之式法而後出否則不妄出矣共王及后世子之衣服之用凡祭祀賔客喪紀㑹同軍旅共其財用之幣齎賜予之財用凡邦之小用皆受焉此即上經所謂待邦之用凡有法者也何謂法九式是已共王及后世子衣服之用則太宰羞服之式祭祀賔客喪紀㑹同軍旅之幣齎賜予之財用則又大宰祭祀賔客喪荒芻秣匪頒好用之式盖大宰總經國之大計故以九式均節邦之財用外府共其用而已故數者皆行之以式法綱要節目森宻如此歳終則㑹唯王及后之服不㑹上經言共王及后世子衣服之用則三者之共其衣服一而已歳終之㑹而王與后不㑹優尊者也優尊者而世子不與戒華靡也義見膳夫司㑹司㑹一職次于大府則宜若聴命于大府然大府以下大夫二人為之長而司㑹乃以中大夫為之次是知司㑹非大夫之屬乃諸府之所以聴其㑹也鄭氏乃謂司㑹若漢之尚書大府若漢之司農不知漢之司農與少府均掌内外之財而尚書特少府之屬官耳以屬官而令其長則𫝑有所不行厥後尚書徒為具文而漢之財計甚無統紀以比司㑹則非其類也不特此而已小宰中大夫也司㑹亦中大夫也皆掌邦之六典八法八則之貳以逆邦國都鄙官府之治者也是則冢宰之受歳㑹小宰與司㑹俱逆其治而司㑹復能兼舉天下之財計則其權亦重矣掌邦之六典八灋八則之貳以逆邦國都鄙官府之治六典所以治邦國八法所以治官府八則所以治都鄙大宰為之掌其正小宰為之掌其貳貳云者掌其貳書以逆大宰之所治者也司㑹特一糾察鉤稽之官耳亦掌其貳而逆邦國都鄙官府之治者孟子曰無政事則財用不足且財用之末何關于政事之大上無道揆下無法守君子犯義小人犯刑而欲行司㑹之權則亦徒法而已惟司㑹掌六典八法八則之貳以逆其治故外而邦國内而都鄙又其内而官府凡其大綱小紀與夫纎悉委曲灼然有以知其本末源流之所在則夫九貢也九賦也九功也豈區區㑹財用而已哉以九貢之灋致邦國之財用以九賦之灋令田野之財用以九功之灋令民職之財用以九式之灋均節邦之財用司㑹之班爵與小宰同其職掌之同皆掌其貳以逆大宰之所治者也大宰以九貢致邦國之用以九賦斂財賄以九職任萬民以九式均節財用小宰既已執其貳而均節之矣今司㑹又從而致之令之均節之致者致邦國之自共令者令萬民之自輸均節者從而計邦國之均費此又司㑹所專之職而詳于小宰矣掌國之官府郊野縣都之百物財用凡在書契版圖者之貳以逆羣吏之治而聽其㑹計官府郊野縣都皆在王畿千里之内凡百物財用之所出與其所當用者皆有書契版圖焉書謂紀載之書契謂合騐之契版謂人民之版圖謂土地之圖司書掌其書司㑹掌其貳而後可以逆羣吏謂受財用之執事者其未用則令之致之其已用則均節之㑹計之是所㑹者官府郊野縣都之財用而邦國之財用則致之而不㑹其後攷歳成而周知四國之治則亦未嘗不㑹也特有内外詳畧之異耳以參互攷日成以月要攷月成以歳㑹攷歳成以周知四國之治以詔王及冢宰廢置冢宰天官之長也歳終受歳㑹而無月要之文小宰天官之貳也月終受月要而無日成之文宰夫天官之考也旬終正日成而無叅互之文三官各舉其一而司㑹乃考其全㑹之欲其詳也参互云者鄭氏謂司書之要貳與職内之入職歳之出近代儒者則謂職内職歳職幣三者相攷其説誠有末通者周官三百六十皆有日成何獨于此三官而言之盖天下之事合衆類而為目則一日之計也合衆目而為凡則一旬之計也合衆凡而為要則一月之計也合衆要而為㑹則一歳之計也一旬之内以凡考目以目攷数以数考凡夫是之謂参凡與数相攷数與目相攷夫是之謂互如是則日成可以無遺矣積日而月又以月要而攷月成積月而歳又以歳㑹而攷歳成詳畧並施久近兼察四國之事周知無隠則吏治之怠而無功者詔王及冢宰而廢之吏治之勤而有功者詔王及冢宰置之夫小宰不以詔王大宰不以詔王而詔王及冢宰之事獨以責之司㑹者㑹計之職專故也大宰之職曰歳終則令百官府各正其治受其㑹聴其致事而詔王廢置冢宰道揆之任專以詔王為職司㑹法守之任固冢宰詔王而後有詔王及冢宰之事法通行乎上下而政本寔出于一其體統嚴矣司書掌邦之六典八灋八則九職九正九事邦中之版土地之圖以周知入出百物以叙其財受其幣使入于職幣六典八法八則九職九正九事皆見于大宰之職而九正九事其名則異盖九貢九賦皆經常之正税故曰九正九式所用以集邦之九事故曰九事是書也小宰有之宰夫有之司㑹有之司書亦有之至于邦中之版土地之圖則統之于司徒非于此版圖之外而别有所謂書也盖有版圖而後可以周知入出百物有六典八法八則九職九正九事之書而後可以叙其財受其幣盖以是書而叙其財則有餘者不敢隠以是叙而受其幣則已用者無所欺職幣一官專主振掌事之餘財以此入之宜矣凡上之用財用必攷于司㑹周禮一經凡言上云者非專指王而言也膳夫于王之膳不㑹庖人于王之膳禽不㑹酒正于王之飲酒不㑹外府于王之服不㑹司裘于王之裘與其皮事不㑹是數者切于王身專指王而言故曰惟王不㑹若上之用財則異乎是宰夫言告于上職嵗言上之賜予職幣言上之小用賜予則各有所主而已是知關乎國體之大者皆謂之上施于邦計之常者皆謂之用財用凡饍服之外有所謂祭祀賓客有所謂匪頒喪紀又有所謂工事芻秣幣帛賜予無非上之用財用者大宰既掌其式大府又掌其法司㑹既以式法㑹之司書又考于司㑹而書之初非一人之私也故曰凡上之用財用必考於司㑹三嵗則大計羣吏之治以知民之財器械之數以知田野夫家六畜之數以知山林川澤之數以逆羣吏之徴令大宰于一歳之終則受百官之歳㑹司㑹又以歳㑹考歳成則功事財用之計每歳固有之矣至于三歳則又統計其治為甚詳故謂之大計羣吏之治所謂民之財器械之數孰備而孰乏田野夫家之數孰登而孰耗山林川澤之數孰興而孰廢既已周知羣吏之治然後可以逆羣吏之徴令徴令有當否不可得而掩也凡此無非賛大宰之事而已盖大宰三歳則大計羣吏之治而誅賞之司書雖卑以其賛大宰故亦謂之大計凡税斂掌事者受灋焉及事成則入要貳焉凡邦治攷焉成周財用之所出不過九貢九賦九功而已無他取于民者也今司書又有税斂之事近代釋經者謂税斂在貢賦之外而不能明指其説或者疑焉以小司徒攷之其言以任地事而令貢賦凡税斂之事言貢賦而不言九職則知税斂者九職之税斂也所謂三農生九穀園圃毓草木以至虞衡藪牧之職又至百工商賈之職又至嬪婦臣妾閒民之職凡有職者有徴故總以税斂為名何以明之以小司徒言税斂于貢賦之後而明之不然閭師任民即九職之貢而曰以時徴其賦非税斂而何凡掌事者受法焉及事成則入要貳焉凡邦治考焉以司書知其數而可以鉤稽之也職内掌邦之賦入辨其財用之物而執其總以貳官府都鄙之財入之數以逆邦國之賦用周制天下之財不過九貢九賦九功之法大府既掌貨賄之入職内又掌邦之賦入職内所掌非於大府所受貨賄之外而别有所謂賦入也即鉤考乎大府之所入者而已盖司㑹以下皆㑹計之職而職内一職惟計其入辨其財用之物而執其總總云者總其凡目之書宰夫所謂師掌官成以治凡司掌官法以治目是也以貳官府都鄙之財入之數數云者析其一二三四之數宰夫所謂旅掌官常以治數是也總者其要也數者其詳也執其至要御其至詳官府都鄙之財皆不逃乎是書之所貳者矣然特以貳官府都鄙之財入而未及夫邦國也盖有土斯有民有民斯有財先王嘗戒之以無封靡于爾邦固不可專利以傷財尤當量入以為出凡邦國之賦用一以官府都鄙之數而逆之其本末源流昭然矣凡受財者受其貳令而書之及㑹以逆職歳與官府財用之出而叙其財以待邦之移用凡受財者謂羣吏受財于大府而其貳令則在職内受其貳令而書之則彼此可以合驗及㑹以逆職歳與官府財用之出則彼此可以叅攷以職内之所入逆職歳之所出則官府財用皆可目擊而周知然後舉其財而叙之叙之者何官府財用不能皆有餘也亦未嘗皆不足也以有餘而補不足求以濟國事而已是之謂移用職歳掌邦之賦出以貳官府都鄙之財出賜之數以待㑹計而攷之職内掌邦之賦入故貳官府都鄙之財入之數職歳掌邦之賦出故貳官府都鄙之財出賜之數是職歳之與職内其財之出入正相關也其入也非職内之令則不受焉其出也非職歳之令則不受焉所謂貳官府都鄙之財出賜之數者亦一二三四之數與職内同職内受其貳令而書之及㑹以逆職歳職歳亦貳其數以待司㑹之所㑹故曰以待㑹而攷之凡官府都鄙羣吏之出財用受式灋于職歳凡頒財大府以九式之灋授之職歳則舉大府之所授者予之故曰受式灋于職歳凡上之賜予以叙與職幣授之上云者非專指王而言也其義已見司書盖九式之中惟膳服切於王之身故上經皆指王而言雖有式灋而不㑹司書所謂上之用財用則自賔客以至賜予凡八者皆有式灋者也皆司㑹之所當㑹者也以其為國家之經費故以上之用財用言之若夫此經所謂上之賜予則九式之賜予而已其出也有先後之叙故以叙與職幣授之以職幣振掌事者之餘財幣餘之賦以待賜予故也及㑹以式灋賛逆㑹司㑹以逆羣吏之治而聴其㑹計所謂逆㑹也及者至也職歳主式灋以出財用至歳終逆㑹之時職歳則以太宰九式之法而賛之故曰以式法賛逆㑹職幣掌式灋以斂官府都鄙與凡用邦財者之幣振掌事者之餘財皆辨其物而奠其録以書楬之以詔上之小用賜予國之餘用二有幣餘有餘財兼掌餘財而獨以幣名官舉其大者言之也何謂用邦財者之幣外府之職曰凡祭祀賔客䘮紀㑹同軍旅共其財用之幣齎賈氏謂外府共其泉即用邦財者之幣其用謂之幣其行謂之幣齎以式灋取其餘曰斂歛者取也何謂掌事者之餘財大府之職曰凡官府都鄙之吏及執事者受財用焉以式灋受財于大府則為掌事者之餘財而不歸未免沉匿故以式灋舉之曰振振者舉也皆辨其物而奠其録奠定也既定其數而録于籍矣以書楬之楬標也又書其目而標楬其物以待其上之小用賜予即大府所謂幣餘之賦以待賜予是也然外府共賜予之財用乃出於邦布之百物而不取於幣何也謂祭祀賔客䘮紀㑹同軍旅之賜予關於國家之大體者也此則小用賜予而已歳終則㑹其出凡邦之㑹事以式灋賛之幣餘之賦雖止於小用賜予然不可不計其所出之數故歳終則㑹其出凡邦事則不止乎小用賜予而已職幣雖掌賜予一端而所給餘財乃散見於九式之中故凡邦之㑹事皆以式法賛之司裘掌為大裘以共王祀天之服周官設司裘不專為裘亦兼皮事三侯則皮事也三裘則裘服也然五服掌於春官之司服而此特為裘五冕掌於夏官之弁師而此不言冕以其所掌者皮事之裘也大裘者象天之義凡祀天之物皆可謂之大大禮必簡大樂必易大圭不琢大羮不和大裘亦然無經緯之文無繢綉之功取其質而已故曰祀昊天上帝則服大裘而冕祀五帝亦如之此不言上帝五帝而獨謂之祀天其義可以互見然下經於裘言獻於侯言共而大裘言為專其官重其事也中秋獻良裘王乃行羽物季秋獻功裘以待頒賜天子諸侯羣臣之裘備見於玉藻此特言良裘功裘而已説者謂良裘為質之自然者功裘為人功治之者此所以為上下隆殺之辨今攷之玉藻既有其物又有其名唯君有黼裘君衣狐白裘錦衣以裼之仲秋獻良裘其以此歟又以錦衣狐裘為諸侯之裘以狐青裘𤣥綃衣麛裘絞衣羔裘緇衣狐裘黄衣為君子之裘以虎裘狼裘為君左右之裘季秋獻功裘其以此歟仲秋獻良裘之時則罻羅可設故行羽物以順陰氣之始季秋獻功裘之後則霜露既降故特頒賜以禦寒氣之盛月令於孟冬之月天子始裘言天子則諸侯羣臣亦可推矣王大射則共虎侯熊侯豹侯設其鵠諸侯則共熊侯豹侯卿大夫則共麋侯皆設其鵠大射祭祀之射也王將有郊廟之事以射擇諸侯及羣臣與邦國所共之士取其中多而可以與祭者於是有三侯二侯一侯焉天子射虎侯其道九十弓弓二寸為侯中則虎侯之中廣一丈八尺三分其廣以其一為之鵠則鵠方六尺侯之上中下皆用布而兩旁餙以虎其中設鵠為的焉諸侯射熊侯七十弓卿大夫射麋侯五十弓其鵠眡其弓之數而降殺之凡侯天子以三諸侯以二卿大夫以一或謂大射天子之侯即射人之三侯以至諸侯二侯卿大夫一侯亦然失之矣侯數雖同而有大射賓射之辨梓人為侯曰張皮侯而棲鵠則春以功皮侯即熊虎豹之三侯天子大射之侯也張五采之侯則逺國屬五采即五正之侯天子賓射之侯也張獸侯則王以息燕此又天子燕射之侯也其侯雖不見於經而鄉射記言天子熊侯白質諸侯麋侯赤質大夫布侯畫以虎豹士布侯畫以鹿豕即獸侯耳蓋大射以鵠賓射以正燕射以質不可以不辨大喪廞裘飾皮車凡邦之皮事掌之嵗終則㑹唯王之裘與其皮事不㑹廞興也裘與皮車象生時為之乃明器中所用者不㑹義見膳夫掌皮掌秋斂皮冬斂革春獻之遂以式灋頒皮革于百工未練治者謂之皮已練治者謂之革秋則物成之時物成則堅實故秋歛皮若革則加人功練治之其成差久故冬歛革春則用皮之事於是乎始故於春獻之遂以式法頒皮革於百工即以大府之所授者頒之也共其毳毛為氈以待邦事毳毛毛之細縟者氈之為用經不多見惟掌次於旅上帝則張氈案物之貴重可知也然特一端而已邦事則自祭祀以至喪紀無不用焉故掌皮皆有以待之歳終則㑹其財齎外府於邦布則共其幣齎掌皮於皮事則㑹其財齎王氏謂齎者行費也皮事何取乎行費鄉遂兵械皆所自備故皮革皆所自用歛之獻之之外致之或用財焉運之則有齎歳終㑹之雖㣲不忽也

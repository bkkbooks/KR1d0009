body:
  text: 周官總義卷十七宋易袚撰夏官司馬第四惟王建國辨方正位體國經野設官分職以為民極乃立夏官司馬使帥其屬而掌邦政以佐王平邦國政官之屬大司馬卿一人小司馬中大夫二人軍司馬下大夫四人輿司馬上士八人行司馬中士十有六人旅下士三十有二人府六人史十有六人胥三十有二人徒三百有二十人魯㑹晉師于上鄍輿師受一命之服晉享六卿于蒲圃輿尉受一命之服所謂輿者車也晉作三行以禦狄其後晉中行穆子與無終戰于大原毁車為行所謂行者徒也成周師田之法險野以徒為主易野以車為主于是設二司馬之屬専掌車與徒之任異于五官凡制軍萬有二千五百人為軍王六軍大國三軍次國二軍小國一軍軍將皆命卿二千有五百人為師師帥皆中大夫五百人為旅旅帥皆下大夫百人為卒卒長皆上士二十五人為兩兩司馬皆中士五人為伍伍皆有長一軍則二府六史胥十人徒百人司勲上士二人下士四人府二人史四人胥二人徒二十人馬質中士二人府一人史二人賈四人徒八人量人下士二人府一人史四人徒八人小子下士二人史一人徒八人羊人下士二人史一人賈二人徒八人司爟下士二人徒六人掌固上士二人下士八人府二人史四人胥四人徒四十人司險中士二人下士四人史二人徒四十人掌疆中士八人史四人胥十有六人徒百有六十人候人上士六人下士十有二人史六人徒百有二十人環人下士六人史二人徒十有二人在秋官者掌送逆邦國之通賓客令其守涂地者為之聚􅝵謂之四面環之可也在夏官者止於徒十有二人何以環之乎今攷簭人九簭之名九曰巫環鄭氏謂簭可致師不此則以為致師之簭孟子曰環而攻之必有得天時者矣既謂之天時非四面環之之義環得天時之吉則其為簭名信矣挈壺氏下士六人史二人徒十有二人挈壺之制不可攷以唐制推之水海浮箭四匱注水始自夜天池入于日天池自日天池入于平壺以次相注入于水海浮箭而上以浮箭為刻分晝夜計十二時毎時八刻二十分毎刻六十分箭四十八二箭當一氣歲統二百一十九萬一千五百分悉刻于箭上銅烏引水而下浮箭而止登至于晝夜之刻分至之候冬夏長短昏曉隱見與周官晷影無差射人下大夫二人上士四人下士八人府二人史四人胥二人徒二十人服不氏下士一人徒四人射鳥氏下士一人徒四人羅氏下士一人徒八人掌畜下士二人史二人胥二人徒二十人司士下大夫二人中士六人下士十有二人府二人史四人胥四人徒四十人諸子下大夫二人中士四人府二人史二人胥二人徒二十人司右上士二人下士四人府四人史四人胥八人徒八十人虎賁氏下大夫二人中士十有二人府二人史八人胥八十人虎士八百人此言虎士八百人與牧誓言虎賁三百人其數為不同葢此以衞至尊為主惟衆而後可以備儀衞旅賁氏中士二人下士十有六人史二人徒八人節服氏下士八人徒四人方相氏狂夫四人大僕下大夫二人小臣上士二人祭僕中士六人御僕下士十有二人府二人史四人胥二人徒二十人𨽻僕下士二人府一人史二人胥四人徒四十人弁師下士二人工四人史二人徒四人司甲下大夫二人中士八人府四人史八人胥八人徒八十人司兵中士四人府二人史四人胥二人徒二十人司戈盾下士二人府一人史二人徒四人司弓矢下大夫二人中士八人府四人史八人胥八人徒八十人五兵之用逺則弓矢射之近則矛者勾之然後殳者擊之戈㦸刺之此司兵掌五兵司戈盾之掌戈盾司弓矢之掌六弓四弩八矢相為先後者也繕人上士二人下士四人府一人史二人胥二人徒二十人稾人中士四人府二人史四人胥二人徒二十人戎右中大夫二人上士二人戎車革路也王於軍事乘革路則用勇力之士為右乃以中大夫為之君有常尊兵革重事故也齊右下大夫二人道右上士二人大馭中大夫二人戎僕中大夫二人齊僕下大夫二人道僕上士十有二人田僕上士十有二人馭夫中士二十人下士四十人校人中大夫二人上士四人下士十有六人府四人史八人胥八人徒八十人趣馬下士皁一人徒四人巫馬下士二人醫四人府一人史二人賈二人徒二十人牧師下士四人胥四人徒四十人廋人下士閑二人史二人徒二十人圉師乘一人徒二人圉人良馬匹一人駑馬麗一人職方氏中大夫四人下大夫八人中士十有六人府四人史十有六人胥十有六人徒百有六十人土方氏上士五人下士十人府二人史五人胥五人徒五十人懐方氏中士八人府四人史四人胥四人徒四十人合方氏中士八人府四人史四人胥四人徒四十人訓方氏中士四人府四人史四人胥四人徒四十人形方氏中士四人府四人史四人胥四人徒四十人形猶人之形有相屬之義山師中士二人下士四人府二人史四人胥四人徒四十人川師中士二人下士四人府二人史四人胥四人徒四十人邍師中士四人下士八人府四人史八人胥八人徒八十人匡人中士四人史四人徒八人撢人中士四人史四人徒八人都司馬毎都上士二人中士四人下士八人府二人史八人胥八人徒八十人家司馬各使其臣以正於公司馬大司馬之職掌建邦國之九灋以佐王平邦國制畿封國以正邦國設儀辨位以等邦國進賢興功以作邦國建牧立監以維邦國制軍詰禁以紏邦國施貢分職以任邦國簡稽鄉民以用邦國均守平則以安邦國比小事大以和邦國言佐王以統御諸侯之權實天子之所自出以九伐之灋正邦國馮弱犯寡則眚之賊賢害民則伐之暴内陵外則壇之野荒民散則削之負固不服則侵之賊殺其親則正之放弑其君則殘之犯令陵政則杜之外内亂鳥獸行則滅之正月之吉始和布政于邦國都鄙乃縣政象之灋于象魏使萬民觀政象挾日而斂之政謂九法九伐之類布於邦國都鄙可也萬民何與焉聖人惟能合民之情内外逺近通行無間而後可以言政乃以九畿之籍施邦國之政職方千里曰國畿其外方五百里曰侯畿又其外方五百里曰甸畿又其外方五百里曰男畿又其外方五百里曰采畿又其外方五百里曰衞畿又其外方五百里曰蠻畿又其外方五百里曰夷畿又其外方五百里曰鎭畿又其外方五百里曰蕃畿此言外方五百里則以方言之非言面也以方言之是毎面面二百五十里兩面之方為五百里自侯畿至蕃畿通為二千五百五十里兩面相距通為四千五百里并王畿千里通為五千五百里其增於禹者五百里之蕃服耳然周之蕃服雖不列於禹貢九州之外而禹貢九州之外咸建五長東漸西被即成周蕃服之域是周之蕃服其名雖增於禹而地未嘗增也凡令賦以地與民制之上地食者參之二其民可用者家三人中地食者半其民可用者二家五人下地食者參之一其民可用者家二人中春教振旅司馬以旗致民平列陳如戰之陳合其衆以成列陳其列以為陳辨鼓鐸鐲鐃之用王執路鼓諸侯執鼖鼓軍將執晉鼓師帥執提旅帥執鼙卒長執鐃兩司馬執鐸公司馬執鐲以教坐作進退疾徐疏數之節遂以蒐田有司表貉誓民鼓遂圍禁火弊獻禽以祭社中夏教苃舍如振旅之陳羣吏撰車徒讀書契辨號名之用帥以門名縣鄙各以其名家以號名鄉以州名野以邑名百官各象其事以辨軍之夜事其他皆如振旅遂以苗田如蒐之灋車弊獻禽以享礿帥以門名見平日統御之方家以號名見平日訓治之素中秋教治兵如振旅之陳辨旗物之用王載大常諸侯載旂軍吏載旗師都載旜鄉遂載物郊野載旐百官載旟各書其事與其號焉其他皆如振旅遂以獮田如蒐田之灋羅弊致禽以祀祊中冬教大閲前期羣吏戒衆庶修戰灋虞人萊所田之野為表百步則一為三表又五十步為一表表以步度之步長六尺百步則一為三表是三表相去二百步又五十步為一表則四表為二百五十步矣大閲必用四表所以寓王者節制之師而大武之四表實象之盖周都西南一表在南所謂武始而北出矣振之而駟伐則有振鐸作旗之義厯二表三表而至四表則再始以著往者也商都東北四表在北所謂四成而南國是疆復亂以飾歸則有鼓退鳴鐃且郤之義厯三表二表而復於一表則樂終而德尊者也大閲亦然賈氏乃謂後表在北士卒由後表以至南表復回身向北以至後表與樂記之言不合樂記言大武則周家一代寓兵之良法當以樂記為正或謂三表相距各百步毎表各六十丈何以容大閲之衆若以開方論其勢誠窄若據虞人萊所田之野則逈野左右何有紀極鄭氏謂左右之廣當容三軍此指一旁而言若左右兩旁當容六軍又云步數未聞則六軍分行左右開張取其容六軍之衆不以步數拘也如此則地𫝑廣袤豈止容六軍而已田之日司馬建旗于後表之中羣吏以旗物鼓鐸鐲鐃各帥其民而致質明弊旗誅後至者乃陳車徒如戰之陳皆坐及田之日司馬建熊虎六斿之旗於虞人所設後表之中據樂記舞而言則後表當是在南一表於是羣吏如鄉師以下以其旗物及鼓鐸鐲鐃等各帥其民而致於大司馬質明仆旗猶有後至者是慢令也故誅之羣吏聽誓于陳前斬牲以左右徇陳曰不用命者斬之衆庶已集命之皆坐於在南之一表羣吏聽誓則自軍帥而下皆南面向表誓于陳前中軍以鼙令鼓鼔人皆三鼓司馬振鐸羣吏作旗車徒皆作鼓行鳴鐲車徒皆行及表乃止三鼓摝鐸羣吏弊旗車徒皆坐中軍以鼙令鼓則旅帥執鼙者也以旅帥居卒伍軍師之中故曰中軍鼓人皆三鼔則軍將之執晉鼓者也司馬振鐸則兩司馬之執鐸者也鼓行鳴鐲則公司馬之執鐲者也當是時旅帥以鼙令鼓故軍將三鼓而作之兩司馬振鐸以通之可以作矣故羣吏作旗車徒皆作既作矣軍將又鼓以行之公司馬又以鐲而節之可以行矣故車徒皆行及表乃止既止矣軍三鼓以警之兩司馬摝鐸以止之可以止矣故羣吏弊旗車徒皆坐此謂自南表以至向北之二表所以象武始而北出觀兵於盟津之時又三鼓振鐸作旗車徒皆作鼓進鳴鐲車驟徒趨及表乃止坐作如初言驟趨則士卒赴敵之心固勇於車徒之行者矣然不可無以節之由是及表乃止而軍將三鼓以警之兩司馬又摝鐸以止之可以止矣故曰坐作如初此謂自二表以至向北之三表所以象再成而滅商戰勝於牧野之時乃鼓車馳徒走及表乃止於是軍將又鼓以作之則車為之馳徒為之走言馳與走則士卒赴敵之心尤勇於車驟徒趨者矣然亦不可無以節之由是及表乃止則教習已備而無事于坐作之節但止之而已此謂自三表以至向北之四表所以象三成而南克殷有餘力功成而反者也鼓戒三闋車三發徒三刺至此則鼓已三闋車已三發徒已三刺於此皆戒焉必三鼓者至於三則節制之正也故大閲之教表為三表鼓為三鼓車以三發徒以三刺坐作以三而為之止皆三之為節制也乃鼓退鳴鐃且郤及表乃止坐作如初謂至北之四表軍將即令鼓以退之公司馬復鳴鐃以郤之於是軍吏士卒回身向南而立復行至表皆為之止坐作如初此又謂自北之四表以至三表二表而復於向南之一表皆如上文之坐作其異者廢鐲鳴鐃而已所以象四成而南國是疆五成而分周公左召公右六成而復綴以崇者也遂以狩田以旌為左右和之門羣吏各帥其車徒以敘和出左右陳車徒有司平之旗居卒間以分地前後有屯百步有司巡其前後險野人為主易野車為主既陳乃設驅逆之車有司表貉于陳前驅謂驅禽獸使趨於圍逆謂逆禽獸使不出圍中軍以鼙令鼓鼔人皆三鼓羣司馬振鐸車徒皆作遂鼓行徒衘枚而進大獸公之小禽私之𫉬者取左耳中軍以鼙令鼓鼔人皆三鼓如習戰之時則師田之法一焉及所弊鼔皆駴車徒皆譟駴如馬之駭譟如鳥之譟以示勝敵徒乃弊致禽饁獸于郊入獻禽以享烝春社夏礿秋祊不言入獻禽而冬烝獨言之者以外行致禽饁郊之禮然後獻禽於宗廟故謂之入及師大合軍以行禁令以救無辜伐有罪及者繼事之辭未有師也謂時田以習戰以為用師之備而已若大師則掌其戒令涖大卜帥執事涖釁主及軍器若有强梗弗率者負固弗服者與夫侵犯王略而自干天誅者天子於是親帥六師方伯連帥從焉謂之大師大司馬掌其戒令則方伯連帥以至軍將師帥莫不受戒令焉及致建大常比軍衆誅後至者比其伍兩卒旅軍師之全缺也及戰巡陳眡事而賞罰及其成陳而戰也巡其陳之隊伍疏數與夫車徒旗鼓之出入莫不眡之若師有功則左執律右秉鉞以先愷樂獻于社大司馬左執律右秉鉞以先若師不功則厭而奉主車不言敗而言不功王者之師無敵於天下故特不功而已王弔勞士庶子則相大役與慮事屬其植受其要以待攷而賞誅植謂築城板榦高博制度係焉則屬之於司空要謂役人數目功程多寡係焉則受之於司徒待攷而賞誅必以植要為本大㑹同則帥士庶子而掌其政令若大射則合諸侯之六耦大祭祀饗食羞牲魚授其祭大祭祀謂廟享之禮饗食則禮公侯等於廟大喪平士大夫喪祭奉詔馬牲平則正喪禮之職與其位也

body:
  text: 周官總義卷四宋易袚撰酒正掌酒之政令以式法授酒材酒之政令則酒正一職所掌者皆是也鄭氏以式法為作酒之式法且引月令所謂秫稻必齊麴蘖必時湛饎必潔水泉必香陶器必良火齊必得以為此經之證然月令所陳不過酒材而已以為作酒之式法則非矣凡周禮所謂式法者無非大宰九式之法而酒正所授則其關係為尤重蓋酒以行禮不繼以淫凡酣飲無常縱欲敗禮皆淫也晉知悼子卒未葬而平公飲酒鼓鐘小大之臣昵于其私而忘君之疾太師不詔褻臣不規而區區之宰夫反越刀匕之職進放濫之戒則淫之害為甚大今酒正之式法不待其共酒飲酒也凡授酒材之初已有幾微存焉若曰祭祀也賔客也凡王之燕飲賜頒也凡饗士庶子饗耆老孤子也一物之所取一嵗之所用綱目多寡具有常儀酒人不敢専受之於酒正酒正不敢決受之於大宰共之有道用之有時日有成月有要嵗有會而誅賞亦有式其意深矣哉凡為公酒者亦如之酒之見於天官者有三酒人漿人有所謂女酒女漿可用於王宫而制之以太宰之式法一也酒正之職則用於朝廷之祭祀賔客與夫燕賜饗食二也其三則此所謂公酒者也鄭氏以公酒為鄉飲禮凡公事所作者然特其一而已今考地官之職鄉大夫之賔興賢者能者州長之會射於州序黨正之屬民飲酒族師之春秋祭輔凡公酒之所當用者則以式法授之凡非公酒所當用者則以式法禁之如司暴之禁羣飲萍氏之幾酒謹酒即所謂禁其非式法者也辨五齊之名一曰泛齊二曰醴齊三曰盎齊四曰緹齊五曰沈齊辨三酒之物一曰事酒二曰昔酒三曰清酒辨四飲之物一曰清二曰醫三曰漿四曰酏掌其厚薄之齊五齊味薄而有量數故言齊用於祭祀非飲也曰泛曰醴二者皆濁以茅泲之縮酌言醴則泛從之矣曰盎曰緹曰沈三者差清亦用清酒泲之故曰盎齊涗酌涗清也言盎則緹與沈從之矣是五齊用之祭祀不致其味致其義而已此所以為之辨其名事酒者酌有事者之酒也昔酒者熟而久者也清酒者清而久於昔者也三酒以飲非若齊之致其義務致其實而巳此所以為之辨其物一曰清者漿人所云醴清也二曰醫者謂釀為醴則為醫也三曰漿者酨漿也四曰酏者粥之薄也四飲皆有其厚薄之齊故亦為辨其物以共王之四飲三酒之饌及后世子之飲與其酒共王之四飲而不及五齊者尚味也王言饌而后世子不言饌優尊者也共后世子之飲與其酒而不言四飲三酒者不備其數也凡祭祀以法共五齊三酒以實八尊大祭三二中祭再二小祭一二皆有酌數唯齊酒不二皆有器量大祭祀天地宗廟也中祭祀日月星辰社稷五祀五嶽小祭祀司中司命風師雨師與山林川澤四方百物法所謂祭祀之式酒正初以式法授酒材及五齊三酒之成又以式法共祭祀之用不可多也不可寡也司尊彛止於六尊此言八尊者謂五齊三酒凡八尊也大祭三二中祭再二小祭一二者三酒乃人所飲而祭祀有尸胙之禮二之以備其乏也大祭祀則飲之者衆故三倍其數中祭少於大祭小祭少於中祭故中祭再二而小祭一二也皆有酌數者謂用器酌之注於尊中量其入之多寡皆有定數也唯齊酒不二者五齊唯以祭而不共飲故無二惟其無二故無酌數而亦有器量其多寡之數設之而已共賔客之禮酒共后之致飲于賔客之禮醫酏糟皆使其士奉之饗以訓恭儉爵盈而不敢飲為禮而已故王之致飲酒于賔客后之致飲于賔客雖隆殺有等而皆謂之禮若夫此經四飲與漿人之六飲皆有醫酏而無糟以糟致之亦以致飲無嫌乎濁也酒正所以奉王也不以奉王之職奉賔客故使其士奉之凡王之燕飲酒共其計酒正奉之王之飲酒不會尊天子也燕飲酒而共其計非會歟曰王之燕飲非饗禮比饗以訓恭儉惟其禮而已焉用會若夫燕朝之暇王之所與飲酒者或同姓之伯父叔父或異姓之伯舅叔舅或公卿大夫之貴而親者燕飲之義於詩可見方其未醉則威儀反反威儀抑抑也曰既醉止則威儀怭怭也又其既醉則屢舞蹮蹮屢舞傞傞也此燕飲之所必至者故周人使酒正自奉而且為之共其計度其酬酢交獻之節酌其多寡隆殺之度燕雖異乎饗禮也亦禮而已矣凡饗士庶子饗耆老孤子則共其酒無酌數凡饗皆所以為禮也今於饗士庶子饗耆老孤子皆共其酒無酌數鄭氏乃謂要以醉為度非饗歟曰王之饗賔與此饗不同士庶子宫中之宿衛也耆老歸政之老也孤子死事者之孤子也周之待此三者於禮為最厚外饔皆為之掌割亨之事稿人又皆為之共其食此所謂有職則食者也此所謂尊事黃耉者也此所謂死于王事者也惟此三者而後可以不拘其數凡酒之頒賜皆有法以行之凡有秩酒者以書契授之賜即賜豫頒即匪頒二者不同而皆出於祿秩之外所謂法者即大宰九式之法以其式法行之則好賜匪頒雖王者非常之恩亦無非天下之常法也若夫秩酒則又有常矣鄭氏謂王制九十日有秩者老臣也然宫正所謂月終則均秩則凡有職者皆有秩也以書契授之則書所以載其所得之數契所以驗其取與之要酒正之出日入其成月入其要小宰聽之嵗終則會唯王及后之飲酒不會以酒式誅賞日入其成計一日之出也月入其要計一月之出也小宰聽之計酒正之所出而已未計夫入焉至於嵗終然後小宰以所入之要而致之於大宰乃以初授式法之多寡而會一嵗之所共所用蓋將以酒式而行誅賞也然必先言唯王及后之飲酒不會者優尊者也至尊雖不會而亦不外乎大宰羞服之式以至尊之式而律臣下則如式者在所賞而不如式者在所誅酒人掌為五齊三酒祭祀則共奉之以役世婦共賔客之禮酒飲酒而奉之酒人奄十人者宦官也與女酒及奚同職所共特祭祀賔客之用故以式法受酒材於酒正而為五齊三酒祭祀則共奉之以役世婦者謂王后六宫每宫世婦二人為卿掌女宮之宿戒及后之祭祀賔客之事是酒人共奉其酒而以奚共其役也共賔客之禮酒飲酒而奉之者禮酒謂燕饗之酒皆有常禮飲酒則常禮之外給賔客之稍禮者二者酒人共之而皆使其士奉之凡事共酒而入于酒府凡祭祀共酒以往賔客之陳酒亦如之酒府酒正之府祭祀賔客之酒既言共而奉之矣此言共而不言奉乃凡祭祀之小者與賔客饔餼而陳酒者皆禮之常也故酒人共酒以往别有奉之者往待其令而已漿人掌共王之六飲水漿醴涼醫酏入于酒府王有六飲而酒正止辨其四飲曰清曰醫曰漿曰酏是已清即六飲之所謂醴也不言水涼者以其無厚薄之齊不必辨也按內則言飲者凡十曰水曰漿其此之水與漿歟曰重醴曰濫者此之醴與涼歟曰醷曰黍酏者其此之醫與酏歟然酒正於四飲言清而此易清為醴者蓋醴有清有糟清泲也糟淳也以可飲言之則曰醴以泲之清者言之則曰清其實一也水涼非酒正所辨而亦入于酒府者以其共王則酒正視之爾共賔客之稍禮共夫人致飲于賔客之禮清醴醫酏糟而奉之凡飲共之賔客之道以十日為正十日之外則有致稍歸禽之禮見於掌客蓋稍禮不一此所共者飲而已稍則稍而共之俾常不乏優賔也后夫人亦助王養賔后致醫酏而并糟致之降於王也夫人致醫酏糟而又加清醴卑於后也后則酒正使其士奉之夫人則漿人奉之漿人亦士也凌人掌氷正嵗十有二月令斬氷三其凌夏用寅正殷用丑正周用子正其來尚矣周人以建子之月為正月故以建寅之月為正嵗如大司徒鄉大夫長之職既書正月又書正嵗此一經通義明白易曉而先儒於凌人一職紛然不一何也或謂此十二月為周建亥之月或又謂正嵗之十二月乃夏正建丑之月二説角立不容不辨且夏正之説古人固未嘗廢近世儒者乃謂殷書之元祀十二月為嵗首之月且引以為夏時之證其説未為不然然而厯家紀三代所尚其實不然何以明之左氏傳春秋載鄭梓氏之言曰火出於夏為三月於殷為四月於周為五月則殷周之月未嘗不各有所尚也又漢志所載殷周魯歷殷太甲元年十二月乙丑朔旦冬至後九十五嵗十二月甲申朔旦冬至周公攝政五年正月丁丑朔旦冬至魯煬公二十四年正月丙申朔旦冬至微公二十六年正月乙亥朔旦冬至夫冬至十一月之中節也而殷以十二月周以正月豈非三代各有所尚而厯家不沒其實乎不然夫子作春秋定一王之法何為必以周正紀事故左氏傳亦曰王周正月是知周家一代典禮以建子為正月無疑者正月既為建子以次而論則十二月乃建亥之月矣若以為夏之建丑則是先一月為正月次一月即為十二月也其説自相背戾殆非周公作經之本旨不特周禮如此周易亦然如建丑之二陽為臨至遁之二陰乃云八月有凶周之八月為遁實建未之月此即十二月為建亥之證或曰豳詩七月亦周詩也二之日鑿冰沖沖而不言周之二月三之日納於凌陰而不言周之三月若四月以至十月則皆以夏正紀事何也七月詩言先公風化則推原后稷以來之事初無與乎周家之厯法奈何以此而遂謂凌人之十二月為夏之建丑哉且月令以建丑為季冬水澤腹堅固可斬氷若先令之於建亥之月乃斬氷於建丑之月其説正與豳詩合要之當以故書正為據鄭司農云掌氷政至杜子春乃始改正謂夏正參考經旨恐不必改此政字今以掌氷政為一句嵗十二月為一句如孟子嵗十二月輿梁成之義是亦建亥之月也或謂周之亥月其氷未堅果何取焉曰周人非以建亥之月斬氷也特令之而已傳曰古者日在北陸而藏氷是時日躔尾箕之間已近北陸於是凌人先時而行斬氷之令且為之三其凌何謂三其凌三為氷室以待亥子丑三月之用也蓋天時不可以預必有冬而無氷者豈能必其冬之常寒凡亥子丑三月之間皆可藏氷故三其凌以待之春始治鑑凡外內饔之膳羞鑑焉凡酒漿之酒醴亦如之祭祀共氷鑑賔客共氷大喪共夷槃氷夏頒氷掌事秋刷先王藏氷出氷之政所以順天時而防民患故申豐之言曰聖人在上無雹雖有不為災古者日在北陸而藏氷西陸朝覿而出之其藏之也深山窮谷固陰沍寒於是乎取之其出之也朝之祿位賔食喪祭於是乎用之其藏之也黑牡秬黍以享司寒其出之也桃弧棘矢以除其災其出入也時食肉之祿氷皆與焉大夫命婦喪浴用氷祭寒而藏之獻羔而啓之公始用之火出而畢賦自命夫命婦至於老疾無不受氷山人取之縣人傳之輿人納之𨽻人藏之今考之經凌人令斬氷而不言斬氷之人即所謂山人縣人輿人𨽻人之類也所謂北陸者建子之月日在牽牛之次建丑之月日在虛危之次所以斬氷而先令於建亥之月者也所謂西陸者建卯之月日在奎於是獻羔以啓之建辰之月日在胃昴火星昏見於東方於是火出而畢賦所以治鑑於春而膳羞酒醴皆共其鑑也又云賔食喪祭於是乎用之即祭祀共氷鑑賔客共氷大喪共夷槃氷之證也又云食肉之祿氷皆與焉命夫命婦至於老疾無不受氷即夏頒氷之證也終之曰七月之卒章藏氷之道也則可見秋刷其凌終而復始也是知氷政著於豳詩大備於成周而時見一二於春秋之世故左氏傳春秋而詳敘申豐之説豈徒制度云乎哉籩人掌四籩之實朝事之籩其實麷蕡白黑形鹽膴鮑魚鱐饋食之籩其實棗栗桃乾䕩榛實加籩之實菱芡栗脯菱芡栗脯羞籩之實糗餌粉餈凡祭祀共其籩薦羞之實喪事及賔客之事共其薦籩羞籩為王及后世子共其內羞凡籩事掌之醢人掌四豆之實朝事之豆其實韭菹醓醢昌本糜臡菁菹鹿臡茆菹麇臡饋食之豆其實葵菹裸醢脾析蠯醢蜃蚳醢豚拍魚醢加豆之實芹菹兔醢深蒲醓醢箈菹鴈醢筍菹魚醢羞豆之實酏食糝食凡祭祀共薦羞之豆實賔客喪紀亦如之為王及后世子共其內羞籩人之四籩醢人之四豆即曰朝曰饋曰加曰羞是也實者言籩豆中所實之物特牲少牢曰士二大夫四諸侯六天子八是天子籩豆之實當以八為節矣此八籩八豆即可以推宗廟九獻之數先儒之言九獻者皆曰祼事朝事饋食各二獻與卒食之三獻為九其説固善然內宰言后祼獻瑶爵則獻之前有祼獻之後有瑶爵祼自為祼獻自為獻瑶爵自為瑶爵不可混而為一且大行人廟享之禮於上公王禮再祼而酢饗禮九獻是上公九獻而祼酢不與焉先王承賔猶承神以宗廟之重於賔客也今上公之禮祼酢猶不與乎九獻豈有宗廟而列九獻於祼酢耶今以司尊彛詳考之方質明行事之時尸在室中王用圭瓚酌鬱齊以祼神后用璋瓚酌鬱齊以亞祼所謂鬱齊獻酌是已再祼之後王牽牲於廟門祝則延尸于堂正南靣之位王麗牲於碑而殺之腥之以獻以象朝時所進故曰朝事后為之薦朝事之籩豆各八王乃用玉爵酌醴齊以獻尸后亞王諸臣助焉其獻凡三所謂醴齊縮酌是已朝事之後王則體解其牲而熟之祝復延尸於室中亦正南靣之位王薦熟於主前以象食時所進故曰饋食后為之薦饋食之籩豆各八王乃用玉爵酌盎齊以獻尸后亞王諸臣助焉其獻凡三所謂盎齊涗酌是已饋食之後尸始有飲食之禮是謂卒食食訖后為之薦加籩豆各八又為之薦羞籩豆各八王乃用玉爵獻修酌以酳尸后亞王諸臣助焉其獻凡三所謂凡酒修酌是已九獻既備則有尸酢之禮用此修酌以酢蓋以人道終焉故尸以玉爵酢王以瑶爵酢后以散爵酢諸臣寧非象人道往反報施之義乎司尊彛言諸臣之所酢則舉其終而言之夫有終必有始有酢必有獻諸臣無獻安得有酢諸臣有酢則王與后有酢可知也不言王與后之酢以諸臣見之不言諸臣之有獻以其酢見之不然則諸臣何以為助祭之禮是知九獻無祼酢而此見於八籩八豆之用者其説與內宰合又與司尊彛合餘見內宰司尊彜之職王舉則共醢六十甕以五齊七醢七菹三臡實之賔客之禮共醢五十甕凡事共醢醯人掌共五齊七菹凡醯物以共祭祀之齊菹凡醯醬之物賔客亦如之王舉則共齊菹醯物六十甕共后及世子之醬齊菹賔客之禮共醯五十甕凡事共醯王舉者即膳夫所言王日舉之禮膳夫醬用百有二十甕即此之共醢六十甕共醯六十甕也醢人既以五齊七菹為醢矣至醯人復掌之蓋醬物須醯而後成此膳夫於百有二十甕所以總名以為醬也共后及世子之醬齊菹特於王舉之後言之不備其數不敢同乎王也賔客共醯醢各五十甕凡百甕參之掌客舉中數而言之也天子備物十二故醬用百有二十甕而掌客於上公亦用其數者尊先代之後且用之大饗非日舉也且醯醢一事周人既分二職矣至其所實之器在膳夫則謂之甕在醢人則謂之豆甕可以備禮數而持久也豆可以和齊菹而共膳也醢人雖備五齊七菹以充豆實而不加之以醢則齊菹不成其味二者相持而用故醯醢不嫌其為二職鹽人掌鹽之政令以共百事之鹽祭祀共其苦鹽散鹽賔客共其形鹽散鹽王之膳羞共飴鹽后及世子亦如之凡齊事鬻盬以待戒令鹽人言政令以其為山澤之利也古者名山大澤不以朌雖曰守以虞衡實與百姓共之特貢其物以共祭祀賔客之費以共王及后世子膳羞之奉以共朝廷官府百事之用此政令之所從出也苦者出於池顆鹽是已散者出於海末鹽是已飴者出於石戎鹽是已惟形鹽之共則鹽而虎形者籩人以虎鹽為朝事之獻今乃用於賔客而不用於祭祀周公閲以虎鹽為國君備物之用奉今乃用於賔客而不用於膳羞即是而觀三者可以互見凡齊事鬻盬者盬即鹽之陳者也鬻即化之以水鍊之以火用以和五味之齊取其潔也所謂政令者如此幂人掌共巾幂祭祀以疏布巾幂八尊以畫布巾幂六彞凡王巾皆黼幂覆也天地無祼禮止以五齊三酒而實之八尊以疏布巾幂之至敬無文貴乎質也宗廟有祼禮則又有朝事饋食之禮故兼用尊彛以畫布巾幂六彛常敬為親貴乎文也六彛如此則宗廟之八尊亦用畫布矣凡王巾皆黼則白與黑謂之黼以示威斷之義宫人掌王之六寢之修六寢者路寢一小寢五路寢在路門之內玉藻曰朝辨色始入君日出而視之退適路寢聽政是也小寢乃堂上之五室即王者燕息之所玉藻曰使人視大夫大夫退然後適小寢釋服是也此皆宫中內外之事所以專設宫人以掌六寢之修修者何下經所言皆所以為修為其井匽除其不蠲去其惡臭共王之沭浴凡寢中之事掃除執燭共爐炭凡勞事四方之舍事亦如之宫正以上士二人為之宫伯以中士二人為之至尊所居嚴乎其為王宫之職也今宫人亦中士四人然不專主六寢而特言六寢之修不專治寢中而特與寢中之勞事何也曰天下固有灑掃使令之冗役瑣碎微末之細故而關乎國體為甚重王宫之事是已夙興夜寐灑掃庭內衛武公所以為荒耽之警子有廷內弗灑弗掃晉昭公所以不能修正國之道此豈為觀美而已朝廷內外之肅正君臣上下警戒之機不然則王宫自奄夷以下如次舍幕幂皆掌之以下士而宫人獨中士其意可見矣掌舍掌王之會同之舍設梐枑再重設車宫轅門為壇壝宫棘門為帷宫設旌門無宫則共人門凡舍事則掌之會同之舍有在國門之外者有在四方者天子巡狩會諸侯於方嶽之下則為四方之舍宫人所言四方之舍事是也王不巡狩則諸侯來會於王城之外設方明壇以行會同之禮亦為會同之舍掌舍所掌是也秋官司儀職曰將合諸侯則令為壇三成宫旁一門是知會之舍即為壇於國門之外司儀之所令即令掌舍為之設梐枑再重者設行馬兩重於會同之地所以外衛車宫也為車宫轅門者以車為宫即轅以為門所以外衛壇壝也為壇壝宫棘門者為壇於中而壝以外棘為之門所以衛天子會同也為帷宫設旌門者以待王之休息亦加嚴衛如大閲左右和之門也無宫則共人門者以待王之遊觀而陳列周衛所以壯君威也凡舍事掌之者覲禮曰諸侯覲於天子為宫方三百步四門壇十有二尋深四尺王巡狩殷國為宫亦如之夫有宫則有壝國門之外與巡守四方皆然故曰凡舍事則掌之幕人掌帷幕幄帟綬之事凡朝覲會同軍旅田役祭祀共其帷幕幄帟綬大喪共其帷幕帟綬三公及卿大夫之喪共其帟帷維於旁者也幕覆於上者也幄則四合以象宫室也帟則在上以承塵也綬為之組以係四物者也幕人掌其物而不言共王者以王出宫則有是事而已若夫凡朝覲會同軍旅田役祭祀則共之於掌次掌次掌王次之法以待張事法者大宰九式之法也夫次舍帷幄其事雖微君尊所臨其體實重故大旅上帝與夫朝日祀五帝實不外乎祭祀之式合諸侯與大朝覲會同實不外乎賔客之式凡師田喪紀與夫邦事莫不皆有式焉大宰以此授之掌次以此行之凡聯事於掌舍幕人亦然以此見王者儀衛亦無適而不謹於法也王大旅上帝則張氈案設皇邸朝日祀五帝則張大次小次設重帟重案合諸侯亦如之師田則張幕設重帟重案大旅上帝非常祭也大宗伯祭天之禮三而無旅帝之禮其末篇言國有大故則旅上帝及四望蓋大故則凶災也旅陳也衆也記曰誦詩三百不足以一獻一獻之禮不足以大享大享之禮不足以大旅大旅具矣不足以享帝其謂是歟鄭氏以為祭天於圜丘既失旅帝之義鄭司農於五帝則又曰五色之帝此亦漢儒讖緯之説已見於大宰祀五帝之義詳矣蓋月令於春曰其帝大昊於夏曰其帝炎帝於中央曰其帝黃帝於秋曰其帝少昊於冬曰其帝顓頊此五人帝之説自三代以來行之豈可不信三代之儀而信漢儒之説若果五天帝則當在朝日之上今其位列於朝日之下則為五人帝可知其朝日之儀則王者春分朝日於東門之外典瑞所謂王搢大圭執鎮圭繅藉五采就以朝日是已傳曰春朝朝日秋暮夕月又曰大采朝日少采夕月禮經並不言夕月而特言朝日者即尊陽卑陰之義與春秋書日食同義若夫合諸侯之師田與下經朝覲會同之師田其事不同下經乃諸侯之禮此經乃天子之禮以國有大事合諸侯於國門之外出師征伐以及田獵以禮為甚大故也凡此數者皆以王者之尊屈而臨之其儀衛不可以不嚴所以專設掌次之職王大旅上帝則張氊案設皇邸其禮雖重而無大次小次者祀天之禮主乎敬王者不敢以自安故也朝日祀五帝合諸侯則禮之次者故張大次以待王之臨涖張小次以待王之退息且設重帟重案而亦無大次小次者親與士卒同其役則不敢自異故也此數者皆所為王次之法諸侯朝覲會同則張大次小次師田則張幕設案孤卿有邦事則張幕設案上經言會諸侯而師田則王者之禮此言朝覲會同而師田則諸侯之禮古者雖乘車之會君行師從是以二千五百人而從諸侯行朝覲會同之禮故與師田之事朝覲會同則為之張大次小次師田則張幕設案皆所以待諸侯也若孤卿有邦事謂以事從王或以王命而出其張幕設案同諸侯師田之法凡喪王則張帟三重諸侯再重孤卿大夫不重凡祭祀張其旅幕張尸次喪祭一也天子諸侯孤卿大夫之喪言帟旅之助祭執事者言幕尸之更衣退息者言次各隨其用之所宜而已射則張耦次掌凡邦之張事耦謂俱升射者大射六耦在西郊賓射六耦在朝燕射三耦在寢謂天子不能獨射也有射必有耦有耦必有次大射曰遂命三耦取引矢于次此雖諸侯之禮亦所以為天子耦次之證

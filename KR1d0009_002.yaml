body:
  text: 周官總義卷二宋易袚撰小宰之職掌建邦之宫刑以治王宫之政令凡宫之紏禁古人立法自貴者始於是乎有王宫之刑宫刑不見於經以宫正所掌推之所謂辨外內而時禁幾其出入均其稍食去其淫怠與其竒邪之民即此之政也所謂稽其功緒紏其德行與夫會其什伍而教之道藝即此之令也以此紏察其不然則曰紏以此禁止其未然則曰禁宫刑以治王宫之政令凡宫之紏禁則其政令紏禁之所棄者乃小宰宫刑之所加者也然則小宰者治官之二也故宫刑所治首言王宫之政宫正者治官之屬也故以政為戒而掌王宫之戒令糾禁蓋宫正所掌亦即推行乎小宰之所掌則是亦推行乎小宰之治者也或謂凡宫兼言后宫失之矣掌邦之六典八法八則之二以逆邦國都鄙官府之治執邦之九貢九賦九式之二以均財節邦用此六者大宰専之小宰二之書之副曰二亦所以二大宰也大宰以前三者兼總治體而専其操舍之大權矣小宰則以其二而察其善否之實故曰以逆邦國都鄙官府之治大宰以後三者兼制國用而専其斂散之大權矣小宰則以其二而謹其出內之吝故曰以均財節邦用此所以為治官之二以官府之六敘正羣吏一曰以敘正其位二曰以敘進其治三曰以敘作其事四曰以敘制其食五曰以敘受其會六曰以敘聽其情百官所居謂之府任官府之職者謂之吏凡官府之吏有位斯有治有治斯有事有事斯有食有食斯有會有會斯有情非敘無以正之於是小宰以六敘正羣吏何謂位公一位卿一位大夫一位上士一位中士一位下士一位凡六等宰夫言治朝之法是也何謂治曰正曰師曰司曰旅曰府史曰胥徒各有所治凡八等宰夫言百官府之徵令是也何謂事或大事則從其長或小事則専達司士言以能詔事是也何謂食或稽其事而制其食或乘其事而上下其食司士言以久奠食是也何謂會有會其政事者有會其財用者宰夫司會所掌之類是也何謂情有納訪之情有復逆之情內史小臣所掌之類是也惟其位有貴賤治有小大事有先後食有多寡會有詳略情有好惡以此六敘而正之則正朝廷以正百官莫不一於正矣以官府之六屬舉邦治一曰天官其屬六十掌邦治大事則從其長小事則専達二曰地官其屬六十掌邦教大事則從其長小事則専達三曰春官其屬六十掌邦禮大事則從其長小事則專達四曰夏官其屬六十掌邦政大事則從其長小事則專達五曰秋官其屬六十掌邦刑大事則從其長小事則專達六曰冬官其屬六十掌邦事大事則從其長小事則專達此大宰八法之官屬也小宰則列其條目而加詳焉六官之長為六卿六卿各帥其屬其屬各六十合六屬而論則其象周天之度今以敘官考之天官之屬六十有三地官之屬七十有九春官之屬七十有一夏官之屬七十秋官之屬六十有五此五官之屬固已三百四十有八雖冬官散落無紀計其數總四百有餘何耶聖人法天建官天度竒而不齊聖人亦不如是之拘舉其成數曰其屬六十而已大事則從其長非特六官之長也凡職皆有長焉大事則其屬從之小事則專達此又六屬小大相承之意以官府之六職辨邦治一曰治職以平邦國以均萬民以節財用二曰教職以安邦國以寧萬民以懷賔客三曰禮職以和邦國以諧萬民以事鬼神四曰政職以服邦國以正萬民以聚百物五曰刑職以詰邦國以糾萬民以除盜賊六曰事職以富邦國以養萬民以生百物小宰之六職自治職之平邦國均萬民以至事職之富邦國養萬民與大宰六典所言或同或異有詳有略無非所以推行乎六典者也然六典治邦國故先百官而後萬民此六職雖言邦國萬民而不及百官者以其所職莫非官府故不言百官而各言六職之事財用會計屬乎天官之職故治職曰以節財用封建委積屬乎地官之職故教職曰以懷賔客掌天神人鬼地示之禮屬乎春官之職故禮職曰以事鬼神掌財用九穀六畜之數屬乎夏官之職故政職曰以聚百物詰姦慝刑暴亂者屬乎秋官之職故刑職曰以除盜賊居四民時地利者屬乎冬官之職故事職曰以生百物是六者特六職之大槩推之六職之中皆各有宰夫之八職於是纎悉畢舉而邦治辨矣以官府之六聨合邦治一曰祭祀之聨事二曰賔客之聨事三曰喪荒之聨事四曰軍旅之聨事五曰田役之聫事六曰斂弛之聯事凡小事皆有聯合官府之六聨於辨六職之後有所辨而後有所合也大宰所謂官聨以會官治是已故吉禮賔禮掌於大宗伯則凡六官之有職於祭祀賔客者皆其聨事也凶禮軍禮掌於大宗伯則凡六官之有職於喪荒軍旅者皆其聨事也若乃大司馬掌田獵之事大司空掌徒役之事則凡六官之有職於此者皆田役之聨事也大府掌斂貨賄之類鄉大夫辨其可舍之類則凡六官之有職於此者皆斂弛之聨事也終之以凡小事皆有聨則知此六者皆大事矣上經言大事從其長固可以聨事小事專達則亦可取乎聨小事有聨尤見成周設官之不茍如此以官府之八成經邦治一曰聽政役以比居二曰聽師田以簡稽三曰聽閭里以版圖四曰聽稱責以傅别五曰聽祿位以禮命六曰聽取豫以書契七曰聽買賣以質劑八曰聽出入以要會載天下之成法者謂之成别謂八成言成而不可變天下之常經也大宰之官成以經邦治是已比謂國比居謂民居既有成法矣小司徒合萬民之卒伍以待政典之役則以比居聽之簡謂兵器稽謂人民既有成法矣大司徒以旗致民而為搜苗獮狩之舉則以簡稽聽之版謂夫家生齒之版圖謂土地風氣之圖既有成法矣欲校登其閭里人民之數則以版圖聽之傅謂地傅以為之保别謂判書以為之合既有成法矣欲參決其稱貸責償之實則以傳别聽之禮命謂禮儀之命多寡隆殺皆成法也凡祿位同而尊卑混者以禮命聼之書契謂契驗之書彼此先後皆成法也凡以物取豫而其情異同者以書契聽之人之保任謂之質文之要約謂之劑亦成法也凡市之賣買而未易别識者以質劑聽之月之所成謂之要嵗之所成謂之會亦成法也凡財用之出入而未易稽考者以要會聽之是八者皆謂之聽或以為聽獄訟非也大司冦之職曰凡萬民之獄訟以邦成弊之斯以八成而聽其獄訟者歟蓋司冦刑官所主獄訟小宰非獄訟之責也聽其治而已如酒正所謂小宰聽之者聽其治者也以聽官府之六計弊羣吏之治一曰亷善二曰廉能三曰廉敬四曰廉正五曰廉法六曰廉辨廉察也察而曰廉者取其方而可見者也吏治亦然善欲其端能欲其厲敬欲其慤正欲其徑法欲其有所守辨欲其有所決皆其方而可見者不然計稽也弊斷也無非所以察吏治不曰察而曰廉豈無意哉以法掌祭祀朝覲會同賔客之戒具軍旅田役喪荒亦如之七事者令百官府共其財用治其施舍聽其治訟法式也天下之事不豫則不立祭祀朝覲會同賔客以至軍旅田役喪荒之事凡七者皆國事之大不素戒而先具則必有緩不及事之患故平居之際戒其所當為之事具其所當用之物小宰皆以式法掌之而待其事焉共其財用者何大府之職以邦都之賦待祭祀邦中之賦待賔客四郊之賦待稍秣山澤之賦待喪紀乃至邦國之貢以待弔用是大府與其屬共之而令之以法者小宰也治其施舍者何鄉大夫之職以嵗時登其夫家之衆寡而辨其可任者其舍者國中貴者賢者能者服公事以至老者皆舍是鄉大夫與其屬治之而令之以法者小宰也治則有所治而質於我訟則有所訟而決於我皆令百官府各以其職而聽之言百官府則非特天官為然小宰於六官皆得而令之宰夫又從而比之故言贊小宰比官府之具凡祭祀贊玉幣爵之事祼將之事凡賔客贊祼凡受爵之事凡受幣之事喪荒受其含禭幣玉之事大宰祭祀則贊玉幣爵之事小宰又從而助其贊於大朝覲會同則贊玉幣玉爵小宰又從而贊其所受受爵受幣不言贊蒙贊祼之上文也此小宰所以為大宰之二大宰以祀五帝為主故不言祼祼宗廟之禮也王用圭瓚酌鬱鬯以祼神小宰則將而送之賔客亦有祼上公再祼侯伯子男一祼小宰皆為之贊祼事若夫喪禮則諸侯致助送之含禭荒禮則諸侯致賙委之幣玉無所贊也自受而達之爾月終則以官府之敘受羣吏之要贊冡宰受嵗會嵗終則令羣吏致事小宰以敘受羣吏之要而六敘則曰以敘受其會者何也事有詳略職有尊卑尊者總其綱卑者舉其目嵗會所以統月要也月要所以統日成也日成則宰夫受之月要則小宰受之然後冢宰於嵗終受嵗會小宰則以敘贊之而已贊冡宰受嵗會而後令羣吏致事者小宰令之而後冢宰聽之且詔王廢置焉本末相因執要御詳之道也正嵗帥治官之屬而觀治象之法夏正建寅謂之正嵗周正建子謂之正月此一經之通例也大宰於正月之吉固已縣象於象魏使萬民觀之矣小宰復於正嵗帥其屬而觀治象與大宰所縣者相去兩月之久殊非挾日斂之之義學者疑焉鄭氏以互文推之乃謂大宰縣治象於正嵗恐非經之本旨蓋建子為時王之正月示萬民以更新之意故大宰縣治象於月吉而復斂於挾日建寅為民時之正嵗吏治於是乎始故小宰帥治官之屬觀治象於已斂之後以治官專掌治象之法不拘乎縣治象之時也徇以木鐸曰不用法者國有常刑乃退以宫刑憲禁于王宫令于百官府曰各修乃職考乃法待乃事以聽王命其有不共則國有大刑小宰一職專掌宫刑以治王宫之政令糾禁而其間並不及王宫之事所謂憲禁者特見於治官觀象之後是知外廷中禁其政皆出於一然治官之屬不用法者特警之以常刑宫中之官其有不共乃警之以大刑者何耶尊君之誠專則近君之法嚴以大刑警之則宫中皆修職守法之士大刑雖設而實未常用也宰夫之職掌治朝之法以正王及三公六卿大夫羣吏之位掌其禁令天子有三朝曰燕朝曰治朝曰外朝亦有五門自外而內則曰臯門曰庫門曰雉門曰應門曰路門書以路門為畢門師氏以路門為虎門皆王者視朝之地也後鄭謂燕朝在路門之內又謂在路寢之庭至門其實一也而鄭司農則曰治朝在路門之內外朝在路門之外據置治朝在路門之內則置燕朝於何所外朝在路門之外則置治朝於何所此其説不攻而自破今考大僕掌正燕朝之服位而曰建路鼓於大寢之門外寢門即路門也知路門內為燕朝則路門外為治朝可知矣况師氏司王朝於虎門之左則知治朝決在路門之外宰夫所掌治朝之法即路門之外王日視之朝王視治朝而大宰贊王聽治故宰夫掌治朝之法以正王及三公六卿大夫羣吏之位司士又於此正朝儀之位辨其貴賤之等王南鄉三公北面東上孤東面北上卿大夫西面北上王族故士虎士在路門之右南面東上大僕大右大僕從者在路門之左南面西上此即治朝之儀令其如儀而禁其不如儀於是掌其禁令敘羣吏之治以待賔客之令諸臣之復萬民之逆此經繼於朝位之後正慮其堂陛之嚴而人情易至於隔絶故也賔客之有求於朝者謂之令諸臣以言而反命者謂之復萬民自下而有言於上者謂之逆有以待之則下得以致其情於上待之不以敘則上亦無以審擇於其下故賔客之令有輕重諸臣之復有先後萬民之逆有緩急宰夫皆敘羣吏之治以待之則賔客臣民其有遺情耶掌百官府之徵令辨其八職一曰正掌官法以治要二曰師掌官成以治凡三曰司掌官法以治目四曰旅掌官常以治數五曰府掌官契以治藏六曰史掌官書以贊治七曰胥掌官敘以治敘八曰徒掌官令以徵令總六官而言則謂之百官府責成於百官府則謂之徵令徵謂上有所召令謂下有所稟辨其八職使之各有所掌者應上之徵令而已正所以長其屬固言乎六官之長所謂掌官法以治要則治其一月之要也師所以帥其屬固言乎六官之二所謂掌官成以治凡則治其一旬之成也司言其職固屬乎六官之考所掌者官法所治者條目目則詳於凡者也旅言其衆固屬乎上士中士下士所掌者官常所治者縷數數則詳於目者也府謂六官之府主蓄藏之物必有契以為之驗故掌官契以治藏史謂六官之史主事物之籍必有書以為之考故掌官書以贊治史下之胥所以掌徒役之次敘胥下之徒所以掌奔走之召令前四者皆王臣也後四者庶人之在官者也職尊則所掌者大而略職卑則所掌者小而詳以徵令辨之則六官之職舉矣掌治法以考百官府羣都縣鄙之治乘其財用之出入凡失財用物辟名者以官刑詔冡宰而誅之其足用長財善物者賞之百官府者謂王朝六官之屬及列職於鄉六遂者羣都縣鄙則自甸稍以至縣都之地皆在王畿千里之內其治至不一也其財用物亦不一也財謂九賦所入者用謂九物所出者物即官府郊野縣都之百物財用物是三者皆民力所出國計所係不可不察也於是宰夫為之乘其出入然必先以治法考治者蓋大宰以八法治官府以八則治都鄙小宰則又以八法八則而逆官府都鄙之治宰夫又為之掌其治法則官府都鄙之治及其財用物之數其綱目纎悉皆不逃吾八法八則之中矣以是而乘其出入則乘其數而已是雖百千萬億皆不外乎所乘之數凡失此三者而又隱匿其失則以官刑詔冡宰而誅之足用謂事不乏用用不廢事長財謂出內之吝常有餘用善物謂守視之謹無所虧損此三者則詔冡宰而賞之此蒙上文故不再言詔誅賞必詔冡宰者宰夫能考其功罪而誅賞則自上出也冡宰必待宰夫所詔而行誅賞者付諸有司之公而我無與也其與後世剝民財肥國計而行殿最之法者異矣以式法掌祭祀之戒具與其薦羞從大宰而視滌濯大宰於祭祀言戒具而未嘗言法小宰言法矣而未嘗言式式法兼掌治小而詳也式謂用財之式法謂治事之法所謂戒具者大宰掌之小宰掌之宰夫又掌之祭祀之事大體重故聨事合治不嫌乎尊卑之同也薦謂所進脯鹽羞謂庶羞內羞此有司所共宰夫又以式法掌之若夫祭祀之前期及執事視滌濯乃大宰之事宰夫特從之而已凡禮事贊小宰比官府之具凡禮事者五禮之事也小宰以法掌祭祀朝覲會同賔客之戒具軍旅田役喪荒亦如之以五禮而言祭祀吉禮也朝覲會同賔客賔禮也軍旅田役軍禮也喪荒凶禮也雖不言嘉禮而饗燕之禮見於賔禮脤膰之禮見於吉禮别而言之故為七事又曰七事者令百官府共其財用所謂官府之具者此也比則敘之而已所以贊小宰之所令者凡朝覲會同賔客以牢禮之法掌其牢禮委積膳獻飲食賔賜之飱牽與其陳數王氏詳説曰賔客牢禮之數見於行人之大者又見於掌客之職宰夫天官之考又從而掌其數此所以見成周之重賔禮也曰牢禮之法者委積膳獻飲食賔賜之飱牽無非牢禮也聘禮云賔至大夫帥至於館宰夫朝服設飱是賔始至則有飱禮矣飱小禮也又云聘日致饔是賔已至則有饔禮矣饔大禮也先鄭以飱為夕食則非也賈氏以饔餼為牢禮亦非也賔至設飱何待夕乎凡禮皆有牢何必饔乎委積膳獻飲食賔賜之飱牽掌客行人所掌可考而知也上公五積侯伯四積子男三積遺人所謂十里有廬廬有飲食三十里有宿宿有路室路室有委五十里有市市有候館候館有積是往來道路間所給用也膳則掌客所謂上公殷膳大牢以及歸侯伯殷膳則無以及歸矣子男則無殷膳矣此之謂膳也獻則掌客所謂上公乘禽日九十雙侯伯乘禽日七十雙子男乘禽日五十雙惟上介皆有禽獻此之謂獻也飲則大行人所謂上公饗禮九獻侯伯饗禮七獻子男饗禮五獻此之謂飲也食則大行人所謂上公食禮九舉侯伯食禮七舉子男食禮五舉此之謂食也賔賜則掌客所謂凡介行人宰史皆有饔飱餼以其爵等為之牢禮之陳數曰賔賜云者以其賔之故而賜其羣下耳此之謂賔賜也飱牽則是自委積以下膳獻飲食賔賜皆有飱牽也掌客所謂上公飱五牢饔餼九牢其死牢如飱之陳牽四牢侯伯飱四牢饔餼七牢其死牢如飱之陳牽三牢子男飱三牢饔餼五牢其死牢如飱之陳牽二牢此之謂飱牽也但致積致飱致饔餼致饔食與夫賔賜皆有牢數必曰飱牽者以賔始至之禮為言耳委積雖不言牢數然積視飱牽三問皆修羣介行人宰史皆有牢則委積往來皆有之此所以先於膳獻飲食也言飱而不及饔言牢而不及死牢義亦在其中矣凡邦之弔事掌其戒令與其幣器財用凡所共者大喪小喪掌小官之戒令帥執事而治之三公六卿之喪與職喪帥官有司而治之凡諸大夫之喪使其旅帥有司而治之古者喪弔之儀無非所以伸君臣之情全始終之義凡邦之弔事則以諸侯諸臣而言之大喪小喪則以后及世子夫人以下而言之三公六卿諸大夫之喪則又有尊卑焉掌之有異禮治之有異職稱其分而已嵗終則令羣吏正嵗會月終則令正月要旬終則令正日成而以考其治治不以時舉者以告而誅之天官之職小宰所以贊冡宰宰夫所以贊小宰其治一也小宰之職曰月終則以官府之敘受羣吏之要贊冡宰受嵗會是嵗之有會冡宰受之也而小宰贊之月之有要小宰受之也而宰夫贊之日之有成宰夫受之也而皆得以令羣吏正要會焉蓋一事之修積而至於無一事之不修一日之謹積而至於無一日之不謹宜乎嵗會月要日成之治宰夫皆得以令之也令之者使之蚤正於先而後宰夫得以考羣吏之治何謂考治小宰於正嵗帥羣吏觀治象而有常刑之戒令又積日成月成而至於嵗成矣果不以時而舉其治則以告而誅之與上經官刑詔冡宰之誅同正嵗則以法警戒羣吏令修宫中之職事書其能者與其良者而以告于上此經言令宫中之吏與上經令官府之吏同意然上經於吏治不舉以告而誅而不及能與良之書何耶宰夫於足用長財善物之人既以詔冡宰而賞之則能與良之書為有素矣而未及夫宫中之吏故小宰於正嵗憲王宫之禁令而有大刑之戒令又至於正嵗則期已久矣其間職事振舉而有能者良者皆已著見則又書之以告於上二者皆言告於冡宰之職也蓋大宰於三嵗大計羣吏之治而行誅賞之法則亦誅賞乎宰夫之所告者而已矣宫正掌王宫之戒令糾禁小宰掌宮刑以治王宫之政令糾禁宫正復掌其令與糾禁而不言政者以政為二官之事也故不掌其政而掌其戒所謂戒者亦宰夫以法警戒羣吏而修宫中之職事者也是所掌之戒令糾禁實上承乎小宰宰夫而兼總于大宰也夫大宰以外廷之大臣而特總宫正宿衛之職者何歟周自文王以來王政實先於內治侍御僕從罔匪正人雖綴衣虎賁趣馬之職亦惟常人吉士之求惟大宰以大臣臨之宫壼朝廷均為一體非若後世之疏外廷而親內署者也或謂宫正所掌宿衛正西漢光祿勳所掌郎衛之職似矣漢初郎選甚重以明經孝廉賢良方正等充之豈不以備宿衛之儀當時署郎獨敬長官而於王宫無所禁是以體統不正考核無法而賢否無辨間燕之際私昵勝矣是知宫正列屬於大宰者正所以兼制內廷之私人而又以小宰宰夫之戒令糾禁行乎其間養成君德如此成周設官之微意也以時比宫中之官府次舍之衆寡為之版以待夕擊柝而比之國有故則令宿其比亦如之辨外內而時禁稽其功緒糾其德行幾其出入均其稍食去其淫怠與其竒邪之民會其什伍而教之道藝王宫以教為本必先為之比其人申其法而後教行焉何謂比其人王宫宿衛有官府之吏有國之士庶子有守王宫之民三者環列於八次八舍之間而宫正則有時比之法為之版以待則籍其名之多少夕擊柝而比則計其人之在否國有祭祀兵戎喪紀之故則其比亦然所謂比其人者也何謂申其法王宫有內外自雉門內以至燕寢則為內自雉門外以至外朝則為外內外嚴密不可不辨啓閉之際以時而禁然後為之稽其功之見於緒者糾其德之見於行者幾其人之出入均其人之稍食或有竒邪淫怠之民則斥而去之此所謂申其法者也二者既立然後為之會其人什與什聨伍與伍聨而使之相勉於道藝而其教成矣宫中官府之吏次舍之士庶子鄭氏言之悉矣惟所謂民者宫正無明文鄭氏以為宫中吏之家人非也至尊所御內外有禁豈羣吏家人所得而至司隸曰掌帥四翟之隸使之各服其邦之服執其邦之兵守王宫此宫中之民其四𨽻之民耶或謂戎狄之民非我族類何以置於宿衛之列且使之服其邦之服執其邦之兵得非賊器竒服怪民之入宫者歟是不然四翟之民即南方之蠻東南之閩東方之夷東北之貉其服屬為有素非西戎北狄比也蓋周自文王之世西有昆夷之患北有玁狁之難惟東南之地王化先及以基王業至周公攝政制禮作樂推原乎王化之所始南方曰象則有象胥之職以待蕃國之使東夷之樂曰韎則有韎師之職以薦宗廟之樂及此四翟之隸司隸亦帥之以備王宫之守皆此意也宫正舉服屬者列於官府士庶子之後而宿衛之政舉矣月終則會其稍食嵗終則會其行事稍食所養吏士會於月終則小宰為之受其要行事則吏事之見於所行者會於嵗終則冡宰為之受其會凡邦之大事令于王宫之官府次舍無去守而聽政令邦之大事則祭祀兵戎之事也王宫宿衛最為嚴肅而倉卒煩劇人情亦易以擾凡平日所以比其衆寡合其什伍禁其內外幾其出入者皆所以為有事之備也令無去守其意深矣春秋以木鐸修火禁司烜中春以木鐸修火禁於國中為季春出火順天時也然不及中秋之火禁且特修其禁於國中而已至王宫則春秋出內火之夕皆從而修之以王宫事重於國中故也凡邦之事蹕宫中廟中則執燭大喪則授廬舍辨其親疏貴賤之居此經正與閽人相聨特有內外之辨閽人曰大祭祀喪紀設門燎蹕宫門廟門以大祭祀在廟中大喪紀在宫中即此所謂凡邦之事是也但閽人掌守王宫中門之禁特有職於宫門廟門而已若宫正掌王宫之宿衛則與閽人不同閽人設燎於門此於宫中廟中則執燭閽人於宫門廟門蹕此言凡邦之事其所蹕者廣也然所謂蹕考之司𨽻則皆屬乎四𨽻𨽻僕掌蹕宫中之事則知以四隸為之蹕以四隸乃主王宫者而宫廟實一體是知廟中亦四隸為之蹕而宫中廟中之執燭亦四隸為之也故宫正皆掌之宫伯掌王宫之士庶子凡在版者宫伯所掌即贊宫正之所比者宫正雖不明言士庶子所謂以時比宫中之官府次舍之衆寡則若官若民若士庶子咸在焉故宫正以時比之為之版以待此乃宫正所掌次舍名數之版宫伯則掌在版之士庶子而已掌其政令行其秩敘作其徒役之事授八次八舍之職事若邦有大事作宫衆則令之宫正於邦之大事令聽政令宫伯又為之掌其政令然非特事之大者凡事皆掌之也何謂凡事秩者祿廩之髙下敘者功緒之先後徒役者宫中徼巡奔走之事及宿衛者居之授職事者即擊柝令宿之類此皆平時行於王宫者若大事作宫衆則令之鄭氏謂或選當行殊不知士庶子之職有當行者有不當行者出而守禦國鄙如諸子所謂帥國子而致於太子唯所用之則在所當行入而宿衛王宫若宫正所謂令於王宫之官府次舍無去守而聽政令豈所當行者哉作宫衆則令不過令無去守而已月終則均秩嵗終則均敘以時頒其衣裘掌其誅賞月終則均秩秩祿稟與宫正均稍食一也嵗終則均敘與宫正則異彼宫中官府故會其行事此其子弟故均其敘敘即才等也以時頒其衣裘夏時頒衣冬時頒裘掌其誅賞者士庶子有功則賞有罪則誅之也此誅賞之法即推行宫正戒令糾禁之法者也戒而後令作其為善糾而後禁止其為惡此宫正所以列之於始為善不怠勉之以賞為惡不悛厲之以誅此宫伯所以敘之於終反復二官始終可見矣

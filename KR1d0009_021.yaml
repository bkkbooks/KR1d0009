body:
  text: 周官總義卷二十一宋易祓撰秋官司寇第五惟王建國辨方正位體國經野設官分職以為民極乃立秋官司寇使帥其屬而掌邦禁以佐王刑邦國小宰言秋官其屬六十掌邦刑而此經乃言秋官司寇掌邦禁者何也先王立法止於禁過而已此司冦所以掌邦禁而後言刑邦國也然刑所以弼教也寇則敗其教之成者也縱欲敗類乃教之所棄而刑之所取故掌刑者謂之冦而後世亦謂之司敗是刑所以懲其敗類者也奚以禁為哉是不然蒙之初六曰利用刑人以正法也於上九則曰利用禦冦上下順也蓋用刑之意本以禁暴懲之於未嘗正法之始猶之可也致冦而後禦雖以順用斯為末矣使不能明威立義俾民不迷防微遏萌逆折其始及陷於罪又從而刑之豈為民極之意是知禁過於未然者聖人之本心也刑以濟其禁之所不及者聖人之不得已也司冦所掌不先言刑而先言禁其三代本末之序也歟刑官之屬大司冦卿一人小司冦中大夫二人士師下大夫四人鄉士上士八人中士十有六人旅下士三十有二人府六人史十有二人胥十有二人徒百有二十人遂士中士十有二人府六人史十有二人胥十有二人徒百有二十人縣士中士三十有二人府八人史十有六人胥十有六人徒百有六十人方士中士十有六人府八人史十有六人胥十有六人徒百有六十人訝士中士八人府四人史八人胥八人徒八十人朝士中士六人府三人史六人胥六人徒六十人司民中士六人府三人史六人胥三人徒三十人司刑中士二人府一人史二人胥二人徒二十人司刺下士二人府一人史二人徒四人司約下士二人府一人史二人徒四人司盟下士二人府一人史二人徒四人職金上士二人下士四人府二人史四人胥八人徒八十人司厲下士二人史一人徒十有二人犬人下士二人府一人史二人賈四人徒十有六人司圜中士六人下士十有六人府三人史六人胥十有六人徒百有六十人掌囚下士十有二人府六人史十有二人徒百有二十人掌戮下士二人史一人徒十有二人司隸中士二人下士十有二人府五人史十人胥二十人徒二百人罪隸百有二十人蠻隸百有二十人閩隸百有二十人夷隸百有二十人貉隸百有二十人布憲中士二人下士四人府二人史四人胥四人徒四十人禁殺戮下士二人史一人徒十有二人禁㬥氏下士六人史三人胥六人徒六十人野廬氏下士六人胥十有二人徒百有二十人蠟氏下士四人徒四十人雍氏下士二人徒八人萍氏下士二人徒八人司寤氏下士二人徒八人司烜氏下士六人徒十有六人條狼氏下士六人胥六人徒六十人修閭氏下士二人胥一人徒十有二人冥氏下士二人徒八人庶士下士一人徒四人穴氏下士一人徒四人翨氏下士二人徒三人柞氏下士八人徒二十人剃氏下士二人徒二十人硩蔟氏下士一人徒二人剪氏下士一人徒二人赤犮氏下士一人徒二人蟈氏下士一人徒二人壺涿氏下士一人徒二人庭氏下士一人徒二人銜枚氏下士二人徒八人伊耆氏下士一人徒二人大行人中大夫二人小行人下大夫四人司儀上士八人中士十有六人行夫下士三十有二人府四人史八人胥八人徒八十人環人中士四人史四人胥四人徒四十人象胥每翟上士一人中士二人下士八人徒二十人掌客上士二人下士四人府一人史二人胥二人徒二十人掌訝中士八人府二人胥四人徒四十人掌交中士八人府二人史四人徒三十有二人掌察四方中士八人史四人徒十有六人掌貨賄下士十有六人史四人徒三十有二人朝大夫每國上士二人下士四人府一人史二人庶子八人徒二十人都則中士一人下士二人府一人史二人庶子四人徒八十人都士中士二人下士四人府二人史四人胥四人徒四十人家士亦如之秋官刑官也司冦掌刑而士師則掌禁自鄉士以至司隸則言其用刑者也自布憲以至銜枚氏則言其用禁者也序言用刑而掌戮必在其後序言用禁而禁殺戮必居其先是為政尤惡於用殺也此特刑禁之職而已若大行人掌客之類則疑於春官之掌禮者也朝士掌交之類則疑於夏官之掌政者也不列於春夏二官而必列於司冦刑官之屬者蓋刑非所以為刑也止其刑於禮文之始制其刑於政治之後設官之意如此其聖人折民惟刑之義歟大司寇之職掌建邦之三典以佐王刑邦國詰四方一曰刑新國用輕典二曰刑平國用中典三曰刑亂國用重典大司寇之三典即太宰之刑典典常也舉皇極之道而時措於天下故三者皆謂之典以刑邦國則近者修刑以正之以詰四方則逺者修辭以詰之逺近不同同於三典而已一曰刑新國者新造之國服教未久故其典主乎輕此成王命康叔撫殷民之意二曰刑平國者已治之國教化素孚故其典主乎中此成王命君陳尹東郊之意也三曰刑亂國者悖亂之國不共王略故其典主乎重此成王命周公征四國之意也是三典者新國亂國或輕或重惟平國獨得輕重之中以聖人用刑之意推之則輕者所以進其善重者所以懲其惡皆所以為中也書曰咸中有慶以五刑紏萬民一曰野刑上功紏力二曰軍刑上命紏守三曰鄉刑上德紏孝四曰官刑上能紏職五曰國刑上願紏㬥五刑專主乎刑典而其實則參六典之職蓋六卿分職各帥其屬以倡九牧固所以為民極之建然建之使必行於天下行之使必範於後世者實大司冦之正其刑典者也乃建事典以富邦國以任百官以生萬民則用野刑焉野刑雖六遂之刑然田萊溝涂之事城郭井邑之事無非關乎事官之職凡役民以作其事者以成功為上也以不致力為紏也故曰上功紏力乃建政典以平邦國以正百官以均萬民則用軍刑焉軍刑雖軍旅之刑然師田行役之政追胥守禦之政無非關乎政官之職凡役民以立其政者以用命為上也以不死守為紏也故曰上命紏守乃建教典以安邦國以教官府以擾萬民則用鄉刑焉鄉刑雖六鄉之刑然六德六行之教五禮六樂之教無非關乎教官之職凡役民以行其教者以成德為上也以不致孝為紏也故曰上德紏孝乃建治典以經邦國以治官府以紀萬民則用官刑焉官刑雖官府之刑然考二殷輔之治府史胥徒之治無非關乎治官之職凡役民以立其治者以用能為上也以不稱職為紏也故曰上能紏職乃建禮典以和邦國以統百官以諧萬民則用國刑焉國刑雖王國之刑然君臣父子之禮祭祀賔客之禮無非關乎禮官之任凡役民以踐其禮者以恪願為上也以不致恭為紏也故曰上願紏恭上者各有所上也紏者紏其渙散者也曾子曰上失其道民散久矣如得其情則哀矜而勿喜蓋渙散非用刑之時而刑之所紏期於無渙散而已此六典並建於天下而納天下於皇極之域聖人制刑之本意也以圜土聚教罷民凡害人者置之圜土而施職事焉以明刑耻之其能改者反于中國不齒三年其不能改而出圜土者殺圜土獄城也罷民則困而不學民斯為下者也過麗於法害加於人聚而教之置於圜土有仁而生之之道故謂之教施職事則以其所能而勞苦之耻以明刑明書其罪惡而愧辱之如是而能改則庶幾乎可與為善也故反于中國反于中國者反于鄉里也鄉里謂之中國者周以圜土代五流之法有絶於中國之義於是乎反于中國三年不齒則雖可與為善而未能保其必善當是時也州長屬民而讀法者屢矣而罷民不在所聽黨正屬民而飲酒者屢矣而罷民不在所序年運而往亦既久矣昔之不善固將自化然後齒之倫類不為辜民日月至而心不化焉逸而出諸圜土則殺之殺之非不仁措民於必善而已聚而教之仁也出而殺之義也聖人之意仁之至義之盡也以兩造禁民訟入束矢於朝然後聼之以兩劑禁民獄入鈞金三日乃致於朝然後聼之獄訟非聖人之得已也故先之以禁禁則止其刑於未然奚以兩造兩劑為哉兩造謂各有爭辨而皆至於公兩劑謂各執其書以相參驗聖人特設是法而已乃所以禁之也或爭而不已必至於訟訟而不已必至於獄是訟者不特兩造而已必入束矢示其直而不曲也不入則是自報其不直故入束矢而後為之聼其訟獄者亦不特兩劑而已必入鈞金示其堅而不變也不入則是其情猶可變故入鈞金而後為之聼其獄聖人之謹於獄訟者如此然訟則入束矢而即聼固欲息民之訟獄則入鈞金必待三日而後聼猶不忍置民於獄是皆聖人不得已之意也以嘉石平罷民凡萬民之有罪過而未麗於法而害於州里者桎梏而坐諸嘉石役諸司空重罪旬有三日坐期役其次九日坐九月役其次七日坐七月役其次五日坐五月役其下罪三日坐三月役使州里任之則宥而舍之上經云罷民害人而麗於法者此則未麗於法而不可以法加者也雖無大罪可置圜土若舍而弗治則亦有害於州里之善俗於是平之以嘉石謂石雖嘉而抑之於外朝之左所以耻之也且桎梏而坐外纍其形役諸司空內苦其心坐以日計焉已不勝其耻况役而進於月者薾然疲困而莫知所自耻而懲也至矣使州里任之宥而舍之非特教罷民亦所以勸州里以肺石逹窮民凡逺近惸獨老幼之欲有復於上而其長弗逹者立於肺石三日士聼其辭以告於王而罪其長肺氣之藏也凡人得志則喜失志則悲不得其平則鳴皆氣有以使之而實內托於肺者也故逹窮民者謂之肺石朝士置之於外朝九棘之右凡窮民欲有復於上而其長弗逹者立於肺石三日士聼其辭而告於上而罪其長然大僕建路鼓於大寢之門外而欲窮民之速逹且甚於遽令而此則三日而後聽何也為罪其長者設也罪其長而不遲之以待其辭之定則下瀆其上而上無以信於下矣非此族也速逆以逹何容心焉正月之吉始和布刑于邦國都鄙乃縣刑象之法于象魏使萬民觀刑象挾日而斂之治教與政皆布之而後斂者也而刑象之法為尤重布之而使斯民有逺罪之心斂之而使斯民無黷刑之心則聖人重刑尤有甚於治教與政也凡邦之大盟約涖其盟書而登之于天府大史內史司㑹及六官皆受其二而藏之盟約二事也約為之信書而已盟則㰱牲焉大司冦兼言之則宜兼掌其事今以盟書為重而不及乎約以司約大史見之也大史於邦國都鄙及萬民之有約劑者藏焉以二六官司約於大約劑書於宗彛小約劑書於丹圖若大亂則六官辟藏非不藏其二於六官也略焉而已矣惟盟書則事大而體重大司冦則職嚴而令肅弗信則人弗保也盟於神者其可已乎弗敬則神弗福也涖其書者其可已乎於是登乎天府而藏之與玉鎮大寶器同寶於萬世此書之正者也史掌官書以贊治司㑹則以考治為職六官則治教政刑禮事之掌又以考信焉皆受其二而藏之以待其不信者質之是以公而任乎天者也豈約劑可以並言哉凡諸侯之獄訟以邦典定之凡卿大夫之獄訟以邦法斷之凡庶民之獄訟以邦成斷之太宰以典待邦國之治以法待官府之治以官成待萬民之治太宰治官之長故以之待其治大司冦刑官之長故又以之聼其獄訟也大祭祀奉大牲若禋祀五帝則戒之日涖誓百官戒于百族王氏詳說援郊特牲曰卜之日王立于澤親聼誓命受教諌之義也獻命庫門之內戒百官也太廟之命戒百姓也百官云者百執事也百姓云者王之族姓也族姓與祭則重於百執事矣故戒百官於庫門之內而戒百姓於太廟之內正所以辨親疏也然祭之前期十日有誓有戒曰誓則重於戒也太宰祀五帝則掌百官之誓戒與其具修小宰以法掌祭祀之戒具小宰言戒而不及誓則誓之重於戒也明矣夫祭莫重於齊齊莫重於誓戒誓百官者太宰也涖其誓者大司冦也夫豈以大司冦涖太宰者哉涖者百官之聼誓於太宰云爾賈氏以為大司冦不得涖太宰遂謂誓者餘小官也失之矣是賈氏有見於太宰而無見於大祭祀也百官言誓而百族言戒則又知百族無與於執事有與於從祭此所以聼戒而不聼誓也或謂互文見義又失之矣及納亨前王祭之日亦如之奉其明水火凡朝覲㑹同前王大喪亦如之大司冦以刑官前王禮也尊天子之威儀一臣下之志慮而已納亨及祭尚其嚴也朝覲㑹同尚其肅也大喪尚其哀也此前王之禮所係為甚重然明水火之奉與否者朝覲㑹同喪紀則以人道言之祭祀之禮則以神道言之各當於禮而已矣大軍旅涖戮于社凡邦之大事使其屬蹕軍旅之事用命賞于祖不用命戮于社社隂祀也刑隂類也以刑官之長而涖其戮重之也凡邦之大事蹕止行者乃其餘事不必親也使其屬而已小司冦之職掌外朝之政以致萬民而詢焉一曰詢國危二曰詢國遷三曰詢立君其位王南鄉三公及州長百姓北面羣臣西面羣吏東面小司冦擯以叙進而問焉以衆輔志而弊謀王朝有三燕朝在路門之內治朝在路門之外外朝在庫門之外致萬民而詢外朝之政也詢者咨於人者也洪範曰汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮龜從筮從卿士從庶民從是之謂大同謂致萬民而詢者卿士庶人咸在也以致萬民為主焉國危則謀安國遷則謀居國立則謀嗣三者國之大事也其利害在君而不在民其可否在民而不在君於是而詢焉王南鄉以臨之三公及州長百姓北面羣臣西面羣吏東面羣臣羣吏左右其事而已上言三公中言州長下言百姓則六鄉之官皆預也三公答王者也州長帥民者也百姓則謀之所自出者也三年賔興而衆賓在鄉老之後外朝之政而百姓在三公州長之後孟子曰民為貴社稷次之君為輕得乎天子而為諸侯得乎丘民而為天子於是可見也小司冦擯以叙進而問焉以衆輔志而弊謀則又以王志為主而輔之以衆以衆謀為稽而弊之於王議其盡天下之心乎以五刑聽萬民之獄訟附于刑用情訊之至于旬乃弊之讀書則用法五刑者墨也劓也宫也剕也殺也以是聽獄訟則當求其罪之所麗得其所麗之罪未遽用法也特附于刑而已然人情之在天下固有隂慝隱惡出於法制之外者亦有法理嚴密而中心實不然者此貴乎用情訊之也至於旬乃弊之則又遲之以久必欲得其情而後已與書言要囚服念五六日至于旬時同意讀書則用法者弊其罪則讀其服罪之書讀其服罪之書則用法而已何者以其法之當於情故也凡命夫命婦不躬坐獄訟凡王之同族有罪不即市貴貴親親之義也義見掌囚掌戮以五聲聽獄訟求民情一曰辭聽二曰色聽三曰氣聽四曰耳聽五曰目聽在心為志感而為情發而為聲此以五聲聽獄訟而求民情宜也以辭為聲可也色氣耳目何以謂之聲大抵言者心之聲也凡人之不善雖欲掩蓋覆護於其外而其實不外乎此心形見之間是以心不直者其辭枝心不實者其色赧心不誠者其氣亂心不正者其耳多惑心不眀者其目多耗聽是四者皆於其辭而察之非其辭之寓于色氣耳目也乃其心之不容隱於言而形於色氣耳目也後世知是理者鮮矣獄訟滋繁何以得其情乎以八辟麗邦法附刑罰一曰議親之辟二曰議故之辟三曰議賢之辟四曰議能之辟五曰議功之辟六曰議貴之辟七曰議勤之辟八曰議賔之辟君謂之辟制法者也制法而不制於法威福所自出故也作威則刑誅之作福則赦宥之刑誅赦宥為未定故八法在所可議者謂之辟所謂八辟者即大宰八統是已曰親曰故曰賢曰能曰功曰貴曰勤曰賔是八者皆教化之所自出不幸而陷於罪戾則法有所不可加先王何以處之於邦法曰麗於刑罰曰附所謂附麗者非取必於法也以八辟議之而已是以八辟有大議而不私者君以義制者也庶民有常法而不議者臣以事守者也斯可以言惟辟作福惟辟作威矣以三刺斷庶民獄訟之中一曰訊羣臣二曰訊羣吏三曰訊萬民聼民之所刺宥以施上服下服之刑刺殺也不曰殺而曰刺者刺有探取之義蓋獄訟雖成而聖人之心猶以為未安必探取乎民情以求至當之理焉於是有三刺以斷庶民獄訟之中一曰訊羣臣二曰訊羣吏三曰訊萬民而聼民之所刺宥者是以訊萬民為主也以訊萬民為主而必先之以羣臣羣吏者是臣吏可以逹天下之民情者也由是羣臣皆曰可殺羣吏皆曰可殺勿聽萬民皆曰可殺見可殺焉然後殺之群臣皆曰可宥勿聼羣吏皆曰可宥勿聼萬民皆曰可宥見可宥焉然後宥之此上服下服之刑所由以施也上服服刑之重者也下服服刑之輕者也宜殺而服上刑故謂之刺宜殺而服下刑斯謂之宥兹非以民情之中為獄訟之中乎及大比登民數自生齒以上登于天府內史司㑹冡宰二之以制國用小司徒頒比法而登民數主乎民而言也小司冦於大比而登民數主乎刑而言也蓋至於三年大比則民之登耗損益亦已多矣此小司冦所以登萬民之數所謂登民數自生齒以上男子八月生齒八嵗而齓女子七月生齒七歲而齓民之蕃育於是乎始此登民數所以必取乎生齒以上今考下經司民之職曰掌登萬民之數自生齒以上皆書於版又曰及三年大比以萬民之數詔司冦是司冦受其數於司民之官而於孟冬祀司民星之時乃獻其數于王而後王拜受之登于天府刑官之致重於民數者如此不特刑官重之而已冡宰於刑官登民數之後又為之二其數而制國用焉蓋古者三年耕必有一年之食九年耕必有三年之食冡宰以三十年通制國用而大比之制國用實所以為三十年盈虛斂散之儲也內史於此二之則以其所掌者㑹計之書司㑹於此二之則以其所掌者㑹計之事二官卑而列於始冡宰尊而繼於後非以統百官之任而統其成者歟由是觀之民之盛衰係乎刑故司冦登民數於地官大比之時財之豐耗出於民故冡宰制國用於刑官登民數之後數官聫事而合治皆所以重乎民者也小祭祀奉犬牲凡禋祀五帝實鑊水納亨亦如之大賓客前王而辟后世子之喪亦如之小師涖戮凡國之大事使其屬蹕此皆所以二大司冦也大司冦奉犬牲於大祭祀之時此則於小祭祀奉之大司冦於禋祀五帝則涖誓戒及納亨前王此則為之實鑊水大司冦於朝覲㑹同前王此則大賔客前王而加之以辟大司冦於大軍旅涖戮此則於小師涖戮卑者任其勞而不敢尸其大也若大司冦蹕邦事則通乎國邑此蹕國事則止於國中之事其帥屬則一而已孟冬祀司民獻民數於王王拜受之以圖國用而進退之此經言獻民數於孟冬祀司民之日而下經司民之職亦曰三年大比以萬民之數詔司冦司冦及孟冬祀司民之日獻其數於王其說頗同疑所謂孟冬祀司民者即下經三年大比之孟冬祀司民也然下經司民之職言大比登民數者與此上經之說合而此經别出於上經大比登民數之後則知此所謂孟冬祀司民者每嵗之孟冬而已蓋軒轅之角有大民小民之星每嵗孟冬祀之當是時也司民雖書生齒以上而未之獻小司冦雖獻民數而未登于天府止以為每嵗圖國用之計所謂圖國用而進退之者王制曰冡宰制國用必於嵗之杪五榖皆入然後制國用用地小大視年之豐耗此亦圖國用之意然王制歸之於冡宰而此經屬之於小司冦者小司冦因民數而進退之則謂之圖國用其聨事合治一也又至於三嵗大比小司冦復於其孟冬祀司民之日取司民所獻之民數而獻之于王王拜受之登于天府冡宰復與內史司㑹二之以制國用其先後之序如此嵗終則令羣士計獄弊訟登中于天府羣士者鄉士以下皆掌獄訟之士也然有未成之獄訟有已成之獄訟嵗終所令則謂其成者計稽也弊斷也稽其一嵗之獄幾何斷其訟之當否幾何其獄訟之已成而合乎法者謂之中羣士入之于小司冦小司冦登之于天府與天府之受治中同義重之也正嵗率其屬而觀刑象令以木鐸曰不用法者國有常刑令羣士乃宣布于四方憲刑禁乃命其屬入㑹乃致事此經與小宰之帥屬觀治象小司徒之帥屬觀教象同意然特憲禁令于王宫與六鄉四郊而已若司冦之職本以刑禁詰四方故宣布而憲于四方焉乃命其屬入㑹致事者王氏謂官以嵗終入其書獨司冦以正嵗入之所以謹其始非也乃者繼事之辭令羣士乃宣布于四方以終嵗期之至大宰受㑹之時乃命其屬入㑹乃致事所以紀小司冦一職之終也

body:
  text: 周官總義巻十八宋易袚撰小司馬之職掌下有闕文凡小祭祀㑹同饗射師田喪紀掌其事如大司馬之灋軍司馬輿司馬行司馬已上官闕而列於司馬之後者以序官知之也義見序官司勲掌六鄉賞地之灋以等其功封國百里以至五百里非六鄉之所能給是以六鄉賞地不過與官田牛田收田並列而已以左傳攷之昔鄭伯賞入陳之功子展三命之服先八邑注謂八邑三十二井又討衛疆戚田取衛西鄙懿氏與孫氏注謂取田六十井此賞田之明證即下經所謂參之一食王功曰勲國功曰功民功曰庸事功曰勞治功曰力戰功曰多凡有功者銘書於王之大常祭於大烝司勲詔之大功司勲藏其貳掌賞地之政令凡賞無常輕重眡功凡頒賞地參之一食唯加田無國正賞之輕重眡其功此所以為賞地之政令馬質掌質馬馬量三物一曰戎馬二曰田馬三曰駑馬皆有物賈此言市馬之政物云者國馬之輈深四尺有七寸田馬之輈深四尺駑馬之輈深三尺有三寸其用各有等其材各有宜故皆以三物量之有物則有價故謂之質綱惡馬此言養馬之政凡受馬于有司者書其齒毛與其賈馬死則旬之内更旬之外入馬耳以其物更其外否馬及行則以任齊其行若有馬訟則聽之禁原蠶者聽馬訟則養馬市馬之政皆得其平量人掌建國之灋以分國為九州營國城郭營后宫量市朝道巷門渠造都邑亦如之營軍之壘舎量其市朝州凃軍社之所里邦國之地與天下之涂數皆書而藏之凡祭祀饗賔制其從獻脯燔之數量掌喪祭奠竁之俎實凡宰祭與鬱人受斚歴而皆飲之小子掌祭祀羞羊肆羊殽肉豆而掌珥于社稷祈于五祀乃沈辜侯禳飾其牲飾其牲被之以文繡謂羊牲也釁邦器及軍器凡師田斬牲以左右狥陣祭祀賛羞受徹焉軍器甲胄戈矛之屬羊人掌羊牲凡祭祀飾羔祭祀割羊牲登其首凡祈珥共其羊牲賔客共其灋羊凡沈辜侯禳釁積共其羊牲若牧人無牲則受布于司馬使其賈買牲而共之羊人之共羊牲如牛人共牛牲雞人共雞牲犬人共犬牲類也未為牲也數官擇其純者而取之於牧人然後命牧人卜其為牲者共之於充人至充人然後謂之牲此言共羊牲以其共而為牲司爟掌行火之政令四時變國火以救時疾季春出火民咸從之季秋内火民亦如之時則施火令凡祭祀則祭爟凡國失火野焚萊則有刑罰焉施火令謂施四時變國火之令掌固掌修城郭溝池樹渠之固頒其士庶子及其衆庶之守設其飾噐分其財用均其稍食任其萬民用其材器周人守禦大槩以民為固以人心為本設其飾器所以聳動觀聽之具而又分其財用則隨其地守之所當得均其稍食則計其功力之所當予凡此皆奮發人心於平時之素也若夫城郭之所以為固者亦不過任萬民而用其材器使其地之人自為守而已材謂材木可為楨榦者器謂器械可僃任載者凡守者受灋焉以通守政有移甲與其役財用唯是得通與國有司帥之以賛其不足者與國有司帥之則非掌固之所敢專帥之於掌甲掌役掌財用之有司亦以賛其甲役財用之不足者晝三廵之夜亦如之此掌固所設之法非其自廵也晝三廵則察其部伍之失次者夜事尤謹故亦如之夜三鼜以號戒若造都邑則治其固與其守灋凡國都之竟有溝樹之固郊亦如之民皆有職焉若有山川則因之每廵必鼓鼜鼜即鼓軍事之鼖鼓也鼜其聲也號則呼其所守者之名戒則警其所守者之事司險掌九州之圖以周知其山林川澤之阻而達其道路設國之五溝五涂而樹之林以為阻固皆有守禁而達其道路國有故則藩塞阻路而止行者以其屬守之唯有節者達之守以道路為急阻以道路而後險為可恃使内外無禁往來不察而姦偽者邪慝者物之犯禁者人之有辠竒衺者或得乗間而入雖險猶無險也故司險於國有故則藩塞阻路而止行者掌疆千里王畿畿之境謂之疆載師所言大都之田任疆地是已而邦國都鄙亦有畿疆之制大司徒所言制其畿疆而溝封之是已此官雖逸而以司險推之則掌王國之疆以及邦國都鄙之疆也審矣候人各掌其方之道治與其禁令以設候人若有方治則帥而致于朝及歸送之于竟環人掌致師察軍慝環四方之故廵邦國摶諜賊訟敵國揚軍旅降圍邑察軍慝則察其在我者環四方之故則環其在人者此六者非其徒十二人之所能及必環人簭之而後舉此所以繼於致師之後挈壺氏掌挈壺以令軍井挈轡以令舎挈畚以令糧飲食居處人之大欲存焉故因其令軍井而兼以令之是三者皆挈於竿首而表之雖軍衆不齊莫不目擊而心㑹鄭氏所謂省煩趨疾是已凡軍事縣壺以序聚柝凡喪縣壺以代哭者皆以水火守之分以日夜及冬則以火㸑鼎水而沸之而沃之守之以水則均其晷刻之多少守之以火則知其漏箭之遷易射人掌國之三公孤卿大夫之位三公北面孤東面卿大夫西面其摯三公執璧孤執皮帛卿執羔大夫鴈孤執皮帛以其有衣被文采之義卿執羔則羣而不失其類大夫鴈則夙夜奉上而不懈其義諸侯在朝則皆北面詔相其灋若有國事則掌其戒令詔相其事掌其治達以射灋治射儀王以六耦射三侯三𫉬三容樂以騶虞九節五正諸侯以四耦射二侯二𫉬二容樂以貍首七節三正孤卿大夫以三耦射一侯一𫉬一容樂以采蘋五節二正士以三耦射豻侯一𫉬一容樂以采蘩五節二正大射則大司馬合諸侯之六耦若賔射則諸侯與王射而合卿大夫以為六耦以至諸侯之四耦卿大夫士之三耦亦各以等殺而辨𫉬即數中之旌服不氏執之以待𫉬也容即蔽身之乏服不氏待𫉬而居乏也若王大射則以貍步張三侯王射則令去侯立于後以矢行告卒令取矢祭侯則為位梓人祭侯之禮其辭則欲諸侯之若寧侯也與太史數射中佐司馬治射正於太史言與於司馬言佐尊卑之序祭祀則賛射牲相孤卿大夫之灋儀祭祀之禮以牲為重視牲分牲養牲廵牲見於未祭之先將祭之時則夕牲展牲牽牲射牲割牲無非禮者射人所掌則射牲之禮而已國語曰禘郊之事天子必自射其牲此雖天子自為之方其迎牲於門則君執紼卿大夫從士執芻至於君親射牲而孤卿大夫咸與焉此射人相孤卿大夫之法儀以其掌射法治射儀故也㑹同朝覲作大夫介凡有爵者射人則以法儀而作之大師令有爵者乗王之倅車大師王乗戎路其廣闕苹輕之倅不可虚位故以有爵命士以上乗其倅有大賔客則作卿大夫從戒大史及大夫介大喪與僕人遷尸作卿大夫掌事比其廬不敬者苛罸之卿大夫掌朝位之事則射人作之服不氏掌養猛獸而敎擾之凡祭祀共猛獸賔客之事則抗皮射則賛張侯以旌居乏而待𫉬射鳥氏掌射鳥祭祀以弓矢敺烏鳶凡賔客㑹同軍旅亦如之射則取矢矢在侯髙則以并夾取之羅氏掌羅烏鳥蜡則作羅襦中春羅春鳥獻鳩以養國老行羽物中春蒐田非羅弊之時故以火弊而搜取其物之不字乳者此言羅春鳥何也以奉至尊為主而已其次則獻鳩以養國老又其次則頒羣臣而謂之行羽物此外一毫不可以輕取掌畜掌養鳥而阜蕃敎擾之祭祀共卵鳥歲時貢鳥物共膳獻之鳥司士掌羣臣之版以治其政令歲登下其損益之數辨其年歲與其貴賤周知邦國都家縣鄙之數卿大夫士庶子之數以詔王治以德詔爵以功詔祿以能詔事以乆奠食爵有髙下皆以德詔祿有豐殺皆以功詔此為公卿大夫士之受命而為王臣者設也然當時之士亦有不命者焉鄭氏謂府史為官長所自辟除又謂胥徒為民之給繇役者凡此皆服役於公上亦既因能而詔以事矣惟其不命故以久奠食而不言詔奠其食則未為禄也校人曰等馭夫之祿宫中之稍食宫中則師圉府史以及胥徒者所以言食馭夫則僕夫趣馬等之為大夫士者所以言禄盖當時一命以上謂之禄庶人在官者稍食而已如宫正則月終㑹其稍食醫師則歲終稽其醫事而制其食槀人則乗其事試其弓弩而下上其食凡此皆奠其食於任事既久之後者也賈氏不曰據能者先試之以事事成乃定以稍食其能堪用乃後亦詔授之以正爵禄其序如此唯賜無常繼於司士以詔王治之後則亦有可常者矣正朝儀之位辨其貴賤之等王南鄉三公北面東上孤東面北上卿大夫西面北上王族故士虎士在路門之右南面東上大僕大右大僕從者在路門之左南面西上位著之次雖有貴賤而布置所向尊王之意已著見於左右前後之列朝儀之不茍如此王族故士大僕之等以其居王之後故不嫌於南面司士擯孤卿特揖大夫以其等旅揖士旁三揖王還揖門左揖門右太僕前王入内朝皆退王族故士虎士在路門之右大僕大右大僕從者在路門之左其位皆南鄉而在王之後故還而揖之掌國中之士治凡其戒令國中之士治謂士之在國中者詩曰濟濟多士文王以寧非公卿大夫以下之總號歟掌擯士者膳其摯諸臣之六摯猶諸侯之五瑞五瑞用以享故三璧則受之而復之書所謂如五器卒乃復是也六摯不用享故三帛二生一死則受之而不復各適其宜而已三帛則共王之服二生一死則共王之膳以示納用其德也凡祭祀掌士之戒令詔相其灋事及賜爵呼昭穆而進之祭祀之時羣臣羣有司與焉或助其禮或執其事此所謂士則同姓之士也掌士之戒令則卜日以後之戒令也詔相其法事則凡祼獻之法事也帥其屬而割牲羞俎豆此繼宗廟祭祀而言當在賜爵之前今乃言於後重其事故特言之司士言割牲則割其牲之體諸子正六牲之體則正牲之全體禮之輕重不同而職之先後或異所謂聨事也凡㑹同作士從賔客亦如之作士適四方使為介大喪作士掌事作六軍之士執披司士掌羣臣之版而總謂之士是以掌三者作士之事㑹同賔客作士從謂卿大夫之可使從於王者也作士適四方使為介謂天子使卿適四方則大夫為介使大夫適四方則元士為介也大喪作士掌事如奠遣之類凡士之有守者令哭無去守不以喪而廢其職國有故則致士而頒其守亦不可以故而弛其防凡邦國三歲則稽士任而進退其爵禄上經言士者總公卿大夫士而言之此言邦國則諸侯之卿大夫士亦總曰士也諸子掌國子之倅掌其戒令與其敎治辨其等正其位故書倅為卒鄭氏以下文有游倅故改為倅職末言修德學道固游倅之事此主下文兵甲之事則卒之一字即有什伍之意國有大事則帥國子而致於大子惟所用之若有兵甲之事則授之車甲合其卒伍置其有司以軍灋治之司馬弗正凡國正弗及治之以軍法與司馬之所以用其民者同不以貴者而廢乎法公其法也不正於司馬之賦亦不與司徒之力役不以有司之法而律貴者重其事也大祭祀正六牲之體凡樂事正舞位授舞器大喪正羣子之服位㑹同賔客作羣子從樂事則舞有出入之位亦有文武之器大喪則有親疎貴賤之服亦有親疎貴賤之居授之正之皆諸子之責凡國之政事國子存游倅使之修德學道春合諸學秋合諸射以攷其藝而進退之使之修德即師氏所謂三德敎國子者使之學道即保氏所謂養國子以道而敎以六藝者德原於性故謂之修道公乎人故謂之學進者任以國事而退者亦有以勉其所未至司右掌羣右之政令凡軍旅㑹同合其車之卒伍而比其乘屬其右凡國之勇力之士能用五兵者屬焉掌其政令虎賁氏掌先後王而趨以卒伍軍旅㑹同亦如之舎則守王閑王在國則守王宫入而在國則五寢次舎以為宫國有大故則守王門大喪亦如之及葬從遣車而哭適四方使則從士大夫若道路不通有徵事則奉書以使於四方五門出入必幾旅賁氏掌執戈盾夾王車而趨左八人右八人車止而持輪凡祭祀㑹同賔客則服而趨喪紀則衰葛執戈盾軍旅則介而趨祭祀㑹同賔客喪紀軍旅各以吉凶之服衛于王軍國之容有足觀者矣節服氏掌祭祀朝覲衮冕六人維王之大常諸侯則四人其服亦如之郊祀裘冕二人執戈送逆尸從車王於郊祀服裘冕而節服氏之二人者亦服裘冕王於祭祀朝覲服衮冕而節服氏之六人者亦服衮冕若是何以為節曰是乃所以為節也春秋之法貴賤不嫌於同號以其有節存焉王眂治朝其位亦南鄉王族故士虎士在路門之右大僕大右大僕從者在路門之左其位亦南鄉則尊卑何以無辨位同乎南鄉從王於後也服同乎衮冕裘冕從王於左右也既有前後左右之節矣則位序服飾乃衛至尊而崇威嚴亦何嫌於同方相氏掌蒙熊皮黄金四目𤣥衣朱裳執戈揚盾帥百𨽻而時難以索室敺疫大喪先匶及墓入壙以戈擊四隅敺方良占夢季冬聘贈王夢遂令始難敺疫則令此而已

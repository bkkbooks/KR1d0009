body:
  text: 周官總義卷十一宋易祓撰春官宗伯第三惟王建國辨方正位體國經野設官分職以為民極乃立春官宗伯使帥其屬而掌邦禮以佐王和邦國宗主也伯夷典禮曰秩宗伯長也春于四時為長禮官之屬大宗伯卿一人小宗伯中大夫二人肆師下大夫四人上士八人中士十有六人旅下士三十有二人府六人史十有二人胥十有二人徒百有二十人鬱人下士二人府二人史一人徒八人鬯人下士二人府一人史一人徒八人雞人下士一人史一人徒四人司尊彛下士二人府四人史二人胥二人徒二十人司几筵下士二人府二人史一人徒八人天府上士一人中士二人府四人史二人胥二人徒二十人典瑞中士二人府二人史二人胥一人徒十人典命中士二人府二人史二人胥一人徒十人司服中士二人府二人史一人胥一人徒十人典祀中士二人下士四人府二人史二人胥四人徒四十人守祧奄八人女祧每廟二人奚四人世婦每宫卿二人下大夫四人中士八人女府二人女史二人奚十有六人內宗凡內女之有爵者外宗凡外女之有爵者冡人下大夫二人中士四人府二人史四人胥十有二人徒百有二十人墓大夫下大夫二人中士八人府二人史四人胥二十人徒二百人職喪上士二人中士四人下士八人府二人史四人胥四人徒四十人大司樂中大夫二人樂師下大夫四人上士八人下士十有六人府四人史八人胥八人徒八十人大胥中士四人小胥下士八人府二人史四人徒四十人大師下大夫二人小師上士四人瞽矇上瞽四十人中瞽百人下瞽百有六十人視瞭三百人府四人史八人胥十有二人徒百有二十人典同中士二人府一人史一人胥二人徒二十人磬師中士四人下士八人府四人史二人胥四人徒四十人鐘師中士四人下士八人府二人史二人胥六人徒六十人笙師中士二人下士四人府二人史二人胥一人徒十人鎛師中士二人下士四人府二人史二人胥二人徒二十人韎師下士二人府一人史一人舞者十有六人徒四十人旄人下士四人舞者衆寡無數府二人史二人胥二人徒二十人籥師中士四人府二人史二人胥二人徒二十人籥章中士二人下士四人府一人史一人胥二人徒二十人鞮鞻氏下士四人府一人史一人胥二人徒二十人典庸器下士四人府四人史二人胥八人徒八十人司干下士二人府二人史二人徒二十人大卜下大夫二人卜師上士四人卜人中士八人下士十有六人府二人史二人胥四人徒四十人龜人中士二人府二人史二人工四人胥四人徒四十人菙氏下士二人史一人徒八人占人下士八人府一人史二人徒八人簭人中士二人府一人史二人徒四人占夢中士二人史二人徒四人視祲中士二人史二人徒四人大祝下大夫二人上士四人小祝中士八人下士十有六人府二人史四人胥四人徒四十人喪祝上士二人中士四人下士八人府二人史二人胥四人徒四十人甸祝下士二人府一人史一人徒四人詛祝下士二人府一人史一人徒四人司巫中士二人府一人史一人胥一人徒十人男巫無數女巫無數其師中士四人府二人史四人胥四人徒四十人大史下大夫二人上士四人小史中士八人下士十有六人府四人史八人胥四人徒四十人馮相氏中士二人下士四人府二人史四人徒八人保章氏中士二人下士四人府二人史四人徒八人內史中大夫一人下大夫二人上士四人中士八人下士十有六人府四人史八人胥四人徒四十人外史上士四人中士八人下士十有六人胥二人徒二十人御史中士八人下士十有六人其史百有二十人府四人胥四人徒四十人巾車下大夫二人上士四人中士八人下士十有六人府四人史八人工百人胥五人徒五十人典路中士二人下士四人府二人史二人胥二人徒二十人車僕中士二人下士四人府二人史二人胥二人徒二十人司常中士二人下士四人府二人史二人胥四人徒四十人都宗人上士二人中士四人府二人史四人胥四人徒四十人家宗人如都宗人之數凡以神仕者無數以其藝為之貴賤之等春官設屬最有統紀所典之禮五禮為先五禮之中吉禮為本是蓋天秩天序自然之理也今觀大宗伯之所謂禮者其用亦博矣合內外備小大本末精粗之具舉而實以天神人鬼地示為主然後小宗伯為之建國之神位肆師為之立國祀之禮而五禮從之自其設屬而言雖五禮之用為不同而莫先於祭祀之禮於是因禮事之緩急而為職掌之先後祭祀始於祼而告時告備之禮行焉故鬱人先之鬯人次之雞人次之尊彛几筵瑞玉命服之官又次之以至內外祭祀無不畢舉而凶禮為謹終之事此冡墓職喪之所以居五禮之末掌禮之職至此詳且備矣禮之所至樂亦至焉又自大司樂以至司干凡二十職而皆列於禮官之次蓋聖人制禮所以檢柅人心而歸之於中使之周旋鼓舞於聲容之間而至敬存焉是樂之為用皆所以輔成乎是禮者也然而禮者理也凡國家之大綱小紀本數末度先王所以經理斯世者茍有一毫之不盡亦不足以為禮之至又自大卜而下皆卜筮之事大祝而下皆巫祝之事大史而下皆紀載策書之事馮相氏而下皆象數占步之事巾車而下皆名器分守之事是雖文為制度之末而天秩天序實寓乎其間聖人率是而行之始於宫庭達於天下其道甚大百物不廢而復以神仕者終焉寧非吉禮為五禮之本乎大宗伯之職掌建邦之天神人鬼地示之禮以佐王建保邦國大宗伯所掌五禮而特以建天神人鬼地示之禮為職者天子之禮先於主祭而已揚雄氏曰節莫備於禮禮莫僭於祭是祭祀之禮人君有天下之至權也故序言佐王和邦國而經言佐王建保邦國而使之為萬世不拔之計非能為天地人神之主則何以哉以吉禮事邦國之鬼神示以禋祀祀昊天上帝以實柴祀日月星辰以槱燎祀司中司命飌師雨師以血祭祭社稷五祀五嶽以貍沈祭山林川澤以疈辜祭四方百物以肆獻祼享先王以饋食享先王以祠春享先王以禴夏享先王以嘗秋享先王以蒸冬享先王吉禮之目在天神者三在地示者三在人鬼者六以禋祀祀昊天上帝者燔玉帛牲牷而達其精意者也以實柴祀日月星辰者柴而實之以牲幣者也以槱燎祀司中司命飌師雨師者槱而燎其牲者也此所謂建天神之禮以血祭祭社稷五祀五嶽者索諸幽陰之義也以貍沈祭山林川澤者順其含藏之性也以疈辜祭四方百物者順其散裂之義也此所謂建地示之禮以肆獻祼享先王者謂五年王者之大禘故備言曰肆曰獻曰祼之序饋食享先王則三年喪畢之祫祭以饋為主祠春享先王以物之初生以詞為主禴夏享先王則物之方長以樂為主嘗秋享先王則物其有矣以薦新為主蒸冬享先王則物其時矣以備禮為主此所謂建人鬼之禮然天神之祀以禋為歆神之始地示之祭以血為歆神之始人鬼之享以祼為歆神之始其實天神同於禋地示同於血人鬼同於祼也記曰燎柴於泰壇祭天也謂其升煙於天也今以日月星辰為實柴司中司命飌師雨師為槱燎則昊天上帝之祀非柴非燎何以為煙乎記曰毛血告幽全之物也則凡地示皆求諸陰也今以社稷五祀五嶽為血祭則貍沈疈辜何以為非血乎司尊彛曰春祠夏禴祼用雞彛鳥彛秋嘗冬蒸祼用斚彛黃彛四時之間祀追享朝享祼用虎彛蜼彛今以肆獻言祼而饋食等享何以為不用祼乎是數者皆以歆神之禮列於先而其餘皆以次而舉昊天之祀不及五帝社稷之祭不及大示先王之享不及先公互文見義云爾以凶禮哀邦國之憂以喪禮哀死亡以荒禮哀凶札以弔禮哀禍災以禬禮哀圍敗以恤禮哀冦亂上經言建保邦國為吉禮反是則為凶禮凶禮之目大概有五始死謂之死既葬謂之亡以喪禮哀之於是乎有賻贈含禭之事天王使榮叔歸含且賵是也凶年謂之凶疾疫謂之札以荒禮哀之於是乎有通財施惠之事晉飢而秦輸之粟是也神所祟謂之禍天所毁謂之災以弔禮哀之於是乎遣使以唁其患宋大水魯莊公使人弔之是也國之見圍謂之圍師之敗績謂之敗以禬禮哀之於是合財以補其乏澶淵之會諸侯謀歸宋財是也兵作於外為寇兵作於內為亂以恤禮哀之於是出師以救其急衛有狄難而齊桓公救之是也五者凶禮皆言哀邦國之憂則君子有以吉其凶矣以賔禮親邦國春見曰朝夏見曰宗秋見曰覲冬見曰遇時見曰會殷見曰同時聘曰問殷眺曰視先王之於諸侯有賔道焉有臣道焉臣道以尊天子為主賔道以親諸侯為主易曰先王建萬國親諸侯其賔禮之謂歟春見曰朝如日出於寅之朝而朝於天夏見曰宗如萬物相見於南方而其類皆有所宗秋見曰覲謂物成之時各勤其事以報乎上冬見曰遇謂閉藏之時其相見若邂逅之遇時見曰會謂非時會集以謀征伐之事殷見曰同謂王不巡守而衆見諸侯以命政時聘曰問謂諸侯遣卿以時致問於天子殷俯曰視謂諸侯遣卿以大禮而衆見於天子凡此八者無非臣職之所當盡而曰賔禮以親邦國各盡其道而已以軍禮同邦國大師之禮用衆也大均之禮恤衆也大田之禮簡衆也大役之禮任衆也大封之禮合衆也軍禮所以統六師大師之禮大均大田大役大封何以亦謂之軍禮蓋制軍有常勝之道有幸勝之道幸勝之道求勝在敵常勝之道求勝在我先王之所以有征無戰者以其在我有是五者之禮也大均者若均人均其地守地職地政有以知其勞逸而民情為素洽大田者若大司馬於四時之搜苗獮狩有以簡其車徒而民事為素習大役者若小司徒之凡起徒役毋過家一人以其餘為羡而民力為素習大封者若小司徒正其畿疆之封有以合聚其民而民志為素定用衆所以用其命恤衆所以恤其事簡衆所以簡其藝任衆所以任其力合衆所以合其情曰衆則上下一心內外一體以是同邦國常勝之道也與後世用不素拊循之士驅市人而就死地者異矣以嘉禮親萬民以飲食之禮親宗族兄弟以昏冠之禮親成男女以賓射之禮親故舊朋友以饗燕之禮親四方之賔客以脤膰之禮親兄弟之國以賀慶之禮親異姓之國易曰嘉會足以合禮則合其禮之善者也吉凶軍賔之四禮皆言邦國而嘉禮獨以親萬民為言者言乎其禮之本而已宗族兄弟天之屬也男女則人之大倫也故舊朋友以義而合四方賔客以禮而接兄弟之國則同姓為內姻異姓之國則甥舅為外姻兹六者人道之大禮之本者也故聖人設為族燕族食之禮而天屬以睦設為昏姻笄冠之禮而人倫以正設為賔射之禮而義之合者得以相洽設為燕饗之禮而禮之接者得以相孚脤膰之禮行而恩及於內姻賀慶之禮行而恩及於外姻自天子達於庶人皆由乎是禮則親萬民者乃所以親邦國也禮明其本則上下交相親矣以九儀之命正邦國之位一命受職再命受服三命受位四命受器五命賜則六命賜官七命賜國八命作牧九命作伯典命於諸侯謂之五儀於諸臣謂之五等之命分而言之者也大宗伯九儀之命則總而言之者也故大宗伯所謂正邦國之位者皆可約典命而為之説所謂一命者典命曰公侯伯之士一命子男之大夫一命是已天子之下士一命雖不見於典命以公侯伯之士推之也古者抱關擊柝皆有常職以食於上而况乎命士一命受職此三等所以各受其職歟所謂再命者典命曰公侯伯之大夫再命子男之卿再命是已天子之中士亦再命以下士之一命而推之也古者卿大夫服玄冕士服爵辨其章數各視其命之數再命受服此三等所以各受其服歟所謂三命者典命曰公侯伯之卿三命是已天子之上士亦三命以中士再命及大夫四命推之也蓋公侯伯之卿無非命於天子王制所謂大國三卿皆命於天子次國三卿二卿命於天子是諸侯之臣受命於天子始得列位於王朝三命受位此二等所以各受其位歟所謂四命者典命曰王之大夫四命公之孤四命是已曲禮所謂無田祿者不設祭器公食采則任大都之田卿食采則任小都之田大夫食采則任家邑之田是大夫以上而後有田祿也四命受器此二等始得受其器歟所謂五命者典命曰子男五命是已左傳所言成國不過半天子之軍非大國次國不得為成國其言則者未成國之法也公卿采邑謂之都而有都則之職大夫食采謂之家而無家則子男五命實在四命大夫之上而居公卿八命六命之下於是同乎大都小都之制五命賜則此一等始得賜之則歟所謂六命者典命曰王之卿六命是已家邑任削地天子之大夫也小都任縣地天子之卿也大都任疆地天子之三公也而其下亦各建官焉八則所謂法則以馭其官又施則于都鄙而建其長立其兩設其伍是賜官也然大夫四命其家司馬各使其臣而不命於天子至都司馬每都皆有三等之士則是三公九卿食采於都始得有官六命賜官此一等始得賜之官歟所謂七命者典命曰侯伯七命是已公為大國則三軍侯伯為次國則二軍子男為小國則一軍子男一軍未足為成國之稱至侯伯然後可以言國或以王之卿而出封或以子男有功而加封皆得以有其國焉七命賜國此一等而後賜之國歟所謂八命者典命曰王之三公八命是已然三公八命及其出封皆加一等則為九命之上公此云牧者蓋以侯伯之有功德者進一命而為牧曲禮所謂九州之長入於天子之國曰牧八命作牧此一等而後使之作牧歟所謂九命者典命曰上公九命是已周制宋杞二王之後為上公而未嘗為二伯其餘天子之三公稱公而其爵皆八命王制言三公一命卷是三公加一命為九命則得以服龍衮公羊傳所謂自陜而東者周公主之自陜而西者召公主之此二伯之任九命作伯此一等而後使之作伯歟典命所言則自尊以及卑大宗伯所言則由小以及大受以義言也賜以禮言也作以功言也賜以君為主受與作以臣為主其實一而已以玉作六瑞以等邦國王執鎮圭公執桓圭侯執信圭伯執躬圭子執穀璧男執蒲璧玉之為物天下之至寶也至瑞也先王列爵分土置諸人上為君公后辟者非仁賢莫豫而仁賢乃國之寶世之瑞也躬仁賢之資則能比德於玉矣故先王以玉作六瑞而用之以等邦國王乃自執鎮圭以臨乎其上琢四鎮之山以象其德之鎮安乎四方其餘則有等差焉公侯伯子男則各制其圭璧之形第其德之小大權其能之輕重以琢圭璧之象公之桓圭九寸則琢以雙植者侯之信圭七寸則信而直者伯之躬圭七寸則躬而屈者子之穀璧五寸則以穀文為飾男之蒲璧五寸則以蒲文為飾凡此六者無非比德於玉然璧者辟也謂其始有君道焉圭則鋭其上而有首出之義故圭為重而璧次之王執鎮圭則不嫌於公侯伯之同用圭也王之三公執璧不嫌於子男之同用璧也因其圭璧之制度而知其小大輕重之義故毋嫌於同以禽作六摯以等諸臣孤執皮帛卿執羔大夫執鴈士執雉庶人執鶩工商執雞六瑞以玉為之天子受而復之賔之也六摯以禽為之天子受而不復臣之也摯之為言至也言所執以自致云爾以文章衣被於人者孤之德也故執虎豹之皮而加以束帛以純厚禮信為德羣而不失其類者卿之道也故執羔候時而行夙夜奉上而不懈者大夫之道也故執鴈耿介有守夷險一致而不失其節者士之道也故執雉居其所而不遷者庶人之道也故執鶩以信行事人而不渝者工商之道也故執雞孤卿大夫士諸臣也庶人工商未為臣而亦謂之諸臣以率土之濵莫非王臣茍有以自致於天子之廷則皆得以執摯然摯有用飾者有不用飾者天子之孤皮帛飾以虎公之孤皮帛飾以豹天子之卿大夫飾羔鴈以繢諸侯之卿大夫飾羔鴈以布自士以下不用飾士於諸臣為卑者也庶人工商則尤其卑者也此其等差皆有分守存焉以玉作六器以禮天地四方以蒼璧禮天以黃琮禮地以青圭禮東方以赤璋禮南方以白琥禮西方以玄璜禮北方皆有牲幣各放其器之色此祭祀之始禮神之玉謂之六器六器者既象天地四方之義又擬其形而琢之所以放其色而致其誠璧圓而中虛其色以蒼象天也琮方而八面其色以黃象地也圭鋭而首出其色以青象帝出乎震而物生東方之義也璋明也其色以赤象物之相見乎離南方之義也琥威也其色以白象秋之肅物西方之義璜者閉藏也其色以玄象乎物之歸藏北方之義也皆有牲幣各放其器之色者因其類致其義而已經言天地四方之器與牲幣各從其方之色詳考其意天地之外如所謂四方者即後世所謂五精之君鄭氏信漢儒緯書誤認此四方與中央為五帝故於小宗伯之兆五帝則詳著其説殊不知周禮有五帝又有四方其禮不同禮四方者各有青赤白黑之色初不謂之帝而祀五帝則與上帝同其禮如大宰言祀五帝而大神示亦如之司服言祀昊天上帝則服大裘而冕祀五帝亦如之初不聞其象五方之色是知五帝之祀即月令所謂五人帝者也而鄭氏所謂五精之君為五帝者即此經之所謂禮四方者也何以知之以牲幣各放其器之色而知之以天産作陰德以中禮防之以地産作陽德以和樂防之鄭氏謂天産動物六畜之屬地産植物五穀之屬而世儒遂以物産為養精養形之具禮樂為防淫防怠之舉以樂記考之其禮殊不然凡樂記之言禮樂者無非以天地為本如曰著不息者天也著不動者地也一動一靜天地之間也故聖人曰禮樂云夫禮樂豈玉帛鐘鼓云乎哉其説正有合乎天産地産之義蓋天之所以産萬物者陽也陽以動為主即樂記所謂著不息者惟其動而不息是以流行發達或至於不中然而至陽之中作之以陰德則陰之靜者足以濟乎陽之動其散見於萬物者無非秩然品節為造化至中之理聖人體是中而制為之禮亦所以防天下之不中者也地之所以産萬物者陰也陰以靜為主即樂記所謂著不動者惟其靜而不動是以深沈重厚或至於不和然而至陰之中作之以陽德則陽之動者足以濟乎陰之靜其萃見於萬物者無非翕然交暢為造化至和之理聖人體是和而作為之樂亦所以防天下之不和者也大宗伯之言陰陽者所以明禮樂之各異其體樂記之言動靜者所以明禮樂之交相為用知一動一靜於天地之間者皆自然之禮樂則知天産作陰德地産作陽德者實禮樂之本也此下經所以復言禮樂合天地之化百物之産不然三産字一也而世儒二之何耶以禮樂合天地之化百物之産以事鬼神以諧萬民以致百物上經言禮樂之所從出故中和所寓有天地陰陽之異體及此合天地之化百物之産則髙卑上下之際渾乎其為一致不知其孰為天地孰為陰陽耶以事鬼神以諧萬民以致百物又皆不出乎天地陰陽之妙而中和實有以感發之也孰謂禮樂為形器之末凡祀大神享大鬼祭大示帥執事而卜日宿視滌濯涖玉鬯省牲鑊奉玉齍詔大號治其大禮詔相王之大禮大宰之職曰祀五帝則掌百官之誓戒與其具修前期十日帥執事而卜日遂戒及執事視滌濯及納亨贊王牲事及祀之日贊玉幣爵之事祀大神示亦如之享先王亦如之非特文之先後與此不合而事之輕重亦不能不異大宰於祀五帝而卜日此則曰祀大神享大鬼祭大示帥執事而卜日豈非鬼神示之大禮大宗伯之所専掌而大宰嫌於逼故止及於五帝之祀乎大宰言及執事視滌濯而此則曰宿視滌濯豈非大宗伯先期而視大宰則至期而視之乎大宰言贊玉幣爵之事而此則曰涖玉鬯蓋玉用之於天地而鬯獨用之於宗廟大宰之祀五帝無祼豈非涖鬯之輕於贊玉幣爵之事乎大宰言及納亨贊王牲事而此則曰省牲鑊蓋君袒而迎牲卿大夫贊君是大宰贊殺牲之事也大宗伯省牲鑊而已豈非省牲鑊之輕於贊牲事乎大宰贊牲而此則奉齍蓋祭祀以牲為貴齍次之小宗伯言五官奉六牲而六宮之人奉六齍則齍之次於牲明矣大宰言祀大神示享先王亦如之而此則言祀大神祭大示享大鬼且及於大號大禮始終皆以大禮為言以其職之所専故正其名大宰嫌於逼故大神大示大鬼之禮特見於祀五帝之後兹其所以不同若玉不與祭祀則攝位凡大祭祀王后不與則攝而薦豆籩徹有王不與之祭祀有王后不與之大祭祀是知大祭祀王后可以不與而王則未嘗不與也曽子問嘗禘郊社之祭簠簋既陳天子崩后之喪如之何夫子曰廢廢者越紼行事而已惟鷩冕以下之祭祀王不與則大宗伯為之攝酌獻之位若王后所不與者雖曰大祭祀亦特行於宗廟之禮蓋宗廟六享王與后同祼獻后親薦八籩八豆九嬪贊其薦又贊其徹王后不與則大宗伯攝而薦之又從而徹之是大宗伯所攝之禮於王則見於祭祀之常者於后則見於祭祀之大者凡以節文乎是禮者也大賔客則攝而載果果祼也此經繼於大祭祀王后不與之禮而已鄭氏謂君無酌臣之禮大宗伯代攝酌獻殊非義理且上經兩言攝者皆王與后不與祭祀之禮大賔客王與后皆與則不當言攝此言攝則蒙王后不與之上文無可疑者蓋大賔客則廟中將幣三享上公再祼侯伯子男一祼王祼賔則小宰贊之后亞王祼賔則內宰贊之已見於二官之職若王后不與然後大宗伯攝而載祼載者以舟而載之也司尊彛言六彛皆有舟是已言載彛以舟而酌之以璋瓚所謂攝者如此不然外宗之職何以曰王后不與則贊宗伯雖専主祭祀而言下言賔客之事亦如之則大宗伯攝王后不與之禮明矣朝覲會同則為上相大喪亦如之王哭諸侯亦如之王命諸侯則儐儐與相一也司儀掌擯相之禮是已出接賔曰儐入詔禮曰相成周重賔禮故大宗伯以卿為上相小行人以下大夫為承擯司儀以上士中士為旅擯擯固所以接賔也何以復謂之相司儀曰每門止一相及廟唯上相入則知相即儐也若夫王命諸侯則儐是以接賔之禮待之也進諸侯之當命者而已王將出命立於祖廟依前南鄉儐者進當命諸侯而使之登既策命之每降再拜稽首登受策以出所謂儐者如此國有大故則旅上帝及四望旅非常祭也國有大故然後旅其羣神而祭之禹於治水之時有所謂蔡蒙旅平荆岐既旅九山刋旅推此則凡所遭大故皆凶災之類也司尊彛之奠彛笙師之陳樂器視瞭之廞樂器皆如大喪之禮言奠則非純乎祭也言陳則非即徹之也陳樂而不懸廞樂而不鼓非以凶災而後旅者耶或言旅或言大旅蓋凶災之故有大小則旅亦隨異合祭衆神則謂之旅主上帝則謂之大旅掌次曰王大旅上帝是已國有大故而言旅上帝及四望則上帝羣神無不祭矣王大封則先告后土乃頒祀于邦國都家鄉邑大封封諸侯也先告后土者鄭氏釋大宗伯之告后土則曰后土土神也釋大祝之告后土則曰后土社神也既曰土神又曰社神鄭氏固已二其説然書曰敢昭告于皇天后土左氏傳曰君戴皇天而履后土后土對皇天而言則皇天為大神后土為大示按周禮有大示又有地示有土示又有后土則所謂后土者非専指大示也凡泛言地示為后土則此言后土者社而已蓋天子有大社其土五色封諸侯於東方則取青土於南方則取赤土於西方則取白土於北方則取黑土冒之以黃裹以白茅謂之茅土先告后土者告以諸侯立社之意頒祀者頒諸侯以所得祀之禮故諸侯不得祭天地及祖天子惟祭始封之祖及國之社稷境內之山川而已此正大封之所當先者而兼及於都家鄉邑者何也都家即三等采地亦有先君及社稷五祀之禮鄉邑即六鄉六遂亦有祭社祭禜祭酺及索鬼神之禮雖其小大異等必以王命而後行之其禮制皆有所不可踰此所以繼於大封之後

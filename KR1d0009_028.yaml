body:
  text: 周官總義卷二十八宋易祓撰函人為甲犀甲七屬兕甲六屬合甲五屬犀甲壽百年兕甲壽二百年合甲壽三百年凡為甲必先為容然後制革權其上旅與其下旅而重若一以其長為之圍凡甲鍛不摯則不堅已敝則撓函包也容也有衛物之義故制甲以衛人亦曰函孟子云函人惟恐傷人蓋其為甲取其堅而已犀甲兕甲指其物合甲言其工削革而合之其甲尤堅於犀兕屬謂上旅下旅札續之數以其聨屬有次叙故曰屬所謂旅者札葉也甲薄者札短欲其堅也厚者札長堅而無事乎短也故犀甲七屬而壽百年兕甲六屬而壽二百年合甲五屬而壽三百年凡為甲必先為容者人身有長短大小之不齊必先因服者之身以為之容使其身安於甲然後制革權其上旅與其下旅而重若一者上旅謂腰以上下旅謂腰以下權以知其輕重使上下等而若一則無偏重之患以其長為之圍者欲長短廣狹之相稱所謂先為容而後制革者如此然革以煆治為善摯之為言至也煆不至於熟則不堅而易壞太熟而過則已敝而易曲此又言制之不可茍也凡察革之道視其鑽空欲其惌也視其裏欲其易也視其朕欲其直也櫜之欲其約也舉而視之欲其豐也衣之欲其無齘也視其鑽空而惌則革堅也視其裏而易則材更也視其朕而直則制善也櫜之而約則周也舉之而豐則明也衣之無齘則變也甲之堅柔在乎革而革之為物有美有惡此所以有察革之道鑽空以受線則欲其惌而小是以革堅而難壞故曰視其鑽空而惌則革堅也革裏以向內欲其和易而不迫是以材更久而不壞故曰視其裏而易則材更也朕謂上下直而不撓則其制善而不敝故曰視其朕而直則制善也約言其約而不豐也卷而置櫜中以約為善則密致無間故曰周豐言其大也舉而視之以大為美則其色可觀故曰明齘言其齧也衣甲於身以無齘齧為利則回旋而適於用故曰變此所以為察革之道也鮑人之事望而視之欲其荼白也進而握之欲其柔而滑也卷而摶之欲其無迆也視其著欲其淺也察其線欲其藏也革欲其荼白而疾浣之則堅欲其柔滑而腛脂之則需引而信之欲其直也信之而直則取材正也信之而枉則是一方緩一方急也若苟一方緩一方急則及其用之也必自其急者先裂若茍自急者先裂則是以博為帴也卷而摶之而不迆則厚薄序也視其著而淺則革信也察其線而藏則雖敝不甐先儒引故書以鮑為鞄說文曰鞄柔革工也此所以鮑人所掌皆柔革之事凡革之制望而視之其色多晦今則欲如荼色之白進而握之其性多澀今則欲其柔順而滑利摶者束縳之也卷而摶之則欲其舒而不迆著者鋪著之也視其著則欲其淺而不積察其線欲其藏者謂革縫之縷欲其藏而不露革欲荼白色固美矣然浣之不疾則為水所漬而易壞故疾浣之則堅也革欲柔滑性固順矣然脂之不厚則其材不澤而易敝故腛脂之則需也引而信之欲其直而不撓直而不撓是取材之先正也信之而枉則緩急不等急者必先為之裂是革雖博而淺也自厚薄序以至於雖敝不甐柔革之道至此可謂善矣韗人為臯陶長六尺有六寸左右端廣六寸中尺厚三寸穹者三之一上三正鼓長八尺鼓四尺中圍加三之一謂之鼖鼓為臯鼓長尋有四尺鼓四尺倨句磬折地官鼓人有六鼓之名韗人所言鼖鼓臯鼓則六鼓之二也蓋韗以軍為義而鼖鼓臯鼓用之師役正韗人之事惟臯陶長六尺有六寸以至上三正者韗人雖言其制而不指其名先儒引賈侍中云晉鼓大而短近晉鼓也特言近之而已其說亦無經見非學者所宜從也臯陶鼓木也言如陶穴之中虛也長六尺有六寸左右端廣六寸中尺厚三寸者謂鼓木之版也此鼓二十板每版兩頭各廣六寸則其圍丈有二尺而鼓面徑四尺矣中尺謂鼓版之中一尺其圍二丈則其鼓之中徑六尺六寸三分寸之二矣此鼓之中徑即所謂穹者而復言穹者三之一如鼓面徑四尺則版穹一尺三寸三分寸之一兩面倍之則二尺六寸三分寸之二加鼓四尺則穹徑亦六尺六寸三分寸之二正與上文中尺之徑合厚三寸者版之廣狹雖不同而同於厚三寸上三正者兩頭與中央皆正為三正已上皆臯陶之制也鼓長八尺鼓四尺中圍加三之一謂之鼖鼓者鼓面四尺則其圍丈有二尺中圍加三之一則其圍丈有六尺也為臯鼓長尋有四尺鼓四尺倨句磬折者鼓面亦四尺然其中之穹者或倨或曲一取於磬折而已此經先言鼖鼓之制以軍事為先也次言臯鼓之制役事次於軍事故也惟臯陶不謂之晉鼓則宜何從要之經無明文不可臆說凡冒鼓必以啓蟄之日良鼓瑕如積環鼓大而短則其聲疾而短聞鼓小而長則其聲舒而逺聞啓蟄者中春之月雷出地奮豫而蟄蟲咸動啓户始出此天以至陽之氣鼓動乎萬物者也以是日而冒鼓是因其至陽之氣達其至陽之聲而已良鼓瑕如積環則周環若瑕之積於內此鼓之善也形有大小長短而聲有舒疾逺近此鼓之病也言其病則可以推器之善矣韋氏闕韋氏之篇亡矣其所掌不可考而上經鮑人之事則治革而柔之者也蓋皮之去毛則為革熟之則為韋革如革車之類不必其熟也韋如韋辨服之類必待熟而後可也或者韋氏所掌用於辨服之類云耳裘氏闕畫繢之事雜五色東方謂之青南方謂之赤西方謂之白北方謂之黑天謂之𤣥地謂之黃畫所以分布乎五色也繢則㑹聚之而已蓋一氣運而為陰陽陰陽判而為五行五行彰而為五色播五行於四時者陰陽之序雜四時於五色者陰陽之理青者木之正色也以蒼天之氣而位乎東故東方謂之青赤者火之正色也以丹天之氣而位乎南故南方謂之赤白者金之正色也以素天之氣而位乎西故西方謂之白黑者水之正色也以𤣥天之氣而位乎北故北方謂之黑陽之色以赤為本而以𤣥為正其色復乎幽天之正色也故天謂之𤣥陰之色以黑為本而以黃為正其色得乎中地之正色也故地謂之黃以天地之色與四方之色而並列於四時之間亦猶乾坤二卦與六子之卦並行乎十二月之氣然經所謂雜五色則青也與夫白黑黃也而復有所謂𤣥焉𤣥與黑何别乎黑者北方之正色而已六入為𤣥則有黑有赤赤者陽之正黑者陰之正惟天體備陰陽之正色而運此五行者也兹其所以辨青與白相次也赤與黑相次也𤣥與黃相次也青與赤謂之文赤與白謂之章白與黑謂之黼黑與青謂之黻畫繪之事雜五色而𤣥亦謂之色是以天之正色而運此五色者也故止言雜五色此言相次者非次序之謂亦雜比以為設色之美而已知所以相次而不知五行之理亦不足以盡設色之工巽位乎東南萬物趨於文明之地故青與赤謂之文坤位乎西南萬物成於致役之時故赤與白謂之章乾位乎西北其道主剛而能斷故白與黑謂之黼艮位乎東北陰陽各止其所辨故黑與青謂之黻言青而繼以赤以至言黑而繼以青五行相生之義也言青而次之以白言赤而次之以黑五行相尅之義也言𤣥而次之以黃又天地相合之義也相合所以相比相生所以相繼相尅所以相治古人合此數者謂之雜五色則亦本乎天地五行自然之理而已矣五采備謂之繡繡非畫繢也而繼于畫繢之後同於用五色而已然畫繢陽也施采未備未害也繡陰也陰道常乏常嫌於不備故五采備謂之繡鄭氏釋上經文章黼黻之義皆謂繡以為裳此其說固不可拘要亦有理存焉書言六章之裳宗彝藻火粉米黼黻絺繡言藻而繼之以火青與赤之文也言火而繼之以粉米赤與白之章也言粉米而繼之以黼白與黑之黼也言黼而繼之以黻黑與青之黻也惟黃之色無所見而宗彞繡以虎蜼則亦以黃為色兹實五采備之證而不言五色蓋畫繢主乎設色而繡則以五采為用欲備色故耳土以黃其象方天時變火以圜山以章水以龍鳥獸蛇雜四時五色之位以章之謂之巧畫繢之事非徒尚象也道德性命之理天地人物之變皆寓焉土以黃其象方天時變者先儒謂古人之象無天地而此記者見時有之殊不知天地雖不可以形容土以黃而位乎中即地之正色可以定體求也故曰其象方青赤白黑者四時之色天以四時之色而生成萬物不可以定體求也故曰天時變火之形鋭而性圓因物賦形則有變通不窮之用故曰火以圜山之上正者為章而草木亦為地之章皆取其成象之義故曰山以章水者龍之所宅而澤國龍節亦以類求故曰水以龍鳥即鳥隼為旟之類所以示摯速獸即熊虎為旗之類所以示猛毅蛇即龜蛇為旐之類所以示完果或謂火與山水則繢之於衣鳥與獸蛇則繢之於旗其說或然然繢山於尊曰山尊繢龍於旗曰龍旗豈特衣而已畫鳥於彞曰鳥彞畫獸於侯曰獸侯豈特旗而已要之古人雜四時五色之位而謂之巧者誠不可以一端求也凡畫繢之事後素功甘受和白受采畫繢之事備五采也以白為先故曰後素功謂先以粉地為質而後施五采焉子夏問詩之素以為絢兮而夫子曰繢事後素子夏即有禮後乎之對蓋禮必以忠信為質猶繢事必以粉素為質以粉為質而謂之功者猶言彰施五采必待此而後為功也鍾氏染羽以朱湛丹秫三月而熾之淳而漬之三入為纁五入為緅七入為緇物莫重於鍾莫輕於羽羽之色欲其重故以鍾氏染之鍾之聲欲其輕故以鳬氏為之鳬以况其聲之清鍾以况其色之重也湛漸也秫赤粟也以朱漸赤粟三月而熾之者先練治其色及三月然後以火熾之又取羽淳熟而浸漬之使羽與色漬而相入所以為染羽之善然而一染謂之縓再染謂之赬三染謂之纁纁則自黃而入赤者也又再染而黑則為緅矣又再染而黑則為緇矣經言三入為纁五入為緅七入為緇而不言四入六入者案士冠禮有朱紱而鄭云朱則四入是纁入赤而四入為朱也鄭又云𤣥色在緇緅之間其六入與是又以緅入黑而六入為𤣥也染羽之不苟如此然鍾氏染羽而春官復有染人者蓋染人掌染絲帛而鍾氏所染者鳥羽而已羽之入色難於絲帛此所以專設鍾氏之職筐人闕㡛人湅絲以涗水漚其絲七日去地尺㬥之晝㬥諸日夜宿諸井七日七夜是謂水湅湅帛以欄為灰渥淳其帛實諸澤器淫之以蜃清其灰而盝之而揮之而沃之而盝之而塗之而宿之明日沃而盝之晝㬥諸日夜宿諸井七日七夜是謂水練治絲帛而熟之之謂㡛治荒之意也治其生者熟之而已絲弱於帛帛壯於絲湅絲不過涗水而漚之湅帛則以欄為灰煮而熟之以至淫之盝之又至於塗之宿之其法為特詳是湅帛涷絲其法為不同而同於晝㬥諸日夜宿諸井者蓋㬥諸日則溫之以陽氣宿諸井則寒之以陰氣精密乎陰陽之理而後知湅絲帛之所以為巧也玉人之事鎮圭尺有二寸天子守之命圭九寸謂之桓圭公守之命圭七寸謂之信圭侯守之命圭七寸謂之躬圭伯守之天子執冒四寸以朝諸侯天子用全上公用龍侯用瓚伯用將繼子男執皮帛天子圭中必天子圭中必必讀為縪縪亦必也先儒謂組約其中央以備失隊必致其謹而已蓋古者天子諸侯之玉用則執之居則守之然諸侯言繅藉而不言組約示有所尊也天子有繅藉而又有組約所以優至尊也天子雖居至尊之位而常有必致其謹之意故以組約其圭之中央者不謂之縪而謂之必豈茍而已哉四圭尺有二寸以祀天四圭者備天德也尺有二寸者備天數也即典瑞四圭有邸是已典瑞掌其用故曰有邸玉人掌其制故曰尺有二寸義見典瑞大圭長三尺杼上終葵首天子服之玉藻云天子搢珽方正於天下也大圭是已大圭而謂之珽者言珽然無所屈也大圭杼上廣其首而無屈故曰大圭大之為言道也圭以大名象道之體三尺為數象道之成杼上終葵首象道之用終葵者椎也杼閷也為椎於杼上明無所屈而已先儒謂珽玉六寸蓋於三尺圭之上六寸之下兩畔殺之而為終葵首者六寸也言天子服之者乃所以搢之也典瑞曰王搢大圭謂搢於衣帶之間若衣服之服故曰服土圭尺有五寸以致日以土地土地致日本非二事致日即所以土地也土地必以尺有五寸之土圭者大司徒曰日至之景尺有五寸謂之地中則正合土圭之數義見大司徒之職祼圭尺有二寸有瓚以祀廟祭惟宗廟用祼天地社稷山川等祭則設秬鬯如鬯人共秬鬯是已至鬱人共鬱鬯用之於宗廟故言祼祼圭有瓚舊圖以瓚下有盤口徑一尺然瓚盤之制出於漢其說見於鄭氏六經初無此制陸氏謂瓚形如盤橫徑四寸鼻上寸為龍形圭璋為柄當矣然典瑞言祼圭以肆先王以祼賔客而此不言賔客者祼以祀廟為主故也琬圭九寸而繅以象德琰圭九寸判規以除慝以易行二圭之義已見典瑞然此經但言琬圭九寸而繅琰圭九寸判規則與典瑞之圭加詳焉琬圭取其圜圜其鋭者以和順為義所以彰諸侯之善琰圭取其剡剡其末者以剛斷為義所以疸諸侯之惡典瑞所謂琬圭以治德以結好琰圭以易行以除慝是也然治德結好先王之仁也取藻飾之文以示聖人文德懷撫之意故曰繅易行除慝先王之義也剡與瑑飾各居其半以示聖人威嚴不可犯之意故曰判規然二圭之長皆以九寸者九為陽數之極言為天子之尊而後可用之以馭諸侯也璧羡度尺好三寸以為度璧羡之義已見典瑞然典瑞止言璧羡以起度而已此言好三寸以為度其制加詳焉爾雅云肉倍好謂之璧好孔也今以好三寸推之肉倍好為六寸是兩畔各三寸則璧之圓凡九寸延其旁之一寸以蓋上下則橫徑八寸袤十寸矣是璧羡之袤十寸廣八寸二者皆謂之度以十寸之尺而起度則十尺為丈十丈為引以八寸之尺而起度則八尺為尋倍尋為常故匠人之室中度以几堂上度以筵宫中度以尋野度以步涂度以軌則又因其數而推之云圭璧五寸以祀日月星辰義已見典瑞而此經但言圭璧五寸者蓋圭鋭以象天之用璧圓以象天之體而其制五寸者殺乎祀天之璧又以象天之中數璧琮九寸諸侯以享天子小行人合六幣璧以帛琮以錦蓋蒼璧所以禮天也故諸侯享天子以璧黃琮所以禮地也故諸侯享王后以琮聘禮云享君以璧享夫人以琮諸侯夫人且各致其享况天子與后而可璧琮之無辨乎今此經特諸侯享天子者闕文也或曰諸侯來享以天子為主言天子則王后與焉今兩存之然璧琮言九寸者據上公而言也先儒釋小行人之義有曰五等諸侯享天子用璧享后用琮其大小各如其瑞是上公九寸侯伯七寸子男五寸其義亦可據矣榖圭七寸天子以聘女義已見典瑞榖善也聘女嘉禮之至善者也先儒以聘女為納徴蓋昏禮有六而五禮皆用鴈惟納徴以束帛鄭氏釋媒氏曰大夫以𤣥纁束帛天子加以榖圭諸侯加以大璋故知其為納徴也徴成也榖圭兼言和難亦取其成而已大璋中璋九寸邊璋七寸射四寸厚寸黃金勺青金外朱中鼻寸衡四寸有繅天子以巡守宗祝以前馬圭璋皆祼玉也圭以象陽之生物璋以象陰之成事成周之肆先王禮賔客以祼圭后之亞祼與王之巡守以祼璋祼圭尺有二寸則象乎陽之以偶成大璋中璋九寸則象乎陰之以竒立此宗廟賔客山川隆殺之辨也後鄭謂三璋之勺形如圭瓚天子巡守有事山川則用祼焉於大山川則用大璋加文飾也於中山川則用中璋殺文飾也於小山川則用邊璋半文飾也其祈沈以馬宗祝亦執勺以先之是已蓋圭璋其柄也瓚其勺也所以承流也柄則純玉為之勺則玉多石少鄭許皆謂瓚四玉一石是圭瓚璋瓚皆以玉為之獨三璋之勺則飾以金此所謂黃金勺青金外是也金位乎西而為義如山川之阻固則義之象焉黃者陰之中青者陰之始朱者陽之正言山川雖以義佐陽而實以陽為主九寸七寸皆陽數焉射四寸剡出者也射以貫勺象山川之通氣鼻四寸所以流鬯也衡四寸勺之徑也必有繅焉文之飾也陸氏以黃金勺青金外朱中鼻寸衡四寸有繅謂勺為龍口矣復引杜之說以勺為尊中之勺何也蓋勺之字一而其制有二明堂位曰夏后氏龍勺殷之疏勺周之蒲勺則尊中之勺也此所謂黃金勺則圭瓚之首鼻勺之勺也鄭氏之說當矣大璋亦如之諸侯以聘女此大璋亦如之者若前大璋九寸則諸侯聘女反過於天子聘女之制鄭氏疑之而曰如邊璋七寸射四寸豈有繼於三璋之後而獨言如邊璋者况邊璋與黃金勺用以酌者聘女加於束帛非酌事也或曰此錯文也當繼於上經榖圭七寸天子以聘女之後亦如之者亦如榖圭之七寸蓋天子聘女用圭諸侯聘女用璋此尊卑隆殺之等其說誠當然兩大璋之名一也按經未有一器而尺寸異者亦未有同名為一器而天子諸侯異用者此大字恐誤不可臆說瑑圭璋八寸璧琮八寸以眺聘義已見典瑞然典瑞言繅皆二采一就而此經言皆八寸其尊卑隆殺不可以不辨也且諸侯朝於天子公侯伯以圭而其臣眺聘亦以圭子男以璧而其臣眺聘亦以璧圭之外又加以璋璧之外又加以琮八寸雖降於公而實過於侯伯子男臣可以踰乎君其分異也或曰據先儒所釋則瑑圭聘天子而以璧享之瑑璋聘王后而以琮享之八寸之制特言上公之臣而已蓋上公九命桓圭九寸其臣以上公之命而來則降其君之禮一等是知侯伯之臣以六寸子男之臣以四寸何其說之紛紛也殊不知經言瑑圭璋璧琮則與圭璋璧琮固自不同也五等諸侯以桓信躬蒲榖飾其圭璧而其臣特瑑之而已其制既有降殺則公侯伯之臣何嫌乎圭璋子男之臣何嫌乎璧琮又何嫌乎其制皆八寸而必欲強為六寸四寸之說何也况乎諸侯之三采三就二采再就而諸臣特二采一就其尊卑降殺固不待辨而明矣牙璋中璋七寸射二寸厚寸以起軍旅以治兵守典瑞言牙璋以起軍旅以治兵守而不言中璋則中璋特牙璋之次者也賈氏曰軍多用牙璋軍少用中璋戰守不同璋亦隨異又曰中璋亦有鉏牙但牙璋文飾多故得牙名其長七寸者火之成數其射二寸者火之生數火陽類也而璋為南方亦陽也白虎通曰璋為南方陽極而生陰兵陰也故以起軍旅以治兵守駔琮五寸宗后以為權駔琮以為權與璧羡起度之意同蓋璧之體圓而象乎天琮之體方而象乎地天地為萬物之所始而萬物之數莫不取法於天地此權之所以取乎琮而度之所以取乎璧也知璧羡起度而度不以璧則知駔琮為權而權不以琮是駔琮可以為權之始而不可以為權之用蓋權之為器法度之所自出而政事係焉先王慮其制之不存故記其制於駔琮耳此言駔琮五寸宗后以為權而下經復言駔琮七寸天子以為權者琮禮地之器也以組繫之謂之駔琮之為言其猶地道之可宗也非居崇高之位而為人所宗者其孰能為之是故天子立六官三公九卿二十七大夫八十一元士以聽天下之外治而權必以七寸者七成數也以成數為權則成而不可變也王后立六宫三夫人九嬪二十七世婦八十一女御以聽天下之內治而其權以五寸者五中數也以中數為權則中而不可易也然天子之權言鼻寸有半寸而宗后不言者舉彼明此亦互見耳大琮十有二寸射四寸厚寸是謂內鎮宗后守之大琮謂之內鎮猶天子之圭而謂之鎮圭也天子繼天而為子故鎮圭十有二寸者所以備天數后配王而位乎內故內鎮十有二寸者所以同乎王非特此也鎮圭尺有二寸而言天子守之內鎮十有二寸而亦言宗后守之守之為言各有分守之謂也蓋天子聽外治必能守是職而後可以鎮乎外宗后聽內治必能守是職而後可以鎮乎內苟違其守則外內失其政尚奚足以言鎮乎駔琮七寸鼻寸有半寸天子以為權義見上經宗后以為權兩圭五寸有邸以祀地以旅四望兩圭祀地對四圭祀天而言也天以健為體其德無不周故其用為四圭其數為尺有二寸地以順為體其德有所止故半之而為兩圭殺之而其數為五寸知四圭尺有二寸而托邸於璧則知兩圭五寸而托邸於琮矣其祀地旅四望之義見典瑞瑑琮八寸諸侯以享夫人上經璧琮九寸諸侯以享天子蓋天下視王為天而視后為地故諸侯享王以璧而享后以琮王后與焉而經不言諸侯來朝以天子為主故也以天子為主則曷為不言享后而言享夫人后與夫人皆致飲於賔客之禮故諸侯享天子以璧享后以琮享夫人以瑑琮璧琮言九寸而不言享后者同於王也瑑琮殺以八寸而言享夫人者别於后也先儒泥於享夫人而謂諸侯之自相朝以經意考之豈其然乎案十有二寸棗㮚十有二列諸侯純九大夫純五夫人以勞諸侯此王后之事而經不言王后闕文也先鄭不知其為闕文而曰夫人天子夫人然勞諸侯以王后為主豈有不言后而先言三夫人乎後鄭破其說曰夫人王后也記時諸侯僭稱王而夫人之號不别是以同王后於夫人也此說又有大不然者且天子之配曰后諸侯之配曰夫人而天子亦有三夫人矣后夫人皆與於賔客之事若王於賔客致酒后致飲夫人亦致飲是也故聘禮曰夫人使下大夫勞以二竹簋說者謂諸侯待聘者之禮有竹簋以盛棗㮚而無案若勞二王之後則有案矣鄭氏既知王后勞朝諸侯皆九列聘夫人皆五列而十有二列者為待二王之後然不知闕文而復言諸侯僭王夫人之號不别曽不謂考工一書惟此與周官合使夫人與王后之號不别則此經又何以有宗后為權宗后守之之文乎意此必有闕文璋邸射素功以祀山川以致稍餼義已見典瑞然典瑞止言璋邸射而此經言璋邸射素功者射言剡出而貫於邸素功則朴質而無瑑飾之文所以象山川有阻固之功賔客有屏翰之功也然此經言以致稍餼而典瑞言造贈賔客者蓋造館而致餼出郊而贈賄與此互相備也楖人闕雕人闕楖比也雕刻也磬氏為磬倨句一矩有半其博為一股為二鼓為三參分其股博去一以為鼓博參分其鼓博以其一為之厚已上則摩其旁已下則摩其專詩曰依我磬聲磬石也石有一定之聲而衆聲依焉故八音之中石為難調先調石聲與七音不相扞格然後謂之無相奪倫此舜之命䕫於八音無所不備而擊石拊石䕫特兩言之者言衆聲依之而不可茍焉者也蓋古者制器其形垂下以象天形屈而下覆之意故磬氏為磬句即股也倨即鼓也股在上廣而短鼓在下狹而長以長掩短則鼓長於股者半矩是倨句一矩有半也廣狹長短務適中焉鄭氏謂假矩以定倨句非用其度其說是矣然磬之制有大小皆從其律如黃鍾之特磬所謂博為一者股博也黃鍾之律九寸則博之一即九寸也股為二則長二律為尺有八寸鼓為三則長三律為二尺七寸三分其股博去一以為鼓博則鼓博六寸矣三分其鼓博以其一為之厚則鼓厚二寸矣已上則聲太清太清則摩其旁而使之薄薄而廣則濁也已下則聲太濁太濁則摩其專而使之短短而厚則清也阮逸胡瑗書曰三分其博以其一為之厚不可依依之則聲高不協音律范鎮之磬黃鍾厚一寸損益其制至於厚五分有竒然石之性或堅或潤則雖厚而清或緩或燥則雖薄而濁奈何以一時偶得之石而遽疑磬氏之制乎矢人為矢鍭矢參分茀矢三分一在前二在後兵矢田矢五分二在前三在後殺矢七分三在前四在後鄭氏引司弓矢之義曰茀當為殺殺當為茀蓋鍭矢自與殺矢相對茀矢自與矰矢相對其輕重之用不可亂也嘗考古人為矢槀長三尺槀之前設刃故有鐵而重槀之後設羽故無鐵而輕輕重之制不同而強弱之力亦異故矢人之職必以物稱量其槀而訂平之以辨其前後多寡之不同鍭矢殺矢參分一在前二在後者三分其槀之三尺則一尺在前而二尺在後也以後二尺之重而與前一尺相等則槀前之鐵為極重矣故其發遲而近射用焉兵矢田矢五分二在前三在後者五分其槀之三尺則尺有二寸在前尺有八寸在後也以後尺有八寸之重而與前尺有二寸相等則槀前之鐵比殺矢差短而小矣故其發逺而火射用焉茀矢七分三在前四在後者七分其槀之三尺則在前者尺有二寸七分寸之六在後者尺有七寸七分寸之一也以後七分之四與前七分之三相等則槀前之鐵比兵矢又短而小矣故其發高而弋射用焉至於恆矢庳矢前後皆四分而此不言者以其無所輕重故也參分其長而殺其一五分其長而羽其一以其笴厚為之羽深水之以辨其陰陽夾其陰陽以設其比夾其比以設其羽參分其羽以設其刃則雖有疾風亦弗之能憚矣鄭氏謂矢槀三尺考之於經本無正文約羽六寸而逆差之羽之六寸又約刃二寸而逆差之蓋羽居槀五分之一則其長三尺矣所謂三分其長而殺其一則殺其前之一尺以趨鏃也五分其長而羽其一則羽居槀之六寸也以其笴厚為之羽深則量笴力之所受也水之以辨其陰陽者陰沈而向下陽浮而向上所以正兩旁之輕重也夾其陰陽以設其比者括居陰陽兩旁之中欲其輕重之均也夾其比以設其羽者謂夾其括使輕重均然後可設羽也三分其羽以設其刃則刃居羽三分之一其長二寸也矢之長短輕重如此則疾風不能動矣何憚之有刃長寸圍寸鋌十之重三垸刃長寸者殺矢之制先儒以上經五分其長而羽其一三分其羽以設其刃若刃長寸則羽三寸而矢之長一尺五寸其為矢太短故易之以刃二寸而不知刃之二寸鍭矢兵矢之類皆然也惟殺矢為獨異蓋其前為極重其發為甚遲若刃過於長則滯而不能發矣此刃必以寸而其設羽設刃不必拘於常制所以獨見於矢人之後不然冶氏為殺矢雖補脫之誤然亦曰刃寸則其制可知也鋌謂箭簇入槀中者也鋌十之則其入槀中者凡一尺矢人所謂殺矢七分三在前四在後此亦於槀中之鐵鋌七分殺一以前也重三垸先鄭以垸為量名亦無據依以冶氏重三鋝考之古文以鋝為鍰而書有罰百鍰之文豈鋝與鍰音相近而傳者或失其真乎前弱則俯後弱則翔中弱則紆中強則揚羽豐則遲羽殺則躁是故夾而搖之以視其豐殺之節也撓之以視其鴻殺之稱也矢之調適不過幹與羽而已幹之前弱則矢行而低後弱則矢行而旋中弱則矢行而曲中強則矢行而起皆強弱之不得其稱者也羽豐則太多而矢重故其矢行失於緩羽殺則太少而矢輕故其矢行過於急皆豐殺之不得其節者也古人慮乎羽有豐殺之病故以指夾矢而搖之以酌其輕重則豐殺之節可知矣古人慮乎幹有強弱之病故以指撓其幹而曲之以審其強弱則鴻殺之稱可知矣古人試矢之法如此於今亦然凡相笴欲生而摶同摶欲重同重節欲疏同疏欲㮚笴幹也相擇也欲生而摶則擇其體之圓者同摶欲重則於圓之中又擇其材之實者同重節欲疏則於實之中又擇其節之不密者同疏欲㮚則於疏節之中又擇其材之縝栗而堅者相笴者固欲其材之美而所以相之者又在乎工之巧者也

body:
  text: 周官總義卷二十四宋易祓撰大行人掌大賔之禮與大客之儀以親諸侯昔者成周之時待六服之諸侯則謂之大賔待諸侯之孤卿則謂之大客協其賔客之禮儀而往來乎諸侯之邦者行人也此大行人之職所以掌大賔之禮及大客之儀魯昭公如晉自郊勞至於贈賄禮無違者而叔齊乃曰是儀也不可謂禮晉趙簡子有及於周旋揖遜之説而大叔亦曰儀也非禮也此禮與儀之辨然亦有不可以差殊觀者大宗伯所謂九儀之命則四命受器以下固諸臣之儀五命賜則以上則諸侯亦未嘗不謂之儀也小行人所謂九儀賔客之禮則朝覲宗遇會同固所以為君之禮存眺省聘問則諸臣亦未嘗不謂之禮也然而大行人之職必於大賔謂之禮大客謂之儀者特以尊卑言之若夫禮儀行於交際之間而誠意孚於禮文之表則先王之所以親諸侯者一而已春朝諸侯而圖天下之事秋覲以比邦國之功夏宗以陳天下之謨冬遇以協諸侯之慮時會以發四方之禁殷同以施天下之政此六者即大宗伯所謂賔禮者也大宗伯以賔禮親邦國春見曰朝夏見曰宗秋見曰覲冬見曰遇時見曰會殷見曰同固所以詳其賔禮之名而大行人所謂圖事比功陳謨協慮發禁施政者又所以詳其命諸侯之實所謂春朝諸侯而圖天下之事者若王制言諸侯之朝而曰考禮正刑是已然事之作於先者功必成於後又於秋覲而比之所以察其禮刑之成二者見於春秋之時故因春朝秋覲而行之也所謂夏宗以陳天下之謨者若舜典言羣后之朝而曰敷奏以言是已然謨之見於外者慮必定於內又於冬遇而協之所以核其敷奏之實二者見於冬夏之時故因夏宗冬遇之禮而行之也所謂時會者諸侯不奉王命而王將有征討之事於是會諸侯於國門之外而命以大司馬九伐之法自眚之伐之以至杜之滅之是謂發四方之禁以其時之不常有所以名時會之禮也所謂殷同者天子於十有二歲或未巡守於是諸侯衆見天子天子亦會之於國門之外而命以大司馬九法之事自正之等之以至安之和之者是謂施天下之政以其國為甚衆所以名殷同之禮也然而宗遇會同之禮亦或總以朝覲名者曲禮曰天子當依而立諸侯北靣而見天子曰覲天子當寧而立諸公東靣諸侯西靣曰朝鄭氏謂夏宗依春此圖事陳謨皆所以責其始又謂冬遇依秋此比功協慮皆所以考其終故曲禮特言朝覲而經亦多以朝覲為主至於會同之發禁施政又同朝覲之時而行其禮故經亦謂之大朝覲此朝覲宗遇會同之名雖異而先王行禮之意一也時聘以結諸侯之好殷眺以除邦國之慝或謂大行人之言俯聘即下經遍存遍省遍俯之事乃天子遣使以撫邦國諸侯者然大宗伯以此二者為賔禮而此亦有大客之儀則知非天子遣使之文其義則鄭氏所釋是已然鄭氏又曰時聘使大夫殷俯使卿俯而使卿禮也聘而使大夫得乎左氏襄公二十九年鄭伯將聘於周而鄭上卿有事子展使印假往伯有曰弱不可昭公三十年鄭遊吉如晉晉魏獻子使士景伯詰之詰其無二也遊吉以為先王之制惟嘉好聘享三軍之事於是乎使卿且援印段之事謂印段實往少卿也王吏不討恤所無也命少卿以往且不可而況於大夫之銜命霸主猶責諸侯以大夫行禮而況乎行禮於天子之庭春秋之時天子猶使宰若公聘諸侯而諸侯乃使大夫聘於天子大失尊君之義要之諸侯之孤若卿為大客是大國則以孤行聘俯之禮次國小國則以卿行之也間問以諭諸侯之志歸脤以交諸侯之福慶賀以贊諸侯之喜致禬以補諸侯之災大宗伯之言賔禮不過朝覲宗遇會同聘俯八者而已如禬禮之哀圍敗反見於凶禮脤膰之親兄弟賀慶之親異姓反見於嘉禮蓋行人以親諸侯為主凡嘉禮凶禮皆親諸侯之意不以賔禮為拘也若夫間歲一問之禮又大宗伯五禮所不載特見於此經撫邦國諸侯之後其義則鄭氏所釋者是已以至歸脤賀慶雖本乎大宗伯之賔禮然大宗伯以脤膰賀同姓異姓而大行人則一概以為諸侯者蓋大宗伯言其定制而大行人言其通制者也若夫致禬以補諸侯之災則又通言凶禮之五者大宗伯之凶禮雖有曰喪曰荒曰禬曰弔曰恤之别而五者皆以哀為文則事雖異意則同鄭氏徒見夫禬禮哀圍敗弔禮哀禍災遂總而言之以致禬為凶禮之弔禮禬禮其實則五者之禮皆所以補諸侯之災也大宗伯之言禮亦可以類推矣以九儀辨諸侯之命等諸臣之爵以同邦國之禮而待其賔客九儀同邦國之禮而諸侯謂之命諸臣謂之爵者何也大宗伯言王命諸侯則擯小宗伯言賜卿大夫士爵則擯謂命者以策而命爵則賜之而已此所以為諸侯諸臣之辨然典命掌諸侯之五儀諸臣五等之命與此經若不合且上公九命侯伯七命子男五命凡三等而曰五儀者以公侯伯子男别之所以止謂之儀此則亦以儀而辨諸侯之命也諸臣之爵孤卿大夫士凡四等而曰五等之命者以士之中有不命之士此之所主者爵所以止於四等也爵命不同如此而曰同邦國之禮者非謂舉其倍蓰不同者而同之也命同於上公則皆以九為節命同於侯伯則皆以七為節命同於子男則皆以五為節以至爵同於孤則皆以四為節爵同於卿大夫而有大國次國小國之異命則亦各視其命之數而為之節以此待其賔客則大行人之所掌有定籍而其爵命之上下隆殺各當於禮而舉不敢踰其分其同也至矣上公之禮執桓圭九寸繅藉九寸冕服九章建常九斿樊纓九就二車九乘介九人禮九牢其朝位賔主之間九十步立當車軹擯者五人廟中將幣三享王禮再祼而酢饗禮九獻食禮九舉出入五積三問三勞諸侯之禮執信圭七寸繅藉七寸冕服七章建常七斿樊纓七就二車七乘介七人禮七牢朝位賔主之間七十步立當前疾擯者四人廟中將幣三享王禮一祼而酢饗禮七獻食禮七舉出入四積再問再勞諸伯執躬圭其他皆如諸侯之禮諸子執穀璧五寸繅藉五寸冕服五章建常五斿樊纓五就二車五乘介五人禮五牢朝位賔主之間五十步立當車衡擯者三人廟中將幣三享王禮一祼不酢饗禮五獻食禮五舉出入三積一問一勞諸男執蒲璧其他皆如諸子之禮此經繼九儀而言即所謂辨諸侯之命者周制三公一命衮謂三公八命加一命而服龍衮則為上公周公召公之分陜以之其餘則二王之後稱公建微子為上公是也按典命之職上公九命為伯其國家宫室車旗衣服禮儀皆以九為節此大行人所以辨上公九命之禮桓圭所執以為瑞者也繅藉所用以藉玉者也冕服所服所戴以章身者也常者在天子為日月之大常此止名以常即所建交龍之旗而通稱為常樊與纓皆飾馬之物以罽飾之者也二車後乘之車也介則相禮者也禮謂饔餼之大禮也凡此其節皆以九其朝見之位分為賔主其間相去九十步而立於車轂之末謂之軹於是王行四十五步以迎賔賔行四十五步以朝王王於是使大宗伯為上擯以至承擯末擯凡五人擯而見之朝畢則有廟享之禮王受其享享必將幣皆束帛加璧庭實惟國所有公再拜送之其享必以三三享之禮既成乃以求神之祼禮禮之王酌鬱齊以祼賔后亞焉是謂再祼再祼之禮賔有酢禮以象尸酢王與后之義以至饗禮九獻則以飲為主食禮九舉則以食為主出入有禾米芻薪之費故五積問以問其無恙勞以勞其勞苦故三問三勞已上皆上公之禮諸侯降殺於公則以七為節其所以異於諸公者執信圭七寸立當前疾擯者四人王禮一祼而酢而已其他則與諸伯之執躬圭者皆殺於上公之禮也諸子降殺於侯伯則以五為節其所以異於侯伯者執穀璧五寸立當車衡擯者三人王禮一祼不酢而已其他則與諸男之執蒲璧者皆殺於侯伯之禮也此亦典命所謂侯伯七命子男五命之節或援先儒之説曰自上公之禮至其他皆如諸子之禮非朝禮也朝禮服皮辨而此云冕服朝禮偏駕不入王門如同姓金路以下皆舍於館乘墨車龍旗以朝而此云樊纓朝禮天子不下堂見諸侯而此云賔主之間有立位之差果朝禮乎是不然皮辨日視朝而已玉藻曰禆冕以朝注謂公袞侯伯鷩子男毳乃冕服之制知此命圭五等以至繅藉冕服之三等皆朝禮也偏駕不入王門王門之外而已庭燎之詩曰君子至止鸞聲將將注謂君子諸侯將將鸞鑣聲乃樊纓之制知此則知建常樊纓以至二車之類凡三等皆朝禮也不下堂而見諸侯特漢儒之説爾經之齊僕曰朝覲宗遇饗食皆乘金路其法儀各以其等為車送逆之節注謂迎賔及送相去遠近之數知此則知朝位賔主之間步立之儀皆朝禮也上公之禮其位相去九十步侯伯七十步子男五十步後鄭雖不得其説止曰賔下車及王車出迎所立處若賈氏則直以為在朝乃有此迎賔之法經既明言朝位則是外朝之位有此迎賔之法朝禮既訖然後於祖廟行受享之禮故將幣三享以至王禮之祼諸侯之酢又至於饔禮食禮皆廟中之禮此廟禮與朝禮其别如此豈可強為之説凡大國之孤執皮帛以繼小國之君出入三積不問一勞朝位當車前不交擯廟中無相以酒禮之其他皆視小國之君經言執皮帛者大宗伯言孤執皮帛則天子之孤也典命言凡諸侯之適子未誓則以皮帛繼子男又言公之孤以皮帛㫝小國之君此言大國之孤則為上公之孤大國之孤執皮帛而上同乎天子之孤者天子六命之孤而執皮帛束帛而加之以虎皮也上公四命之孤而執皮帛束帛而加之以豹皮也若夫諸侯之適子未誓者以皮帛繼子男不純乎子男也公之孤執皮帛以繼小國之君亦不純乎小國之君也所謂繼小國之君者孤以君命來聘則其位在子男之後子男朝禮既畢則繼其後而進出入之積問勞之禮視子男而降殺其朝位當車前則其進而近君也俞蹙而速其傳辭則不使介交於王之擯行聘享於廟之時亦不用相禮之人王禮之用酒而已此其所以降殺於子男者若其他如二車以至饗食之禮皆與子男同故曰􅢂昭二十二年叔孫婼曰列國之卿為小國之君固周制也此所謂􅢂小國之君者也􅢂之為言輕重不同而皆倣其禮則不純乎小國之君明矣凡諸侯之卿其禮各下其君二等以下及其大夫士皆如之王制言次國之上卿位當大國之中中當其下下當其上大夫小國之上卿位當大國之下卿中當其上大夫下當其下大夫其有中士下士數各居上之三分與左氏所載臧宣叔之言大略相似皆以次國之諸臣而降大國一等小國之諸臣而降大國二等也此言諸侯之卿大夫士其禮各下其君二等以本國之君卿大夫士而以次降二等爾蓋有上公之卿有侯伯之卿有子男之卿其命數為不同王朝禮之如介與朝位賔主之步各降二等則公之卿以七侯伯之卿以五子男之卿以三正與聘義所謂上公七介侯伯五介子男三介之説同然大國之孤視小國之君則子男以五為節凡為禮皆五今上公之孤􅢂子男五介而其卿乃七介則是大國之孤降於其國之卿矣此殆有深意存焉孤執皮帛繼小國之君則同小國之君皆以五介而受贄於朝卿不得受贄於朝但以執羔七介受享於廟而已以下及其大夫士亦如之亦如卿之禮而殺其數其他如大夫執鴈士執雉則其命數固自不同也如定八年公會晉師於瓦范獻子執羔趙簡子中行文子皆執鴈雖春秋之世不廢命數其禮可知矣邦畿方千里其外方五百里謂之侯服歲一見其貢祀物又其外方五百里謂之甸服二歲一見其貢嬪物又其外方五百里謂之男服三歲一見其貢器物又其外方五百里謂之采服四歲一見其貢服物又其外方五百里謂之衛服五歲一見其貢材物又其外方五百里謂之要服六歲一見其貢貨物邦畿言畿而六服言服內外小大之辨也職方氏言九服之邦國而行人止言六服者蓋自侯服以至要服即職方氏蠻服以上雖有遠近皆十二歲天子巡守所至故待之以中國之禮惟夷鎮二服不見於大行人之職其言九州之外謂之蕃國則此夷鎮二服實在九州之內蓋先王以其荒遠非巡守所至故不列於六服鄭氏徒見此二服不列於六服遂一概以為九州之外曰九州之外夷服鎮服蕃服也經止言蕃服而鄭氏乃加之以夷鎮二服非矣又見要服以上每服各五百里六服凡三千里相距六千里兼王畿千里遂謂此六服去王城三千五百里相距方七千里尤不知禹迹之實數也蓋禹貢九州之內列為五服方五千里至州則於九州之內為王畿為夷鎮以上之八服亦方五千里而蕃國一服在九州之外然則成周言九服與禹貢言五服何以皆言方五百里曰禹之五服則各計其一面之數周之九服則通計其兩面之數何謂各計其一面之數禹之甸服千里而止言五百里一面之數也何謂通計兩靣之數周之王畿不言五百里而言千里兩靣之數也蓋禹貢五服王之甸服千里在內自甸服至荒服各五百里凡二千五百里兩靣則為五千里至於職方氏所載則王畿千里不在九服之內自方五百里之侯服至方五百里之鎮服每服五百里計其一面各二百五十里九服并王畿一靣則為二千五百里兩靣亦為五千里是為九州由此觀之周之邦畿即禹貢之甸服也周之侯服甸服即禹貢之侯服也周之男服采服即禹貢之綏服也周之衛服蠻服即禹貢之要服也周之夷服鎮服即禹貢之荒服也是禹貢之與周制其九州之地皆五千里無可疑者不然則職方氏所載九州之山川澤浸其名不出禹貢九州之域雖時有損益而皆不改乎禹貢九州之舊孰謂其廣地於禹貢九州之外耶然而夷服鎮服不列於六服者以其為禹貢之荒服非天子巡守之地然則九州之內則其待之也實與要服同其禮惟此六服朝畢十二年王乃巡守則是王巡守之禮止及六服故也若夫侯服歲一見則每歲而見甸服二歲一見則在二年四年六年八年十年男服三歲一見則在於三年六年九年采服四歲一見則在於四年八年衛服五歲一見則在於五年十年要服六歲一見則在於六年而夷鎮二服亦然若十二年則皆從王巡守鄭氏謂朝之歲四方趨四時而來或朝春或宗夏或覲秋或遇冬此其説可信至於貢祀物以至貢貨物其名與大宰之九貢同而其實則非也大宰以九貢致邦國之用歲貢之常也小行人之春入貢是已大行人之所謂六貢則因朝而貢者行人有小大而其貢有同異各分其職而已矣九州之外謂之蕃國世一見各以其所貴寶為摯經言九州之外謂之蕃國而鄭氏乃以夷服鎮服併列於九州之外非經之明文也且弼成五服至於五千乃舜之十二州禹治水成功别九州塗山之會執玉帛者萬國則亦九州之內五服在周則夷服鎮服以上是已若夫外薄四海咸建五長即周之所謂蕃服者當時雖不言所貢之遠物而其言五長則有職必有貢故也至周人始詳其制天子巡守止於六服而夷鎮二服在九州之內則其朝貢繼於要服之後九州外之蕃國雖列於九服之末然世一見則不責以中國之禮各以其所貴寶為摯則不強以中國之物如武王克殷而西旅貢獒肅慎氏貢其楛矢以其所貴寶為摯也故明堂位朝諸侯於明堂而四夷皆在四門之外以成王之嗣位也世一見明矣併列夷鎮二服豈所以待九州之諸侯耶王之所以撫邦國諸侯者歲遍存三歲遍俯五歲遍省七歲屬象胥諭言語協辭命九歲屬瞽史諭書名聽聲音十有一歲達瑞節同度量成牢禮同數器修法則十有二歲王巡守殷國撫諸侯而言邦國諸侯者非獨厚其君也凡先王所以建君公后辟上以蕃王室下以輯百姓而已使其於百姓而不能推其德意於王室而不能守其政刑雖曰撫之非所以撫之也王制曰天子巡守命典禮考時定日同律禮樂制度衣服正之山川神祗有不舉者為不敬不敬者君削以地宗廟有不順者為不孝不孝者君絀以爵變禮易樂者為不從不從者君流革制度衣服者為畔畔者君討有功德於民者加地進律然不徒舉是禮而已始焉存之俯之省之終焉瑞節度量不差其制數器法則不失其守使其一德以尊天子則其為撫諸侯也大矣存俯省鄭氏以謂王使臣於諸侯之禮所謂間問是也歲存則問而存之三歲遍俯則問而視之五歲遍省則巡而察之七歲屬象胥諭言語則通五方之言語協辭命則合九等之辭命皆象胥之職也九歲屬瞽史諭書名則達六書之文聽聲音則察五言之和皆瞽史之職也至十有一歲然後為之察諸侯之政刑瑞節用於小行人之官從而達之牢禮主於掌客之官從而成之法則正於匡人之官從而修之度量數器一於合方氏之官從而同之凡此皆所以待王之巡守也至於十有二歲天子於是行巡守之禮諸侯各朝於方嶽之下天子謂之巡守則巡所守也諸侯謂之述職則述所職也雖有省耕省斂之政而亦不無流連荒亡之戒以至加地進律與夫削地絀爵之類皆以次而舉此乃所謂無非事者若王不巡守則行殷國之禮會諸侯於國之外亦如巡守之事此皆所以撫邦國諸侯者也凡諸侯之王事辨其位正其等協其禮賔而見之王事謂諸侯朝王之事辨其位謂九十七十五十步之位正其等謂尊卑之等如冕服旗斿二車之類協其禮謂牢禮饗燕積膳之禮賔謂以賔禮見之也若有大喪則詔相諸侯之禮諸侯為天子服斬衰其喪禮皆有法故也若有四方之大事則受其幣聽其辭四方之大事鄭氏謂國有兵寇諸侯來告急者禮動不虛皆有贄幣以崇敬也受之以其事入告王也其説誠當文二年秦伯使乞術聘魯且言將伐晉襄仲辭玉客曰不腆幣器不足辭也致諸執事以為瑞節此用幣以告用兵之證諸侯相告如此而況告於天子者乎然小行人之官乃以此待小客蓋小客不交擯受其幣而聽其辭宜也此言大事則非小客不交擯之比鄭氏乃引聘禮曰若有言則束帛如享所謂有言者蓋因聘而有所請於王言則天子聽之束帛則天子受之非大行人所得而與若援此以證必如享禮則緩不及事失先王之意夫兵寇而有請若解倒懸然豈可以常禮拘大行人受其幣而聽其辭為諸侯之告急者設也凡諸侯之邦交歲相問也殷相聘也世相朝也聘義云天子制諸侯比年一小聘三年一大聘是以諸侯自相聘為文則此經所謂諸侯之邦交者也其言比年一小聘則合於經之歲相問其言三年一大聘則異於經之殷相聘蓋殷聘者謂久無事則行盛禮也初無年歲之限如昭九年孟僖子如齊殷聘禮也服氏以為殷中也蓋自襄之二年叔老聘於齊至此殆二十一年故中行盛禮是知殷為大聘即非所謂三年也當以此為正若夫世相朝者蓋諸侯即位講好結信謀事補缺則有相朝之禮惟繼世者行之成八年公如晉朝嗣君也襄三年公如晉始朝也此雖以小朝大猶足以見諸侯世相朝之義若王制所謂五年一朝者雖以諸侯朝天子為文鄭氏釋之則曰晉文霸時所制蓋得於春秋昭三年傳鄭子太叔之説是知晉文五年一朝之制已不知有天子之禮如叔向所言間朝以講禮謂相朝於間一歲之近則後世之繼霸者又欲求加於晉文始霸之制當時諸侯亦甘心以天子之禮事之鄭子大叔既以為五歲一朝左氏之傳春秋亦以為諸侯再相朝以修王命古之制也以此為古制宜其習見霸者之僭禮而不知大行人所掌邦交之禮諸侯亦惡其害已而皆去其籍成周典禮至是不復存矣小行人掌邦國賔客之禮籍以待四方之使者成周以九儀辨諸侯之命等諸臣之爵名位有上下之等儀文有隆殺之節小行人皆記之以籍此所以掌邦國賔客之禮籍蓋其籍有在王官者有在諸侯者周稱籍談曰昔而髙祖孫伯黶司晉之典籍以為大政故曰籍氏諸侯自為籍如此則掌之王官者為可知小行人使適四方協九儀賔客之禮蓋以王官所掌之籍而合諸侯所記之籍故曰協大行人以此待大賔大客小行人以此待四方使者職之相承如此令諸侯春入貢秋獻功王親受之各以其國之籍禮之小行人掌禮籍以待四方使者蓋以别大行人之親諸侯也然自春入貢以下則皆待諸侯之事令云者以天子之命令之也令諸侯春入貢乃每歲之常貢即大宰之九貢是已必使春入之者以邦國所貢出稅於民經冬至春乃可貢於王故必因大行人所謂春朝圖事而入之圖事於春必獻功於秋大行人又於秋覲而比邦國之功所謂令者如此當是時也諸侯述職親執壤奠王者重其事則為之親受其禮各以其國之籍禮之者是又以邦國所記之籍協王官所記之籍而以待之也凡諸侯入王則逆勞于畿及郊勞視館將幣為承而擯凡諸侯入王謂入而朝王逆勞于畿使小行人往小行人之明文也惟郊勞無所見賈氏謂王使勞賔于郊者為大行人雖經無明文可以類推覲禮賔至於郊王使人皮辨用璧勞鄭氏以為近郊重其禮也使人即王人也據賈氏近郊使大行人則遠郊亦使大行人歟蓋大行人勞于郊則小行人勞于畿小行人至郊勞之時又先為之視館蓋賔國天子館之前朝前朝者庫門外之朝右九棘之位也及廟中將幣三享則為承擯擯與相一也出接賔曰擯入詔禮曰相出入異辭也小行人既為承擯矣而肆師又曰大朝覲佐儐此為大朝覲設若常朝覲則小行人為承擯而已此所以不同凡四方之使者大客則擯小客則受其幣而聽其辭大客謂諸侯之使者也凡時聘殷俯皆於廟中行享禮擯而見之與諸侯同但旅擯不交擯耳交擯者傳辭於末擯示不敢與天子抗乃諸侯之禮若旅擯王使人與之言其享禮皆有圭璋受幣聽辭天子也非行人也若小客則蕃國使者不可直達于天子故小行人為之受其幣聽其辭使適四方協九儀賔客之禮朝覲宗遇會同君之禮也存俯省聘問臣之禮也賔謂命者五客謂爵者四邦國不一則九儀不可以不協小行人使適四方先協而同之使知朝覲宗遇會同為君之禮存俯省聘問為臣之禮習之有素行之有常一旦以賔客而入見於王朝則名位嚴而儀物稱典禮舉矣達天下之六節山國用虎節土國用人節澤國用龍節皆以金為之道路用旌節門關用符節都鄙用管節皆以竹為之掌節之守邦節與行人達天下之節蓋聯事而通治也然小行人有管節而無玉節角節璽節者何也以其掌適四方之事非正掌天下之節但因以達六節而已邦國都鄙之節掌節授之門市國貨之通掌節聯之非行人之所達也此所以不言玉節角節璽節歟惟龍虎人之三節則用之於內外之使臣旌符管之三節則用之於王國及侯國小行人之所達達此而已然行人於都鄙用管節而掌節言守都鄙用角節蓋所守所用之不同故也成六瑞王用瑱圭公用桓圭侯用信圭伯用躬圭子用穀璧男用蒲璧大宗伯於六瑞言執執之以為守者也此六瑞所以掌邦國小行人無與乎等邦國之事因其使適四方則成其六瑞而已故不言執而言用所謂用六瑞者言其為上下之所通用茍王朝用之而邦國異焉則無以驗乎下邦國用之而王朝異焉則無以合乎上惟小行人為之掌成於內外是以尊卑有定用名分正而禮法嚴故謂之成成與大行人所言成牢禮同義合六幣圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼此六物者以和諸侯之好故合配也取兩兩相配之義六幣而必配以六器之玉者玉所以象德也幣所以行禮也兩兩相配皆有義存焉何以言之圭用於東方者也有始事之義而馬為天駟為辰次之始亦東方之象故合圭以馬璋用於南方者也有致飾之義而皮用虎豹有自然之飾亦南方之象故合璋以皮璧用於天者也而天事尚質帛為純素之物亦以質為尚故合璧以帛琮用於地者也而地事尚文錦為華麗之制亦以文為貴故合琮以錦琥用於西方者也象乎物之成五采備謂之繡則有物成之象故合琥以繡璜用於北方者也象乎事之斷白與黑謂之黼有致斷之義故合璜以黼馬皮帛錦繡黼則行禮之幣圭璋璧琮琥璜則比德之玉故有是君德享以如是之玉必合以如是之幣使其往來交際皆有一定之禮故曰以和諸侯之好故大宰之幣貢釋者曰玉幣皮馬也則幣之為用廣矣此小行人之合六幣鄭氏乃云二王後尊享用圭璋而特之其於諸侯亦用璧琮耳子男於諸侯則享用琥璜未必然也彼見玉人之事曰璧琮九寸諸侯以享天子言九寸則上公之禮上公是璧琮則圭璋是二王後特之者惟有皮馬無束帛可加故云特其諸侯亦用璧琮者又見玉人之事曰瑑琮八寸諸侯享夫人明享君用璧亦八寸是下享天子一寸如是明二王後相見不可同於天子用圭璋則用璧琮可知言是兩公自相朝二王後稱公是於諸侯還同二王後可知云子男於諸侯享用琥璜者覲禮子男已入侯氏用璧琮則子男自相享退用琥璜可知此鄭氏以意推之豈盡合乎成周之制今考小行人之職不過曰合六幣而已璧琮琥璜則施之於帛錦繡黼也圭以馬璋以皮則皮馬不上堂故圭璋言特記曰圭璋特達德也又曰束帛加璧往德也以至琮之於錦琥之於繡璜之於黼亦莫不然如必二王之後用圭璋諸侯相朝用璧琮則典瑞言瑑圭璋璧琮繅皆二采再就以俯聘則諸侯固得而通用之矣如又曰子男於諸侯享用琥璜則聘享之禮未有專言琥璜者惟禮器曰琥璜爵則又非子男所得專用以為享者也要之合六幣之説即庭實之事諸侯用之以享天子亦用之以自相享之禮聘以爵命為之隆殺則不可知以典瑞及玉人無明文不可臆説若國札喪則令賻補之若國凶荒則令賙委之若國師役則令稿禬之若國有福事則令慶賀之若國有禍災則令哀吊之凡此五物者治其事故此經繼於合六幣之後正為此五物者説也方其無事小行人為之使適乎四方邦國以和諸侯之好故及其有禍福之事則令諸侯講信修睦而同其憂樂之情若國札喪則令賻補之謂資之以財即凶禮所謂喪禮哀死亡者也若國凶荒則令賙委之謂助之以粟即凶禮之荒禮哀凶札者也若國師役則令稿禬之謂加之以燕勞即凶禮之恤禮哀寇亂者也若國有福事則令慶賀之謂申之以贊美即嘉禮之賀慶親異姓者也若國有禍災則令哀吊之謂致之憫恤即凶禮之弔禮哀禍災者也是五物者雖禍福憂樂不同而皆謂之事故此以邦令行之而以王官治之及其萬民之利害為一書其禮俗政事教治刑禁之逆順為一書其悖逆暴亂作慝猶犯令者為一書其札喪凶荒厄貧為一書其康樂和親安平為一書凡此五物者每國辨異之以反命于王以周知天下之故上經以其五物治其事故謂其事皆有故也從其故而治之則五者之事無不舉此特言周知天下之故則非若上五物之有事可治也從其本焉者治之而已蓋此經所謂五物者以萬民為本故先言萬民及萬民之利害為一書則害可革而利可興是欲以治天下之大利也其禮俗政事教治刑禁之逆順為一書則逆禁而順可導是欲以成天下之大順也惟欲成天下之大順故悖逆暴亂作慝猶犯令者為可革矣以此為書是乃禁其逆而導其順者也惟欲致天下之大利故其札喪凶荒厄貧為可恤矣以此為書是乃除其害而興其利者也夫如是則康樂和親安平之效可坐而致故終之以康樂和親安平為一書此五物者為故雖不同而其本皆在乎民然千里有不同之風百里有不同之俗而況邦國有封疆之限則其書烏可混雜而莫辨小行人於是每國辨異之以反命于王以周知天下之故則王者端本於上而順利可周於天下矣司儀掌九儀之賔客擯相之禮以詔儀容辭令揖讓之節九儀即大行人所掌之九儀辨諸侯五等之命則為大賔等諸臣四等之爵則為大客是九儀之禮非司儀之所掌也司儀所掌者特九儀賔客擯相之禮而已鄭氏謂出接賔曰擯入贊禮曰相蓋成周重賔容之禮大宗伯以卿為上相小行人以下大夫為承擯司儀以中士下士為末擯若大朝覲則肆師亦以下大夫為佐擯且擯何以亦謂之相下經曰每門止一相及廟唯上相入是知相即擯也司儀為之詔其儀容辭令揖讓之節蓋所以相道賔客者特詳於末擯故司儀皆以禮詔之將合諸侯則令為壇三成宫旁一門詔王儀南鄉見諸侯土揖庶姓時揖異姓天揖同姓及其擯之各以其禮公於上等侯伯於中等子男於下等其將幣亦如之其禮亦如之王燕則諸侯毛將合諸侯謂時會以發四方之禁殷同以施天下之政則為壇於國門之外命諸侯以行其事此壇之所由作也其制三成為三尺發地一尺總為四尺覲禮所謂壇深四尺是已壝上為壇壇之上為宫每旁一門則為四門覲禮所謂宫方三百步四門是已所謂令為壇者非合諸侯之時而後令為之也天子帥諸侯拜日於東郊則為壇於國東禮日於南郊則為壇於國南禮山川丘陵於西郊則為壇於國西禮月四瀆於北郊則為壇於國北退加方明於壇上而祀焉亦謂之方明壇方明木也方四尺其玄黃青赤白黑之六者以象上下四方之位所以教尊尊也詔王儀南鄉見諸侯者謂王行祀方明之禮諸侯上介皆奉其君之旗置于宫乃詔王升壇南鄉而立諸侯皆就其旗而立諸公東階之前北面東上諸侯東階之東西面北上諸伯西階之西東面北上諸子門東北面東上諸男門西北面東上王揖之者定其位也揖之則以同姓異姓庶姓為主示其情也庶姓無親者也土揖則推手小下之異姓則婚姻之邦也時揖則平推手以向之同姓則兄弟之邦也天揖則推手小舉之情之所在其等差如此及其擯之者謂三揖既畢諸侯執玉而前見於王也擯之各以其禮則有上等中等下等之别覲禮所謂壇十有二尋每尋以八尺計之則為廣九十六尺堂上方二丈四尺以為王立與祀方明之所每等兩廂各丈二尺以為諸侯奠玉之所共九十六尺矣諸侯各以其等奠玉降拜升成拜明臣禮也明臣禮而公侯伯子男以爵言者示其分也公奠玉於上等降拜於中等侯伯奠玉於中等降拜於下等子男奠玉於下等降拜於地及升成拜皆於奠玉之處分之所在其等差如此然朝覲雖有壇而諸侯將幣及玉以酒禮之者在廟惟大會同之事則皆於壇之三等其將幣三享與夫王禮再裸而酢王禮一裸而酢王禮一裸不酢皆言亦如之者謂公於上等侯伯於中等子男於下等亦如擯之之禮此言因大會同而就壇行饗禮者也左氏曰饗終乃燕則繼之以在寢之燕可知矣燕以示慈惠則諸侯之毛者為主二毛曰老故曰燕毛言毛則親踈之以姓言者不必論也尊卑之以爵言者亦不必論也以毛為尚而已中庸曰宗廟之禮所以序昭穆也序爵所以辨貴賤也燕毛所以序齒也序昭穆親親也辨貴賤貴貴也燕毛序齒老老也一舉而三善備焉合諸侯之謂矣十二歲王巡守合諸侯於方嶽之下者倣此凡諸公相為賔主國五積三問皆三辭拜受皆旅擯再勞三辭三揖登拜受拜送主君郊勞交擯三辭車逆拜辱三揖三辭拜受車送三還再拜致館亦如之致餐如致積之禮及將幣交擯三辭車逆拜辱賔車進答拜三揖三讓每門止一相及廟唯上相入賔三揖三讓登再拜授幣賔拜送幣每事如初賔亦如之及出車送三請三進再拜賔三還三辭告辟致饔餼還圭饗食致贈郊送皆如將幣之儀賔之拜禮拜饔餼拜饗食賔繼主君皆如主國之禮諸侯諸伯諸子諸男之相為賔也各以其禮相待也如諸公之儀諸公之臣相為國客則三積皆三辭拜受及大夫郊勞旅擯三辭拜辱三讓登聽命下拜登受賔使者如初之儀及退拜送致館如初之儀及將幣旅擯三辭拜逆客辟三揖每門止一相及廟唯君相入三讓客登拜客三辟授幣下出每事如初之儀及禮私面私獻皆再拜稽首君答拜出及中門之外問君客再拜對君拜客辟而對君問大夫客對君勞客客再拜稽首君答拜客趨辟致饔餼如勞之禮饗食還圭如將幣之儀君館客客辟介受命遂送客從拜辱于朝明日客拜禮賜遂行如入之積凡侯伯子男之臣以其國之爵相為客而相禮其儀亦如之凡四方之賔客禮儀辭命餼牢賜獻以二等從其爵而上下之凡賔客送逆同禮凡諸侯之交各稱其邦而為之幣以其幣為之禮諸公相為賔謂世相朝也賔之入境主君命卿以勞之曰主國主國五積三問者蓋賔所停止則有積所以備賔之用也間闊則有問所以致敬於賔也積問皆三辭者以其禮來於外示不敢當也拜受皆旅擯者擯而不傳旅而陳之示不敢輕也再勞亦主君命卿勞於遠郊者其三辭拜受同於積問皆所以尊而敬之也然積問受之於庭故不言登再勞必有幣下拜於堂而登受之故曰三揖登拜受所謂拜送則賔送使者亦拜之重主君之命也然以遣卿再勞為未足主君又躬行郊勞之禮則其勤至矣交擯者謂賔與主君在道皆不為主不陳五擯各陳九介以傳辭也蓋近郊有館賔在內主君至館大門外主君北面而陳此九介去門九十步東面賔在大門內於門外之東亦陳九介西面三辭者以主君郊勞之禮故耳車逆拜辱者傳辭既畢賔乘車出大門迎主君以拜主君之辱三揖者入門與當曲當碑為三揖三辭者辭讓升堂然後拜而受之也車送者謂主君之去賔又出車以送之主君三還辭之然後賔再拜送之也致館亦如之者主君郊勞之後賔始至國主國使大夫授館而後君親致於賔其交擯三辭車逆拜辱以至車送三還再拜亦如郊勞之禮也致飱如致積之禮者始入境則有積始入館則有飱飱小禮也故如致積之禮三辭拜受旅賔而已將幣謂賔至館之後後日始行朝禮交擯三辭車逆拜辱賔車進答拜者此並在大門之外賔去門九十步而陳九介主君在大門之東陳五擯上擯入受命出請事傳辭與承擯承擯傳與末擯末擯傳與末介末介傳與承介承介傳與上介上介傳與賔賔又傳與上介上介傳與承介承介傳與末介末介傳與末擯末擯傳與承擯承擯傳與上擯上擯入告君如是者三謂之交擯三辭車逆拜辱者傳辭既畢主君乘車出大門迎賔以拜賔之辱亦如賔拜郊勞之禮賔車進答拜者進而答主君之拜也三揖者主君遙揖賔使前北面三讓入大門也云每門止一相者既入門則東至祖廟諸侯五廟則五門五相及廟唯上相入即上擯上介須詔禮故也三揖者亦謂入門揖當曲揖當碑揖也三讓登者謂至階之時主君讓賔賔讓主君如是者三則主君先登也再拜授幣者謂主君既登以幣享之主君再拜受之不曰受而曰授者主君於賔授幣則再拜受之也賔拜送幣者退向西階上北面拜送幣乃降也每事如初者謂享及有言也賔亦如之謂以鬱鬯禮賔也其儀容辭令揖讓之節皆如將幣之禮及賔出主君車送三請三進請賔就車也主君一請一進賔亦一還一辭故曰三還三辭則已避去也故終之以告避也熟食謂之饔生物謂之餼還圭則主君還圭於賔饗以飲為主食以食為主致贈謂賔去而贈以賄也郊送謂主君送賔復至於近郊也此七者唯饗食速賔而餘皆主君親往焉故其儀皆如將幣之儀賔之拜禮者謂饔餼饗食皆禮之重者故拜焉就朝而拜之也賔繼主君皆如主國之禮者鄭氏謂復主人之禮費而不知主國之禮何禮也豈有往來交際而復其禮費如市道之交者耶蓋主君使卿勞賔于境必為致幣故有拜受之禮其致幣雖無明文以覲禮考之賔至于郊王使人皮辨用璧勞此天子勞賔之禮則知諸侯勞賔亦以幣此所謂主國之禮蓋先王制禮有施必有報而施報有輕重之辨惟其有施有報此賔所以有繼主君之禮惟其施報之欲稱此賔之報不如主君之禮特如主國之禮而已以至侯伯子男命數不同其儀則一故曰各以其禮相待也如諸公之儀凡行人之儀不朝不夕不正其主面亦不背客此謂行人之與乎傳辭贊禮者故曰凡行人之儀日出為朝朝東也日入為夕夕西也記所謂為朝夕必因日月是已蓋主出自內而位乎北賔至自外而位乎南而東西在乎賔主之間今行人之儀不朝以東嚮不夕以西嚮不正其主面而南嚮亦不背客而北嚮蓋居賔主之間得以兩嚮之隨寓擯相其勢然也行夫掌邦國傳遽之小事媺惡而無禮者凡其使也必以旌節雖道有難而不時必達居於其國則掌行人之勞辱事焉使則介之

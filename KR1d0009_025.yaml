body:
  text: 周官總義卷二十五宋易袚撰環人掌送逆邦國之通賓客以路節達諸四方舍則授館令聚柝有任器則令環之凡門關無幾送逆及疆此環人與夏官環人其義不同夏官環人掌致師乃致師之簭此則送逆賔客四面而環之者也所謂送逆邦國之通賔客者以邦國賔客取道往來環人則以路節逹諸四方路節即旌節之用於道路者其實一而已舍則授館者非行人致館之比謂其取道往來則以國野之館授之即遺人所謂五十里有市市有候館是已又令野廬氏以守涂地之人為之聚􅝵者所以見出入之有所守有任器則令環之者守其所須之物亦所以為非常之備凡門關無幾送逆及疆者是雖賔客取道往來於王國環人亦為之逹諸路且使人之各得其所王者之政也象胥掌蠻夷閩貉戎狄之國使掌傳王之言而諭說焉以和親之若以時入賔則協其禮與其辭言傳之凡其出入送逆之禮節幣帛辭令而賔相之凡國之大喪詔相國客之禮儀而正其位凡軍旅㑹同受國客幣而賔禮之象胥掌四夷之言者也東方曰寄南方曰象西方曰狄鞮北方曰譯周興王業惟南方先服故特以象名官而胥則取其才智焉先王設象胥之官既使之譯四方之言則蕃國使者之來乃傳王之言而諭說焉以和親之若蕃國之君以時入賔而行世一見之禮則其所習雖不同乎中國象胥則以中國之儀而協其禮與其辭言傳之雖不能變其聲音亦可以通其事之意然後譯其辭而言之於上也凡其出入送逆之禮節幣帛辭令而賔相之者皆象胥所以擯相蕃國之事若遇國之大喪則詔相國客之禮儀而正其位若遇軍旅㑹同則受其幣而賔禮之蓋先王不鄙夷其人既設象胥以待之則亦示以中國之禮而已凡作事王之大事諸侯次事卿次事大夫次事上士下事庶子先王所以有事於四夷惟征伐為大事其次則有威讓之令文誥之辭而次事下事分焉凡邦國之諸侯內為扞屏外則敵王之愾故大事則諸侯之所作也若卿大夫士庶子則各以其尊卑而分任其事言庶子而不言中士下士則以所任者同耳掌客掌四方賔客之牢禮餼獻飲食之等數與其政治掌四方賔客而名官以掌客者賔亦可以謂之客也牢禮即凡用牢之禮餼謂餼九牢之類獻謂禽獻之類飲食謂饗燕膳食之類凡其等數與其政治皆所以序下文也鄭氏以邦新殺禮釋之未之盡矣王合諸侯而饗禮則具十有二牢庶具百物備諸侯長十有再獻傳曰制禮上物不過十二天之大數也故王者以十二為節不可以有加焉今王之饗諸侯衆則十有二牢長則十有二獻鄭氏遂以為用王禮之數者以公侯伯子男盡在是兼饗之莫敵用也謂之兼饗莫敵用可也謂用王禮之數不可也牢具十有二而莫適所主獻至十有二而少異於衆則其禮蓋有品節之矣王巡狩殷國則國君膳以牲犢令百官百牲皆具從者三公視上公之禮卿視侯伯之禮大夫視子男之禮士視諸侯之卿禮庶子一眂其大夫之禮上經言王合諸侯而饗禮此遂言王巡守殷國國君膳以牲犢令百官百牲皆具若所以明施報之義然君臣不可以施報言也盡其禮之實而已然禮之所在有以少為貴者有以多為貴者國君膳王以牲犢則以少為貴者舉天下之物不足以為吾君之報惟牲用繭栗乃事天之禮是以事天之禮事其君也百官百牲皆具此以多為貴者不特百牲皆具而公卿大夫士庶子皆加於王朝一等是厚其禮以待其臣者乃所以尊吾君也記曰禮之以多為貴者以其外心也禮之以少為貴者以其內心也內盡其心以事其君外盡其物以待其臣各盡其道而已矣凡諸侯之禮上公五積皆視餐牽三問皆修羣介行人宰史皆有牢餐五牢食四十簠十豆四十鉶四十有二壺四十鼎簋十有二牲三十有六皆陳饔餼九牢其死牢如餐之陳牽四牢米百有二十筥醯醢百有二十罋車皆陳車米視生牢牢十車車秉有五籔車禾視死牢牢十車車三秅芻薪倍禾皆陳乘禽日九十雙殷膳大牢以及歸三饗三食三燕若弗酌則以幣致之凡介行人宰史皆有餐饔餼以其爵等為之牢禮之陳數唯上介有禽獻夫人致禮八壺八豆八籩膳大牢致饗大牢食大牢卿皆見以羔膳大牢侯伯四積皆視餐牽再問皆修餐四牢食三十有二簠八豆三十有二鉶二十有八壺三十有二鼎簋十有二腥二十有七皆陳饔餼七牢其死牢如餐之陳牽三牢米百筥醯醢百罋皆陳米三十車禾四十車芻薪倍禾皆陳乘禽日七十雙殷膳大牢三饗再食再燕凡介行人宰史皆有餐饔餼以其爵等為之禮唯上介有禽獻夫人致禮八壺八豆八籩膳大牢致饗大牢卿皆見以羔膳特牛子男三積皆視餐牽一問以修餐三牢食二十有四簠六豆二十有四鉶十有八壺二十有四鼎簋十有二牲十有八皆陳饔餼五牢其死牢如餐之陳牽二牢米八十筥醯醢八十罋皆陳米二十車禾三十車芻薪倍禾皆陳乘禽日五十雙一饗一食一燕凡介行人宰史皆有餐饔餼以其爵等為之禮唯上介有禽獻夫人致禮六壺六豆六籩膳視致饗親見卿皆膳特牛凡諸侯之禮即所掌牢禮餼獻飲食之等數是也上公五積侯伯四積子男三積皆視飱牽者蓋上公飱五牢侯伯飱四牢子男飱三牢謂至館有飱入境有積其積皆視餐牽則生致之而不殺明致積亦有牢禮視則視其數而已上公三問皆修侯伯再問皆修子男一問以修於其始至而問間濶則有修焉修則脯之加薑桂者也然其賔之問皆修而其羣介行人之問則有牢君用修臣用牢鄭氏以為非禮然禮有損而益者有益而損者有豐大禮而殺小禮者有豐小禮而殺大禮者初未可以此為輕重至於侯伯子男則不言臣用牢者以上公之禮為特優也至於館則有飱禮上公五牢侯伯四牢子男三牢司儀所謂致飱如致積之禮是已食謂庶羞之食陳於楹外東西共四列上公之列數以十侯伯之列數以八子男之列數以六簠所以盛稻粱也公堂上六東西夾各二故其為簠十侯伯堂上四東西夾各二故其為簠八子男堂上二東西夾各二故其為簠六豆𦵔醢器也公堂上十六東西夾各十二故其為豆四十侯伯堂上十二東西夾各十故其為豆三十有二子男堂上十二東西夾各六故其為豆二十有四禮器言天子之豆二十有六諸公十有六諸侯十有二則言堂上之數而已壺所以盛酒其設於堂上及夾者亦如豆之數也鉶羮器也有鉶鼎有鉶羮所謂膷臐膮也亦所謂藿苦薇也羮熟於鼎而載之器凡飪一牢則正鼎九陪鼎三陪鼎即鉶羮之鼎也正鼎即牛羊豕魚臘腸胃倫膚與夫鮮魚鮮臘之鼎也其數凡十有二既言有鼎十二又言上公鉶四十有二侯伯鉶二十有八子男鉶十有八則鉶為鉶羮之器而已非鼎也鼎牲器也簋黍稷器也公侯伯子男皆十有二而無所降殺者以牲與黍稷俱為食之主然鼎爼竒而籩豆偶故正鼎九陪鼎三皆設於西階之前簋堂上八東西夾各二夫簋盛黍稷皆十有二而簠盛稻粱乃降殺以兩者稻粱貴者所食而黍稷為上下通用之物此鼎簋所以同乎十二也腥即牲之腥者也腥謂鮮魚鮮臘之鼎牲謂牛羊豕魚臘腸胃倫膚之鼎或言牲或言腥互見也此與上文之正鼎九者何别蓋上文之正鼎每鼎飪一牢飱五牢則飪一牢而腥四牢飱四牢則飪一牢而腥三牢飱三牢則飪一牢而腥二牢其數又以九為降殺上公牲四牢則凡三十六侯伯牲三牢則凡二十七子男牲二牢則凡十有八此正鼎陪鼎皆十有二而腥之鼎則降殺以九蓋牽牲無鉶鼎腥牲亦無鉶鼎此飪腥之鼎所以不同其數也自此以上皆為飱禮其言饔餼以下則皆饔餼之禮矣饔餼公九牢則其五為死牢侯伯七牢則其四為死牢子男五牢則其三為死牢故曰其死牢如飱之陳陳者皆陳於門西如積或死或牽而皆曰饔餼者蓋餼之為義有二按聘禮云主國使卿歸饔餼五牢飪一牢腥二牢餼二牢此則餼為生矣故鄭氏謂生曰餼僖三十三年鄭皇武子曰惟是餼牽竭矣則此餼為腥矣故服氏謂腥曰餼是知致積致飱致膳等皆用牢而餼得為牢禮者豈非此乎此死牢牽牢之所以異也米有載之於筥者半斛曰筥上公百有二十筥其為米六十斛侯伯百筥其為米五十斛子男八十筥其為米四十斛其設在於庭中醯榖陽也醢肉隂也其數亦以二十為降殺故上公百有二十罋侯伯百罋子男八十罋車皆陳以車乘罋而陳之也醯陳於碑東醢陳於碑西既陳則不復用車矣故侯伯子男皆言陳而不言車也上公言車米視生牢牢十車車秉有五籔車禾視死牢牢十車車三秅芻薪倍禾皆陳者車米則載米於車者也牽四牢四牢分為四列然則牢十車米凡四十車也十六斗曰籔十籔曰秉車秉有五籔為十五籔是二十四斛也車禾則載禾於車者也禾藁實并刈者也車禾視死牢夫死牢如飱之數上公飱五牢牢十車則車禾凡五十車也四秉曰筥十筥曰稯十稯曰秅每車三秅則三十稯也芻薪倍禾皆陳則百車也皆陳謂皆陳於門外也米在門東禾在門西芻薪雖取數於禾而薪從米芻從禾也侯伯米三十車禾四十車芻薪倍禾皆陳子男米二十車禾三十車芻薪倍禾皆陳則又降殺之序也自此以上皆饔禮至於所陳則又有可言者食也簠也豆也鉶也壺也皆陳於堂上及兩夾簋亦陳於堂上而與鼎並者並其數也非並陳也鼎也腥也陳於阼階之前死牢也牽牢也陳於門之西車米也車禾也芻薪也陳於門之外醯也醢也陳於碑之東西掌客言饔餼之皆陳者二筥米與醯醢並者以其皆在門內也米禾之車與死牢生牢兼者以其皆在門外也言飱之皆陳者一而鼎也腥也同於簠簋豆鉶之列者雖同其列而簠簋豆鉶乃堂上之器鼎與腥乃堂下之器也乘禽謂乘行羣處之禽如雉鴈之屬上公日九十雙侯伯日七十雙子男日五十雙此中膳之禮也殷中也謂於中又以大牢膳賔不忘賔也上公侯伯皆言膳大牢而子男不言皆止於乘禽耳蓋賔客之道以十日為正行禮一旬之後有故未去則有致稍歸禽之禮漿人所謂共賔客之稍禮是已但上公言以及歸而侯伯子男不言者間或略之耳上公三饗三食三燕侯伯三饗再食再燕子男一饗一食一燕隆殺之節也若弗酌則以幣致之者謂君或有故不親饗食燕之禮則饗有酬幣食有侑幣不饗則以酬幣致之不食則以侑幣致之所以見將意而致敬者不可廢也上公羣介行人宰史獨有牢公及侯伯子男之羣介行人宰史皆有飱饔餼而上介亦有禽獻此禮賓之介從也按聘禮上介與賔同是以大夫餼賔云上賔上介皆大牢米八筐衆介皆少牢米六筐但上賔有芻禾而上介無芻禾耳此五等之上介皆有禽獻也但凡介行人宰史皆有飱饔餼以其爵等為之牢禮者五等諸侯其爵有五而其命有三故待諸侯從其命諸侯之臣其命有五而其爵有三故待諸臣從其爵此凡介行人宰史之禮異也上公侯伯八壺八豆八籩子男六壺六豆六籩籩豆陳於戶東壺陳於東序此夫人助君養賢之禮如內宰所謂致后之賔客之禮是已然上公與侯伯同者抑以夫人之於上公有膳有饗有食而侯伯則無食禮矣子男則膳視致饗是不復親饗矣上公卿皆見以羔膳大牢侯伯卿皆見以羔膳特牛子男親見卿皆膳特牛卿皆見者見於賔也以羔則以其所贄見焉子男獨言親見卿者以王之卿六命而子男五命故以親見卿為文言親見則有時乎不親若卿有故則不造館見賔惟親見以羔乃致膳焉此所以少異於上公侯伯之禮然皆卿所以助養賔者也或用大牢或用特牛亦禮之降殺故耳凡諸侯之卿大夫士為國客則如其介之禮以待之古者坐賔於西北位介於西南所以尊賔卑介也賔之尊以其敵主介之卑以其副賔此上經所謂凡介皆有牢皆有飱饔餼以其爵等為之牢禮之陳數宜也若夫諸侯之卿大夫士以聘問而自為國客則非介也具賔之體者也具賔之體則疑於賔矣乃如介之禮以待之者何耶尊者之道為正為大卑者之道為副為小諸侯之卿大夫士臣也以為介者分之所當然以為國客者亦分之所當然以其爵等為之牢禮之陳數則知先王待賔客之禮固有常制耳凡禮賔客國新殺禮凶荒殺禮札喪殺禮禍烖殺禮在野在外殺禮禮者合於天時宜於地財當於人心者也乃若求之天而不得於時求之地而不足於財求之人而不當於心則殺焉可也國新謂新建國者凶荒謂無年者禍烖謂兵冦者在野在外謂非方嶽及國門之外者以王禮言之大荒大札天地有烖王皆為之不舉所以為內省自疚之道至矣於是數者而殺禮抑以其自處者而待賔客耶凡賔客死致禮以喪用賔客有喪惟芻稍之受遭主國之喪不受饗食受牲禮賔客禮之常者也死喪禮之變者也凡賔客死則致禮以喪用有君及父母之喪則惟芻稍之受遭主國之喪則惟受牲禮而饗食皆廢此禮之變者也亦裁之以常禮而已矣掌訝掌邦國之等籍以待賔客若將有國賔客至則戒官修委積與士逆賔於疆為前驅而入及宿則令聚柝及委則致積至于國賔入館次于舍門外待事于客及將幣為前驅至于朝詔其位入復及退亦如之凡賔客之治令訝訝治之凡從者出則使人道之及歸送亦如之上經有訝士以訝四方之獄訟為主故曰士此以掌四方之賔客為主故曰掌訝掌訝掌邦國之等籍者非小行人所謂掌邦國賔客之禮籍乃九儀差數之籍也所以迓賔客者必以此籍之差數而為之節若將有國賔客至則戒官修委積者若牛人共積牛羊人共積羊倉人共道路之榖積委人共委積之芻薪則掌訝先以其籍而戒之既戒之矣然後與士逆賔於疆為前驅而入士謂訝士也以訝士與行人送逆賔客入於國則為之前驅而辟故也及宿則令聚柝謂令野廬氏以野廬氏若有賔客則令涂地之人聚柝故也及委則致積以王命致之於館也至於國賔入館次於舍門外待事於客謂待賔客之有所求也及將幣為前驅則導之以至於朝也至於朝詔其位入復及退亦如之者謂入詔其位而復故位及退亦詔其位也凡賔客之治令訝訝治之治謂理其事也以告掌訝訝為如朝理之也凡從者出則使人道之使其屬道之也及歸送亦如之謂逆至於疆則送亦至於疆也且掌訝雖與訝士同於送逆然訝士與行人送逆不及疆至於野而已訝士不前驅及野與國則前驅以辟而已訝士不道從者之出入道客之出入而已蓋訝士訝獄訟而掌訝訝賔客此詳略所以不同歟凡賔客諸侯有卿訝卿有大夫訝大夫有士訝士皆有訝掌訝以中士八人為之而此言諸侯有卿訝卿有大夫訝則非掌訝之所謂訝也鄭氏謂朝覲聘問之日王所使迎賔客於館之訝蓋按聘禮云卿訝卿大夫訝大夫士訝士賔即館訝掌公命此以諸侯之臣之為國客者言之若以敵天子之使則命數為不等矣以王之卿六命而上公九命侯伯七命故公侯伯為國賔而卿皆見以羔以卿訝之宜也至子男則親見卿以子男五命視王之卿則降一等矣至於王之大夫四命而公侯伯之卿則三命子男之卿則再命王之上士三命中士再命下士一命而公侯伯之大夫則再命子男之大夫則一命士皆有訝而子男之士則又有不命者矣先王之待諸侯之臣寧過於厚毋過於薄賈氏謂訝將舍於館之外宜相親也此其親諸侯之大者乎凡訝者賔客至而往詔相其事而掌其治令上經因訝賔客而及卿大夫即館之訝此復言掌訝之職凡言修委積以下皆所治之令也掌交掌以節與幣巡邦國之諸侯及其萬民之所聚者道王之德意志慮使咸知王之好惡辟行之使和諸侯之好逹萬民之說天地交而萬物通上下交而其志同交之為義大矣故先王設掌交一職而使之交通乎上下節所以為信行道必有節故也幣所以為禮相見必有幣故也諸侯則據所以守邦國者而言萬民之所聚則據都家縣邑之類而言是知掌交所巡必及其民非止邦國之諸侯而已道王之德意志慮使咸知王之好惡辟行之固也然天下之無公好惡久矣益之戒舜曰罔違道以干百姓之譽罔咈百姓以從已之欲此君臣警戒無虞之所當先者所欲與之聚所惡勿施爾宜三代之所以興也今也王之志慮出於王之德意則所謂德者乃平康正直之德故曰無有作好遵王之道無有作惡遵王之路惟遵王之道則所謂豫攸好德以至於哲謀肅乂乃天下之同好非作好也惟遵王之路則所謂淫朋比德以至於狂僭豫急乃天下之同惡非作惡也使天下咸知王之好惡而辟行之則時人斯其惟皇之極矣其或不協於極不罹於咎者又有皇極之君從而受之掌交之官從而和諸侯之好使之蕃王室逹萬民之說使之正王面邦國上下交通無間此所以為皇極之世也掌邦國之通事而結其交好以諭九稅之利九禮之親九牧之維九禁之難九戎之威通事謂朝覲聘問之事也結其交好則結其交通之好有以結其交好而後可以王制諭之九稅九職之稅方其裂土而封固已使之得征其民今又諭之以稅之利則使之不殖於利者也九禮九儀之禮方其列爵以等固已使之各守其爵今又諭之以九禮之親則使之不乖其親者也九牧九州之牧大宰於施典之際固已建其牧而使其大小之相維今又諭之以九牧之維所以使之知所聽命者也九禁九法之禁九戎九伐之戎大司馬掌九法以平邦國九伐以正邦國固已示之於平時之素今又諭之以九禁之難九伐之威尤所以使之知所警畏者也是五者皆王政之大若非掌交之所能諭惟掌交時有以申敕之而命令之嚴實行乎其間是豈徒咸其輔滕口說也哉掌察闕掌貨賄闕朝大夫掌都家之國治日朝以聽國事故以告其君長國有政令則令其朝大夫凡都家之治於國者必因其朝大夫然後聽之唯大事弗因凡都家之治有不及者則誅其朝大夫在軍旅則誅其有司周官以八則治都鄙蓋使之有所揆焉非特頒其常而已故凡祭祀賔客之禮與夫衣服宫室車旗之禁令則主之有都家之宗人士庶子衆庶之守及其車馬兵甲之戒令則主之有都家之司馬皆王官得以兼治之矣其在刑則為尤詳既有方士以聽其獄訟之辭而又為之立朝大夫之職凡彼有所治此有所令朝大夫則上下逹之而已掌都家之國治即大宰所謂以八則待都鄙之治者也法雖出於大宰而其事則朝大夫掌焉日朝以聽國事故以告其君長國有政令則令其朝大夫因之以告都家之君若吏者也凡都家之治於國者必因其朝大夫惟朝大夫逹之而後聽之也唯大事弗因則冡宰聽之而已都家之治有不及者則朝大夫在所誅在軍旅則朝大夫弗預焉故誅其有司此都司馬家司馬之所責也都則闕大宰以八則治都鄙故設官以専其職謂之都則然言都則不及家則者考大宗伯九儀之命惟五命然後賜則王之大夫四命則未與賜則之數故采邑謂之家而不謂之都若卿以六命為小都公以八命為大都此所以置都則焉由是觀之八則通用於三等采地而以都為主其推行蓋有序矣都士闕家士闕鄭氏都家之士主治都家吏民之獄以告方士者也蓋方士掌都家聽其獄訟之辭辨其死刑之罪而要之三月而上獄訟於國又曰凡都家所上治則主之鄭蓋據此而云

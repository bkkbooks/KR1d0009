body:
  text: 周官總義卷十二宋易祓撰小宗伯之職掌建國之神位右社稷左宗廟兆五帝於四郊四望四類亦如之兆山川丘陵墳衍各因其方神位者别而言之則天神獨謂之神合而言之則人鬼地示皆神也何謂建國之神位雉門之外庫門之內右建社稷尊之也左建宗廟親之也右陰也地道尊右而社稷為地之道故右之人道尚左而宗廟為人之道故左之匠人營國亦云左祖右社言社則見稷言祖則見宗兆五帝於四郊則太昊位於東郊少昊位於西郊顓帝位於北郊黃帝炎帝同位於南郊如月令所言者是已兆即為壇之營域者也以至望於山川則凡嶽鎮川瀆之列於四方者謂之四望類于上帝則凡日月星辰之次於四方者謂之四類亦如之者辨四方陰陽之位也兆山川丘陵墳衍各因其方者謂因王畿之四方而為之辨其位亦如五帝四望四類之兆也言兆五帝而不言大神之位言山川丘陵墳衍而不言大示之位以圜丘方丘之禮不可以神位言爾掌五禮之禁令與其用等五禮吉凶軍賔嘉也皆有禁令與其用等用等即輕重隆殺之等見於九儀之命者是已用等辨而後禁之令之焉以吉禮言之三代命祭祀不越望淫祭無福逆祭有罰此其所禁也天子祭天地四方歲遍諸侯方祀歲遍大夫祭五祀歲遍此其所令也以賔禮言之變禮易樂為不從改制度衣服為畔此其所禁也朝覲宗遇㑹同為君之禮存俯省聘問為臣之禮此其所令也以軍禮言之非賜弓矢不得征非賜斧鉞不得殺此其所禁也大國三軍次國二軍小國一軍此其所令也以嘉禮言之繫之以姓而弗别綴之以食而弗殊百世婚姻不通此其所禁也男三十而娶女二十而嫁仲春為之㑹男女此其所令也以凶禮言之三年之喪自天子逹或短喪而期或朝祥而暮歌此其所禁也啜粥面深墨顔色之戚哭泣之哀此其所令也禁令之施於五禮者不一而足其大略如此先言禁令而後言用等用等待禁令而後辨云爾辨廟祧之昭穆王制天子之廟三昭三穆與太祖之廟而七此廟之昭穆也毁廟之主各遷於祧而祧亦有昭穆焉故為二祧蓋周自后稷以來不窋父為昭鞠子為穆至文王十四世而第稱穆武王十五世而第稱昭惟文武受命作周為百世不遷之宗及后稷遷邦啓土為一代之始祖特立廟不毁與四親廟為七廟七廟之外其餘先王先公之遷主各以昭穆藏於祧廟是宗廟迭有遷毁而其父昭子穆百世有所不可易餘見守祧義朱文公假諸侯之廟以明昭穆之義其大略曰周禮左宗廟則五廟皆當在公宫之東南同為都宫太祖之廟在北二世居昭之北廟三世居穆之北廟四世居昭之南廟五世居穆之南廟廟皆南向各有門堂室寢而牆宇四周焉惟太祖百世不遷自餘每一易世而一遷其遷之也新主祔於其班之南廟南廟之主遷於北廟北廟親盡則遷其主於太廟之西夾室而謂之祧凡廟主在本廟之室中皆東向及其祫於太廟之室中則惟太祖東向羣昭皆列於北牖下而南向羣穆皆列於南牖下而北向南向者取其向明故謂之昭北向者取其深逺故謂之穆曰六世之後二世之主既祧則三世為昭而四世為穆五世為昭而六世為穆乎曰不然昭常居昭穆常居穆二世祧則四世遷昭之北廟六世祔昭之南廟矣三世祧則五世遷穆之北廟七世祔穆之南廟矣昭祔則穆不遷穆祔則昭不遷此所以祔必以班尸必以孫而子孫之列亦以為序若武王謂文王為穆考成王稱武王為昭考自其始祔已然而左傳以管蔡郕霍為文之昭䢴晉應韓為武之穆雖其既逺猶不易也曰二世昭而三世穆四世昭而五世穆則左為尊右為卑矣今乃三世穆而四世昭五世穆而六世昭是右反為尊左反為卑也而可乎曰不然宗廟以左右為昭穆而不以昭穆為尊卑五廟同為都宫則昭常在左穆常在右而外不失其序一世自為一廟昭不見穆穆不見昭而內各全其尊天子廟祧亦當以是推之辨吉凶之五服車旗宫室之禁此謂吉凶皆有五等之服自衮冕至𤣥冕所以象其德自斬衰至疑衰所以稱其情以至車旗宫室皆有禁焉典命言其命數此則禁其踰於命數者掌三族之别以辨親疏其正室皆謂之門子掌其政令有三族有五族有九族廣言九族則上及四世之高祖下及四世之𤣥孫其五族三族則以次而差今止言三族以辨親疏則謂父之服屬己之服屬子之服屬推本而言之也是三族皆有親疏而親疏之中以正嫡為宗記言尊祖故敬宗敬宗故收族又古者支子不祭祭必告于宗子以宗子為主而後可以睦親疏之族詩有公子公姓公族以久近言也春秋有公族餘子公行以親疏言也此言門子以嫡庶言也古人重立嫡曲禮曰孤子當室是以當室名其嫡也文王世子曰正室守太廟是以正室名其嫡也亦正室門子之類毛六牲辨其名物而頒之于五官使共奉之辨六齍之名物與其用使六宫之人共奉之祭祀之禮牲為貴齍次之大宰言贊牲而大宗伯言奉齍其輕重可知也六牲謂牛雞馬羊犬豕毛之則名物為不同六齍謂黍稷稻梁麥苽辨其名物則其用亦有辨是以祭祀之日王親牽牲而五官佐焉故頒之于五官使共奉之后親供齍而六宫助焉故使六宫之人共奉之五官言頒有所分也六宫之人不言頒無所分也五官共奉之而後大宰贊其事六宫之人共奉之而後大宗伯奉其用上下相承之禮嚴矣辨六彝之名物以待果將辨六尊之名物以待祭祀賔客六牲六齍名物不一故奉之者衆此特司尊彝一職之事不過辨其名物待其用而已六彝用之於祼實之以鬱齊者也六尊用之於獻實之以五齊三酒者也考司尊彝之職則所謂六尊六彝者特施之於宗廟六享初不言賔客之用亦不言天地祭祀之用及觀鬱人所謂掌祼器凡祭祀賔客之祼事則不特廟享有祼賔客亦有祼也酒正所謂凡祭祀以法共五齊三酒以實八尊則八尊用於祭祀賔客不獨廟享也惟小宗伯為之辨其名物以待其用然後司尊彝得以詔其酌辨其用與其實掌衣服車旗宫室之賞賜衣服之制見於司服車旗之制見於巾車宫室之制見於典命皆春官之屬也嘗為之考其名數之制上公衮冕侯伯鷩冕子男毳冕司服言之矣金路大旗以封同姓象路大赤以封異姓革路大白以封四衛木路大麾以封蕃國巾車言之矣典命雖有五等諸侯宫室之文而無其制鄭氏謂公之城方九里宫方九百步侯伯之城方七里宫方七百步子男之城方五里宫方五百步此皆定制固諸侯之所當得者也而小宗伯為之掌其賞賜者何耶蓋賜國賜則賜官必待王命而後行之否則諸侯不敢專書曰車服以庸是衣服以待有功也又言惟衣裳在笥則有不可妄豫者焉韓奕之詩曰王錫韓侯淑旗綏章而序詩者以為能錫命諸侯則是車旗亦不可以妄豫也嵩高之詩曰王命召伯定申伯之宅而序詩以為能褒賞申伯焉則是宫室亦不可以妄豫也宜乎小宗伯之掌其賞賜必待王命其嚴如此掌四時祭祀之序事與其禮天神地示人鬼之祭祀四時各有常禮而其祭祀之事則亦有先後之序與其禮則序事之輕重隆殺者也若國大貞則奉玉帛以詔號貞正也以正而卜者謂之貞大卜於國大貞卜立君卜大封視高作龜是已凡卜大事必用玉帛故玉曰嘉玉幣曰量幣奉之以詔六者之大號則可以薦信於神而正吉凶矣大祭祀省牲視滌濯祭之日逆齍省鑊告時于王告備于王大宗伯於大祭祀帥執事而卜日宿視滌濯涖玉鬯省牲鑊奉玉齍皆見於前十日之期小宗伯亦於此省牲視滌濯焉蓋省牲則預擇其純視滌濯則預致其潔至祭之日所謂逆齍者逆大宗伯之所奉者也所謂省鑊者省大宗伯之所省者也其禮嚴矣若夫用玉與鬯禮之大者惟大宗伯得涖其事告時告備禮之煩者乃小宗伯之專職兹其辨焉爾凡祭祀賓客以時將瓚將送也凡祭祀王用圭瓚酌鬱鬯以始棵后用璋瓚酌鬱鬯以亞祼賔客亦然王祼則小宰贊之后祼則內宰贊之小宗伯特於當祼之時將送二瓚以授王與后使不失其時爾鄭氏謂祭祀以時奉而授王賔客以時奉而授大宗伯非也見大宗伯載祼義詔相祭祀之小禮凡大禮佐大宗伯大宗伯於祀大神享大鬼祭大示則詔相王之大禮此則詔相祭祀之小禮而其大禮則佐大宗伯也然大宗伯言詔相大禮者見於省牲鑊奉玉齍之後則此文亦當繼於告時告備之下以至下經言小祭祀掌事如大宗伯之禮亦當繼於此文之下如此方見禮官之次序賜卿大夫士爵則儐鄭氏謂儐之如命諸侯之儀所以重王命也義見大宗伯小祭祀掌事如大宗伯之禮大賓客受其將幣之齎幣齎之說已見於天官外府言之詳矣蓋賈氏釋外府共其財用之幣齎則曰外府共其泉是泉布可以為幣而言齎此所謂受其將幣之齎鄭氏亦謂所齎貢獻之財物亦泉布之類也故小宗伯受之而外府得待邦之用焉若大師則帥有司而立軍社奉主車若軍將有事則與祭有司將事于四望古者出師其始必宜於社造於祖其行必以祖社之主載之於車示有所受命焉及合戰之時雖以至仁伐不仁然君子臨事而懼故又有事於四望之祭蓋祭四望則求勝在神載祖社則求勝在人夫子謂我戰則克祭則受福用此道也義見肆師若大甸則帥有司而饁獸于郊遂頒禽大烖及執事禱祠于上下神示昔武王有疾周公禱之則禱祠之事古人不廢然夫子疾病子路請禱子曰有諸曰有之誄曰禱爾于上下神祗子曰丘之禱久矣是知周公處此亦必有道焉王崩大肆以秬鬯渳及執事涖大斂小斂帥異族而佐縣衰冠之式于路門之外及執事視葬獻器遂哭之卜葬兆甫竁亦如之既葬詔相喪祭之禮成葬而祭墓為位小宗伯於大喪之禮詳於大宗伯者何也大宗伯春官之長大喪則為上相而已其禮文次序則專屬於小宗伯之職建國神位之官而專此數者之事則其禮嚴矣凡王之㑹同軍旅甸役之禱祠肄儀為位國有烖禍則亦如之凡天地之大烖類社稷宗廟則為位肄習也為位者國之神位也㑹同軍旅田役及禍烖之禱祠乃國家不常之儀故肄儀而後為位天地大烖而類社稷宗廟則有常儀也故為位而已凡國之大禮佐大宗伯凡小禮掌事如大宗伯之儀上經言大禮小禮則祭祀之禮而已此終篇則總結之以五禮之大小者也肆師之職掌立國祀之禮以佐大宗伯立大祀用玉帛牲牷立次祀用牲幣立小祀用牲肆師之職有總言佐宗伯者有專言佐大宗伯者此立國祀之禮則專言佐大宗伯者也大宗伯云祀大神享大鬼祭大示别而言之則天神謂之祀人鬼謂之享地示謂之祭合而言之則享與祭通謂之祀大祀則天地宗廟之祀也次祀則日月星辰社稷五祀五嶽之祀也小祀則司中司命風師雨師山林川澤四方百物之祀也立大祀用玉帛牲牷禮之隆者也立次祀用牲幣禮之殺者也立小祀則牲而已禮之又其殺者也牲色之純者謂之牷上言牲牷下不言牷而特言牲則知所謂牲者其色之不必純也幣帛一也自其質而言之則謂之帛制而用之則謂之幣玉則陽精之貴者也大祀用精純而尚乎質故用玉帛牲牷次祀則加以文焉故用牲幣小祀則牲以致其味以其禮之近乎人情者也故用牲然大宗伯六器禮天地四方而曰皆有牲幣則大祀非無幣也典瑞言圭壁璋邸射之類與牧人言凡時祀之牲必用牷物則次祀小祀非無玉與牷也蓋肆師立國祀之禮禮者體也上下小大有一定之體則所用之物不容於不辨以歲時序其祭祀及其祈珥序其祭祀者於一歲四時之間而序其禮之先後也因序祭祀而序祈珥則祈珥之為義亦廣矣小子職曰珥于社稷祈于五祀羊人職曰凡祈珥共羊牲正與肆師之文同至秋官士師職則曰凡刉珥奉犬牲若以祈為刉則肆師之文為非若以刉為祈則士師之文為非後鄭皆改祈為刉謂毛牲曰刉羽牲曰珥且以珥之字當從血為衈取其以血為釁之義引雜記之言曰成廟則釁之謂宫兆始成則有釁禮其說非無所據然羊人小子亦自言釁積釁邦器釁軍器之事兹數者皆直謂之釁不應宫兆始成之釁而獨謂祈珥况刉珥之見於經者獨一士師而已如祈珥則肆師羊人小子凡三出焉不應以三出之祈而盡改為刉也又羽牲曰珥如司約言珥而辟藏者固曰以血塗户至山虞職言致禽而珥則又曰取左耳以效功言效功則與釁禮不同言取左耳則為毛牲與羽牲曰珥之文自相背馳何耶按劉氏中義云珥當為弭字之誤也祈謂小祝之祈福祥弭謂小祝之弭兵烖然則社稷五祀曰祈曰弭山川曰侯曰禳落成曰釁各有倫類矣其說今存之義亦見山虞大祭祀展犧牲繫于牢頒于職人牲之全者為犧肆師之展犧牲則陳之而視其全也然後繫于牢而頒之于職人蓋職人之名不同鄭氏謂充人及監門之人若散祭祀之牲繫于國門則監門為職人祀五帝之牲繫于牢則充人為職人牛人言祭祀共其享牛求牛以授職人而芻之泛舉此二者之職人而已肆師所言大祭祀則頒其牲於充人之職者也若是則充人芻之而得其碩肆師展之而得其全凡祭祀之卜日宿為期詔相其禮視滌濯亦如之祭之日表齍盛告潔展器陳告備及果築鬻相治小禮誅其怠慢者掌兆中廟中之禁令凡祭祀禮成則告事畢卜日者卜前期之十日也古者圜丘方澤之禮必取冬至夏至之日二者之外則天地宗廟等之祭祀必卜日得吉日而後齊此言卜日宿為期則是卜前之夕與諸執事者以明旦為期也詔相其禮則齊戒之禮而已視滌濯亦如之者亦如卜日之詔相其禮也及祭之日簠簋齍盛以徽幟表之所以明王者自致之誠此黍稷稻粱所以謂之接盛必肆師告潔而後用展器陳則陳其祭器實之既訖又展省而告備於小宗伯及果築鬻則築香草以煮鬯酒所以嚴宗廟之禮相治小禮誅其怠慢者則盡已之職所以贊宗伯之儀兆謂兆於四郊廟謂昭穆之廟以其執事者衆故為之掌其禁令禮成而告事畢則王者之誠至矣大賔客涖筵几築鬻贊祼將大朝覲佐儐共設匪罋之禮饗食授祭大賔客之禮者天子所以禮諸侯故以几筵為先司几筵設之肆師涖之致其肅也築鬻亦如宗廟酌祼之禮肆師則酌鬱鬯以贊之也至於大朝覲者非常朝覲之比常朝覲則大宗伯為上相小行人為承擯司儀為旅擯若大朝覲則肆師又為佐儐所以佐大宗伯也共設匪罋之禮則匪以實幣帛罋以實醯醢是大府醯人醢人共之而肆師設之也饗食授祭者曲禮曰殽之序遍祭之則無所不祭焉周人以祭肺為主而已膳夫授祭則授之於王肆師授祭則授之於賔與祝侯禳于疆及郊侯謂候迎喜祥禳謂却弭殃氣二者小祝之職也逺而五百里之疆近而百里五十里之郊小祝之官實主侯禳之事肆師與之偕往以見國祀之立雖侯禳之小祀不廢也大喪大渳以鬯則築鬻命外內命婦序哭禁外內命男女之衰不中法者且授之杖小宗伯曰王崩大肆以秬鬯渳此則築鬻以為鬯也序哭則以服之輕重為先後小宗伯縣衰冠之式於路門之外若不中法則肆師又從而禁之也且授之以杖則先服而後杖凡師甸用牲于社宗則為位類造上帝封于大神祭兵于山川亦如之凡師不功則助牽主車凡四時之大甸獵祭表貉則為位師甸者田而後用師者也社軍社也宗遷祖謂之宗者以其繼太祖也蓋凡出師征伐必載社之石主祖之木主示有所受命於神也小宗伯所謂帥有司而立軍社奉主車是已肆師言用牲於社宗則社與宗而已至於上帝則謂之類造大神則謂之封山川則謂之祭皆軍祭之禮也言類則以上帝為主凡天神皆與焉則造其所而祭之封于社及方嶽之大神則謂之封山川軍所依止以兵而祭則謂之兵祭此軍師之所當先者而肆師皆為之位無非依神以為之助而欲民之用命以有功也若師不功則神不得所依也民不得所用也故立國祀者與掌邦政者均任其責焉此大司馬所以厭而奉主車肆師亦為之助牽主車貉與禡同謂師祭也而亦用於四時皆肆師為之位以肆師立國祀故爾嘗之日涖卜來歲之芟獮之日涖卜來歲之戒社之日涖卜來歲之稼肆師於凡祭祀之卜日宿為期故於來歲之芟來歲之戒來歲之稼亦為之涖其卜蓋芟者除田之事嘗者嘗穀之祭因榖祭而卜田事欲人預知之而盡力於芟也戒者兵寇之備獮者治兵之教因教兵而卜兵備欲人知之而盡力於戒也稼者土事之大社者土示之祭祭土示而卜土事欲人知之而盡力於稼也且三者之卜凡陳龜貞龜命龜視高作龜使卜師卜人等為之肆師特涖之而已若國有大故則令國人祭歲時之祭祀亦如之歲時之祭常禮也國有大故而祭非常禮也此皆國人之事其禮微矣必待上令而後行則名分所存尤先王之所深致意者也凡卿大夫之喪相其禮非相其家禮相其國之喪禮而職喪聽之者也凡國之大事治其禮儀以佐宗伯凡國之小事治其禮儀而掌其事如宗伯之禮肆師掌立國祀之禮則專於佐大宗伯凡國之大事而言佐宗伯凡國之小事而言掌事如宗伯之禮者兼大小宗伯而言之也故於佐宗伯則謂之事於佐大宗伯則謂之禮鬱人掌祼器凡祭祀賔客之祼事和鬱鬯以實彝而陳之凡祼玉濯之陳之以贊祼事詔祼將之儀與其節凡祼事沃盥大喪之渳共其肆器及葬共其祼器遂貍之大祭祀與量人受舉斚之卒爵而飲之祼者求神之始天地不祼而宗廟有祼以人道事之也人之始生也神聚而有氣氣聚而有形及其死焉氣化而有魂形化而有魄魄為陰以降乎地魂為陽浮以歸乎天而其神則無所不之故必求諸隂陽焉殷人先求諸陽故尚聲周人先求諸隂故尚臭祼用鬱鬯以求神之出所謂臭隂達于淵泉既祼然後迎牲既奠然後􅌊蕭合羶薌以求神之降所謂臭陽達于牆屋無非求諸陰陽之義而祼實為求神之始此鬱人所以專掌祼器何謂祼器實之者彝也載之者舟也將之者圭瓚璋瓚也凡祭祀賓客之祼則賔客亦有祼如大行人於廟中將幣三享有再祼一祼之禮而先王制禮之意則専以祼為求神之禮和鬱鬯以實彝而陳之者鬱其草也詩所謂黃流在中是也鬯其酒也記所謂賜圭瓚然後為鬯是也凡祼玉則圭璋也王用圭瓚后用璋瓚郊特牲曰祼以圭璋用玉器也濯之所以致其潔陳之所以備其用逮王與后之祼將也又因以贊其事焉詔祼將之儀則奉玉送祼之儀與其節則奉玉送祼早晏之節沃盥則盥手洗瓚之事凡此皆鬱人周旋祼禮之次序也至於大喪之渳共其肆器者即小宗伯所謂王崩大肆以秬鬯渳鬱人則共其陳尸之器也及葬共其祼器遂貍之者謂遣奠之彞與瓚貍於祖廟之階次以明奠終於此也大祭祀與量人受舉斝之卒爵而飲之者蓋祭祀必有尸所以象神尸以獻酬以象受福舉斚之卒爵則受福之爵也天子奠斝斚乃夏之爵惟王禮而後用之主人舉斚獻尸而尸酬焉命祝致辭主人坐奠斚興再拜稽首執爵以興坐卒爵此鬱人與量人則受其餘而飲之蓋以量人制其從獻脯㸋而有濟於鬱人之祼事同其事則同其福也然祼為祭祀之始有始則有終受卒爵而飲之不亦宜乎鬯人掌共秬鬯而飾之凡祭祀社壝用大罍禜門用瓢齎廟用修凡山川四方用蜃凡祼事用槩凡疈事用散大喪之大渳設斗共其釁鬯凡王之齊事共其秬鬯凡王弔臨共介鬯祭祀之禮有秬鬯有鬱鬯鬱鬯用之於宗廟秬鬯用之於天地社稷等祀蓋秬鬯一稃二米乃造化至和之氣釀之為酒以求神之降謂之鬯則芬馨逺達而交暢於上下者也故謂之秬鬯而掌以鬯人之職共秬鬯而飾之者鄭氏以飾謂設巾以幂人考之畫布巾用以幂六彞而非以飾秬鬯之器蓋鬯人共秬鬯而不言祭祀天地之用是天地之秬鬯純用朴素而無事乎文采其餘則未免有飾焉祭社於壝而用大罍若近乎瓦尊然以雷為文則瓦尊之有飾者也禜祭於國門而用瓢齎若近乎匏尊然割瓢以為齎則匏尊之有飾者也廟用修者如司尊彝凡酒修酌之義則以人力修之而為飾者也凡山川四方用蜃者如掌蜃共蜃器之蜃則又以蜃物為飾者也凡祼事用概者謂以朱𢃄飾漆尊而橫概以落腹者也凡疈事用散者謂散尊雖無琢刻而亦用漆以為飾者也六者之用各因其宜而已以至大喪之設斗釁鬯齊事之共其秬鬯無非所以致其香潔之義曲禮曰凡摯天子用鬯是王之弔臨則以鬯為摯天子不可以自致使介執之而鬯人共之故曰共介鬯雞人掌共雞牲辨其物大祭祀夜呼旦以嘂百官凡國之大賔客㑹同軍旅喪紀亦如之凡國事為期則告之時凡祭祀面禳釁共其雞牲國之六牲毛物居其五而羽物居其一雞是已庖人曰秋行犢麛膳膏腥腥為雞雞木畜而木廢於秋以之養肝此雞人所以列於春官也所謂共其雞牲辨其物者辨其陽祀隂祀之騂牲黝牲而已然雞之為物有用之以為牲者有用之以呼旦者而雞人實兼掌焉祭祀賔客喪紀以至軍旅㑹同皆以夙興為期呼旦以嘂百官警之以夙興從事也凡國事為期告之時則不拘於夙興從事蓋使之無時而不告釋庭燎之詩者謂不正雞人之官而問夜早晚所以為當時之戒是知雞人之告時呼旦夫豈小補凡祭祀面禳釁者禳非一方也疆郊之四面皆禳焉釁以厭妖怪者亦然共其雞牲則雖小祀不廢司尊彞掌六尊六彝之位詔其酌辨其用與其實六尊六彝宗廟六享之器也六享之祼皆用彝六享之獻皆用尊故司尊彝之官不特為之掌其器又為之掌其位下經雖不言所陳之位禮運曰𤣥酒在室醴盞在户粢醍在堂澄酒在下此其位也詔其酌則獻酌縮酌之類辨其用則春祠夏禴之類與其實則鬱齊醴齊之類因其所詔所辨者而推之先六尊而後六彝則所掌之序先祼以六彝而後獻以八尊則所用之序春祠夏禴祼用雞彝鳥彝皆有舟其朝踐用兩獻尊其再獻用兩象尊皆有罍諸臣之所昨也秋嘗冬蒸祼用斚彝黃彝皆有舟其朝獻用兩著尊其饋獻用兩壺尊皆有罍諸臣之所昨也凡四時之間祀追享朝享祼用虎彝蜼彝皆有舟其朝踐用兩大尊其再獻用兩山尊皆有罍諸臣之所昨也宗廟之禮已於內宰及籩人醢人言之詳矣至司尊彝而後備見成周禮文之盛蓋有六享之制有祼獻昨之序有尊彝罍舟之義此三者所以為廟享之始末何謂六享之制春祠以詞為主夏禴以樂為主秋嘗以薦新為主冬蒸以備物為主此四時之常禮惟四時之間祀謂之追享朝享則不可不考論其故鄭司農謂追享追及其祖之所自出與宗伯之饋食同謂之禘以朝享為三年喪畢而朝於廟與大宗伯之肆獻祼同謂之祫然饋食肆獻祼列於四時之首而間祀列於其後豈得謂之祫禘又五年一禘三年一祫乃宗廟大禮豈得為四時之間祀考之祭法王立七廟一壇一墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月祭之逺廟為祧有二祧享嘗乃止去祧為壇去壇為墠墠壇有禱焉祭之無禱乃止去墠曰鬼釋者曰享嘗為四時之祭時祭之外親近者為祖為考每月朔朝於廟因祭焉是之謂朝享親逺者為遷廟之主有禱則追祭之是之謂追享二者為四時間祀而列於祠禴蒸嘗之後此六享之制一也何謂祼獻昨之序質明行事尸在室中王用圭瓚酌鬱鬯以祼神后用璋瓚酌鬱鬯以亞祼二祼之後王迎牲於門祝則延尸於堂於是有朝事之禮以籩豆言之則為踐以齊酒言之則為獻王乃割牲以薦腥用玉爵酌醴以獻尸后亞焉諸臣為之助祭是謂朝事之三獻朝事之後王解牲而享之祝復延尸於室於是有饋食之禮以物之獻言之則為饋以祭之序言則為再王乃奉牲以薦熟用玉爵酌盎齊以獻尸后亞焉諸臣為之助祭是謂饋食之三獻饋食之後尸始飲食於是有卒食之禮王用玉爵獻修酌以酳尸后亞焉諸臣為之助祭是謂卒食之三獻夫有獻則有昨蓋以人道之往反施報終焉於是尸以玉爵昨王以瑶爵昨后以散爵為諸臣之昨諸臣有昨則王與后有昨為可知王與后及諸臣皆受昨於尸則諸臣與於酌獻為可知此祼獻昨之序也何為尊彝舟罍之義成周功成治定兼用四代之禮樂四代之樂見大司樂之職四代之禮則於此見之嘗考虎蜼為有虞氏之宗彝泰為有虞氏之尊山罍為夏后氏之尊又夏后氏以雞彝殷以斚以著周以犧象以黃目以魯壺今於六享之間兼而用之春夏之發生長養主乎動曰雞曰鳥曰犧曰象非取其有動意乎秋冬之肅殺斂藏主乎靜曰斚曰黃曰著曰壺非取其有靜意乎四時間祭為非常之禮始以人道求之則主乎動終以神道事之則主乎靜曰虎曰蜼則用以祼曰泰曰山則用以獻非始出於動而終復於靜乎以至六彝皆有舟六尊皆有罍考之禮制則彝受三升尊受五升罍受一石鄭氏謂舟為尊下壺故禮家不言所受此不必論大槩舟之為物量其所受則有濟物之利受過其量則有沈溺之害靁之為物應時而動則有澤物之利動不以時則有浸淫之患知舟靁之戒則知先王設尊罍之意此尊彝舟罍之義三也三者可考而周人享禮之始末備矣凡六彝六尊之酌鬱齊獻酌醴齊縮酌盎齊涗酌凡酒修酌此四酌亦享禮之序也凡廟享祼用鬱齊謂煮鬱和鬯以為求神之始酌以獻之而已故曰獻酌朝踐用醴齊則齊之濁者以茅縮之即郊特牲所謂縮酌用茅明酌也故曰縮酌饋食用盎齊則清濁之中者以酒涗之即郊特牲所謂盞酒涗于清凡涗新之也故曰涗酌卒食用酒乃酳尸之禮亦人之所飲修以致味故曰修酌以修視涗則凡酒為味以涗視縮則盎齊為清以縮視鬱則醴齊為淳蓋宗廟之中始以神道求之終以人道事之愈近則愈親故爾大喪存奠彝大旅亦如之存省也陳之而不即徹也鬱人言遣奠之祼器是已司几筵掌五几五席之名物辨其用與其位敷於地上一重曰筵筵上再加之曰席馮之以佑其力曰几名官以几筵而所掌者几席舉一可以例其一也五几則玉雕彤漆素是已五席則莞蒲次繅熊是已此名也亦其物也用則若祭若賔之類位則若廟若朝之類司几筵掌之又從而辨之凡大朝覲大饗射凡封國命諸侯王位設黼依依前南鄉設莞筵紛純加繅席畫純加次席黼純左右玉几祀先王昨席亦如之乾位在西北白與黑為黼蓋取諸西北之乾離位在南聖人南面而聽天下蓋取諸正南之離乾之體為剛故人依之離之用為明故聖人鄉之此司几筵所以曰王位設黼依依前南鄉而後為之肆筵設席也王之席三重莞則筵之清堅者紛綬以為之緣繅則席之柔礝者畫雲氣以為之緣次則席之次列成文者黑白黼以為之緣左右玉几即書所謂華玉几設於左右優尊者也祀先王昨席者王獻尸尸昨王為昨席於室中西鄉而受之非南鄉也專言昨席則無几也所同者席而已矣諸侯祭祀席蒲筵繢純加莞席紛純右雕几昨席莞筵紛純加繅席畫純筵國賔于牖前亦如之左彤几天子之席三重諸侯之席再重禮也然天子有次席黼純而不用於諸侯者以諸侯不可尚自然之文不可專斷制之義也諸侯有蒲筵繢純而不用於天子者以蒲不若莞之細繢不若畫之工也天子昨席於祭祀同而諸侯則異其席者尊卑之辨也天子設几於左右而諸侯則陰事尚右陽事尚左者亦寓尊卑之辨一几席之末而大分存焉甸役則設熊席右漆几凡喪事設葦席右素几其柏席用萑黼純諸侯則紛純每敦一几凡吉事變几凶事仍几甸役有表貉之祭席用熊皮示服猛也几用漆飾示正固也漆几右之陰事也葦席素凡則天子之喪禮槨席用萑黼純則槨中所藏之席敦燾也棺在殯則以槨燾之故每敦一几也吉事變几則從王所在變而設之凶事則不知神之所之如顧命之四仍几位皆設耳

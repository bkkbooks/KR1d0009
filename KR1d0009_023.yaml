body:
  text: 周官總義卷二十三宋易袚撰職金掌凡金玉錫石丹青之戒令受其入征者辨其物之􅍇惡與其數量揭而璽之入其金錫于為兵器之府入其玉石丹青于守藏之府入其要掌受士之金罰貨罰入于司兵地官丱人已守金玉錫石之厲禁此復掌以職金者古者名山大澤逺不以封近不以朌于是為厲禁于金玉錫石之地而丱人掌之為戒令于金玉錫石丹青之物而職金掌之所謂金錫者即禹貢惟金三品之類所謂玉石者即禹貢璆琳琅玕之類所謂丹青者即禹貢砮丹丹銀之類然民之所利者廣而上之所征者薄則必為之戒令焉于是職金掌其戒令而受其入征者受丱人之所入而已辨其物之􅍇惡則或貴或賤為不等辨其物之數量則或多或寡為可稽然後書楬而璽封之入其金錫于為兵器之府則以備攻金之工築冶鳬栗假桃之用也入其玉石丹青于受藏之府則以備玉府金玉及良貨賄之藏也入其要則又以其數量録其要簿而入于大府也掌受士之金罰貨罰入于司兵即稿人所謂受財于職金以齎其工者也是職金雖列于秋官而大府玉府則天官之屬攻金之工則冬官之屬以至司兵則夏官之屬丱人則地官之屬五官之職無非聨事而通治是知金玉錫石丹青之為用不一而其戒令詳矣旅于上帝則共其金版饗諸侯亦如之凡國有大故而用金石則掌其令金版即掌次之皇邸先儒以為後版屏風以金飾之職金之所共也國有大故而用金石則掌其令令其為器械而已司厲掌盜賊之任器貨賄辨其物皆有數量賈而楬之入于司兵其奴男子入于罪𨽻女子入于舂稿凡有爵者與七十者與未齓者皆不為奴非其所有而取之者謂之盜因盜而肆害于人謂之賊先王之除盜賊除民害也故掌囚専守盜賊以待刑殺罪至于殺則棄人之刑也以殺為不足司厲又掌盜賊之任器貨賄入于司兵以備公家之用又奴其父母妻子其男子入于罪𨽻女子入于舂人稿人則以充公之役此所謂無餘刑者而亦有不盡刑者有爵者從坐非尊貴也七十者從坐非敬老也未齓者從坐非慈幼也然則先王之于天下固有殺未足以懲惡亦有不刑可以勸善此之謂矣犬人掌犬牲凡祭祀共犬牲用牷物伏瘞亦如之凡幾珥沈辜用駹可也凡相犬牽犬者屬焉掌其政治司寇奉犬牲而其屬犬人則掌犬牲凡祭祀共犬牲則共之于充人而入之于司寇也牷則謂其色之純者駹則謂其色之雜者伏則祖道之祭瘞則地示之祭二者用牷禮之重也幾祈也珥弭也沈以祭川辜以磔門四者用牷正也無則以駹代之亦可以也凡相犬牽犬者屬焉掌其政治則田犬食犬之類不特祭祀之牲而已司圜掌收教罷民凡害人者弗使冠飾而加眀刑焉任之以事而收教之能改者上罪三年而舍中罪二年而舍下罪一年而舍其不能改而出圜土者殺雖出三年不齒大司寇言罷民者二其一則民之有罪過未麗于法而害于州里者桎梏而坐諸嘉石役諸司空其二則民之害人者雖麗于法而未可加以刑故置之圜土而施職事焉以眀刑耻之施職事則司圜所謂任之以事而收教之者以眀刑耻之則司圜所謂弗使冠飾而加眀刑者然大司寇不言任舍而司圜則有一年二年三年之辨又有或殺或不齒之辨皆所以推行大司寇之法者也凡圜土之刑人也不虧體其罰人也不虧財五刑天下之正刑也其輕則有罰焉又其輕則置之圜土焉圜土而言聚教則非所以為刑罰也司刑之曰墨曰劓曰宫曰刖曰殺則凡言刑者虧其體者也此特耻之以眀刑而已職金掌受士之金罰貨罰則凡言罰者虧其財者也此則罰之以職事而已是二者雖曰刑罰而非刑罰之正乃所以正刑罰之正者也掌囚掌守盜賊凡囚者上罪梏拲而桎中罪桎梏下罪梏王之同族拲有爵者桎以待弊罪及刑殺告刑于王奉而適朝士加眀梏以適市而刑殺之凡有爵者與王之同族奉而適甸師氏以待刑殺凡囚皆囚而守之而掌囚獨先言守盜賊者以盜賊為重故也木其手曰拲木其項曰梏木其足曰桎三木皆具者重囚也次者桎梏輕者桎而已王之同族拲親也有爵者桎貴也以至弊罪而徇之至于斷罪而後已焉及刑則告于王鄭氏所謂死罪則曰某之罪在大辟刑罪則曰某之罪在小辟是已奉而適朝以王之有所赦宥焉赦之宥之王之仁也若不私其法而至于刑殺則庶姓及無爵者士加眀梏以適市其同姓及有爵則奉而適甸師氏刑于隱也亦親與貴之辨耳掌戮掌斬殺賊諜而搏之凡殺其親者焚之殺王之親者辜之凡殺人者踣諸市肆之三日刑盜于市凡罪之麗于法者亦如之唯王之同族與有爵者殺之于甸師氏凡軍旅田役斬殺刑戮亦如之賊害人者諜反間者已得則言斬殺未得則言摶摶之議其罪而後刑殺也雖同謂之賊諜而罪有輕重故斬所以分其體殺特使其死而已殺其親者賊仁莫甚焉焚之則其體不存殺王之親者賊義孰甚焉辜之則其體不全甚其罪所以懲天下之大惡也凡殺人者及刑盜于市與夫罪之麗于法者踣諸市肆之三日即刑人于市與衆棄之意也王之同族及有爵者殺之于甸師氏者即掌囚之所奉者而行刑殺故也軍旅田役之斬殺刑戮雖各有所屬而亦司之於掌戮者惟天吏得以殺之惟王官得以掌之先王之謹於用刑故也墨者使守門劓者使守關宫者使守內刖者使守囿髠者使守積五刑殺為重其四則有生道焉刑餘之人茍失其所是雖不殺乃所以殺之也于是處之以事係之于公雖棄其身而不棄其能雖不全其體而未嘗不全其養墨者黥其面無害於守禦故使之守王朝之門劓者截其鼻亦無害於守禦故使之守王畿之關宫則絶人道若寺人之類故使之守內刖則斷其足止可以牧禽獸故使之守囿惟王族無宫刑不翦其類髠之而罰於至隱之地故使之守積言守則其志専且精也言使則使之有道故也記禮者謂公家不畜刑人非也特不可近之而已矣司𨽻掌五𨽻之法辨其物而掌其政令帥其民而摶盜賊役國中之辱事為百官積任器凡囚執人之事邦國有祭祀賔客喪紀之事則役其煩辱之事五𨽻之法所謂罪𨽻則中國之罪民而役於其𨽻者蠻夷閩貉之𨽻則以其賔服王國入而為𨽻者其𨽻各以百二十人為制而其嬴不足則不可以制定辨其物則衣服兵器之屬掌其政令則摶盜賊役辱事之屬此皆所謂法也掌帥四翟之𨽻使之各服其邦之服執其邦之兵守王宫與野舍之厲禁王宫即王朝之宫野舍即合諸侯於國門外之舍至尊所御皆有厲禁如後世閽人之法守之以四翟之𨽻冝也嘗觀閽人掌守王宫之中門之禁潛服賊器不入宫竒服怪民不入宫中門之禁如此則王宫野舍之厲禁尤不可緩然夫人皆可守也何取乎四翟之𨽻四𨽻不足恃也何至服其邦之服執其邦之兵鄭氏謂其服為布與氊非竒服歟謂其兵為劔與弓非賊器歟若夫狼子野心非我族類之人非怪民歟是不然經言四翟之民即南方之蠻東南之閩東方之夷東北之貉其服屬為有素非西戎北狄比蓋周自文王之世西有昆夷之患北有玁狁之難而東南先服王化遂基王業至周公攝政制禮作樂推原乎王業之始故南方曰象則有象胥以待蕃國之使東夷之樂曰韎則有韎師以薦宗廟之樂乃此四翟之𨽻而列于宿衛之次皆此意也其在王宫之宿衛則宫正掌之其在野舍之宿衛則師氏掌之初何嫌乎哉罪隸掌役百官府與凡有守者掌使令之小事凡封國若家牛助為牽倣其守王宫與其厲禁者如蠻隸之事蠻隸掌役校人養馬其在王宫者執其國之兵以守王宫在野外則守厲禁閩𨽻掌役畜養鳥而阜蕃教擾之掌子則取𨽻焉夷𨽻掌役牧人養牛馬與鳥言其守王宫者與其守厲禁者如蠻𨽻之事貉𨽻掌役服不氏而養獸而教擾之掌與獸言其守王宫者與其守厲禁者如蠻𨽻之事五𨽻皆𨽻也蠻夷閩貉之𨽻則賔服之民罪𨽻則沒入為奴之民其民不同其用亦異罪𨽻則任使令牽倣之冗事四翟之𨽻則養之而已雖曰蠻𨽻掌役校人養馬之類閩𨽻掌役畜養鳥之類夷𨽻掌役牧人養牛馬之類貉𨽻掌役服不氏養獸之類皆因其俗之所習而使之養之也然司𨽻帥四翟之𨽻守王宫與野舍之厲禁是止於四翟之𨽻也今罪𨽻亦言王宫與厲禁之守而閩𨽻反不言王宫與厲禁之守互文以見則其有守可知矣布憲掌憲邦之刑禁正月之吉執旌節以宣布于四方而憲邦之刑禁以詰四方邦國及其都鄙達于四海先王之治有刑必有禁知禁而自止則不至于罪知罪而自反則不至于刑此宣布而詰之有不容已者於是正月之吉大司冦布刑之時布憲為之憲其刑禁執旌節則使其道路之無所壅宣布于四方則欲其四達于天下所謂以詰四方邦國及其都鄙達于四海者蓋當時六服承德四夷咸賔刑禁所施無此疆爾界之異凡聲教所暨即在所憲則其播告不匿者逺邇同而上下察也其言詰者是豈區區布令陳辭而已哉凡邦之大事合衆庶則以刑禁號令國之大事在祀與戎此以合衆庶而言則主乎戎事也凡軍旅田獵天子親涖其事皆合衆庶之大者衆庶所集刑禁為先惟以天子之號令行之則人知刑禁之為不可犯太宰于大事戒百官則以王命行其戒布憲于大事合衆庶則以號令行其刑禁雖小大異用而所以聳動乎人心則一而已禁殺戮掌司斬殺戮者凡傷人見血而不以告者攘獄者遏訟者以告而誅之斬殺戮者上之人所以懲惡也非下之人所得而自擅者也上所以懲惡故掌戮者司之下不得以自擅故禁殺戮者司之掌司斬殺戮謂不應斬殺戮而擅為之者應告其傷乃隱之而不告者應治其獄乃攘之而不治者應聽其訟乃遏之而不聽者察此四者以告于司冦而誅之則姦凶不得以侵善良勢力不得以抑窮弱矣禁暴氏掌禁庶民之亂暴力正者嬌誣犯禁者作言語而不信者以告而誅之以刑教中則民不暴教官之事也刑官則禁之而已亂謂逆理而害治者暴謂恃強而虐物者力正謂脅衆從已以邪為正者以至嬌曲誣罔以欺衆造作無根之言語以惑衆者此禁暴氏之所紏以告于司冦而誅之者也王制曰析言破律亂名改作執左道以亂政者殺行偽而堅言偽而辨學非而慱順非而澤以疑衆殺若有是五者之罪而害于風教之大者禁之誅之冝矣凡國聚衆庶則戮其犯禁者以徇凡奚𨽻聚而出入者則司牧之戮其犯禁者前五者之禁為庶民設也此於聚衆庶則人情雜還其暴尤甚故必戮其犯命者以徇奚謂女奴之為奚者𨽻謂男奴之為𨽻者既以罪役則其暴為有素故必司牧其出入牧養也出入之際無不得所養或有犯禁從而戮之則非不教之誅是二者亦所以禁其暴也野廬氏掌達國道路至于四畿比國郊及野之道路宿息井樹若有賔客則令守塗地之人聚柝之有相翔者誅之凡道路之舟車轚互者敘而行之凡有節者及有爵者至則為之辟禁野之橫行者徑踰者凡國之大事比修除道路者掌凡道禁邦之大師則令掃道路且以幾禁行作不時者不物者詩曰于時廬旅又曰于豳斯館則館大而廬小也公劉之所以基王業者在是故遺人之職十里有廬三十里有宿宿有路室五十里有市市有候館蓋古者吉行五十里故賔客宿于五十里之候館師行三十里故軍旅宿于三十里之路室所謂十里有廬則野道之小室所以待行旅也野廬氏以廬名官則小者舉而大者可推矣掌達國道路至于四畿即遂人所謂澮上有道川上有路以達于畿者是已此言四幾之道至此復言比國郊及野之道路自廬以至路室候館皆有宿息井樹之所野廬氏則巡而比之也若有賔客至則令守塗地之人聚柝之有相翔者誅之蓋先王之時凡天下之塗地皆有人以為之守賔客至則令聚而擊柝所以待暴客也翺翔觀伺之人則誅之所以禦姦冦也昔子産稱晉文公之為盟主也司空以時平易道路墟人以時塓館宫室諸侯賔至𨽻人牧圉各贍其事百官之屬各展其物此晉之所以霸諸侯若單襄公假道于陳而道茀不可行候不在疆司空不視塗道無列樹國無寄寓野無施舍此所以知陳之將亡諸侯之事得失如此則王政可推也蓋賔客之至上以承王命下以修職貢茍道路不戒民有覬心則國政不行為害實大此掌訝令之于野廬氏而野廬氏則令之于守塗地之人所以安賔客者至矣凡道路之舟車轚互謂隘迫而相轚觸相差互者則序其先後貴賤老少往來而通之凡有節者及有爵者至則為之辟謂辟止行人而使之敬王命若三公有邦事則鄉士為之辟六卿有邦事則遂士為之辟大夫有邦事則縣士為之辟此則止於有節者及凡有爵者而已以其在國野之道故也禁野之不由道而橫行者與夫不由梁而徑踰者國有大事則比修除道路之怠慢者掌凡道禁則若修閭氏所謂以兵革趨行者與馳騁於國中者是也然修閭氏所禁者在國之道也野廬氏所禁者在野之道也若邦之大師則其事為甚重不特令掃道路而已凡行止不時者不物者則必有姦人內賊及反間以刺探邦事故不特幾之又從而禁之蠟氏掌除胔凡國之大祭祀令州里除不蠲禁刑者任人及凶服者以及郊野大師大賔客亦如之若有死于道路者則令埋而置楬焉書其日月焉縣其衣服任器于有地之官以待其人掌凡國之胔禁骨枯曰骼肉腐曰胔人獸皆同除而埋之不令暴露道塗仁政之所先者也故曰掌除胔凡國之大祭祀則齋戒以盡其禮大師大賔客則嚴肅以敬其事令州里郊野除不蠲禁刑者與夫任人及凶服者則不止胔而已若有死于道路則令埋而置楬焉書其日月焉縣其衣服任器於有地之官以待其人待其識而取之也掌凡邦之胔禁則仁民愛物之心著矣雍氏掌溝瀆澮池之禁凡害于國稼者春令為阱擭溝瀆之利于民者秋令塞阱杜擭禁山之為苑澤之沈者掌溝瀆澮池之禁而名官以雍氏者禁其凡害於國稼者而已蓋溝瀆澮池之利行者不可以擅塞止者不可以擅行非所當行而行非所當止而止皆足以害國稼此所以有雍氏之禁然溝瀆之利無時或廢而田鼠田獸之害有時而或息故春令為阱擭去其害國稼者而後通溝瀆之利秋不言塞溝瀆而専言塞阱杜擭凡以遂物之性而已若夫即獸之所居而為苑以取之即魚之所聚而沈藥以毒之雖足以得魚獸而其不仁甚矣故從而禁之萍氏掌國之水禁幾酒謹酒禁川遊者萍浮於水而不溺於水此萍氏所以掌禁也蓋水雖利於涉而亦害於遊狎而玩之蹈而死者多矣惟酒亦然古人豢豕以為酒非以為禍也酒之流則禍生焉幾酒則微察其不節者謹酒則謹制其無度者又為之禁川遊者則知溺水酣酒之禍一而已矣司寤氏掌夜時以星分夜以詔夜士夜禁禦晨行者禁宵行者夜逰者此謂施於國中者日出而作羣動皆起日入而息羣動皆止掌夜時以星分夜亦人事作息之節而於國中則尤所當急也蓋國中則有啓閉之候國事則有朝夕之禮以星分夜則星見於夜星沒於晝朝夕啓閉於是乎在以是詔夜守之士嚴夜禁之法則有晨侵于夜而行者暮侵於宵而行者或夜遊不止皆姦偽之所集故皆禁之司烜氏掌以夫遂取明火于日以鑒取明水于月以共祭祀之眀齍眀燭共眀水掌眀水眀火而其官謂之司烜者取大易所謂日以烜之之義蓋萬物形成於地精成於天月遡日之光其本皆出於日之故也以夫遂取眀火于日以鑒取眀水於月者日陽之精月隂之精也離為日為火為電者火之氣也坎為月為水為雲者水之氣也水火以氣而升降日月之精薄之則夫遂可以召陽而為火鑒可以召隂而為水所以謂之眀水火言取于日月而非人力之所能致眀之至也眀齍用眀水以滌粢盛也眀燭用眀火以照爼豆也眀水則以配玄酒也夫隂陽之氣降而在物者無所不備而致其潔之至者眀水火而已故以司烜共之凡邦之大事共墳燭庭燎中春以木鐸修火禁于國中軍旅修火禁司烜之職以火為義故因命之以掌火事凡邦之大事共墳燭庭燎墳燭大燭也設于門外庭燎則設於門內之庭中天子百之諸侯有差焉中春以木鐸修火禁于國中國中之事而已宫正則春秋以木鐸修火禁乃宫中之事宫中之事詳于國此所以為內外之辨軍旅修火禁則大衆所集在所警戒雖非時亦禁之也邦若屋誅則為眀竁焉屋誅者王氏謂舉家受誅忍哉戰國參夷之誅止及親屬而不及臣妾孰謂先王而行此不仁之政蓋謂王族及有爵者不加眀刑而罄于甸師氏謂甸師誅之於屋非刑於市者然先王貴貴親親之義雖不眀其刑而未嘗不眀於竁竁謂壙埋之地楬其罪於竁上而屬於司烜氏以眀為義故爾條狼氏掌執鞭以趨辟王出入則八人夾道公則六人侯伯則四人子男則二人狼之為物貪很而弗率凡世之弗率於教化者如狼貪很然先王設官以治之使之整整而有條故曰條狼氏蓋王與諸侯之出入在道路冝致其肅鞭所以指麾左右執鞭以趨則使人之知所畏趨而後辟則辟止行者使人之知所避與朝士所謂帥其屬而以鞭呼趨且辟者同義然朝士所主者外朝之事此所主者王與諸侯出入道路之事所主不同而已王出入則八人夾道自公而下皆降殺以兩故公六人侯伯四人子男二人此固尊卑之辨然諸侯得與王同用條狼氏以辟止行者即孟子所謂君子平其政行辟人者也條狼氏之義如此凡誓執鞭以趨于前且命之誓僕右曰殺誓馭曰車轘誓大夫曰敢不關鞭五百誓師曰三百誓邦之大史曰殺誓小史曰墨士師之五戒一曰誓用之於軍旅此所以有軍旅之誓條狼氏執鞭以趨於前與上經之執鞭以趨辟者不同上經執鞭以趨辟者重主威也此執鞭以趨於前且命之者重軍事也蓋軍中之羣吏犯難赴敵於是乎在則其聽誓於陳前者不得不嚴其告戒之旨車莫先於僕右謂其右於戎車者皆勇力之士或不用命則勇力無所施此晉合諸侯而楊干亂行於曲梁魏絳為之戮其僕正為是也故誓僕右曰殺然車尤聽命於其馭馭者驅馳不及則車之進退無所用其力此晉使張骼趙躒救鄭近禁師其馭不告而馳之幾以不免是馭之能危之也故誓馭曰車轘以至大夫大師大史小史皆有誓且史掌禮師掌樂初何關乎軍旅記謂刑不上大夫則大夫何與乎軍旅之法王氏新傳於此數者皆以為誓其屬然經無誓屬之眀文鄭氏謂出軍及祭祀之時出軍之誓誓左右及馭師樂師也大史小史主禮事者曽不知皆誓之於軍旅者也今考大師職曰大師執同律以聽軍聲而詔吉凶是軍旅有取於大師之職也大史職曰大師抱天時與大師同車是軍旅有取于大史之職也小史職曰大軍旅佐大史是軍旅有取於小史之職也然師史右馭數職亦以大夫為之按戎僕中大夫戎右亦中大夫大師下大夫大史亦下大夫六誓之中惟小史為中士其五者皆職名而其大夫獨以官名則知非右馭師史之為大夫者是必大夫之銜命以官不以職者也何以知之以經文敢不關而知之蓋大夫受命出疆事得専行不必關白於君若御命於軍中則非出疆之比關白而後往則無専輒敗慮之事故誓大夫曰敢不關鞭五百誓師曰三百誓邦之大史曰殺誓小史曰墨以其用法次序而論則墨輕於鞭三百鞭三百輕於鞭五百鞭亦輕於殺所謂殺者置之於死而已若轘則以車裂之不止於殺焉所以為輕重不同何也車之進退主於馭馭不職則敗國事此其罪之所以為最重僕掌侍衛之事右掌擊刺之事大史掌占驗之事一或不職皆足以誤軍事此其罪之所以為重至於大夫御命而失其職其罪次之大師聽軍聲而失其職其罪又次之小史官卑而聽不専其失職又次之輕重不同各有攸當使羣吏之聽誓者各以其職而共王命此軍旅之所以無不勝也修閭氏掌比國中宿互柝者與其國粥而比其追胥者而賞罰之禁徑踰者與以兵革趨行者與馳騁于國中者邦有故則令守其閭互惟執節者不幾里門謂之閭以二十五家之閭同門而入所以扞制內外先王設官以修治其事故名之曰修閭氏其職則比國中之事而已比謂檢柅夜士之守宿者互謂行馬以斷夜行者柝謂擊柝以守其閭者國粥謂行粥於國中之市者修閭氏於此從而比之或有盜賊之追胥則又比其所獲之多寡而為之賞罰以至不由梁而徑踰者以兵革趨行於道者與馳騁於國中者皆非國中之所宜有若是者或至於容姦故皆禁之若邦有故則又以防非常令民各守其閭而互之唯執節者不幾則又深辨乎往來緩急之所在國中之禁其嚴如此冥氏掌設􅋃張為阱獲以攻猛獸以靈鼓驅之若得其獸則獻其皮革齒須備庶氏掌除毒蠱以攻説禬之以嘉草攻之凡驅蠱則令之比之穴氏掌攻蟄獸各以其物火之以時獻其珍異皮革翨氏掌攻猛鳥各以其物為媒而掎之以時獻其羽翮此四者之物皆足以害人然有形可求則先王以力勝之故設􅋃張靈鼓以待之而猛獸無所逞其威用攻説嘉草以治之而毒蠱無所肆其毒以至攻蟄獸則火其所食之物以誘其出攻猛鳥則各以其物之媒以誘其下此所以去其物之害人者也或獻其珍異皮革羽翮之類則又有國之利存焉柞氏掌攻草木及林麓夏日至令刋陽木而火之冬日至令剝隂木而水之若欲其化也則春秋變其水火凡攻木者掌其政令除木曰柞故設官謂之柞氏然木生於山而曰及林麓者林則積木者也麓則山之足也夏日至令利陽木而火之冬日至令剝隂木而水之者何輪人之職曰凡斬轂之道必矩其隂陽陽也者稹理而堅隂也者疏理而柔稹理而堅則如栗柘之類疏理而柔則如榆栁之類夏日至而刋陽木又從而火之則木之稹理而堅者不勝其陽且死而不肆矣冬日至而剝隂木又從而水之則木之疏理而柔者不勝其隂且死而不肆矣若欲其化者謂時以種榖也變其水火者謂火陽木於夏至秋則復以水漬之水隂木於冬至春則復以火焚之使其蘖蕩於隂陽相沴之氣則木可化為土而地利和美斯可以為稼穡之利然山虞言仲冬斬陽木仲夏斬隂木與此異者蓋山虞為制器取材者設柞氏為殺木以治田者設也剃氏掌殺草春始生而萌之夏日至而夷之秋繩而芟之冬日至而耜之若欲其化也則以水火變之掌凡殺草之政令翦草曰剃故設官謂之剃氏傳所謂農夫之務去草芟夷而蘊崇之是已此殺草之法也春始生而萌之者謂春陽之盛而生氣始達則不可使之不生故萌之而弗治焉夏日至而夷之則陽極而隂始生生氣鬱矣於是乎可夷秋繩而芟之繩孕也則夷而又孕於是乎可芟冬日至而耜之則用耒金以深殄之若欲其化則以水火變之者以火燒其所芟夷之本末又從而加之以水則其制於隂陽相沴之氣而草化為土矣此賈氏謂剃氏所掌治地從春至冬亦一年之事後年乃可種不特治田而已凡殺草之政令皆然硩蔟氏掌覆夭鳥之巢以方書十日之號十有二辰之號十有二月之號十有二歲之號二十有八星之號縣其巢上則去之翦氏掌除蠧物以攻禜攻之以莽草熏之凡庶蠱之事赤叐氏掌除牆屋以蜃炭攻之以灰灑毒之凡隙屋除其貍蟲蟈氏掌去蛙黽焚牡蘜以灰灑之則死以其煙被之則凡水蟲無聲壺涿氏掌除水蟲以炮土之鼓驅之以焚石投之若欲殺其神則以牡橭午貫象齒而沈之則其神死淵為陵庭氏掌射國中之夭鳥若不見其鳥獸則以救日之弓與救月之矢夜射之若神也則以大隂之弓與枉矢射之上經四官言四物之害則有形可求者也故以力勝之此六官言六物之害則無形可求者也故以智勝之夫六物至微各設一官以去其害殆類不憚煩者蓋萬乘所至或在宫閫或在苑圃或齊宿於郊廟之內或臨御於朝廷之上一物不去則護衛至尊為有闕此所以専設六職以除妖怪隱伏之物今觀剪氏以莽草熏器用之蠧赤叐氏以蜃灰而灑牆屋之毒蟈氏以牡蘜之灰與其煙以去其蛙黽之聒固可信也若夫壺涿氏以炮土焚石而除水蟲又以牡橭午貫象齒以殺其神硩蔟氏書嵗月日辰之號以覆夭鳥之巢庭氏又以大隂救日之弓與救月之枉矢以射其神果何取耶聖人精察乎萬物之理必能通乎變化之道後世巫家猶有禳厭之術醫家猶有攻治之法獨可以是而疑周官乎銜枚氏掌司囂國之大祭祀令禁無囂軍旅田役令銜枚禁嘂呼嘆嗚于國中者行歌哭于國中之道者嚻聲之微而衆者祭祀禁而無嚻而已若軍旅田役則人情雜遝非法之所能禁直使之銜枚枚以竹為之而銜於口所以止言語尚肅也至於聲大急曰嘂聲高而緩曰呼聲怨而嗟曰歎聲悲而傷曰鳴聲過於樂曰歌聲過於哀曰哭若是者皆非國中之所宜有故皆禁之伊耆氏掌國之大祭祀共其杖咸軍旅授有爵者杖共王之齒杖杖所以策也咸所以盛杖也必掌之以伊耆氏蓋古者伊耆氏始為蠟祭以息老物而杖則老者倚之以為息此先王設官之意大祭祀尚敬也雖老者亦弗杖故為之共其杖咸軍旅之事尚威也馭衆必以杖故為之授有爵者杖若夫共王之齒杖則八十杖於朝惟君賜而後用之伊耆氏共之正其職也

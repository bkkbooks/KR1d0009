body:
  text: 周官總義卷三宋易袚撰膳夫掌王之食飲膳羞以養王及后世子食飲膳羞雖曰養王及后世子然后世子謂之及者不敢同乎王也且王者備奉何以謂之養曰有養其徳者有養其體者酒正之五齊三酒四飲則異其酌庖人之六畜六獸六禽則異其獻至於食醬一職亦且眡羮醬飲食之齊均鹹酸辛苦之味㑹牛羊犬豕魚鴈之宜豈真養其體哉昔晉平公燕樂於卿佐有喪之時區區一宰夫乃能酌以飲工而罪其司聰酌以飲嬖而罪其司明酌以自飲而罪其司味且曰味以行氣氣以實志志以定言言以出令臣實司味二御失官而君弗命臣之罪也夫燕樂之戒何與於刀七之職盖用之不以其道行之不以其時肥鮮甘㫖之是耽而貪冐沈酣之弗戢司味之罪與司聰司眀之蔽君徳者等耳其責莫重焉此膳夫之所以奉至尊雖養其體亦所以養君徳也至后世子則特共其膳羞而已然亦掌於膳夫者以見王者之一内外公天下而人主備奉亦且以奄寺主之其初欲以成其私而終至於失嚴重之體忘警戒之意與成周設膳夫之意異矣凡王之饋食用六穀膳用六牲飲用六清羞用百有二十品珍用八物醬用百有二十罋進物於尊者曰饋禮之盛者也成周設内饔之職選百羞醬物珍物以俟饋而後膳夫得以共王者備物之奉故曰凡王之饋何謂饋莫非食也而六穀為食之主黍稷稻粱苽麥是已莫非膳也而六牲為膳之實馬牛羊犬豕雞是已莫非飲也而六飲以清為貴水漿醴凉醫酏是已羞謂庶羞内則所載國君所加庶羞如牛修鹿脯以至柤梨薑桂之類凡三十一物則百有二十品可以類推也珍亦見於内則曰淳熬曰淳母曰炮豚曰炮牂曰擣珍曰漬曰糁曰肝膋凡八物皆味之珍者也醬謂醯人共醯六十罋醢人共醢六十甕合之則為百有二十罋不言醯醢而謂之醬味以醬為主故也凡此皆饋也而饋以食為先膳飲珍羞次之孔子所謂肉雖多不使勝食氣於此可見矣王日一舉鼎十有二物皆有俎以樂侑食膳夫授祭品嘗食王乃食卒食以樂徹于造盛饌曰舉王日一舉則朝食也玉藻曰皮弁以日視朝遂以食日中而餕是已鼎十有二者牢鼎之牛羊豕魚腊腸胃同鼎膚鮮魚鮮腊為鼎凡九陪鼎之臐膷膮為鼎凡三陪鼎實於豆而專以牢鼎為物故言物皆有俎也以樂侑食者王制曰天子食日舉以樂語所謂亞飯三飯四飯皆所以𨗳飲食之和也膳夫授祭者曲禮曰殽之序徧祭之謂無所不祭也而有虞氏以首為主夏后氏以心為主殷人以肝為主周人以肺為主膳夫授王以所祭之物謹之也品嘗食者玉藻曰凡食果實者後君子火熟者先君子物物先嘗而後進則其所防者微矣卒食以樂徹于造者造謂造食之處徹于故處以見有始有卒之義王齊日三舉大䘮則不舉大荒則不舉大札則不舉天地有烖則不舉邦有大故則不舉王日一舉禮之主乎敬者也又有加于此者焉古者祭祀之時散齊七日以齊之致齊三日以定之通神人之交接三才之奥凡所以内養其心者無不極其至故為之三舉亦所以為敬也又有殺于此者王者以四海為家以萬姓為心不幸而有非時之㓙烖不虞之變故凡所以貶抑于已者皆内省自疚之道故為之不舉亦所以為敬也是三者敬皆寓焉孔子謂無終食之間違仁况有天下者乎王燕食則奉膳贊祭凡王祭祀賓客食則徹王之胙俎凡王之稍事設薦脯醢王燕飲酒則為獻主此四者在日舉之外皆王者飲食之禮王燕食者謂日中及夕食非若朝舉為禮之盛故朝舉祭肺而夕祭牢肉此則贊牢肉之祭也凡王祭祀賓客食則徹王之胙俎者胙亦酢也廟享之禮王獻尸尸胙王將幣廟中王祼諸侯諸侯亦胙王胙皆有饌饌皆有爼此所以徹王之胙俎也凡王之稍事設薦脯醢者先鄭以為日中之間食後鄭以為小事而飲酒皆非禮之備此所以設薦脯醢而為王之稍事也王燕飲酒則為獻主者燕義曰臣莫敢與君抗禮也然飲酒謂之燕即孟子所謂養君子之道膳夫為獻主固曰莫敢抗禮然亦廩人繼粟庖人繼肉之意掌后及世子之膳羞庖人共后世子膳夫掌其數而已不敢同乎王也凡肉脩之頒賜皆掌之腊人共之而膳夫掌其頒賜之數凡祭祀之致福者受而膳之以摯見者亦如之羣臣有祭祀而致胙于天子曰致福如都宗人家宗人之致福于國者是已其禮大牢以左肩九箇少牢以左肩七箇犆豕以左肩五箇然後祭僕展而受之膳夫則受之於祭僕而膳之於王所以享羣臣所致之福也司士曰掌擯士者膳其摯盖諸臣以其摯進見於天子如圭璧皮帛則復以班之惟卿之羔大夫之鴈士之雉庶人之鶩工商之雞皆入于膳夫而後膳夫膳之於王所以享諸臣所薦之誠也嵗終則㑹惟王及后世子之膳不㑹經㑹不㑹者五皆所以優尊者也掌皮之不㑹裘與皮事唯王而已外府之不㑹其服酒正之不㑹其飲酒庖人之不㑹其膳禽不特王也而后與焉此言不㑹其膳又非特王與后也而世子與焉世子天下之本而獨不㑹膳何也膳常禮也日用不可廢者也若裘與服則有華靡之戒膳禽飲酒則有盤遊沈湎之戒觀有司之㑹不㑹而先王之待世子者有道矣不㑹者非謂無㑹不可以有司之法㑹之也大宰以九式均節財用其四曰羞服之式大府頒財之市法亦曰闗市之賦以待王之膳服非惟闗市有制不可過取而亦羞服有式不可妄供惟大宰以道制之此膳夫所以不㑹庖人掌共六畜六獸六禽辨其名物凡其死生鱻薧之物以共王之膳與其薦羞之物及后世子之膳羞膳夫之職備物之奉以養乎君者也庖人之職致君之養而辨其物之奉者也六畜即馬牛犬羊豕雞是已六獸即狼麕兔麋鹿野豕是已六禽即羔豚麛雉犢鴈是已此其名也亦其物也而名物之外又有死生鱻薧之物其間或有不時者不中食者臣子其可共之於君父乎凡王之膳與其薦羞庖人辨而共之一刀匕之間而臣子愛君之道著矣共祭祀之好羞共喪紀之庶羞賓客之禽獻祭祀而有好羞若文王之昌歜曾晳之羊棗其生也好之其死也羞之乃事死如事生之意喪紀之庶羞則謂虞祔之祭賓客之禽獻則謂乘禽之數以共王膳羞之官而共之乃所以仁祭祀賓客喪紀也凡令禽獻以灋授之其出入亦如之秋官掌客共賓客之禽獻以爵為之等數此禽獻之法也共之者獸人也煎和之者庖人也故以常數之式法授之方其未授則入以待用及其既授則出以給用彼此互攷不可違乎數也故皆有法焉凡用禽獻春行羔豚膳膏香夏行腒鱐膳膏臊秋行犢麛膳膏腥冬行鱻羽膳膏羶人之一身與天地相為流通參以四時之休王而後可以知萬物之性庖人之用禽獻察乎此而已春草始生則羔豚肥秋草始寔則犢麛肥夏則腒鱐之性為燥冬則鱻羽之性為定此其所行者順乎物之性者也而其所膳者則有理也牛土畜也其膏香而土廢於春犬金畜也其膏臊而金廢於夏雞木畜也其膏腥而木廢於秋羊火畜也其膏羶而火廢於冬其膳以五行之廢者勝其物之太盛者而已以其所勝濟其所順養生之道也嵗終則㑹唯王及后之膳禽不㑹庖人言共王之膳與其薦羞之物及后世子之膳羞則三者之共其膳禽一而已嵗終而王與后不㑹優尊者也而世子不與所以示盤遊之戒也義見膳夫内饔掌王及后世子膳羞之割亨煎和之事辨體名肉物辨百品味之物膳夫掌王及后世子膳羞掌其品式而已共其物則庖人也割亨而煎和之則内饔也割之使解而亨之以鼎煎之使熟而和之以味此所以専設内饔之職左氏載晏子之言曰水火醯醢鹽梅以烹魚肉燀之以薪宰夫和之齊之以味濟其不及以洩其過君子食之以平其心是豈可輕也哉牲有體名或貴或賤牲有肉物或燔或胾以至百品味之物或羞或薦則當辨其可用而去其不可用者於是而調以水火醯醢鹽梅之用此割亨煎和之所以得其善也王舉則陳其鼎俎以牲體實之選百羞醬物珍物以俟饋共后及世子之膳羞俟饋者俟膳夫之饋也膳夫言王日一舉鼎十有二物皆有俎内饔則陳其鼎俎而實以所用之牲體膳夫言羞用百有二十品珍用八物醬用百有二十罋内饔則選其可為羞可為醬可為珍者凡此皆所以俟饋若夫后及世子亦尊矣然其禮不可以敵乎王故不言共内饔共之膳夫掌之辨腥臊羶香之不可食者牛夜鳴則庮羊泠毛而毳羶犬赤股而躁臊鳥皫色而沙鳴貍豕盲眡而交睫腥馬黑脊而般臂螻腥謂雞臊謂犬羶謂羊香謂牛也四者皆可食之物庖人固已用之於四時之膳矣物雖可食而有病於中者必見於外亦不可不辨牛之為物晝作則夜息無故而夜鳴則反常矣其肉必庮羊之為物以柔毛為貴毛長而結聚則非善矣其肉必羶犬股無毛謂之赤疾走不常謂之躁如是者其肉必臊鳥毛失色謂之皫聲細而散謂之沙如是者其肉必貍豕俯首而目不望視望視而交睫其肉必腥馬純色則脊不間黒黒脊而般臂其肉必螻庮惡也貍鬰也螻臭也腥臊羶香亦非正者也其不可食者既為之辨其腥臊羶香矣其可食亦從而辨其體名肉物之用膳夫又為之品嘗其食者其致謹如此凡宗廟之祭祀掌割亨之事凡燕飲食亦如之王及后世子之膳羞言割亨煎和之事宗廟不言煎和而獨以割亨為用以禮之逺人情者為貴耳凡燕飲食亦如之者葢燕而無節必至於荒不言煎和而用割亨防其燕之至於荒也凡掌共羞脩刑膴胖骨鱐以待共膳凡王之好賜肉脩則饔人共之内饔於王舉則實牲體於鼎俎且選百羞珍醬之物其終又言凡掌共羞脩刑膴胖骨鱐以待共膳則非特日舉而已羞庶羞也脩脯也刑鉶羮也膴肉之大臠也胖亦脯之類骨即肉之有骨者鱐即魚之乾者皆所以詳言煎和割亨之事共王之好賜肉脩者若聨於膳夫肉脩頒賜之事然頒賜者嵗時之常賜膳夫為之掌其數示不可以泛予也好賜出於一時之所好饔人共之而已外饔掌外祭祀之割亨共其脯脩刑膴陳其鼎俎實之牲體魚腊凡賓客之飱饔饗食之事亦如之邦饗耆老孤子則掌其割亨之事饗士庶子亦如之師役則掌共其獻賜脯肉之事凡小喪紀陳其鼎俎而實之外饔之於内饔内外之辨也外祭祀謂非宗廟之事若社稷五祀五嶽之類凡其有事於外者是已共其脯修刑膴陳其鼎俎實之牲體魚腊則如内饔之所共所陳所實者凡賓客始至致飱則禮之小者聘日致饔則禮之大者饗禮九獻則以飲為主食禮九舉則以食為主亦如外祭祀之所共所陳所實者耆老謂歸政之老孤子謂死事者之子士庶子則指宿衞於王宫者皆為之掌其割亨之事禮之厚者也師役謂有勞還之禮則掌其獻賜脯肉之事小喪謂王有奠祭之命則亦如祭祀賓客之所共所陳所實者割亨之事不可廢也外饔皆以禮而共之亨人掌共鼎鑊以給水火之齊職外内饔之爨亨煮辨膳羞之物亨人繼於内外饔之後即内外饔之所共所陳所陳者而爨之亨之煮之也易之鼎曰以木巽火亨飪也聖人亨以享上帝大亨以養聖賢此職言共祭祀賓客之大羔鉶羔則無非享上帝養聖賢之事此所以共鼎而復兼以鑊葢俎之所實取於鼎也鼎之所實取於鑊也以給水火之齊者水有多寡火有緩急齊其水火而使之無過無不及然後足以為爨亨煮之善此所以役於内外饔之職而為之辨其膳羞之物祭祀共大羹鉶羹賓客亦如之太古煮六牲而不和謂之大羹後世和之以味而調以陪鼎盛以鉶噐謂之鉶羔聖人於祭祀之時非味之貴始不忘乎古所以崇徳也終必備其味所以致其徳之實也賓客亦如之者荀卿曰大饗先大羮貴飲食之本也食公大夫禮有十六豆之臐膷膮是鉶羹實于豆而謂之庶羞也賓客之與祭祀何間焉然必職之亨人者謂亨飪之事亦以知本為貴甸師掌帥其屬而耕耨王籍以時入之以共齍盛祭祀共蕭茅共野果蓏之薦耕籍之職何以謂之甸周人以公邑之田任甸地距王城二百里然禹貢五百里甸服則舉王畿皆甸也甸地之所以奉祭祀者非一物而實先於王籍籍田則近在王城之外故城外耕籍之地亦得謂之甸賈氏所謂南郊千𤱔是已方孟春之月躬耕籍田天子三推三公五推卿大夫九推庶人終焉庶人即序官所謂胥三十人徒三百人乃庶人之在官者甸師之帥其屬帥此而已以時入之者麥以夏熟稻以秋熟以時入之于地官之廪人也共其齍盛者在榖曰齍在噐曰盛廪人所謂大祭祀共其接盛是也不特此而已蕭合黍稷亦以祭脂茅以共蒩亦泲酒醴此正甸地之所出也故甸師共之蒩生曰果桃李之屬蔓生曰蓏𤓰瓞之屬言野果蓏之薦則正在郊外六遂之野也故甸師共之以至㣲物如薪蒸之材亦皆於此乎出地之所有無乎不備名官以甸則其所致者逺矣喪事代王受𤯝烖𤯝烖言於喪事之後則非大喪也大祝曰大喪贊歛徹奠言甸人讀禱鄭氏謂禱于籍田之神以弭後殃此國之大喪王自受其𤯝烖禱而弭之反己自疚之道也甸人特讀禱而巳此止言喪事則甸師代為之禱毋乃黍稷之非馨歟毋乃薦獻之不誠歟亦所以致禱於籍田之神以奉祭祀之官而為之代受𤯝烖職也王之同姓有辠則死刑焉帥其徒以薪蒸役外内饔之事死與刑為二等重罪則死于甸輕罪則刑于甸同姓有罪而不免乎死與刑者法也死刑于甸而不忍暴之於外者情也文王世子曰公族有死罪則磬於甸人謂其罪之重者又曰其刑罪則纎剸亦告于甸人謂其罪之輕者又曰獄成有司讞于公其死罪則曰某之罪在大辟其刑罪則曰某之罪在小辟公曰宥之有司又曰在辟公又曰宥之有司又曰在辟及三宥不對走出致刑于甸人公又使人追之曰雖然必赦之有司對曰無及也反命于公公素服不舉為之變如其倫之喪無服觀文王世子一章之義殆若委曲致意而非其真情者然權之以義則知天下之至情莫大乎是盖人主以情為尚而有司以法為先周先王雖不以法而忘乎情亦不以一人之私情而廢萬世之公法此所以有甸師之職然以奉祭祀之甸地而待死與刑之罪亦足以見王者不私其親之意愚按甸師非㫁獄之官但待刑殺耳黄氏曰同姓死刑于是事人事鬼無二道也詩曰惠于宗公神罔時怨神罔時恫刑于寡妻至于兄弟以御于家邦反道敗類近在其族教帥之不至忝其先人寧不自愧乎死刑于是盖自以為事鬼之未盡怨恫之必不能免也記曰不與國人慮兄弟兄弟之有可慮麟趾仁厚之化安在哉如此則知冢宰設屬大意獸人掌罟田獸辨其名物冬獻狼夏獻麋春秋獻獸物時田則守罟及弊田令禽注于虞中凡祭祀喪紀賓客共其死獸生獸凡獸入于腊人皮毛筋角入于玉府凡田獸者掌其禁令獸網謂之罟田獸者取所當田之獸也凡祭祀喪紀賓客須獸以為用則所謂當田者有名必有物辨其名物而冬夏為之各獻春秋為之雜獻者何也冬獻狼則狼膏聚而温夏獻麋則麋膏散而凉春方孳乳未可取者不當獻秋已蕃庶茍可獻者在所用皆所以順乎四時之宜而已此大司馬所以行時田之政時田則守罟者以至尊所御而防奔觸之患及弊田令禽注于虞中者令以所𫉬注虞旗之中而欲其趨赴之速祭祀賓客喪紀共其死獸生獸者即與庖人共其死生之物者同意未共者入于腊人備膳羞之用也皮毛筋角入于玉府備玩好之用也故田獸之政令皆掌之䱷人掌以時䱷為梁春獻王鮪辨魚物為鱻薧以共王膳羞凡祭祀賓客喪紀共其魚之鱻薧凡獻者掌其政令凡䱷征入于玉府田謂之時田則四時因田以講武若䱷人所取則不必四時皆具也以時䱷為梁而已梁水偃也偃水為闗空以笱承其空焉詩所謂敝笱在梁其魚唯唯是已是以孟春之月獺祭魚然後虞人入澤梁取之以時也季春之月獻王鮪天子以薦寢廟獻之以時也四時惟夏不取魚魯宣公濫于泗淵里革諫其非時以夏則水蟲成故也若夫秋獻龜魚則秋未嘗不獻也特以備禮之用而已不如澤梁之盛此䱷為主祭祀賓客喪紀共其魚之鱻薧則不敢妄共也凡䱷者掌其政令則不敢妄取也䱷征入于玉府與獸人同鼈人掌取互物以時簎魚鼈龜蜃凡貍物春獻鼈蜃秋獻龜魚祭祀共蠯蠃蚳以授醢人掌凡邦之簎事互物介物也凡龜蜃與鼈皆物之有介者也鼈人獨以鼈名官而不及龜與蜃者龜之為物王用以卜蜃之為物王用以飾噐初非可食之物凡介物之美而可食者惟鼈而已詩言顯父之餞韓侯則曰炰鼈吉甫之飲諸友亦曰炰鼈則其美為可知以此奉至尊則其名官宜矣簎謂刺取於泥中者凡貍物則其泥中之所藏者若魚亦謂之簎則非䱷人澤梁之所取者䱷人既䱷魚矣此復言魚魚對龜鼈蜃而言亦謂其貍藏於泥中非網罟所可致者蠯蛤也蠃螔蝓也蚳蛾子也此物之至㣲而先王用之於祭祀者非以為飲食之道内盡其志外盡其物而已記曰不敢用常褻味而貴多品所以交於神明者非食味之道也此三者亦貍物之類故皆言簎腊人掌乾肉凡田獸之脯腊膴胖之事凡祭祀共豆脯薦脯膴胖凡腊物賓客喪紀共其脯腊凡乾肉之事脯腊膴胖皆以乾肉為主者也而腊人獨以腊名官者腊為易乾之物故以腊人掌乾肉而脯膴胖則兼掌也王者時田所得之獸或當為脯為腊為膴為胖則腊人皆為之掌其事祭祀所共者鄭氏謂脯非豆實豆當為羞其然耶王制云天子諸侯無事嵗三田一為乾豆釋者謂腊之以為祭祀之豆實也則脯亦有實於豆者矣脯實於豆而又與膴胖腊物同薦則祭祀貴乎物品之備賓客喪紀則脯腊凡乾肉而已醫師掌醫之政令聚毒藥以共醫事凡邦之有疾病者疕瘍者造焉則使醫分而治之嵗終則稽其醫事以制其食十全為上十失一次之十失二次之十失三次之十失四為下食醫掌和王之六食六飲六膳百羞百醬八珍之齊食飲膳羞珍醬之齊既以時而眡之鹹酸苦辛滑甘之調又以時而和之牛羊犬豕魚鴈之宜又以其物而㑹之凡所以資助其血氣而調適其體膚者無不盡其至則疾病何從而生不待醬為然始於膳夫以至庖人亨人酒漿醯醢茍可以助王之養者食醫皆從而和之是知醫以食名不待治其疾而治其致疾之本人臣愛其君之大者也凡食齊眡春時羹齊眡夏時醬齊眡秋時飲齊眡冬時凡和春多酸夏多苦秋多辛冬多鹹調以滑甘凡㑹膳食之宜牛宜稌羊宜黍豕宜稷犬宜粱鴈宜麥魚宜苽凡君子之食恒放焉眡比也人之食物别聲被色未有不本於五行者而五行以四時為主食齊四時常温比於春時羹齊四時常熱比於夏時醬齊四時常凉比於秋時飲齊四時常寒比於冬時皆所以調四時之和養五臟之不足然四肢五臟化為五氣又應於四時之五行春為木而味多酸以養肝也夏為火而味多苦以養心也秋為金而味多辛以養肺也冬為水而味多鹹以養腎也脾土王於四季故皆調以滑甘若夫膳食之宜則又五行之理周流而宣暢散於萬物而通行於一身何為宜牛土畜而稌金穀也豕水畜而稷土穀也犬金畜而梁火穀也鴈火禽而麥木穀也羊與黍皆火之類也魚與苽皆水之類也或以相生為義或以相濟為義或以相勝為義皆所以順萬物之理而調隂陽寒温之性食醫之所和者如此疾醫掌養萬民之疾病天有六氣謂隂陽風雨晦眀皆足以傷形人有六疾謂寒熱末腹惑心皆足以傷氣運行於榮衛周流於四肢交通則為和有餘不足則為疾茍調養不得其道而與之適相值焉是以疢疾交攻甚者或至病此疾醫於萬民疾病而言養者精察乎六疾之本而順適乎六氣之運此醫之良者也四時皆有癘疾春時有痟首疾夏時有痒疥疾秋時有瘧寒疾冬時有𠻳上氣疾凡人四時之間冬傷於寒而陽為主於内寒不能勝春木用時而陽氣𤼵於外然後寒氣搏之而為之痟首之疾春木為肝而主色火盛於夏以子勝母故暑氣溢而為痒疥之疾夏傷於暑而隂為主於内暑不能勝秋金用時而隂氣𤼵於外然後暑氣搏之而為瘧寒之疾秋金為肺而主聲水盛於冬以子勝母故寒氣壅而為嗽上氣之疾四者皆四時不和之氣故謂之癘以五味五穀五藥養其病以五氣五聲五色眡其死生兩之以九竅之變參之以九藏之動智者調其五藏百疾自愈此五味五穀至參之以為養疾之本也不得已而須五藥之用亦必和其金石草木肉之齊此五藥所以亦謂之養又不得已而五藥未效則必從而眡其生死眡之者何以醫經攷之五藏病於内者也五氣五聲五色則病之應於外者也所謂五氣者肝氣温心氣熱脾氣和肺氣凉腎氣寒是已所謂五聲者肝聲呼心聲笑脾聲歌肺聲哭腎聲呻是已所謂五色者肝色青心色赤脾色黄肺色白腎色黒是已此三者皆出於五藏眡其或逆或順則可以决疾者之生死九竅者陽竅七隂竅二皆有形而見於外者觀其證之變而有通塞之二候故曰兩九藏者正藏五府藏四皆有形而藏於内者察其脉之動而有浮中沈之三部故曰參以要而言九藏皆不出乎五藏而闗乎九竅兩之參之而得其要則五藥可用而醫無過誤之失矣凡民之有疾病者分而治之死終則各書其所以而入于醫師王者於萬民疾病皆欲獲全生之效故命疾醫分而治之不幸而至死終則各書其死終之證而入於醫師以制其食之髙下而為衆醫之懲勸於死終者如此則其於生者可知瘍醫掌腫瘍潰瘍金瘍折瘍之祝藥劀殺之齊凡療瘍以五毒攻之以五氣養之以五藥療之以五味節之凡藥以酸養骨以辛養筋以鹹養脉以苦養氣以甘養肉以滑養竅凡有瘍者受其藥焉四瘍雖異疾皆在表故直注藥於其上祝之聲為注理然也劀謂刮去其敗血殺謂蝕去其惡肉盖腫者欲散潰者欲合傷者欲復㫁者欲續故必先攻之以五毒而後養以五藏之氣五氣調適而後療之以五藥節之以五味且食有五味藥亦有五味以酸養骨者酸屬肝而腎主骨從其相生者以子養母之道也然治瘍以骨為主而筋也脉也氣也使其過盛則反以相傷肝木也而生於筋故以辛養之心火也而生於脉故以鹹養之肺金也而生於氣故以苦養之從其相勝者而言抑其過盛而養其不及故也肉以甘養之竅以滑養之以類從類而已獸醫掌療獸病療獸瘍凡療獸病灌而行之以節之以動其氣觀其所𤼵而養之凡療獸瘍灌而劀之以𤼵其惡然後藥之養之食之凡獸之有病者有瘍者使療之死則計其數以進退之經言六畜又言六獸此所謂獸則六畜之獸也六畜所養或供犧牲或供膳羞或以任重致逺其為用廣矣此獸醫所以列於疾醫瘍醫之後然先王仁民愛物未嘗無等差存焉以獸之病為難知則必灌其藥而使行焉不過節之養之而已以獸之瘍為易見則必灌以藥而刮去其惡肉亦不過藥之養之食之而已其先後詳畧固見於此以至人之疾者瘍者其醫為一在人則以十全為上死終則為次為下而有懲勸之法在獸則進退之而已又所以貴人而賤畜也其與恩及鳥獸而功不至於百姓者異矣

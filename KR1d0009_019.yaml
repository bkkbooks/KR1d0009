body:
  text: 周官總義卷十九宋易祓撰大僕掌正王之服位出入王之大命掌諸侯之復逆王視朝則前正位而退入亦如之此經正與司士一職互文見義司士正朝儀之位王南鄉則王之位也雖言王位而非正王位之職所正者羣臣之位其曰三公北靣東上孤東靣北上卿大夫西靣北上王族故士虎士在路門之右南靣東上大僕大右大僕從者在路門之左南靣西上羣臣既正其位矣然後大僕自路門之左立於王前故曰大僕前所以正王位又言王入內朝皆退鄭氏引玉藻之言曰朝服以日視朝於內朝辨色始入君日出而視之退適路寢聽政謂諸侯也言諸侯則天子亦然謂王入路門聽政於路寢則羣臣各退向治事之處若據司士所言皆退疑若大僕亦隨羣臣而退今考此經文意則大僕實未嘗退所言王視朝則前正位而退乃是退立於路門之本位以俟朝畢及王入路門而聽政路寢則羣臣雖退而大僕復入正路寢之位司士不及此者以其所正者羣臣之位朝畢則退而已大僕掌正王位則無往不從故王入亦如之詳略不同亦各以其職云建路鼓于大寢之門外而掌其政以待達窮者與遽令聞鼓聲則速逆御僕與御庶子祭祀賓客喪紀正王之服位詔法儀贊王牲事王者祭祀之服六司服之六服是也賓客之服二司服所言饗射則鷩冕視朝皮辨服是也喪紀之服一司服所言凶事服辨服是也其位則隨事而立無非大僕之所正王出入則自左馭而前驅不敢自右以周人尚右尊君也凡軍旅田役贊王鼓救日月亦如之大司馬搜田之禮王執路鼓必待司馬辨之而後大僕贊之鼓人於救日月則詔王鼓必待鼓人詔之而後大僕贊之王皆為之親鼓焉其義見於大司馬及鼓人大喪始崩戒鼓傳達于四方窆亦如之始崩及窆擊鼓以戒衆人且傳達于四方使四方知喪禮也縣喪首服之法于宫門掌三公孤卿之弔勞王燕飲則相其法王射則贊弓矢王視燕朝則正位掌擯相王不眂朝則辭于三公及孤卿小宗伯既已縣衰冠之式于路門之外此復縣首服之法于宫門者首服則婦人之服衰冠則男子之服小臣掌王之小命詔相王之小法儀掌三公及孤卿之復逆正王之燕服位王之燕出入則前驅大祭祀朝覲沃王盥小祭祀賔客饗食賔射掌事如大僕之法掌士大夫之弔勞凡大事佐大僕小臣佐大僕者也大僕出入王之大命此則言辭告語之末故掌王之小命大僕詔王之法儀此則趨行拱揖之容故詔相王之小法儀大僕於眂朝及禮之大者正其服位此則正王之燕服位大僕於王之大禮路車出入則曰左馭而前驅此於王燕出入則前驅以至大僕掌諸侯之復逆而此則掌三公及孤卿之復逆大僕掌三公孤卿之弔勞而此則掌士大夫之弔勞凡此無非大僕掌其大而小臣掌其小也小臣所得而專者大祭祀沃王盥而已然先王設小臣之職亦猶后之有內小臣而內小臣所掌反同於大僕何也大僕正王之服位而內小臣亦正后之服位大僕出入王之大命而內小臣亦掌王后之命大僕於王之出入則曰左馭而前驅內小臣於后之出入亦前驅大僕於祭祀賔客喪紀則詔法儀於眂燕朝則掌擯相內小臣亦擯詔后之禮事蓋內小臣之於大僕則內外之辨小臣之於大僕則大小之辨祭僕掌受命于王以眂祭祀而警戒祭祀有司紏百官之戒具既祭帥羣有司而反令以王命勞之誅其不敬者大喪復于小廟凡祭祀王之所不與則賜之禽都家亦如之凡祭祀致福者展而受之凡祭祀受胙謂之受福言神錫之福而君受之也都宗人家宗人于國之祭祀有司皆致其福于王祭僕則展而受之膳人則受而膳之則祭祀之誠至矣御僕掌羣吏之逆及庶民之復與其弔勞御僕所掌復逆視大僕小臣有尊卑小大之異視宰夫有甚不同者此謂庶民非萬民之衆所謂羣吏則府史胥徒之在官者亦非諸臣也諸臣則諸侯羣臣咸與非御僕所得而並言然宰夫於諸臣言復此於庶民言復宰夫於萬民言逆此於羣吏言逆所謂復逆者蓋通上下言之也以大僕掌三公孤卿之弔勞小臣掌大夫士之弔勞推之此亦羣吏之弔勞也大祭祀相盥而登大喪持翣掌王之燕令以序守路鼓此喪祭之冗事故御僕掌令𨽻僕掌五寢之掃除糞灑之事祭祀修寢玉行洗乘石掌蹕宫中之事大喪復于小寢大寢於宫中為之蹕致其肅也辨師掌王之五冕皆玄冕朱裏延紐五采繅十有二就皆五采玉十有二玉笄朱紘諸侯之繅斿九就瑉玉三采其餘如王之事繅斿皆就玉瑱玉笄鄭氏曰侯當作公上公九命故九就三采朱白蒼也繅斿皆就又總言侯伯子男之冕侯伯七命則七就也子男五命則五就也王之皮辨會五采玉璂象邸玉笄王之吉服其辨三皮辨用之於視朝韋辨用之於兵事冠辨用之於田獵兵田之辨有時而用之者也皮辨視朝則日視朝之禮其用數矣此辨師所以特言皮辨之制會五采玉璂者詩謂會辨如星言縫中飾之以玉爍爍而處狀似星也又曰其辨伊綦言其文也詩又作騏騏馬青驪文也象邸者以象骨飾辨內項上之邸以眀託宿之義而貫之以玉笄者也此所謂皮辨之制若夫韋辨即爵辨也所謂爵辨絰䊷衣是已冠辨即元端也所謂元衣素裳是已二辨與皮辨素積相似微有損益言皮辨則韋辨冠辨在其間王之辨絰辨而加環絰諸侯及孤卿大夫之冕韋辨皮辨辨絰各以其等為之而掌其禁令上言上公玉繅之數而兼言諸侯之繅斿皆就末及夫冕玉之制此經言諸侯之冕辨而兼及卿大夫冕辨之制蓋侯伯之冕七就用玉九十有八而繅皆三采子男之冕五就用玉五十而繅皆二采以至孤四就用玉三十二三命之卿三就用玉十八再命之大夫再就用玉八朱緑而已其韋辨皮辨則侯伯璂飾七而玉皆三采子男璂飾五而玉皆二采孤則璂飾以四三命之卿璂飾以三再命之大夫璂飾以二亦朱緑而已辨絰雖無飾亦有等殺此不言士者司服所謂士之服自皮辨而下則皮辨亦士服也司甲闕司兵掌五兵五盾各辨其物與其等以待軍事及授兵從司馬之法以頒之及其受兵輸亦如之及其用兵亦如之祭祀授舞者兵大喪廞五兵軍事建車之五兵會同亦如之如考工之六等與夫廬人之六建莫不建之以備軍旅會同之用司戈盾掌戈盾之物而頒之頒之以給祭祀軍旅會同之用祭祀授旅賁殳故士戈盾授舞者兵亦如之軍旅會同授二車戈盾建乘車之戈盾授旅賁及虎士戈盾及舍設藩盾行則斂之皆所以衛至尊尚崇嚴也司弓矢掌六弓四弩八矢之法辨其名物而掌其守藏與其出入中春獻弓弩中秋獻矢箙及其頒之王弓弧弓以授射甲革椹質者夾弓庾弓以授射犴侯鳥獸者唐弓大弓以授學射者使者勞者其矢箙皆從其弓或謂王弓􅋃弓往體寡來體多宜為弱弓何謂之強夾弓庾弓往體多來體寡宜為強弓何謂之弱賈氏曰往寡來多者弛之五寸張之一尺五寸往多來寡者張之五寸弛之一尺五寸往來若一者弛之一尺張之亦一尺其理可信故王􅋃授射甲革椹質者皆射堅者也非強而何夾庾授射犴侯鳥獸者則皆射近者也非弱而何唐大往來均則強弱中以授學射者使者勞者蓋用強弱之中則逺近焉可也凡弩夾庾利攻守唐大利車戰野戰凡矢枉矢潔矢利火射用諸守城車戰殺矢鍭矢用諸近射田獵矰矢茀矢用諸弋射恆矢庳矢用諸散射天子之弓合九而成規諸侯合七而成規大夫合五而成規士合三而成規句者謂之弊弓凡祭祀共射牲之弓矢澤共射椹質之弓矢大射燕射共弓矢如數并夾大喪共明弓矢凡師役會同頒弓弩各以其物從授兵甲之儀田弋充籠箙矢共矰矢凡亡矢者弗用則更弓之強弱因人之形體志慮血氣不可以尊卑言經必以尊卑言者設此以眀分而已六弓之體雖係乎分而六弓之用實關乎力繕人掌王之用弓弩矢箙矰弋決拾掌詔王射贊王弓矢之事凡乘車充其籠箙載其弓弩既射則斂之無會計箙可以盛矢詩所謂魚服是已矰則矢之有繳者用之於弋詩所謂弋鳬與雁是已稿人掌受財于職金以齎其工弓六物為三等弩四物亦如之弓凡六物皆視其身之長短而為三等之制弩四物亦三等又眂其弓之長短而為之也矢八物皆三等箙亦如之矢人為矢曰五分其長而羽其一注謂羽者六寸則知矢長三尺是恆庳矰茀枉潔殺鍭之矢凡八物皆視其弓弩之勢以三尺增減其長短而為三等之制箙以盛矢亦為三等又視矢之長短而為之春獻素秋獻成此經繼於弓弩矢箙之下即弓弩矢箙皆春獻素秋獻成也鄭氏釋之則曰矢箙春作秋成而不及弓弩者蓋以弓人為弓之制自冬析幹春液角以至寒奠體氷析灂春被弦則一年之事合於司弓矢中春獻弓弩之説故不及弓弩而專言矢箙考此文意則矢箙取乎秋之獻其成而弓弩亦未嘗不同其獻然司弓矢之説與稿人之説何其不同耶蓋稿人受財于職金以齎其工故工以時而獻其器春為始事則獻素秋為既事則獻成乃入功於司弓矢焉然後司弓矢取稿人之所已成者為中春中秋之獻故止言獻而已與稿人所謂獻素獻成者各有次第不相侵紊豈可牽強而求合乎弓人為弓之説要之弓人為弓之制未必皆稿人之法鄭説類乎鑿書其等以饗工乘其事試其弓弩以下上其食而誅賞乃入功于司弓矢及繕人凡齎財與其出入皆在稿人以待會而考之亡者闕之饗固足以示其恩未足以示勸懲之方必因其工事而乘之乘與宰夫乘其財用之出入同謂計其所作之事而試其所作之藝試之既審則巧拙良窳皆有不可掩善者為之上其食不特上食而已其尤善者必有賞不善者為之下其食不特下其食而已其尤不善者必有誅戎右掌戎車之兵革使詔贊王鼓傳王命于陳中會同充革車盟則以玉敦辟盟遂役之贊牛耳桃茢傳於大司馬而達於軍中齊右掌祭祀會同賔客前齊車王乘則持馬行則陪乘所以嚴翼衛也凡有牲事則前馬牲事前馬是齊右於齊車之事無一不致其敬也而祭祀會同賔客之禮行矣道右掌前道車王出入則持馬陪乘如齊車之儀自車上諭命于從車詔王之車儀王式則下前馬王下則以蓋從道右在車則為右下車則為從左右前後無乎不在雖下車之際亦未嘗不以儀而輔乎王也然道右言下車以蓋從而齊車不言者齊以敬神為主道以尊君為主各有所寓焉爾大馭掌馭玉路以祀及犯軷王自左馭馭下祝登受轡犯軷遂驅之及祭酌僕僕左執轡右祭兩軹祭軓乃飲凡馭路行以肆夏趨以采薺凡馭路儀以鸞和為節軷為道祭以南郊之祀在國門八里之外故有犯軷之事王非所以為馭而自馭者以敬已之道敬神也大馭非所以為祝而使之祝者以事人之道事神也王者行郊祀之禮其動靜出處宜與天為一然出戶而巫覡有事出門而宗祝有事出郊而僕馭有事非必於神也致謹於禮而已戎僕掌御戎車掌王倅車之政正其服王于軍事服韋辨而有爵者之乘王倅車亦韋辨服所以衛護至尊而重軍旅之威然有等殺存焉故戎僕從而正之此即倅車之政也犯軷如玉路之儀凡巡守及兵車之會亦如之掌凡戎車之儀上文言馭戎車則王之革路此言凡戎車則衆之兵車也武王戎車三百兩其進退之節不愆于六步七步不愆于四伐五伐六伐七伐乃止齊焉則戎車之儀可知至大司馬於搜田之時亦有所謂坐作進退疾徐疏數之節戎僕所以掌其儀者此也齊僕掌馭金路以賔朝覲宗遇饗食皆乘金路其法儀各以其等為車送逆之節大行人言賔主車介步數皆曰朝位是知非特在廟之禮况經言饗食列于朝覲宗遇之後則是數者皆有送逆之法眀矣餘見大行人及樂師道僕掌馭象路以朝夕燕出入其法儀如齊車掌二車之政令二車猶掌其政令則道車之用嚴矣田僕掌馭田路以田以鄙掌佐車之政設驅逆之車令獲者植旌及獻比禽凡田王提馬而走諸侯晉大夫馳馭夫掌馭二車從車使車分公馬而駕治之校人掌王馬之政辨六馬之屬種馬一物戎馬一物齊馬一物道馬一物田馬一物駑馬一物凡頒良馬而養乘之乘馬一師四圉三乘為皂皂一趣馬三皂為繫繫一馭夫六繫為廄廄一僕夫六廄成校校有左右駑馬三良馬之數麗馬一圉八麗一師八師一趣馬八趣馬一僕夫鄭以僕夫為上士非也玉路之僕曰大馭金路之僕曰齊僕象路之僕曰道僕木路田僕也革路戎僕也總而名之曰僕夫五僕中惟道僕田僕為上士大馭戎馭為中大夫齊僕為下大夫豈皆上士乎不然則良馬五種既以駕五路所謂僕夫者非五路之僕而何六廄成校則一千二百九十六匹也校有左右則二校為十二廄凡馬之數當計二千五百九十二匹鄭氏謂校變言為成者眀六馬各一廄而王馬少備也由此觀之則良馬五種分為十廄駑馬一種分為二廄一廄之馬凡二百一十六匹則二廄之馬為四百三十二匹矣以良馬一種而在二廄者四百三十二匹則五種十廄合二千一百六十匹外二廄為駑馬一種當四百三十二匹正合十二廄二千五百九十二匹之數天子十有二間馬六種邦國六間馬四種家四間馬二種凡馬特居四之一春祭馬祖執駒夏祭先牧頒馬攻特秋祭馬社臧僕冬祭馬步獻馬講馭夫凡大祭祀朝覲會同毛馬而頒之飾幣馬執撲而從之凡賔客受其幣馬大喪飾遣車之馬及葬埋之田獵則帥驅逆之車凡將事于四海山川則飾黃駒凡國之使者共其幣馬凡軍事物馬而頒之等馭夫之祿宫中之稍食天子有十二間謂六廄成校而校有左右故十二也邦國六間家四間直謂一廂不分左右耳邦國六間馬四種者謂良馬三間為齊馬道馬田馬而駑馬三良馬之數亦三間是三間良馬為六百四十八匹三間駑馬亦六百四十八匹總六間為一千二百九十六匹也家四間馬二種者謂良馬一間而駑馬三良馬之數亦三間是一間良馬為二百一十六匹三間駑馬為六百四十八匹總四間為八百六十四匹趣馬掌贊正良馬而齊其飲食簡其六節掌駕説之頒辨四時之居治以聽馭夫巫馬掌養疾馬而乘治之相醫而藥攻馬疾受財于校人馬死則使其賈粥之入其布于校人牧師掌牧地皆有厲禁而頒之孟春焚牧中春通淫掌其政令凡田事贊焚萊廋人掌十有二間之政教以阜馬佚特教駣攻駒及祭馬祖祭間之先牧及執駒散馬耳圉馬正校人員選凡馬八尺以上為龍七尺以上為騋六尺以上為馬以象天駟為蒼龍之星是其品之尤異者唯天子可備乘路之駕月令言駕蒼龍是也以騋之牝驪牡玄是其色之尤異者天子諸侯得以兼用詩于衛文公言騋牝三千是也圉師掌教圉人養馬春除蓐釁廄始牧夏庌馬冬獻馬射則充椹質茨牆則剪闔充澤宫習武之居剪闔以茨牆也二者皆圉人所習故圉師因而使之圉人掌養馬芻牧之事以役圉師凡賔客喪紀牽馬而入陳廞馬亦如之賔客之時陳馬於館喪紀而葬陳馬於廟遣車眀器之時則陳之於壙以圉人養馬故使之牽而陳之

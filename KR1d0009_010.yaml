body:
  text: 周官總義卷十宋易祓撰旅師掌聚野之鋤粟屋粟間粟而用之間粟即甸地間田所出之粟以質劑致民平頒其興積施其惠散其利而均其政令行之以王命則謂之施惠行之以有司之常法則謂之散利無多寡不均之患故謂之均此先王所以待凶荒之民也凡用粟春頒而秋斂之春頒者平頒其興積秋斂者聚野之鋤粟屋粟而用之蓋凶荒之歲秋雖不熟尚有餘積或可移用及春作之始苟非上之人為之補助則將有救死不贍之患此先王所以專立春頒之法漢之春和議賑貸正與同意凡新氓之治皆聽之使無征役以地之媺惡為之等或謂旅師之新氓繼於鄰長之後即民之徙于他邑而為之授者然他邑居亦六遂之邑乃遂人以下劑致氓之法非旅師以質劑致民之法觀旅師一職言平頒興積以至使無征役始末皆凶荒補助之政大司徒之荒政十有二不言移民之事若食不能人二釜有非荒政所能聚者然後廪人為之移民就榖凡質劑所致者悉補助之或受廛為氓則謂之新氓此所以有旅師之法或謂新氓之治與遂人下劑致氓之説同是不然遂人致氓以下地而此之授地則以媺惡為之等不止乎下地也鄭氏以下劑為家取二人而此則使人之無政役併與二人亦不役也是知遂人乃致氓之常法旅師乃凶荒補助之法使無征役非盡使之無也王制曰自諸侯來徙家期不從政則從於遂者亦可知要必限以歲月之期然後以地之媺惡為之等媺謂不易之上地惡謂再易之下地以三地為輕重之等至期則征役行之稍人掌令丘乘之政令丘即四邑為丘乘即四丘為甸之所出總名之曰丘乘軍制之始也世之言軍制者曰五人為伍至萬二千五百人為一軍六鄉六軍凡七萬五千人為千乘王畿十倍其數則七十五萬人為萬乘是每乘當用七十五人今以丘乘推之四丘為甸甸之為井者凡六十有四其為夫者凡五百七十有六以五百七十六夫而使之共出革車一乘甲士三人步卒七十二人其軍制亦止於用七十五人何也曰家出一人為正卒此徒役之大數甸出革車一乘此出軍調發之數是知每次調發則五百七十六家共出七十五人并一革車其餘未調發者可以應八次調發之數所謂萬二千五百人為一軍者非盡發此六鄉之人合諸乘之丘共為一軍也或曰萬二千五百家為一鄉有比閭族黨州鄉之名故萬有二千五百人為一軍即有伍兩卒旅師軍之數今合諸乘共為一軍而亦有伍兩卒旅師軍者何也曰居鄉則寓兵之制出軍則部伍之數古者軍國異容不明言之六遂之間既以伍兩卒旅師軍為萬二千五百人之聯及其用也亦以諸乘萬二千五百人而統之以伍兩卒旅師軍之法使其戰陳行列之際無異乎平時統率之義此丘乘之制政令于是乎出若有會同師田行役之事則以縣師之法作其同徒輂輦帥而以至治其政令以聽於司馬大喪帥蜃車與其役以至掌其政令以聽於司徒以其同井而耕同里而居帥而為役謂之同矣委人掌斂野之賦斂薪芻凡疏材木材凡畜聚之物以稍聚待賔客以甸聚待羈旅凡其餘聚以待頒賜以式法共祭祀之薪蒸木材賔客共其芻薪喪紀共其薪蒸木材軍旅共其委積芻薪凡疏材共野委兵器與其野囿財用凡軍旅之賔客館焉薪芻疏材木材之類實祭祀賔客喪紀軍旅之切於用者物雖至微無非大宰之式法土均掌平土地之政以均地守以均地事以均地貢以和邦國都鄙之政令刑禁與其施舍禮俗喪紀祭祀皆以地媺惡為輕重之法而行之掌其禁令此即閭師任民之職而均之也自農圃至藪牧皆謂之地守自耕植至畜養皆謂之地事自九榖草木鳥獸至山澤之材皆謂之地貢均之則高下媺惡重輕適其平草人掌土化之法以物地相其宜而為之種凡糞種騂剛用牛赤緹用羊墳壤用麋渴澤用鹿鹹潟用貆勃壤用狐埴壚用豕疆㯺用蕡輕爂用犬八物皆以糞化草蕡則獨以草化之耳稻人掌稼下地職方氏辨九州之國皆有所宜之榖惟稻一種獨宜於荆揚蓋荆揚二州厥土惟塗泥乃沮洳下濕之地故言其榖宜稻此稻人所以掌稼下地以瀦畜水以防止水以溝蕩水以遂均水以列舍水以澮寫水以涉揚其芟使作田稻稼下地宜於水而已然水所以養稼亦所以害稼使水之往來不窮而下地無早潦之憂亦恃吾之所以治水者有其道耳凡稼澤夏以水殄草而芟夷之澤草所生種之芒種旱暵共其雩斂喪紀共其葦事􅉭種稻之有􅉭者土訓掌道地圖以詔地事道地慝以辨地物而原其生以詔地求王巡守則夾王車誦訓掌道方志以詔觀事掌道方慝以詔避忌以知地俗王巡守則夾王車此二官為王巡守設也且地圖掌於司徒方志掌於外史更何與於此二官之職今土訓總言天下之地圖以詔地事之利害誦訓分言天下之方志以詔觀事之媺惡非巡守而何然王者巡守四方雖萬乘之尊儀衛嚴備無不順適其所欲至於五方異氣寒燠燥濕異候剛柔輕重異齊茍不為之精察其利害媺惡則非臣子愛君之道故土訓於詔地事之後為之道地慝以辨地物而原其生以詔地求者此以膳羞奉養為主也誦訓於詔觀事之後為之道方慝以詔辟忌以知地俗者此以次舍居處為主也二者既詔其慝則能精察其利害媺惡然後膳夫庖人得以别其品掌次掌舍得以辨其宜二官實左右之山虞掌山林之政令物為之厲而為之守禁山有虞林有衡此兼言掌山林之政令者以林衡受法於山虞也所受之法即所守之厲禁仲冬斬陽木仲夏斬陰木凡服耜斬季材以時入之令萬民時斬材有期日凡邦工入山林而掄材不禁春秋之斬木不入禁凡竊木者有刑罰若祭山林則為主而修除之且蹕若大田獵則萊山田之野及幣田植虞旗于中致禽而珥焉大田獵者天子親行之禮萊山田之野則聨於大司馬之職弊田植旗則獸人所謂令禽注於虞中是已致禽而珥珥如小子珥于社稷之類田畢而祭也鄭氏謂珥當為衈取其左耳以效功故曰衈蓋取字之偏旁以為左耳其説未為不善然肆師小子羊人言祈珥鄭氏亦曰珥當為衈羽牲曰衈且引雜記之言成廟則釁之與此效功之言不同又取左耳為毛牲與羽牲曰衈之文自相背馳况大司馬言致禽以祀祊致禽饁獸於郊皆行祭禮於致禽之後不應致禽之後方取左耳以效功劉執中釋肆師之職曰珥當為弭字之誤也弭謂小祝之弭兵災蓋田獵所以訓兵弭兵災正田獵之事肆師於狩之日涖卜來歲之戒亦弭兵災之意義見肆師祈珥説林衡掌巡林麓之禁令而平其守以時計林麓而賞罰之若斬木材則受法于山虞而掌其政令川衡掌巡川澤之禁令而平其守以時舍其守犯禁者執而誅罰之祭祀賔客共川奠澤虞掌國澤之政令為之厲禁使其地之人守其財物以時入之于玉府頒其餘于萬民凡祭祀賔客共澤物之奠喪紀共其葦蒲之事若大田獵則萊澤野及弊田植虞旗以屬禽有政令有禁令禁令即政令之所禁者也山林之政令山虞專掌之國澤之政令澤虞專掌之林衡川衡特巡山林川澤之禁令而已是林衡正於山虞川衡正於澤虞然林衡列於山虞之後川衡列于澤虞之前者以山林川澤為序也山虞物為之厲而為守禁澤虞為之厲禁使其地之人守其財物林衡川衡之所謂平其守者平此者也山虞以時入木材而令萬民時斬材而林衡之斬木材則受山虞之法澤虞以時入財物于玉府頒其餘於萬民而川衡則以時舍其守山澤之利與民共之者也林衡正於山虞故以時計林麓而賞罰之川衡正於澤虞故犯禁者執而誅罰之平其守者之守其禁也若夫大田獵之日虞人萊所田之野為表百步比山虞澤虞之職林衡川衡無與焉山虞以旌致禽而澤虞以旌屬禽者以熊虎之象宜於山而鳥羽之飾宜于澤也兹其辨爾迹人掌邦田之地政為之厲禁而守之邦田常田也田之義有三大田之時虞人萊所田之野教民以戰陳之事天子為之乘革路建太常見於司馬者是也其次牧畜於囿設囿遊之禁以時取其獸而不廢乎祭祀賔客之用天子為之載斿車之旌見於囿人者是也若夫邦田之地政非囿人所禁之囿亦非大司馬所萊之野平田之地迹其鳥獸之所萃者謂之迹人迹人掌其地政則為之厲禁以守之當邦田之時天子為之載木路巾車言木路以田是也凡田獵者受令焉受迹人之令則不至於罷民力禁麛卵者與其毒矢射者草人掌金玉錫石之地而為之厲禁以守之天地之寶生於山澤金玉錫石之貴飢不可食寒不可衣先王不盡以豫民設之官為厲禁以守之非私之也上以資邦用下以使斯民之棄末厚本而已若以時取之則物其地圖而授之使其案圖而取之巡其禁令利孔所在姦弊百出既禁之又令之又從而巡之然後草人取之而入於職金職金受之而入其金錫於為兵器之府入其玉石丹青於受藏之府所以待邦之大用玉府所以共王之玩好者也角人掌以時徴齒角凡骨物于山澤之農以當邦賦之政令以量度受之以共邦用羽人掌以時徴羽翮之政于山澤之農以當邦賦之政令凡受羽十羽為審百羽為摶十摶為縛以度受之則知其物之長短以量受之則知其物之多寡以權受之則知其物之輕重其或不可受之以權以度以量者則為審為摶為縛無非參酌其數以當邦賦之政令則所用有補於國所賦不加於民緩急可以相資有無可以相通賦用兩得於是為至掌葛掌以時徴絺綌之材于山農凡葛征徴草貢之材於澤農以當邦賦之政令以權度受之掌染草掌以春秋斂染草之物以權量受之以待時而頒之掌炭掌灰物炭物之徴令以時入之以權量受之以共邦之用凡炭灰之事掌荼掌以時聚荼以供喪事徴野疏材之物以待邦事凡蓄聚之物掌蜃掌斂互物蜃物以共闉壙之蜃祭祀共蜃器之蜃共白盛之蜃四者微物而用不可缺故設官以掌囿人掌囿遊之獸禁牧百獸祭祀喪紀賔客共其生獸死獸之物場人掌國之場圃而樹之果蓏珍異之物以時斂而藏之凡祭祀賔客共其果蓏享亦如之珍異果蓏物之至微而場人專掌之者以祭祀賔客之奉皆於此乎出也廩人掌九榖之數以待國之匪頒賙賜稍食天府職曰若祭天之司民司祿而獻民數榖數則知九榖之數專掌於司祿今復見於廩人何也賈氏謂廩人掌米倉人掌榖其義誠然蓋倉人掌粟入之藏辨九榖之物則掌榖可知廩如御廩常廩之類則皆米也不然明堂位何以曰米廪有虞氏之庠釋者以魯謂之米廩虞帝上庠今藏粢盛之委焉非米而何以廩名官所掌者米而云掌九榖之數者兼掌九榖之數也是知倉人掌榖司祿掌九榖之數廩人即其九榖之數以知廩米之數凡以待國之匪頒賙賜稍食而已以歲之上下數邦用以知足否以詔國用以治年之豐凶年之有豐凶歲之所以有上下也制其財之多寡權其禮之增損非廩人之事此特以邦用之足否詔之於上凡以治年之豐凶而已年之豐凶天也所以治之者人也治之則權其多寡增損而為之開闢斂散其於豐也不為妄費以蠧其國其於凶也不為過取以害民凡萬民之食食者人四釜上也人三釜中也人二釜下也若食不能人二釜則令邦移民就榖詔王殺邦用冡宰制國用其榖之所積皆有定所凡荒政所不能聚者均其逺近之所就榖而已凡邦有會同師役之事則治其糧與其食糧乃會同師役之所急者太宰以九式均節財用而不及會同師役之式小宰之七事有所謂會同軍旅田役之戒具共其財用然會同所用者不過宰禮委積膳獻飲食之飱牽則有賔客之式矣軍旅田役所用者不過工事幣帛芻秣匪頒之數者則有工事之式幣帛之式芻秣之式匪頒之式矣惟最急之糧食乃無式焉蓋式法出於九賦之中乃國家之經費冡宰制國用則以邦國之貢待弔用萬民之貢充府庫二者之外隨處而積以待邦之大用則會同師役之類凡九式所不載者皆取具於此不然倉人共道路之榖積飲食之具遺人凡賔客會同師役掌其道路之委積若非前二者之積將何所從出然特道路之所費而已若廩人之治其糧與其食又兼在道之費及止居之費也大祭祀則共其接盛接猶承也天子親耕籍田以共粢盛非有司親承之與常榖同何以致敬於鬼神故甸師以時入之於廩人廩人接之以藏於神倉及大祭祀之時廩人則共其所接之盛是以舂人接之則舂榖而為米􅐪人接之則炊米而為食然後王者得以親承祭祀其為敬至矣舍人掌平宫中之政分其財守以法掌其出入有王宫有后宫王宫之宫宫正為之均其稍食后宫之宫內宰為之均其稍食所以平宫中之政則舍人也守禁之所謂之財守出之於廪人入之於宫中皆有法存焉廩人不妄供宫中不妄取所謂平其政者莫先乎此凡祭祀共簠簋實之陳之賔客亦如之共其禮車米筥米芻禾喪紀共飯米熬榖以歲時縣穜稑之種以共王后之春獻種掌米粟之出入辨其物歲終則會計其政倉人掌粟入之藏辨九榖之物以待邦用若榖不足則止餘法用有餘則藏之以待凶而頒之凡國之大事共道路之榖積食飲之具大府所謂式貢之餘財以供玩好幣餘之賦以待賜豫委人所謂凡其餘聚以待頒賜止餘法用止此者歟有餘則藏之以待凶而頒之是樂歲則取之於民凶年則遂以頒之於民取之不以為虐頒之乃所以為利無非充裕民之仁政司祿闕司祿逸篇弗可考矣此經猶存其官之名者以序官見之不特見之序官而已天府曰若祭天之司民司祿而獻民數榖數則受而藏之鄭氏謂司祿為文昌第六星祿之言榖也則以掌天下之榖數者謂之司祿亦猶掌天下之民數而秋官有司民之職蓋民之損益關乎天榖之豐耗係乎民此司民及三年大比則以萬民之數詔司寇司寇及孟冬祀司民之日獻其數於王王拜受之且有天府之登知司祿之於榖數亦然則王者以民為天民以食為天其類同其義可推矣司稼掌巡邦野之稼而辨穜稑之種周知其名與其所宜地以為法而縣于邑閭所謂法者周自后稷播種百榖以為鄉師天以其粒食生民國其子孫千有餘年而後王業始大南宫括以躬稼有天下而歸之於稷原其始也公劉太王王季文王武王周公六君子可謂不替其業者周公作六典舉前日播榖之法而備見於大司徒即以其法而責於司稼之官司稼復以其法而縣於邑閭使稼者取法焉播種之法明為稼之效著當時所以善其始者有道矣巡野觀稼以年之上下出斂法掌均萬民之食而賙其急而平其興舂人掌其米物祭祀共其齍盛之米賔客共其牢禮之米凡饗食共其食米掌凡米事􅐪人掌凡祭祀共盛共王及后之六食凡賔客共其簠簋之實饗食亦如之稿人掌共外內朝冗食者之食外朝庫門外之朝內朝路門外之朝若饗耆老孤子士庶子共其食掌豢祭祀之犬

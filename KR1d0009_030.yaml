body:
  text: 周官總義卷三十宋易祓撰匠人為溝洫匠人所為之溝洫有與遂人合者有不與遂人合者遂人言夫間有遂是舉一夫而言也而匠人言田首之遂則舉其百畝而言之遂人言十夫有溝是舉旁加而言也而匠人言九夫之溝則舉其實數而言之此匠人之制與遂人合者也若夫匠人言方十里為成成間有洫即九百夫之地也則有異乎遂人百夫之洫匠人言方百里為同同間有澮即九萬夫之地也則有異乎遂人千夫之澮匠人言兩山之間必有川焉即地勢自然之川也則有異乎遂人萬夫之川何其逺近之大相遼絶若是乎先儒疑之遂謂鄉遂采地之不同此非特經無明文且井田之法通行天下抑何鄉遂采地之自為異制也要之遂人為成周之法而匠人乃通異代之制是不可以臆説求合者矣耜廣五寸二耜為耦一耦之伐廣尺深尺謂之􅍒田首倍之廣二尺深二尺謂之遂遂人言五溝之制而始於遂匠人言五溝之制而始於􅍒􅍒非溝也播種之地也古者嵗不易者為上田農夫受上田百畝嵗一易者為中田農夫受中田二百畝嵗再易者為下田農夫受下田三百畝一易再易非荒之而不耕也特所以愛惜地力而巳故上地田百畝則一畝為三畝中地田二百畝則一畝為二畝下地田三百畝則一畝為一畝畝長百步廣一步􅍒廣一尺壠髙一尺一尺之􅍒則二人各執一耜而共發之耜廣五寸合二人為耦而耦則二耜正合一耦之地詩所謂十千維耦是已􅍒之制深廣皆一尺而其首即為遂遂宜倍於􅍒故廣二尺深二尺也九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二尋深二仞謂之澮方里而井井九百畝為九夫旁加一溝為十夫此匠人之説與遂人合也然遂人井田之法乃成周開方之數若匠人言井間之溝為一里十倍之而為十里之洫又十倍之而為百里之澮特言其一靣之長者而已蓋匠人方十里之洫是每一靣各十井以開方而論則方十里者為方一里者百是洫為百井乃九百夫之地果何與於遂人百夫之洫匠人言方百里之澮是每一靣為百井以開方而論則方百里者為方十里者百是澮為萬井乃九萬夫之地果何與於遂人千夫之澮鄭氏疑之而不得其説故曰此畿內采地之制又曰采地制井田異於鄉遂及公邑其意謂遂人治野乃鄉遂公邑之制匠人溝洫乃采地之制其説無所據依殊不知成周井邑丘甸縣都實通行於天下初何采地及鄉遂公邑之異此鄭氏之失不必辨也近代劉氏中義必欲以匠人溝洫而求合乎遂人治野之制謂遂人所言者積數匠人所言者方法即所謂據一靣而言者若必欲以一靣而牽合其數則十夫之溝為一里之井十倍之為十里之成又十倍之為百里之同以是推之自百里之同而至於兩山之川得無大遼絶乎蓋嘗謂匠人非成周之全書故不言川而特附見於兩山之間至遂人言萬夫有川則止於三十二里少半里即詩所言十千維耦終三十里舉成數而言之者也不特此而已匠人雖言成間之洫而實為百井之地匠人雖言同間之澮而不言千夫有澮蓋遂人千夫乃百井之地此言同間之澮實為萬井之地以是知匠人溝洫不可拘以成周之法或者出於夏商之制未可知也何以明之通十為成成十為終終十為同文王司馬法為商末之制則有合乎十里百里之説益稷之書曰濬畎澮距川是自然之川則有合乎兩山之間之説知此則匠人為前代之制遂人為成周之制也明矣専達於川各載其名凡天下之地勢兩山之間必有川焉大川之上必有塗焉此言同間有澮澮水入川川在兩山之間與遂人萬夫之川其説大異蓋遂人夫間有遂其地百畝十夫則其首為橫溝方一里十溝則東畔為南北之洫方三里有竒十洫則於南畔為橫澮九澮則於四畔為川是萬夫之川故其為川方三十二里少半里又九之而後方一同以南畝圗之九澮而川周其外又從而九之則一同之間方八十一澮何其澮洫之稠多也此遂人之制詳密備具井井皆有條理所以謂之井田至匠人則百里一同始有一澮達於兩山之川而已凡溝逆地阞謂之不行水屬不理孫謂之不行梢溝三十里而廣倍凡行奠水磬折以參伍欲為淵則句於矩凡溝五溝也五溝固所以為灌溉之利溝而逆地阞是不依乎水之脈也水屬不理孫是不順乎地之理也所以皆謂之不行若欲其行必順乎水之勢梢溝則水之源也其末流之勢必三十里而廣倍是以行停水者直行以三而曲行以五則其勢益疾欲為淵則曲為之矩使其回旋流轉而其流益遲凡此無非順其勢而導之此五溝之所以為利也凡溝必因水藝防必因地藝善溝者水潄之善防者水淫之善為溝防者因水勢而流不壅因地藝而土不決所以為利也又有因其利而利之者溝固惡乎水之潄而善溝者欲其潄之而益深防固惡乎水之淫而善防者欲其淫之而益固其利也大矣凡為防廣與崇方其閷參分去一大防外閷廣與崇方言其基之廣與其堤之髙相等也堤髙則欲其固故殺於基之廣者三分之一若大防則非特殺其內而已又殺其外焉是以末勢不傷其本益固凡溝防必一日先深之以為式里為式然後可以傅衆力此謂溝防有定法而後可以齊衆志蓋自􅍒深尺廣尺以至澮之廣二尋深二仞非朝夕之積也必先深一日以為式自方里之井以至方百里之同非跬步而至也必以一里之廣以為之式如此則自小可以凖大自近可以凖逺而溝防之功可以漸而成矣凡任索約大汲其版謂之無任葺屋參分瓦屋四分囷窖倉城逆牆六分堂塗十有二分竇其崇三尺牆厚三尺崇三之此非溝洫而匠人終之以此者亦匠人之事而已凡任索約大汲其版謂之無任者謂以繩東其築堵之版不可過於任也葺屋三分者三分取一以為之峻也瓦屋四分者四分取一以為之峻也囷窖倉城逆牆六分者言六分其髙去一以為之閷也堂塗十有二分者言兩旁十二分取一分於中央以為之髙也竇其崇三尺牆厚三尺崇三之其制皆然所以列於匠人之終篇者有由哉車人之事半矩謂之宣一宣有半謂之欘一欘有半謂之柯一柯有半謂之磬折車人之職與輪輿異輪輿之度十分曰寸十寸曰尺十尺曰丈八尺曰尋倍尋曰常車人無取焉內取諸身外取諸物而已欘即斤之柄也柯即斧之柄也宣即人首以上也磬折即人帶以下也皆取其近者以為之度易曰巽為宣髮大抵人長八尺而大節有三以三通之則其上居二尺六寸三分寸之二是為一矩之數宣復得矩之半為一尺三寸三分寸之一是人首之長也是一宣之度為一尺三寸三分寸之一宣之半則為六寸三分寸之二合而言之則二尺焉故謂之欘爾雅所言句欘謂之定是已一欘為二尺則半欘為一尺合而言之則三尺焉故謂之柯詩所言執柯伐柯其則不逺是已柯長三尺而一柯有半則為四尺五寸謂之磬折蓋人帶以下四尺五寸磬折立則俯玉藻所言三分帶下紳居二焉紳長三尺是已曰宣曰磬折則取諸吾之身曰欘曰柯則取諸吾所自用之物車之為度其有或差者耶車人為耒庛長尺有一寸中直者三尺有三寸上句者二尺有二寸自其庛緣其外以至於首以弦其內六尺有六寸與步相中也堅地欲直庛柔地欲句庛直庛則利推句庛則利發倨句磬折謂之中地耒之六尺與步相中謂六尺有六寸之曲也耒之六尺有六寸其制雖一而其曲六尺則有三地之差堅地其土剛故其庛欲直庛直則所入者深而利推然庛直則過乎六尺之弦矣柔地其土耎故其庛欲句庛句則所起者順而利發然庛句則不及乎六尺之弦矣惟中地之耒其庛與直者句者形如磬折則合乎弦之六尺此量地所以用中地之耒也車人為車柯長三尺博三寸厚一寸有半五分其長以其一為之首轂長半柯其圍一柯有半輻長一柯有半其博三寸厚三之一渠三柯者三車人所為之車非乘車兵車田車故其制不同據此則大車也下經所謂大車崇三柯是已柯即斧之柄車人用斧以斬木亦用其柄以為車之度柯長三尺博三寸厚一寸有半以斧柄言也五分其長以其一為之首以斧刃言也其度則専以三尺為言大車崇三柯則其崇九尺焉以是推之則轂之長必半柯輻之長必一柯有半渠之圍必三柯者三渠為車輮所謂牙也渠三柯者三則其圍凡二丈七尺其徑凡九尺或謂牙徑九尺而轂空壺中與焉則輻長之四尺五寸似不相合其通計轂而言之歟行澤者欲短轂行山者欲長轂短轂則利長轂則安行澤者反輮行山者仄輮反輮則易仄輮則完先儒謂大車轂長半柯為短轂柏車轂長一柯為長轂是大車行澤而柏車行山者也蓋澤為沮洳之地用短轂則無却行之患故曰利山為險阻之地用長轂則無倍任之患故曰安惟輮亦然輮者牙也牙也者所以為輪之固抱也大抵牙之為制其裏則滑而堅其表則澀而脆行澤者反輮反其裏之滑者在外也行乎泥淖之中而莫之溓矣故曰易行山者仄輮仄其裏之堅者相依也行乎沙礫之地而莫之甐矣故曰完以先儒之言推之則反輮大車之制仄輮柏車之制六分其輪崇以其一為之牙圍此與輪人之言同而制則異也輪人言乘車兵車其輪六尺六寸牙圍尺有一寸此言大車其輪崇九尺牙圍尺有五寸茲其所以不同耳柏車轂長一柯其圍二柯其輻一柯其渠二柯者三五分其輪崇以其一為之牙圍大車崇三柯綆寸牝服二柯有參分柯之二羊車二柯有三分柯之一柏車二柯凡為轅三其輪崇參分其長二在前一在後以鑿其鉤徹廣六尺鬲長六尺此三車者擬以乘車兵車之制輪即乘車兵車之所謂輪也牝服即乘車兵車之所謂較也轅即乘車兵車之所謂輈也徹廣即乘車兵車之所謂軌也鬲即乘車兵車之所謂衡也以乘車兵車而論之輪崇與輿廣衡長同於六尺有六寸故曰參如一謂之參稱較即輿上之兩輢而出乎式者也其制亦如之衡即一轅容兩服而服馬者也其制亦如之軌廣雖八尺然亦因輿之廣而加之也輈長雖丈四尺四寸然亦因輿隊之深而加之也至於車人之車則不然大車之輪崇九尺而其較長八尺所謂牝服二柯有三分柯之二是已柏車之輪崇六尺而其較長六尺所謂柏車二柯半是已羊車雖不言崇庳小大之制然夫子言小車無軏而釋者以為羊車則其較於短為宜今言羊車二柯有三分柯之一則其較為七尺雖不及大車之制而反過於柏車何也柏車行險阻之地則其較宜於短大車行平夷之地則其較宜於長羊車用於宫中冝於長短之中而已是三者既有長短則其為轅也亦各隨其輪之制所謂三其輪崇者柏車輪崇六尺三之則為丈有八尺大車輪崇九尺三之則為二丈七尺羊車雖不言輪崇亦三之以為轅也曰輪曰轅曰牝服雖有三等之不一至其為鬲為徹廣則一而已是數者皆非乘車兵車三稱之制此所以命之車人而特見於考工之末歟弓人為弓取六材必以其時六材既聚巧者和之幹也者以為逺也角也者以為疾也筋也者以為深也膠也者以為和也絲也者以為固也漆也者以為受霜露也此與下經為總目即下經所謂材美工巧為之時是已幹之堅而栗也其本強矣故其所及必逺角之厚而澤也其勢順矣故其所發者必疾筋之稹而密也其力鋭也故其所中者必深於是合之以膠所以為和纒之以絲所以為固環之以漆所以為受霜露六材既美而天時工巧之相濟此弓之所以為良也凡取幹之道七柘為上檍次之檿桑次之橘次之木瓜次之荆次之竹為下凡相幹欲赤黑而陽聲赤黑則鄉心陽聲則逺根凡析幹射逺者用藝射深者用直居幹之道災栗不迤則弓不發弓之六材以幹為質幹之七等以堅為體故取幹以柘為上竹雖堅而有節故為下檍也檿桑也橘也木瓜也荆也皆取乎堅而其堅有差故以次而序之序之矣而後有相幹之法赤者陽之正色也黑者隂之正色也隂陽正色發見於外而至堅之體實隱於中赤黑則鄉心言其內外之相應也幹之為質雖取乎隂陽之正其聲之所發則貴乎陽而不貴乎隂蓋木之根下屬乎地則去隂為未逺及其喬亢而親上則近乎陽陽聲則逺根言根非所以為陽而本乎陽者親上也弓人既因其材而相之然後從而析之所謂用勢者反其曲而用之則往體寡來體多而利於射深既有以析之則必有以居之如居材之居欲其小大長短適其宜而已災言其稹也栗言其密也災栗不迤言其行不邪而理不絶也如是則弓體堅固何自而發曰取曰相曰析曰居四者不同而取之居之獨謂之道道也者順適乎自然而已然則取之所以善其始居之所以善其終歟凡相角秋閷者厚春閷者薄稚牛之角直而澤老牛之角紾而昔疢疾險中瘠牛之角無澤角欲清白而豐末夫角之本蹙於􅑠而休於氣是故柔柔故欲其藝也白也者藝之徵也夫角之中恆當弓之畏畏也者必撓撓故欲其堅也青也者堅之徵也夫角之末逺於􅑠而不休於氣是故脆脆故欲其柔也豐末也者柔之徵也角長二尺有五寸三色不失理謂之牛戴牛閷讀為殺秋殺者萬物堅成之時則知其角之為厚春殺者萬物發生之時則知其角之為薄此以天之時相之也以其時相之則所謂薄者固不如厚者之善稚牛方少而血氣壯則角之材必正直而潤澤老牛已衰而血氣弱則角之材必粗紾而交錯牛之疢疾則角裏傷牛之瘠瘦則角不滋此以物之材相之也以其材相之則所謂老者疾者瘠者固不如稚牛之為善夫用稚牛之角又以秋時取之則角之材固已得其良矣然角有三等有所謂角之本有所謂角之中有所謂角之末角之本蹙於􅑠而休於肉之氣則必滋潤而柔柔則無力故欲其藝角之中常當弓之隈隈為曲中則其勢必撓撓則易傷故欲其堅角之末逺於􅑠而不休於肉之氣則必枯瘁而脆脆則易折故欲其柔惟藝以白驗之堅以青驗之柔以豐末驗之則可以知三者之用是以角長二尺有五寸而青白豐末之色皆不失自然之理故謂之牛戴牛以其倍於一牛之力故也凡相膠欲朱色而昔昔也者深瑕而澤紾而摶廉鹿膠青白馬膠赤白牛膠火赤鼠膠黑魚膠餌犀膠黃凡昵之類不能方昔錯也朱色者色之純赤者也故相膠者以純赤為上又欲其文之交錯謂其交錯故瑕雖深而悅澤其理縝而密其用圜而利皆其明之自內而形見於外者如此也然亦不特朱色而已自鹿膠青白以至犀膠之黃凡六等雖天下之所謂昵者如脂膏之類皆不能方非至良而何就六膠而論之則惟牛角膠火赤所謂朱色者自餘非純赤則不能及矣凡相筋欲小簡而長大結而澤小簡而長大結而澤則其為獸必剽以為弓則豈異於其獸筋欲敝之敝剽疾也弓之所以疾發者本無與乎獸而欲其如獸之剽者蓋獸之所以迅速而輕捷者其力在筋以之為弓亦豈異於其獸然何以知其獸之為剽也亦以相筋而知之筋小則拳聯此則小簡而長筋大則疏緩此則大結而澤雖未見其獸而已必知其獸之為剽也筋固貴乎剽矣然筋之生者其力硬筋之熟者其力和必欲椎擊而嚼齧之使之勞敝而熟則筋之所以為剽者善矣漆欲測絲欲沈上經幹角膠筋皆言相而漆與絲則無事乎相測言其清也漆之色惡乎昏而濁故欲其如水深之可測取其清也沈言其潤也絲之色惡乎乾而燥故欲其如沈於水中之色取其潤也無所事乎相此所以居六材之後得此六材之全然後可以為良此總上六材而言凡為弓冬析幹而春液角夏治筋秋合三材寒奠體氷析灂冬析幹則易春液角則合夏治筋則不煩秋合三材則合寒奠體則張不流氷析灂則審環春被弦則一年之事古人制器何其不茍也既取乎材之美又資乎工之巧又因乎天之時幹欲其堅於冬析之宜其勢之順且易也角欲其和於春液之宜其氣之浹而洽也筋欲其舒於夏治之宜其理之散而不亂也膠漆絲欲其實故於秋合之宜其質之固而不離也體者來往之體也體用膠而欲其堅故於寒之時定之宜其張之而不可移也灂謂漆之灂也漆灂欲其凝烈故於氷之時析之宜其用之而不可動也自冬析幹至於氷析灂必待期嵗之久至被弦則又待來年之春以一弓之微制度精審如此其與後世朝為之夕冀其利者異矣析幹必倫析角無邪斫目必荼斫目不荼則及其大修也筋代之受病夫目也者必強強者在內而摩其筋夫筋之所由幨恆由此作故角三液而幹再液厚其帤則木堅薄其帤則需是故厚其液而節其帤約之不皆約疏數必侔斫摰必中膠之必均斫摰不中膠之不均則及其大修也角代之受病夫懷膠於內而摩其角夫角之所由挫恆由此作此經言幹角筋絲膠交相為用之義析幹必倫必欲其有倫理也析角無邪必欲其無曲邪也斫目必荼必欲其舒而徐也斫目不荼則及其大修也筋代之受病者修言其久也筋之附幹與幹為力而幹有節目雖足以驗其堅然斫之不舒則功不精是以幹不用力而筋代之受病夫目也者必強強者在內而摩其筋筋之所由幨常由此作者蓋目必堅強而筋必柔弱堅強在內而摩其柔弱則筋為目所勝必有幨絶之患故角三液而幹再液者謂以火治之欲其調而適於用也尉角以火而欲其和故三液揉木以火而欲其固故再液厚其帤則木堅薄其帤則需者謂弓中禆也弓雖以木為幹仍於幹上禆之厚其帤則過乎剛故木堅而難發薄其帤則過乎柔故木需而易弊惟厚其液而節其帤則其性調適而厚薄為有節也約之不皆約疏數必侔者約謂以絲筋束之不皆約則有多寡焉必欲疏數之皆侔斫摰必中膠之必均斫摰不中膠之不均及其大修角代之受病者蓋施角於弓之隈而斫摰其幹必欲其厚薄之適宜故曰必中施膠於上而必欲其多寡之適稱故曰必均不然則及其久也角必代幹而受病以其不中不均故也夫懷膠於內而摩其角夫角所由挫恆由此作者蓋斫摰不中膠之不均則幹懷膠於內而與角相摩角烏得而不挫已上數節既言其病又言其利使為工去其病而求其利則材之為用固矣凡居角長者以次需恆角而短是謂逆撓引之則縱釋之則不校恆角而達譬如終紲非弓之利也今夫茭解中有變焉故校於挺臂中有拊焉故剽恆角而達引如終紲非弓之利上經言角長二尺有五寸謂之牛戴牛則角固貴乎長也然以達對短則達為長之過需須也良工以次需而用之不可過於長亦不可過於短充滿兩旁而不及兩端則曰恆角而短充滿兩旁而過於兩端則曰恆角而達恆竟也竟其角而失之短則其勢必撓則引其弦而力不逮故至縱舍其弦而力不及故至於不校竟其角而失之達則其送矢大疾若見紲於弓䪐而無所發凡此皆非所以為弓之利記者欲言其利特起義端以今夫言之謂校者疾而速剽者疾而勇是必有所自也茭謂弓之隈與弓之簫相接之處也解中則相接之中也有變即異也異謂引之則臂用力放矢則簫用力二者用力既異則其勢必疾而速故曰校挺直也挺臂中則弓把之直者也有柎即弓把中之側骨也弓之兩旁以側骨柎之則骨之堅強與弓為力其勢必疾而勇故曰剽知校與剽為弓之利則知居角之短與達者皆所以為弓之害終之曰恆角而達引如終紲非弓之利謂引其弦也再言之者甚言其過長之尤為害也嬌幹欲孰於火而無贏嬌角欲孰於火而無燂引筋欲盡而無傷其力鬻膠欲孰而水火相得然則居旱亦不動居濕亦不動茍有賤工必因角幹之濕以為之柔善者在外動者在內雖善於外必動於內雖善亦弗可以為良矣此謂幹角筋膠之材治之得其道則有以調其剛柔強弱之性柔不失於弱則陽氣不能勝故居旱亦不動剛不失於強則隂氣不能勝故居濕亦不動賤工昧此則弓之為力殆矣凡為弓方其峻而髙其柎長其畏而薄其敝宛之無已應下柎之弓末應將興為柎而發必動於閷弓而羽閷末應將發峻弓簫也放矢則簫為之用力故欲其方柎側骨也骨堅強則與弓為力故欲其高當弓之曲為隈隈所以為之運故欲其長手蔽之處為敝敝所以為握持故欲其薄有此四利則雖引之不已而其應弦亦無已若夫下柎之弓則形見於弓末之簫者亦將應弦而發為柎而發則其形見於接中之閷者欲其無動不可得也羽閷則兩接中俱動角幹亦隨之而發是柎之與末末之與閷其可有一毫不善者哉弓有六材焉維幹強之張如流水維體防之引之中參維角䟫之欲宛而無負弦引之如環釋之無失體如環弓之六材以幹為弓之本足以有制矣故張如流水勢順而利也勢雖順利而尤欲其體之定故又曰維體防之引之中參謂內弓於檠中以定其往來之體引之三尺則與矢相中也弓體既定而角之柎幹者尤不可以不正故又曰維角䟫之欲宛而無負弦䟫正也謂置角於隈中者既得其正則其勢宛而無負弦之失也繼之曰引之如環釋之無失體如環申言宛順之義如此材美工巧為之時謂之參均角不勝幹幹不勝筋謂之參均量其力有參均均者參謂之九和九和之弓角與幹權筋三侔膠三鋝絲三邸漆三庾上工以有餘下工以不足材美工巧為之時固謂之參均角不勝幹幹不勝筋亦謂之參均量其力而謂之有參均者何也有又也幹勝一石加角而勝二石又被筋而勝三石故謂之又參均又三之則為九和九和之弓以角幹筋為主故角與幹權權猶平也筋三侔侔猶等也即所謂角不勝幹幹不勝筋之意九者和矣而絲膠漆則為之輔膠三鋝絲三邸漆三庾其輕重雖未詳以經意推之亦欲其稱而已九和既定輕重不差此上工所以有餘下工所以不足為天子之弓合九而成規為諸侯之弓合七而成規大夫之弓合五而成規士之弓合三而成規弓長六尺有六寸謂之上制上士服之弓長六尺有三寸謂之中制中士服之弓長六尺謂之下制下士服之凡為弓各因其君之躬志慮血氣豐肉而短寬緩以荼若是者為之危弓危弓為之安矢骨直而立忿藝以奔若是者為之安弓安弓為之危矢其人安其弓安其矢安則莫能以速中且不深其人危其弓危其矢危則莫能以願中五方之民其躬有長短肥瘠之不同而其志慮血氣亦因之有剛柔緩急之異故其盛衰強弱常與天地之盈虛相為流通其力少壯則體胖焉膚革充盈而志慮強盛膂力方剛而氣血飄溢及其老耄則體將休焉膚革疲癃而志慮柔弱筋力解弛而血氣衰耗失身之所化若是况其性之所稟哉固有射於百步之外而四鏃如植者亦有射則墜矢而喘息不勝者此為弓所以因其君之躬與其志慮血氣也豐肉而短者體之柔者也寬緩以荼者志慮血氣之弱者也若是者為之危弓輔以安矢骨直以立者體之剛者也忿勢以奔者志慮血氣之強者也若是為之安弓輔以危矢危之為言疾也安之為言舒也人與弓矢皆安則三者一於舒故矢不及而莫能以速中人與弓矢皆危則三者一於疾故矢行太過而莫能以願中上言速則知下之為遲下言願則知上之為暴然則弓之於人矢之於弓皆相安焉此弓人所以善為弓也往體多來體寡謂之夾臾之屬利射侯與弋往體寡來體多謂之王弓之屬利射革與質往體來體若一謂之唐弓之屬利射深體謂六弓往來之體也賈氏謂夾臾之屬往多來寡者弛之一尺五寸張之五寸王弓之屬往體寡來體多者弛之五寸張之一尺五寸唐弓之屬往來若一者弛之一尺張之亦一尺此雖意推其理誠然以司弓矢考之夾弓臾弓以授射犴侯鳥獸者此所以利射侯與弋也王弓􅓡弓以授射甲革椹質者此所以利射革與質也唐弓大弓以授學射者使者勞者此所以利於射深也言王弓之屬則弧弓與焉言唐弓之屬則大弓與焉夾臾並言而亦曰屬者按大射與鄉射大夫士同射五十步之侯又同用夾臾之弓但有合三合五之不同故亦謂之屬也餘義見夏官司弓矢大和無灂其次筋角皆有灂而深其次有灂而疏其次角無灂合灂若背手文角環灂牛筋蕡灂麋筋斥蠖灂大和者九和之弓也其體調適何待於灂其次筋角皆有灂而深者言深在背筋隈角之中央而兩旁無有也其次有灂而疏者言背與隈及兩旁雖有灂而不皆有也其次角無灂者言簫頭及背皆有灂而角之在隈者無灂也合灂若背手文者謂合其表裏有灂之處而背上之文理相應也角環灂者謂弓之隈其灂文如環之周旋故曰環灂牛筋蕡灂者謂背之漆文如麻實故曰蕡灂麋筋尺蠖灂者謂背之深文如屈蟲故曰尺蠖灂有灂者雖曰受霜露為弓之固然謂之和可也而不謂之大和此大和之弓所以獨貴乎無灂也和弓􅌛摩和調也􅌛試也摩之以待用也覆之而角至謂之句弓覆之而幹至謂之侯弓覆之而筋至謂之深弓覆猶察也至猶善也弓以角幹筋為主三者皆善則為弓之上二善者為次一善者為下察之而角至角獨善而已筋幹容有未善故謂之句弓司弓矢所謂句者謂之敝弓是也察之而幹至則角既善而筋又善特筋為未善故謂之侯弓上經所謂夾庾利射侯與弋是也察之而筋至則非特角與幹善而筋又善故謂之深弓上經所謂唐弓之屬利射深是也言句弓侯弓深弓而不及王弧之弓則王弧亦三善而射深其質則尤堅於深弓故爾

body:
  text: 周官總義禮類一周禮之屬提要臣等謹案周官總義三十卷宋易祓撰祓有易總義已著録是書陳振孫書録解題不載惟趙希辨讀書附志著録稱許儀為之序刻於衡陽今衡陽本世已無傳惟永樂大典尚載其天官春官秋官考工記而地官夏官亦佚謹裒合四官之文編次成帙以存其舊其地官夏官則採王與之周禮訂義所引以補其亡仍依讀書附志所列勒為三十卷雖非完帙然十已得其八九矣其書研索經文斷以已意與先儒頗有異同如論大宰九賦則援載師之任地及司市司關草人角人職幣等職以駁口率出泉之説論宗廟九獻則合籩人醢人內宰司尊彛及行人王禮再祼之文以駁列祼事於九獻之説論肆師之祈珥則引羊人小子及山虞諸條以紏改祈為刉改珥為恤之説論輈人之四旗則厯辨巾車司常大司馬大行人與考工記不合以明曲禮車騎為戰國之制諸如此類雖持論互有短長要皆以經釋經非鑿空杜撰至於內宰二事則改為副二之二於酒正式法則指為九式之法於園廛漆林諸賦則謂以什一取民又於一分中分十一十二二十之三數等而輸之於王於凌人斬冰則謂十二月為建亥之月先令之於亥月而後三為凌室以待亥子丑三月之藏亦皆自出新義而於職方氏之地理山川尤為詳悉雖其釋三江則混於蘇氏之説釋波溠則膠於唐志隨縣之文釋泲水濟水則據漢志而強分為二多所未安要其援引明晰自不可沒蓋祓雖人品卑汚而於經義則頗有考據不以韓托胄蘇師旦故掩其著書之功也乾隆四十六年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀

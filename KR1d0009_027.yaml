body:
  text: 周官總義卷二十七宋易袚撰輿人為車輪崇車廣衡長參如一謂之參稱賈氏曰輿人專造輿而記言為車者車其總名愚按輪輿軫蓋皆車也言為車而謂之輿人則從輿為正若夫挾車旁以踐地者輪也橫車前以扼馬者衡也輪崇則欲其運兩軹衡長則欲其容兩服輪崇車廣衡長皆六尺有六寸故曰參如一謂之參稱稱等也言三者相等也參分車廣去一以為隧參分其隧一在前二在後以揉其式以其廣之半為之式崇以其隧之半為之較崇六分其廣以一為之軫圍參分軫圍去一以為式圍三分式圍去一以為較圍參分較圍去一以為軹圍參分軹圍去一以為轛圍輿之深者曰隧隧邃也言車之深也人之所依憑者曰式式敬也言憑之則致敬而有禮也兩輢上出式者曰較謂車箱兩旁植之者也輿後之橫木曰軫則旗斿之所被飾者也軹則輢之直者以其旁止於此故曰軹轛則式之直者對人而言故曰轛其分寸之法賈氏釋之詳矣此後不復詳釋圓者中規方者中矩立者中縣衡者中水直者如生焉繼者如附焉權與物鈞而生衡衡運生規規圜生矩矩方生繩繩直生凖此方圓平直之所從出也故輿人之為車也規之以眂其圓圓之至者自中於規矩之以眂其方方之至者自中於矩繩以縣之以眂其直而立之直者自中於縣水以平之以眂其均而衡之平者自中於水曰中者循天下自然之理而不容加毫末於此者也至於直者如自然之生繼者如自然之附此又理之極於自然者蓋天下之直必本乎繩墨若木之條達而生者不待繩墨而自直天下之繼必本乎膠漆若木之旁出而附者不待乎膠漆而自繼車之材直而如生非謂舍繩墨而自直也繼而如附非謂舍膠漆而自繼也本於繩墨膠漆而若非出於繩墨膠漆其為工之巧也至矣凡居材大與小無并大倚小則摧引之則絶居之為言處之得其所之謂也并如兼并之義凡物之體以小入大大者受而入之是謂大與小無并若大者勢足以相并則小者不能以自立不動則已器成而動大倚小則小必摧若又從而引之則小者絶而不復屬善居材者必有其道矣棧車欲弇飾車欲侈棧車即巾車所言士乘棧車者也飾車即巾車所言孤乘夏篆卿乘夏縵大夫乘墨車者也古者天子諸侯卿大夫士皆以革鞔輿及轂約但有金玉象為飾者得金玉象之名孤卿大夫轂上有篆縵墨之飾故亦得篆縵墨之名士之棧車則無革以為鞔者無革者無以為固故欲弇言斂而向於內也有革者有以為固故欲侈言縱而向於外也然車以弇侈為善而鍾則以弇侈為病蓋鍾貴乎廣狹之中而車貴乎小大之宜各適其當而已輈人為輈輈有三度軸有三理國馬之輈深四尺有七寸田馬之輈深四尺駑馬之輈深三尺有三寸軸有三理一者以為􅍇也二者以為久也三者以為利也攻木之工七而不列輈人者以輈非作車之所始而實有切於車之用此所以别設輈人之職輈有三度因馬之髙下以為之度也國馬之輈深四尺有七寸加軹崇三尺有三寸及軫與轐之七寸則衡髙八尺七寸所以用八尺以上之馬田馬之輈深四尺加軹崇三尺一寸半及軫與轐之五寸半則衡髙七尺七寸所以用七尺以上之馬駑馬之輈深三尺有三寸加軹崇三尺軫與轐之四寸則衡髙六尺七寸所以用六尺以上之馬是三度者固輈人之制軸以貫轂特輪之一器而已於輈人何與而其言軸有三理乃繼於三度之後者軸待輈而後運輈待軸而後行其勢實相資焉以經意考之弧而無折經而無絶輈之􅍇如此實軸之所以為媺也終日馳騁左不犍終嵗御衣衽不敝輈之久如此實軸之所以為久也勸登馬力馬力既竭輈猶能一取焉輈之利如此實軸之所以為利也以是知輈人之職實兼輈與軸之制故下文又曰五分其軫間以其一為之軸圍則軸之制附於輈人也明矣軓前十尺而策半之軓謂式前也謂自式以前為轅曲中其長凡十尺策以策馬半軓之數其長凡五尺御者自車上執之不短不長取其足以及馬而已凡任木任正者十分其輈之長以其一為之圍衡任者五分其長以其一為之圍小於度謂之無任任木者以其材之大小而稱其任之輕重者也任正者謂輿下之木車所取正為兩輢之所植而較式又依於兩輢故謂之任正十分其輈之長以其一為之圍則軓前十尺與隧四尺四寸凡丈四尺四寸以十分之一為任正之圍則凡尺有四寸五分寸之二矣衡任者謂厄馬領不得出兩軛之間則輈頸用力之處故謂之衡任五分其長以其一為之圍則衡長六尺六寸其圍則一尺三寸五分寸之一矣此皆任木之度若小於度則力不足以勝其任故謂之無任五分其軫間以其一為之軸圍十分其輈之長以其一為之當兔之圍參分其兔圍去一以為頸圍五分其頸圍去一以為踵圍軸謂車軸之貫轂者也輿廣六尺有六寸即軫之間五分取一以為軸圍則其圍一尺三寸五分寸之一與衡任者相應矣當兔謂輿下之貫軸者也輈長丈四尺有四寸十分取一為當兔之圍則其圍尺四寸五分寸之二與任正者相應矣頸謂頸前之持衡者也三分兔圍去一以為頸圍則其圍九寸十五分寸之九矣踵謂輿後之承軫者也五分其頸圍去一以為踵圍則其圍七寸七十五分寸之五十一矣凡揉舟欲其孫而無弧深今夫大車之轅摰其登又難既克其登其覆車也必易此無故唯轅直且無撓也是故大車平地既節軒摰之任及其登阤不伏其轅必縊其牛此無故唯轅直且無撓也故登阤者倍任者也猶能以登及其下阤也不援其邸必緧其牛後此無故唯轅直且無撓也輈以火揉所以致曲亦不可太曲弧深則太曲矣下經言輈欲弧而無折輈無惡於弧也惟太深則折故孫而無弧深孫言順理也輈而順理雖無弧深之患亦不可有直且無撓之勢於是記考工者以大車之轅證之夫大車乃駕牛之車初無與乎駕馬之輈特因其揉輈而證以大車之法今夫大車之轅摰下也謂其勢直而下至也下則難於登阤雖能登阤而阪險之地易以傾覆此直而無撓故也大車平地雖能節其軒摰之任而使之髙下相稱若其登阤則牛不退而伏其轅轅必重而縊其牛此亦直而無撓故也登阤者自下而上用力為多故謂之倍任然力之强者尚能登阤及其下阤不摩其車之邸則車或進而緧牛之後此亦直而無撓故也此三者皆所以證揉輈之說是故輈欲頎典頎如碩人頎頎之頎言其長也典常也法也輈貴乎曲直順理故欲頎典頎典則輈雖長而合乎法度之常矣輈深則折淺則負輈注則利凖利凖則久和則安輈欲弧而無折經而無絶進則與馬謀退則與人謀終日馳騁左不楗行數千里馬不契需終嵗御衣袵不敝此惟輈之和也勸登馬力馬力既竭輈猶能一取焉輈深則折謂揉之太深則傷其力故馬倚之而易折淺則負謂揉之太淺則馬負之而反傷馬之力此輈之病也不深不淺若水之注無所凝滯故行則利而順載則凖而平利凖則愈久而愈堅馬引之而和人乘之而安此輈之善也其善與病如此故諄復詳紀其揉輈之法所謂輈欲弧而無折經而無絶則揉輈之法也弧曲也太曲則易折故欲弧而無折上經言無弧深是已經直也太直則易絶故欲經而無絶上經言孫是已既孫而無弧深則無不得其進退之宜進非能謀於馬而若與馬相謀退非能謀於人而若與人相謀是以無情之物而與人及馬之有情者不期而自合非和之至者不能也輈既得其和矣則其用無不順其行無不利是以終日馳騁而左不楗言尊者在車之左而無罷倦之勢行數千里而馬不契需言馬與之相習而無相倚之病終嵗御衣袵不敝言馬無動搖而不勞御者之力是三者皆善斯可以言輈之和矣然不特和而已輈之勢和而順則其進也必易馬力未進輈已有以勸其登非果能勸也其勢若有以使之也馬行既止則無所用其力輈猶能一進而取道焉非有意於一取也其勢自不容已也則雖記考工者之善於形容其亦工之巧者如是哉良輈環灂自伏兔不至軓七寸軓中有灂謂之國輈上言良輈下言國輈記考工者之善於形容者也言國輈則甚言其為良也如經言良馬則總言駕五路者又言國馬則乘車兵車之所專用者此國輈良輈之辨良輈環灂謂其楘有五環飾之以漆故曰環灂自伏兔不至軓七寸軓中有灂者謂輈長丈有四尺四寸漆之所不至者自伏兔去軓七寸而已其軓中亦半有灂焉此特輈之一端何遽謂之良輈而且以國輈許之蓋自上經言輈之和至此方以良輈國輈名之此記者叙述之法也軫之方也以象地也蓋之圜也以象天也輪輻三十以象日月也蓋弓二十有八以象星也車之為制不過乎形與數也而聖人之觀象制器實具不說之理軫之與輿皆方也不言輿而言軫者以軫在輿之下以方而承乎上所以特言其象地也蓋之與輪皆圜也不言輪而言蓋者以蓋在輪之上以圜而覆乎下所以特言其象天也輪之有輻所以直指也輻以三十而凑於轂其數乃象乎日月之運以三十日而合宿者也蓋之有弓所以為庇也弓以二十八而凑於部其數乃象乎二十八星之次環列於天之四方者也一車之制取象如此而聖人者又載而與之俱則三才實寓乎其間是蓋有超乎形數之表者矣龍旗九斿以象大火也鳥旟七斿以象鶉火也熊旗六斿以象伐也龜蛇四斿以象營室也上經言周人上輿車官之制莫詳焉車上必建旗故此經終之以旗與斿之義然考其制皆與周官不合巾車所謂大常大旗大赤大白大麾者主五路所建而兼四伐之制也司常所謂王建大常諸侯建旗孤卿建旜大夫士建物師都建旗州里建旟縣鄙建旐者主國之大閲而建之以帥衆者也大司馬所謂王載大常諸侯載旗軍吏載旗師都載旜鄉遂載物郊野載旐百官載旟者主中秋之治兵而載之以帥衆者也大行人所謂建常九斿建常七斿建常五斿者主五等諸侯之命數而同邦國之禮者也司馬司常言旗而不言斿大行人雖言斿而特明諸侯之制巾車於大常言斿而於大旗大赤大白大麾不言斿乃天子五路之制惟司常司馬辨天子諸侯羣臣之旗制雖不言旗斿而其旗斿亦各從其命之數諸侯以奇數故以九七五為節羣臣以偶數故以八六四為節今輈人所言龍旗九斿鳥旟七斿則固有取乎陽奇之數所言熊旗六斿龜蛇四斿則特有取乎隂偶之數而皆以為天子之旗制殆有不可曉者若以此求合巾車之制而謂龍旗為大旗鳥旟為大赤熊旗為大白龜蛇為大麾似矣然大赤周制大白殷制大麾夏制豈周專於鳥旟殷專於熊旗夏專於龜蛇乎若復以此求合於司常司馬之制謂龍旗為諸侯所建鳥旟為州里百官所建熊旗為師都軍吏所建龜蛇為縣鄙郊野所建似矣然諸侯建交龍之旗以至州里百官師都軍吏縣鄙郊野所建之旗其旗各視其命數亦豈專於龍旗之九斿鳥旟之七斿熊旗之六斿龜蛇之四斿乎若曰王乘玉路建大常則象路載鳥旟在前木路載龜蛇在後金路載龍旗在左革路載熊旗在右亦無據也且周制玉路以祀而四路從固已有巾車之大旗大赤大白大麾矣輈人四旗將安所施况成周之車旗托物取象皆有不說之理輈人四旗之義是豈成王周公之所以托物取象者乎今考之大火東方蒼龍之宿心是也其屬有尾尾有九星故龍旗九斿象之鶉火南方朱雀之宿栁是也其屬有星星有七星故鳥旟七斿象之伐者西方白虎之宿也與參連體而六星故熊旗六斿象之營室北方𤣥武之宿也與東壁連體而四星故龜蛇四斿象之然有可疑者同為青龍何止於大火同為鳥隼何止於鶉火同為熊虎何止於伐同為龜蛇何止於營室是於四方七宿各舉其偏者也大火為心何與乎尾之九星鶉火為栁何與乎星之七星六斿象伐伐止三星不曰與參連體則六之數為不足四斿象營室營室止二星不曰與東璧連體則四之數為不足况東南之星取其一西北之星取其二東南則取日月所舍之次西北則取其星之名東南則取七宿之中西北則取七宿之末其說參差不合於古是豈成王周公之制大抵輈人四旗非周制亦非前代及秦之制也巾車言大旗大赤大白大麾為前代之制此非前代之制矣大司馬司常言旗旗旟旐為成周之制此非成周之制矣月令言四時載青赤白黑之旗為秦之制此亦非秦制矣然則何所據乎曲禮云行前朱雀而後𤣥武左青龍而右白虎正合輈人四旗之說而曲禮亦先秦古書也上文有車騎之說而三代無車騎騎馬之制自戰國之趙武靈王始趙改胡服與丐奴角於是乎有騎戰或者此為趙之制乎不然則戰國之制乎國語云左軍皆赤旟而許慎乃謂熊旗六斿以象伐星士卒以為旗則是戰國之軍制而用之於車戰者也以是推之輈人四旗為戰國之制明矣弧旌枉矢以象弧也弧弓枉矢見於夏官司弓矢之職則弧矢之取象尚矣蓋晉志所載弧九星在狼東南天弓也主備盜賊常向於狼弧矢動搖不如常者多盜賊此成周所以設弧矢之制然周官皆不言旗縿之畫惟覲禮曰侯氏載龍旗弧韣釋者謂旌旗之屬皆有弧也弧以張縿之幅又設矢象弧星有矢恐未必旌旗皆有之或者諸侯之制乎今輈人以此列於四旗是襲侯氏之制以為軍制之飾於此益信四旗為戰國之制攻金之工築氏執下齊冶氏執上齊鳬氏為聲㮚氏為量段氏為鎛器桃氏為刃金有六齊六分其金而錫居一謂之鍾鼎之齊五分其金而錫居一謂之斧斤之齊四分其金而錫居一謂之戈㦸之齊參分其金而錫居一謂之大刃之齊五分其金而錫居二謂之削殺矢之齊金錫半謂之鑒燧之齊築冶鳬㮚段桃此攻金之工六也而金亦有六齊鍾鼎一也斧斤二也戈㦸三也大刃四也削殺矢五也鑒燧六也且夫天下之至剛者莫金若也奚以錫為蓋以錫之柔濟金之剛而後其器為可用六工者為之調適其性而品節其齊故曰六齊齊以多錫為下少錫為上於是又有上齊下齊之别築氏為削五分其金而錫居二則多錫為下故曰執下齊冶氏為戈㦸四分其金而錫居一則少錫為上故曰執上齊少錫為上則鍾鼎斧斤戈㦸皆上齊也多錫為下則大刃削殺矢鑒燧皆下齊也以是推之則鳬氏為聲㮚氏為量段氏為鎛器當入上齊桃氏為刃當入下齊然下經鳬氏為鍾而此言為聲桃氏為劍而此言為刃蓋聲以金為正而刃以劒為利其别以此若夫此言鼎與斧斤鑒燧而經不名其官者以鼎與斧斤為上齊而冶氏為之也鑒燧為下齊而築氏為之也築氏為削長尺博寸合六而成規欲新而無窮敝盡而無惡削刀也古人用簡以竹為之以火灼之然後以削刀刻其書其用之關於天下者甚大上經言魯之削以為地氣之良不特地氣為然秦惟善戰者多故多廬粵惟善耕者多故多鎛魯之削其亦猶是故築氏之職雖曰執下齊而實用之所甚急長尺博寸此削之制合六成規則有義存焉蓋竹簡之書有縱橫曲直反缺倒仄之體惟削刀之勢順而後可以得其利此所以有取於合六之規又須築氏以巧制之常欲其新發於硎用之不窮雖用之久者不能無敝然鋒鋩銛利雖敝至於盡而無頓缺之患故曰無惡此又非常工之所可及者自秦之蒙氏製筆而人始為簡且便之習漢存古法仍取書刀兼而用之謂之刀筆然機事競起巧詐百出終不若古人用削之為安也冶氏為殺矢刃長寸圍寸鋌十之重三垸冶氏執上齊此經所言戈㦸是已今首言為殺矢者是殺矢以至重三垸十三字乃衍文重出鄭氏亦謂似補脫誤在此蓋殺矢之制五分其金而錫居二是為下齊不應以執上齊之冶氏為之且此經唯玉人其制與典瑞同然前後差殊且有散逸不全者大抵收拾殘編於秦火之後若此者不一况矢人為矢自有此十三字想當時傳寫誤置冶氏之下此其為衍文無疑也戈廣二寸內倍之胡三之援四之已倨則不入已句則不決長內則折前短內則不疾是故倨句外博重三鋝戈刺兵也鄭氏以為句兵或者疑之而遂謂已倨已句為句兵之制度則誤矣大抵句為太曲倨為太直此戈所以言倨句也戈二刃內謂胡以下接柲者也胡謂矛之旁出者也援謂直而向上者也戈廣二寸總內援與胡而言之皆徑二寸也內倍之則其長四寸胡三之則其長六寸援四之則其長八寸已倨已句則專主胡而言之也胡之曲直鋒本必橫而取圍於磬折已倨則胡過於直過於直則刺人而不入已句則過於曲過於曲則刺人而不決長內謂胡以內過長也短內謂胡以內過短也胡以內過長則援短援短則曲於磬折曲於磬折則與胡並句故折前胡以內過短則援長援長則倨於磬折倨於磬折則引之不能速及故不疾倨之外則胡之裏也句之外則胡之表也倨句外慱則上下俱寬無四者之病矣重三鋝先儒以鋝為鍰與書所謂其罰百鍰同其重六兩大半兩三之則一斤四兩其說誠然矢人言重三垸乃音丸豈非音相近而傳之或差乎㦸廣寸有半寸內三之胡四之援五之倨句中矩與刺重三鋝㦸與戈同戈二刃㦸三刃皆刺兵也何以知其為三刃上經戈廣二寸援及接柲長一尺二寸胡長六寸重三鋝此㦸廣二寸有半寸胡四之則與戈同長六寸內三之援五之雖上下有半寸之差其實與胡同長尺有二寸但其刃狹於戈半寸宜若輕矣而亦重三鋝者若不三刃則輕於戈而其重為不同三刃則胡之倨句中矩言正方也於援之外又有所謂刺刺者著柲前如鐏謂於援胡之橫上中使出者也有刺與三刃乃見三鋒之數桃氏為劍臘廣二寸有半寸兩從半之以其臘廣謂之莖圍長倍之中其莖設其後參分其臘廣去一以為首廣而圍之劍以止暴惡桃以辟不祥類相似也故以桃氏為劍劍之所利在乎刃而刃謂之臘臘廣二寸有半寸則臘兩面各有刃兩從者劍脊中髙兩殺而趨鍔者各一寸四分寸之一也以臘廣為之莖圍長倍之者莖謂劍夾中人所握者其圍二寸有半則其長五寸矣中其莖設其後者謂從中以却稍大之者於操執則易制也三分其臘廣去一以為首廣而圍之者首廣謂劍把接刃處之徑也三分二寸半而去其一則首廣一寸三分寸之二而圍之者正謂圜也與廬以圍為圜同身長五其莖長重九鋝謂之上制上士服之身長四其莖長重七鋝謂之中制中士服之身長三其莖長重五鋝謂之下制下士服之上中下三等之士非指命士也樂記所謂虎賁之士說劍是已劍之上制長三尺重三斤十二兩中制長二尺五寸重二斤十四兩三分兩之二下制長二尺重二斤一兩三分兩之一各因其人之材力彊弱而列為三等之用則人與器相習而無不安之患矣鳬氏為鍾兩欒謂之銑銑間謂之于于上謂之鼓鼓上謂之鉦鉦上謂之舞舞上謂之甬甬上謂之衡鍾縣謂之旋旋蟲謂之幹鍾帶謂之篆篆間謂之枚枚謂之景于上之攠謂之隧天下之物重不踰金輕不踰羽鳬羽物也輕莫尚焉欲其聲之清揚而遠聞故為鍾以鳬氏取其聲之輕而已凡鍾不圓而有兩角欒角也欒謂之銑者其角已無所致飾取其明潔言其絶澤如洗也銑間謂之于者鍾形上袪則屈而不直聲生於此緩而不迫猶氣之于也于上謂之鼓者以所擊之處聲所由作故曰鼓也鼓上謂之鉦者左右上下于此取正焉故曰鉦也鉦上謂之舞者以其聲大而運於此發揚故曰舞也舞上謂之甬者以鍾柄所接之處有不窮之用故曰甬也甬上謂之衡者衡平也言甬上之勢正而用之以取平也鍾縣謂之旋者旋環而繫之也言繫之如循環也旋蟲謂之幹者幹固也設飾於上以為固也鍾帶謂之篆者介乎鼓鉦舞之間而其形條細若帶故曰帶其帶如篆籕之文故又曰篆篆間謂之枚枚謂之景者篆間有鍾乳以夾鼓與舞若數物之枚故曰枚其枚如日景之明故又曰景于上之攠謂之隧者以所擊之處如靡之光故曰攠攠之窐如燧故又曰燧自兩欒之銑以至鼓上之舞所以定鍾之體也舞上之甬甬上之衡所以正鍾之縣也鍾縣之旋以至攠謂之隧所以為鍾之飾也鍾之制於是備矣十分其銑去二以為鉦以其鉦為之銑間去二分以為之鼓間以其鼓間為之舞修去二分以為舞廣以其鉦之長為之甬長以其甬長為之圍參分其圍去一以為衡圍參分其甬長二在上一在下以設其旋此言鍾之度而不言多寡者隨其律之大小長短為之而已周語曰景王將鑄鍾無射問律於伶州鳩而對以度律均鍾均平也假如黃鍾之律長九寸以律計身倍半為鍾蓋取九寸之倍而又取其九寸之半則通為二尺二寸半餘律亦如是各以其律為廣長圍徑此即度律均鍾也律有長短故鍾有小大鍾有小大而長短亦欲其稱凡鍾之制皆下侈上斂故鉦之徑居銑徑十分之八而銑間則與鉦同也鼓與鉦同而鼓間去二分則鼓間居銑徑十分之六也以其鼓間為之舞修則舞間與鼓間等矣又去二分以為舞廣則舞廣居銑徑十分之四矣以此推之則銑間與鉦相應鼓間與舞修相應然舞之上下既促當以橫為修從為廣則上不失於太斂下不失於太侈矣以其鉦之長為之甬長則太長不類先儒以為并衡數是也以其甬長為之圍三分其圍去一以為衡圍衡在甬上小於甬故也三分其甬長二在上一在下以設其旋者上既以鉦之長為甬與衡之長故令衡居一分而旋又居一分乃居甬之中央是其正也由是制鍾則鍾之大小短長皆可以律推之矣薄厚之所震動清濁之所由作侈弇之所由興有說鍾已厚則石已薄則播侈則柞弇則鬱長甬則震鍾以聲為主而聲之所發本乎形形既不同聲亦隨異此鍾之大小所以貴乎中也大鍾以鼓間十分之一為厚小鍾以鉦間十分之一為厚則為厚薄之中矣今鳬氏言薄厚而未免乎震動則必有不得其中者薄厚不得其中其初不過震動而已至於聲之清濁由此而出口之侈弇由此而興果何所自而然記者於此謂之有說蓋有說以推其弊之所由起也謂大鍾不可以不厚而已厚者其聲石而不出小鍾不可以不薄而已薄者其聲播而多散其形侈者其聲迫窄而出疾其形弇者其聲鬱抑而不發其甬長者其聲震掉而不定其聲之病皆其形之失中者也所謂有說者如此是故大鍾十分其鼓間以其一為之厚小鍾十分其鉦間以其一為之厚鍾大而短則其聲疾而短聞鍾小而長則其聲舒而遠聞為遂六分其厚以其一為之深而圜之大鍾以鼓間十分之一為之厚小鍾以鉦間十分之一為之厚是鼓間鉦間皆居銑十分之六其為數一也鄭氏謂鼓鉦之間同方六而今宜異又曰若言鼓外鉦外則近之殊不知鼓間鉦間雖同而鍾之大小不同因其大小之形而各取大小之數則其為厚也實異何必鼓外鉦外之說至於鍾大而短其聲疾而短聞鍾小而長其聲舒而逺聞則亦於二者之厚而取中焉若夫遂特于上之攠其方圓深淺於鍾若未甚病而亦十分其厚之一既為之深又為之圜其制鍾不茍如此㮚氏為量改煎金錫則不耗不耗然後權之權之然後凖之凖之然後量之㮚堅也量與鍾鼎同為上齊皆六分其金而錫居一又欲其改煎不耗取其堅而已不耗然後權之以視其輕重之平權之然後凖之以視其髙下之均凖之然後量之以視其多寡之稱由是置之模鑄此量之所以為至堅而用之不窮者也量之以為釜深尺內方尺而圜其外其實一釜其臀一寸其實一豆其耳三寸其實一升周用四營之數四籥為合四合為升四升為豆四豆為區四區為釜釜深尺方內而圜其外則四區也其臀一寸其實一豆則四升也其耳三寸其實一升則四合也鄭氏以釜為六㪷四升誠得之矣至焦蹈則謂躍於籥合於合登於勝聚於㪷角於斛所謂釜者斛也深尺方尺而圜其外實能容之所謂豆者㪷也其臀一寸實能容之雖然此西漢之所謂量也班固之言量曰其上為斛則十㪷其下為㪷則十勝左耳為勝則十合右耳為合則十籥籥以千二百黍為實自籥自斛皆以十計殆倍半於周量之數蹈以此為周之量豈其然乎或謂蹈蓋引管子曰百勝而成釜此釜為斛之證也梓人曰爵一勝觚三勝獻以爵而酬以觚一獻而三酬則一豆矣此豆為㪷之證也是不然孔子嘗語冉有曰與之釜馬融釋之曰六㪷四升管子因時立制釡與釜同其實數則異乎周殆不可以一概論且為豆或以木或以瓦木豆實四勝醢人言四豆之實是已瓦豆實十勝旊人言豆實三而成觳是已梓人所謂豆亦瓦豆耳臀之所實當與木豆同數或謂釜豆固非齊之法然蹈謂豆區釡鍾各自四而登者乃齊之亂法也奚取焉曰晏子以齊舊四量四勝為豆各自其四以登于釡釜十為鍾陳氏三量皆登一焉鍾乃大矣以家量貸以公量收是晏子當春秋之時去成周為未逺其論四量必有本也或謂周之量深尺方尺漢制亦然算方一尺則所受一斛若實四豆無乃大寡乎曰周用指尺八寸漢用黍尺十寸量方尺深尺雖同而其尺有長短之差故也重一鈞量法本起於黃鍾之籥至於釜之深尺內方尺而圜其外其重一鈞若漢律歷之斛亦深尺內方尺而圜其外其重乃至二鈞何也考律歷志則漢用黍尺十寸若周則指尺八寸說文曰咫八寸周尺也王制曰古者以周尺八寸為步今以周六尺四寸為步此八寸尺之證也周量方尺而狹故其實一釜而重一鈞漢量方尺而廣故其實一釜而重二鈞本朝范鎮嘗言周之釜重一鈞漢之釜重二鈞其聲皆中黃鍾乃知尺為權衡相傳至今不變唯量為不同今之大府量此古量半之殊不知周之一鈞即今之半鈞蓋今之尺既倍於古則今之半即古之全今之黃鍾重半鈞即古之重一鈞者也其聲中黃鍾之宫古者神瞽考中聲以制量則知量法本起於黃鍾之籥蓋黃鍾中聲也周制逺矣參以漢制黃鍾之律其始以秬黍千二百積之黍之積有多寡故律之管有短長黃鍾之管其長九寸其所容之黍千有二百而餘律自是生焉故以一黍之廣為一分積分而寸寸而尺尺而丈丈而引則知五度之法皆起於其長以千二百黍之重而為十二銖積銖而兩兩而斤斤而鈞鈞而石則知五權之法皆起於其重以千二百黍之多而為一籥積籥而合合而勝勝而豆豆而區區而釜則知五量之法皆起於其多而衆法具焉是以五度皆起於黃鍾之長五權皆起於黃鍾之重量之深尺方尺以至重一鈞者既合乎黃鍾之權度而又起乎黃鍾之籥其中黃鍾之宫宜矣概而不稅概所以平物也不稅所以公天下也賈氏援趙商之問概而不稅廛人何以有稅鄭曰官量無稅彼㕓人有稅在肆常用者也其說陋矣今考㕓人斂市之總布後鄭以為守升斛者之稅非謂升斛有稅也以升斛受其稅耳不然則角人之齒骨以度量受之掌染草之草物以權量受之豈皆謂之稅哉以此量概之平通用於民亦通用於官此所以為不稅也其銘曰時文思索允臻其極嘉量既成以觀四國永啓厥後兹器維則銘之為義有以為戒者有以為美者戒若湯之盤銘是也美若衛孔悝之鼎銘是也此量之款識則銘其美而已蓋聖人制量本乎黃鍾之籥五權五度六律六吕皆始於此而禮樂實寓焉非時文之君何足以探制作之理祭統曰有其位而無其德不敢作禮樂有其德而無其位不敢作禮樂德與位兼者非時文而何惟時文之君內思於心外索於物信臻乎是理之極故其量足以該天下之美而謂之嘉量以觀四國者謂大觀在上之觀巍然在上立此嘉量之法而以中正觀天下也允啓厥後兹器維則者謂五則之則非特後世五量取則於此如五權之輕重五度之長短六律六吕之髙下亦皆取則於此也舜之先於同度量武王之先於謹權量亦是此意銘之所謂時文思索豈欺我哉凡鑄金之狀金與錫黑濁之氣竭黃白次之黃白之氣竭青白次之青白之氣竭青氣次之然後可鑄也金堅也錫柔也錫居金六分之一故專言鑄金之狀上經言改煎金錫則不耗而此言其證以青色為貴弓人曰青也者堅之徵也惟金亦然金之青則其色純其力堅其次青白則色差雜矣其次黃白則雜而弱矣至於黑濁則穢滯而不可用矣故鑄金之狀始則變黑濁為黃白又變黃白而為青白又變青白而為青純則亦復其本而得其至堅之性者也言於㮚氏為量之後兹其所謂上齊者乎段氏段氏為鑄器以序工知之也凡農器耕以錢耨以鎛穫以銍鎛之為利大矣臣工之詩曰庤乃錢鎛庤具也良耜之詩曰其鎛斯趙趙刺也周家以農事開國而盈盛之世以此為告成功之頌宜乎段氏以鎛器專其職而記考工者又以粵無鎛為首稱即此意推之則段氏雖亡而不亡矣

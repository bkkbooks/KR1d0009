body:
  text: 周官總義卷二十六宋易袚撰冬官考工記第六冬官非火于秦也其亡久矣蓋自周轍既東之後諸侯惡其害已而滅去其籍是以太平鉅典不聞于孔門學者之傳習亦不見于先秦傳記之所紀載遺言湮沒誠可於邑其亦幸而煨燼既息復出于漢也其又不幸而編帙散逸冬官空焉河間獻王以千金求之弗𫉬于是以考工記補其闕或曰考工記非周書也言周人上輿而有梓匠之制言周人明堂而有世室重屋之制言溝洫澮川而非遂人之制言旂旗旟旐而非大司馬司常巾車之制其眡周典誠大不類而不知三代有異制以意逆之而已書曰司空掌邦土居四民時地利而百工即四民之一也况其制度纎悉靡不備舉而其文亦䆳偉閎麗足以𤼵聖經之秘學者遺其迹而探其本則其于冬官也亦思過半矣國有六職百工與居一焉或坐而論道或作而行之或審曲面埶以飭五材以辨民器或通四方之珍異以資之或飭力以長地財或治絲麻以成之有大人之事有小人之事自王公以至農婦是已百工則並列於其間而本末精粗備焉貴賤不同均以利天下為事故曰國有六職六職非先王之制記考工者專為百工設也於是言百工居一而復序列六職之義觀先後之序而工之為利博矣或坐而論道莫尊於王公或作而行之莫貴於士大夫而百工乃居王公士大夫之次或通四方之珍異以資之莫急於商旅或長地材而治絲麻莫切於農婦而百工乃居商旅農婦之首何也荀卿曰精於道者兼物物精於物者以物物王公士大夫職於道者也故視百工為先商旅農婦職於物者也故視百工為後惟守之世謂之工者雖不過乎物而百工之事皆聖人所作則實進乎道蓋形而上者謂之道形而下者謂之器而百工之職兼大人小人之事記考工者以百工而與居六職之一其意深矣哉坐而論道謂之王公作而行之謂之士大夫審曲面埶以飭五材以辨民器謂之百工通四方之珍異以資之謂之商旅飭力以長地財謂之農夫治絲麻以成之謂之婦功坐論謂之王公論治國平天下之道也作行謂之士大夫行王公所論之道也上言王公下言士大夫而不言孤卿舉上下以見其中則孤卿可知矣五財謂金也木也水火土也傳所謂天生五材是已五材而加以皮玉設色則為八材經所謂百工飭化八材是已皮玉設色有非民用者故曰以飭五材以辨民器謂之百工珍異則非地官之所謂珍異也質人言市之珍異㕓人言膳府之珍異場人言場圃之珍異而鄭氏皆以為四時食物此非食物也凡民用所關則賤者可以為珍而常者可以為異先王必有以通之故曰通四方之珍異以資之謂之商旅飭力以長地財者平地山澤之農皆與焉故言長地財絲可以為帛麻可以為布而皆出於五畝之宅嬪婦化治而已故言治絲麻以成之長者長於始也成者成於終也粤無鎛燕無函秦無廬胡無弓車粤之無鎛也非無鎛也夫人而能為鎛也燕之無函也非無函也夫人而能為函也秦之無廬也非無廬也夫人而能為廬也胡之無弓車也非無弓車也夫人而能為弓車也聖人立成器以為天下利而器非人之所能為也專設百工之職是以工精其業而器便於人若舉國之人而皆能為之則非百工之常其性習然也粤居東南之極土多塗泥金錫生焉田器尤盛此夫人所以能為鎛則何以謂之無鎛燕居東北之極迫近邊境人善禦敵鎧甲尤精此夫人所以能為函則何以謂之無函秦處西陲汧隴涇渭之間地多細木善作矜柲此夫人所以能為廬則何以謂之無廬胡為北夷即獯鬻玁狁匈奴之屬初無屋宅田獵畜牧逐水草而居此夫人所以能為弓車則何以謂之無弓車四者謂之無非果無也名生於不足而亦泯於有餘四國之人皆能為是器則有之名不立故爾知者創物巧者述之守之世謂之工百工之事皆聖人之作也形而上者謂之道形而下者謂之器器雖百工之事而聖人之道於是乎在惟天下之知者能明聖人之道而創其物又得天下之巧者運其心術而述知者之所創然後為百工者得以專習其爇而世守巧者之所述就其三者而言之以知視巧則知為精以巧視工則工為粗曰知曰巧曰工雖精粗不同要之所創者不出乎物所述所守者亦此所創之物皆百工之事而已記考工者推本乎聖人之所作則知形而下者之器皆形而上者之道也易曰備物致用立成器以為天下利莫大乎聖人爍金以為刃凝土以為器作車以行陸作舟以行水此皆聖人之所作也此經所以證上經也所言不過四者之事何足以盡聖人之所作記考工者蓋以理而推之太極動而為隂陽布而為五行是五行者天地生成自然之理鯀汨之而彝倫斁禹次之而彞倫敘此五行所以居九疇之初一今考工記所述刃之以金為體者以火為用故於金言爍器之以土為體者以水為用故於土言凝水行乘舟以濟不通陸行乘車以任重致逺則木之為用無往而不利記考工者舉此四者以推五行造化之理以明聖人器用之制使天下因物以窮理則又不特此四者而已天有時地有氣材有美工有巧合此四者然後可以為良材美工巧然而不良則不時不得地氣也此四者無一不備然後可以為器用之良或闕一焉則又有重輕存乎其間世固有材美工巧而或至於不良者不時不得地氣也時若冬析幹春液角夏治筋秋合三材是已地氣若鄭之刀宋之斤魯之削呉粤之劒是已就其重輕而言則天時地氣為先材美工巧次之要不若合四者之為良也橘踰淮而北為枳鸜鵒不踰濟貉踰汶則死此地氣然也鄭之刀宋之斤魯之削呉粤之劒遷乎其地而弗能為良地氣然也燕之角荆之幹妢胡之笴呉粤之金錫此材之美者也天有時以生有時以殺草木有時以生有時以死石有時以泐水有時以凝有時以澤此天時也百工之事貴乎巧而事有非人力之所能致則工巧亦不可以專尚要必以天時地利材美為本此記考工者所以詳言此三者之事蓋斥鹵之地不能使草木之生植宜乎橘踰淮而北為枳鸜鵒不踰濟貉踰汶則死也倡優之所不能使鐵劒之銛利宜乎鄭之刀宋之斤魯之削呉粤之金錫遷乎其地而弗能為良也櫟杜之樗不能使之中規矩宜乎燕之角荆之幹妢胡之笴呉粤之金錫所以獨稱乎材之美也善耕者不能使冬種而春穫宜乎天有時以生殺草木有時以生死石有時以泐水有時以凝澤無非因乎天之時然也蓋天時有隂陽之異候地氣有燥濕之異齊而其材有疏稹堅柔之異質三者備而後工得以施其巧此經雖不詳言工巧而善用之三者則無非工巧之事故曰合此四者然後可以為良凡攻木之工七攻金之工六攻皮之工五設色之工五刮摩之工五摶埴之工二攻木之工輪輿弓廬匠車梓攻金之工築冶鳬㮚段桃攻皮之工函鮑韗韋裘設色之工畫繢鐘筐㡛刮摩之工玉楖雕矢磬摶埴之工陶旊考工記之言工者其數凡三十然攻木之工七而外復有輈人之職其實則八也設色之工五而畫繢分為二其實則四也析而言之其數若差合而言之皆三十而已然有以人名者有以氏名者有以事名者惟畫繢一職獨言所職之事其他如輪人輿人之類則以人名之謂工以巧為能不必責之世守也如築氏冶氏之類則以氏名之謂官有世功族有世業必世習之為貴也言人則上經所謂工有巧是已言氏則上經所謂守之世謂之工是已然攻木無稱氏者攻金摶埴無稱人者蓋制木必以巧而金土實貴乎世習寧非記者深得先王制作之意乎有虞氏上陶夏后氏上匠殷人上梓周人上輿上之為言尚也昔者聖人逆推世變之所趨而為之黙制其變所謂一代之制初非偏尚之為狥世儒泥考工之説則曰四代各有所尚殊不知有虞氏之泰尊則固尚陶矣而夏后氏之山罍則亦未始不尚陶夏后氏之世室則固尚匠矣而殷人屋用重檐則亦未始不尚匠殷之崇牙則固尚梓矣而夏后氏之龍簨簴周人之璧翣則亦未始不尚梓周之乘路則固尚輿矣而有虞氏之鸞車夏后氏之鉤車殷之大路則亦未始不尚輿由是言之設一官制一器固不足以盡四代之所尚而捨是亦不足以推世變之所寓要之考工之說特舉一代所專尚者言之耳故一器而工聚焉者車為多故者繼上文而言也上經言周人尚輿而工之所聚為多攻金之工六攻皮之工五設色之工五刮摩之工五摶埴之工二惟攻木之工獨居七焉七者之中弓廬匠梓各居其一而輪人輿人車人者乃居其三又於三者之中輿人居其一輪人析而二車人析而三其外又有輈人為輈是車之三工又别而為七此一器而工多惟車為最以周人所尚故也車有六等之數車軫四尺謂之一等戈柲六尺有六寸既建而迆崇於軫四尺謂之二等人長八尺崇於戈四尺謂之三等殳長尋有四尺崇於人四尺謂之四等車㦸常崇於殳四尺謂之五等酋矛常有四尺崇於㦸四尺謂之六等車謂之六等之數此兵車也詩曰伯也執殳為王前驅鄭氏引此文箋之是車之六等為前驅所建可知矣所謂車軫四尺者兵卓之輪六尺有六寸軹崇三尺有三寸加軫與轐之七寸則為四尺也是軫去地四尺矣自軫以上皆差以四尺其數凡六故六等之數軫一人二之外其兵有四曰戈柲曰殳曰車㦸曰酋矛皆揷而建之於車戈柲六尺有六寸既建而迆止戈為武之義也殳長尋有四尺卓㦸常酋矛常有四尺皆置之車旁備而不用之義也出則先刃入則後刃言不以刃向國有國者之所宜逺也觀兵車之制而先王不急於用兵可推矣凡察車之道必自載於地者始也是故察車自輪始凡察車之道欲其樸屬而微至不樸屬無以為完久也不微至無以為戚速也古者觀轉蓬而為輪然後因物生智而為車車之有輪所以利轉故察之之道一曰必自載於地者始二曰欲其樸屬三曰欲其微至車之材衆矣然載於地而衆力之所資焉者輪而已故察車自輪始其次則輪之用以完久為固軫之行以戚速為利樸屬者言其附著於地則堅而不浮所以為完久也微至者言其踐行於地則微而不滯所以為戚速也是三者皆察之以道故曰察車之道言道則超乎形數之表蓋有非目力之所能給者矣輪已崇則人不能登也輪已庳則於馬終古登阤也已太也甚也崇髙也庳下也終古猶言常也阤阪也古人制器内窮天下之理外盡天下之法故大不踰尋丈小不踰方寸所謂輪崇六尺有六寸天下之中制也輪過於崇則其軫亦過於四尺矣故軫為太髙而人之力有所不能登輪或已庳則其軫亦不及四尺矣故軫為太下而馬之力有所不能引人不能登則其力怠馬不能引則常若登阪而倍用其力此非車之善者也故兵車之輪六尺有六寸田車之輪六尺有三寸乘車之輪六尺有六寸此以馬之髙下為節也兵車革路也田車木路也乘車玉路金路象路也兵車乘車駕國馬田車駕田馬然兵車乘車之輪皆六尺有六寸而田車之輪獨六尺有三寸亦可以推先王緩急輕重之意矣六尺有六寸之輪軹崇三尺有三寸也加軫與轐焉四尺也人長八尺登下以為節輪之中為轂轂之末為軹輿後之橫木謂之軫軸上之伏兎謂之轐伏兎尾後即所以銜軸上載車軫者也自軫而上即車輿也輪崇六尺有六寸則軹居其中得三尺有三寸加軫與轐之七寸則車輿去地四尺矣人長八尺則與車輿去地之尺適得其半其長短升降適相稱焉故曰登下以為節輪人為輪斬三材必以其時三材既具巧者和之轂也者以為利轉也輻也者以為直指也牙也者以為固抱也輪敝三材不失職謂之完察車之道必自輪始而輪之為體不過三者而已轂也輻也牙也輪人何以察之斬三者之材因乎冬夏隂陽之時固有得乎天之時材之美者矣三材既具又必欲得夫工之巧者和之和之義亦有三轂當輪之中以虚受轊以實受輻則有取乎利轉輻上凑乎轂而下實乎輪之圍則有取乎直指牙周乎輪之四圍以固轂輻之利則有取乎固抱合是三者則輪人之制可謂不苟矣雖歴時之久不能無弊既弊矣而三材各居其所猶不失職故謂之完望而眡其輪欲其幎爾而下迆也進而眡之欲其微至也無所取之取諸圜也望其輻欲其揱爾而纎也進而眡之欲其肉稱也無所取之取諸易直也望其轂欲其眼也進而眡之欲其幬之亷也無所取之取諸急也輪雖一物而備轂輻牙之三體此經言望其轂望其輻而不言望其牙者蓋望而眡其輪則牙在焉輪之制取乎圜故欲其幎爾而下迆又欲其微至幎爾而下迆者謂如中之幂物下直而不倚微至者謂微著於地周流而不滯此所以為圜也輻之制取乎易直故欲其揱爾而纎又欲其肉稱揱爾而纎者謂如人手之削而其下有殺小之勢肉稱者又如人體之壯而小大有相稱之勢此所以為易直也轂之制取乎急故欲其眼又欲其幬之廉眼如人之眼𨼆然而起幬之亷者以革鞔之欲其負幹而亷隅自見此所以為急也望者逺而眡之也進者近而眡之也惟輪獨貴乎望而眡者以察車自輪始加詳焉故耳眡其綆欲其蚤之正也察其菑蚤不齵則輪雖敝不匡菑謂輻入轂中者也蚤謂輻入牙中者也綆謂輪箄也下經言六尺有六寸之輪綆三分寸之二是已蓋鑿牙之始以三分寸之二為輻骹外箄輻骹外箄則車行安帖而不掉故曰眡其綆欲其蚤之正以輪之鑿孔取其正也輻入牙中者既眡之而欲其正則輻入轂中者又察之而欲其與蚤不相齵賈氏謂齒牙參差謂之齵今菑與蚤一一相當而無參差齟齬之患若是則輪以久而不能無弊故雖敝其用不匡匡方也不方則轉無所膠矣凡斬轂之道必矩其隂陽陽也者稹理而堅隂也者疏理而柔是故以火養其隂而齊諸其陽則轂雖敝不藃斬轂之道猶察車之道言道之無乎不寓散在萬物雖察車斬轂皆有道存焉故也必矩其隂陽者陽木稹理而堅隂木疏理而柔使所斬之材各具堅柔疏稹之性則取其陽者去其隂者初何待於矩惟一木之性或有中堅稹而外疏柔者或有堅柔疏稹之相間者不以矩而辨則器之成也必有緩急偏勝之弊故輪人之斬轂於是有矩之之道所謂矩者初非方矩之矩而以方矩之法察之轂之材貴乎堅以火養其隂則疏理而柔者雖不能必其稹理而其堅則可以齊乎陽也故曰轂雖敝不藃藃暴也言矩得其道而轂材堅宻無暴起之患也轂小而長則柞大而短則摯柞狹也摯危也小大欲其稱而已是故六分其輪崇以其一為之牙圍田車之輪六尺有三寸乘車兵車之輪六尺有六寸今以乘車兵車之輪言之六分其輪崇以其一為之牙圍則牙圍尺有一寸當分為兩面鄭氏不分兩面只就一面尺有一寸上便說三分牙圍而漆其二若是則輪圍兩面為牙圍共二尺二寸矣實與經意不合今以兩面牙圍共一尺一寸言之則每面各得五寸半共為尺有一寸如此而後合六分取一之數參分其牙圍而潻其二牙圍每面五寸半今先以四寸半三分之每分得一寸半是漆其二者為三寸其一不漆者為一寸半外餘一寸三分之是漆者得三分寸之二兼上三寸共為三寸三分寸之二不漆者得三分寸之一兼上一寸半以半寸為十五分三分寸之一作十分是不漆者共為一寸三十分寸之二十五鄭氏謂不潻其踐地者也如牙厚一寸三分寸之二之說此以意推之非經之正文皆有所不取椁其漆内而中詘之以為之轂長以其長為之圍先鄭云椁兩漆之内相距之尺寸也舊注云牙厚一寸三分寸之二餘二寸分於内外面故各一寸是六尺有六寸之輪漆内六尺四寸此說無所據若謂牙厚一寸三分寸之二便為漆内則非矣既曰漆内安可便以牙厚計之漆内之制未明則轂長三尺二寸圍徑一尺三分寸之二亦非也今以經之文意推之除不漆其踐地者只據漆者三寸三分寸之二則兩面為七寸三分寸之一兼上輪崇六分之五為五尺五寸是漆内共得六尺二寸三分寸之一中詘之為三尺一寸三十分寸之五此轂之長也亦所以為圍以其圍之阞捎其藪捎除也阞三分之一也藪謂壺中衆輻所趨之地而容輻菑者也老子曰三十輻共一轂當其無有車之用注無有謂空虚轂中空虚輪得行以一轂之圍得三尺一寸三十分寸之五而為三十輻之所凑茍藪孔稍廣則轂之力弱而有不勝任之患故三分其圍而除一為藪圍三尺一寸三十分寸之五以此三分之三尺得一尺尚餘一寸三十分寸之五以一寸為三十分又三之為九十分以三十分寸之五為十五分共得一百五分三分之一則為三十五分是藪之制得一尺九十分寸之三十五藪中大小穿皆以金錮其内而貫輻焉五分其轂之長去一以為賢去三以為軹上經言轂空壺中此言轂之大小兩頭也賢大穿也軹小穿也轂長三尺一寸三十分寸之五圍三徑一則圍三尺者得徑一尺尚餘一寸三十分寸之五以一寸為三十分又三之為九十分又以五分三之為十五分共得一百五分三分之一為三十五是轂之徑亦得一尺九十分寸之三十五與藪相稱焉五分去一以為賢以一尺五分而去一得八寸以九十分寸之三十五而三之為二百七十分寸之一百五五分去一則得二百七十分寸之八十四是賢徑為八寸二百七十分寸之八十四去三以為軹則半賢之數是軹徑為四寸二百七十分寸之四十二然賢徑倍於軹則大穿為太大鄭氏疑其誤以去一宜為去二理或然也然則大穿去五分轂長之二亦得六寸二百七十分寸之六十三容轂必直陳篆必正施膠必厚施筋必數幬必負幹既摩革色青白謂之轂之善容者形容也如凡為甲必先為容是已容轂不直則非利轉之勢故必欲其直篆者轂約也采以約之謂之篆如詩所謂約軧是已轂之有約以待施筋施膠幔革之用茍或不正則幬何以負幹故必欲其正篆既正矣然後施膠以附麗之則必欲其厚施筋以固結之則必欲其數然後幬以幔轂則必欲廉之外見而負於幹是以轂革相應而無嬴不足之患五者固必欲其善而古人猶為未焉幔轂必將漆之先以骨丸之待乾乃以石摩之其色青白則為善之徵故曰轂之善參分其轂長二在外一在内以置其輻上經皆論制轂此以下詳言輻之制鄭氏謂轂長三尺二寸者令輻廣三寸半則輻内九寸半輻外一尺九寸且經文既言三分轂長則當復除輻廣三寸半謂轂長三尺二寸亦未為當今以經之文意攷之則知轂長三尺一寸三十分寸之五以三尺言之二在外則得二尺矣尚餘一寸三十分寸之五以一寸為三十分又三之為九十分又以五分三之為十五分共為一百五分是二在外者得二尺九十分寸之七十其一在内者得一尺九十分寸之三十五於二在外一在内之中而置輻焉凡輻量其鑿深以為輻廣輻廣而鑿淺則是以大扤雖有良工莫之能固鑿深而輻小則是固有餘而强不足也故竑其幅廣以為之弱則雖有重任轂不折鑿深者言轂之深足以受輻之入也輻廣者言輻之廣足以稱轂之所受也注云輻廣三寸半量其鑿深以為輻廣則鑿深亦三寸半兩者相應則其固足以相任反是則非輻之善矣輻廣而鑿淺鑿不應於輻也則是以大扤雖有良工莫之能固扤言其動摇之甚也鑿深而輻小輻不應於鑿也則是固有餘而强不足固有餘言鑿之深强不足言輻之小也善為輪者必竑其輻廣以為之弱則其力相稱而足以任重竑言度其廣狹也弱菑也輻入轂中者也度其輻廣以為之菑則雖有重任轂不折矣參分其轂之長而殺其一則雖有深泥亦弗之溓也參分其股圍去一以為骹圍參分其轂之長而殺其一者鄭氏曰假令輻除入轂之中其外長三尺則殺一尺以向牙其尺寸之長特假其說以言之此不必泥然凡為輻近轂則欲豐而近牙則欲殺牙所以行地於近骹而殺其參分之則向下利而泥弗黏也蓋輻近轂曰股入轂曰菑近牙曰骹入牙曰蚤在股則豐若人之髀股在骹則殺若人脛近足之骹以輻三分之長殺一以向牙以股三分之圍去一以為骹圍則大小稱矣揉輻必齊平沈必均直以指牙牙得則無𣙗而固不得則有槷必足見也水火無心之物也古人善用之而已揉輻以火所以齊曲直沈輻以水所以均輕重齊曲直者取其易直也均輕重者取其肉稱也然輻直則為倨牙曲則為句輻牙雖有倨句至於鑿内必正正則直以指牙而與牙相得故無用於𣙗而自固不得則雖用𣙗以固然輪摇動則𣙗出而足見矣六尺有六寸之輪綆參分寸之二謂之輪之固綆輪箄也鑿牙之時其孔向外侵三分寸之二使輻骹外箄則車行不掉是謂輪之固凡為輪行澤者欲杼行山者欲侔杼以行澤則是刀以割塗也是故塗不附侔以行山則是摶以行石也是故輪雖敝不甐於鑿為輪有常制用之於平地者也行山行澤而拘乎常制則遇險必僨遇坎必蹶矣故或損或益而從其宜焉行澤者以薄為利故欲杼杼言削薄其踐地者則是刀以割塗而塗不附山石地也行山者以厚為利故欲侔侔言上下之適等則是摶以行石雖石齧之而不能動其鑿此古人備物致用而深得夫變通之宜者也凡揉牙外不廉而内不挫旁不腫謂之用火之善火剛而善變故制器者資之以揉物若曰揉輻必齊則曲者直焉若曰以火養其隂而齊諸其陽則柔者堅焉揉牙亦然順其自然之性而已或逆其性則外亷而絶理内損而挫折旁腫負而起惟巧者無此三患是謂用火之善是故規之以眡其圜也萭之以眡其匡也縣之以眡其輻之直也水之以眡其平沈之均也量其藪以黍以眡其同也權之以眡其輕重之侔也故可規可萭可水可縣可量可權也謂之國工萭或作矩匡或作方此又總括輪人一篇之意大抵注目而視方圓不如付諸規矩之為公謄口而議平直不如付諸凖繩之為審援手而度多寡輕重不如付諸權量之為當六者設則天下之為方圓平直多寡輕重者皆不能外是固不容加毫末於其間者也故可規可萭可水可縣可量可權也謂之國工也固宜非特百工之事為然凡成順利於天下者亦此理而已矣輪人為蓋達常圍三寸桯圍倍之六寸信其桯圍以為部廣部廣六寸部長二尺桯長倍之四尺者二十分寸之一謂之枚部尊一枚弓鑿廣四枚鑿上二枚鑿下四枚鑿深二寸有半下直二枚鑿端一枚蓋取乎圓輪亦取乎圓蓋以二十八弓而凑於部輪以三十輻而凑於轂類相似也故以輪人為蓋蓋之為制上為部中為達常下為桯非部無以納弓於其旁非桯無以含達常於其中蓋達常小於桯而桯小於部所謂達常圍三寸桯圍倍之六寸不言可知也信其桯圍之六寸以為部廣之六寸不言可知也部長二尺桯長倍之四尺者二為八尺亦不言可知也若十分寸之一謂之枚則枚為一分部尊一枚則蓋斗之上穹然而髙者一分也弓鑿廣四枚則鑿孔之廣所以容弓者四分也鑿上二枚以其在上無所受而不用力故二分也鑿下四枚以其在下有所受而用力為多故四分也鑿深二寸有半上言部廣六寸達常圍三寸則達常入部其徑一寸是達常兩畔猶有五寸則鑿深二寸有半正合兩畔五寸之數而弓鑿不侵逹常也下直二枚者謂鑿下四分弓入鑿而曲二分則下直二分也鑿端一枚則鑿之狹一分也夫一枚為一分部廣六寸圍三之則尺有八寸其數十過百八十分而止弓鑿四分而二十八弓已占一百一十二分外止於六十八分則部中實少而虚多又以弓鑿一百一十二分其深各二寸有半而共凑於達常一寸之徑其數似不相合然古人深察物理上下相制自然堅固縝密而非常工之所能測識者矣弓長六尺謂之庇軹五尺謂之庇輪四尺謂之庇軫軹轂末也輪崇與車廣同輿廣六尺有六寸並兩軹六尺二寸三分寸之一總一丈二尺八寸三分寸之一又以乘輿七寸為軌故旁軌内七寸則減尺四寸入輿下其餘一丈一尺四寸三分寸之一也故六尺之弓倍之加部廣六寸凡丈二尺六寸又有宇曲之減則止可以覆軹若輪之廣則又小於軹軫之廣則又小於輪而弓之庇亦以一尺為差故五尺謂之庇輪四尺謂之庇軫參分弓長而揉其一參分其股圍去一以為蚤圍蓋弓近部者謂之尊近外而長則為宇曲三分弓長而揉其一則六尺之弓揉而為宇曲者二尺矣參分弓長以一為尊則六尺之弓平而近部者亦二尺矣近部謂之股猶輻近轂之為股也宇曲之末謂之蚤猶輻入牙謂之蚤也股欲大蚤欲細三分其股圍去一以為蚤圍以弓鑿廣四分而方圍之則股圍一寸六分去其一以為蚤圍則蚤一寸十五分寸之一蚤圍在末而股圍近部謂之尊則與部尊同參分弓長以其一為之尊上欲尊而宇欲卑上尊而宇卑則吐水疾而霤逺蓋已崇則難為門也蓋已卑是蔽目也是故蓋崇十尺良蓋弗冒弗紘殷畆而馳不隊謂之國工上欲尊謂近部之二尺也宇欲卑謂下為宇曲之四尺也蓋桯并達常一丈故宇曲之四尺者垂二尺部上髙則其勢隆宇下卑則其勢俯此所以吐水疾而霤逺也至於蓋崇十尺其中正也謂以宇二尺并人長八尺則於十尺為稱過乎十尺則蓋已崇而難為門不及乎十尺則蓋已卑而反以蔽人之目是以蓋之崇必十尺古之所謂良蓋者不以衣覆之故曰弗冒不以絲繫之故曰弗紘如是平畝而馳有殷其震地之聲宜若墜矣而不墜是弓之入於部者固而不可摇也故謂之國工與輪人為輪之國工同

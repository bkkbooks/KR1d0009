body:
  text: 周官總義巻十三宋易袚撰天府掌祖廟之守藏與其禁令凡國之玉鎮大寳噐藏焉王者之業傳之先祖而後受天之命以有天下凡歴代之玉鎮大寳噐皆得以有而藏之以天府名官重之也掌祖廟之守藏是先王之噐守也與其禁令則王者以道守其噐者也若有大祭大䘮則出而陳之既事藏之大祭大䘮則出而陳之者若顧命之越玉五重陳寳有所謂赤刀𢎞璧琬琰大玉夷玉天球之類皆所以顯先王之道徳而受天命者也亦所以戒後王之怠荒而輕世守者也既事藏之傳之無窮其可忽諸凡官府鄉州及都鄙之治中受而藏之以詔王察羣吏之治官府鄉州及都鄙之治中者計治之書也與玉鎮大寳器同蔵於天府者民亦國之寳也吏尤親於民者也先王盖深致意焉如登賢䏻之書於天府而教得其中登民榖於天府而政得其中計獄弊訟登中於天府而刑得其中凡此無非所謂治中之書天府受而蔵之以詔王察羣吏之治則吏道益謹民心益固然後可以永保天命而玉鎮大寳器為可守也上春釁寳鎮及寳器凡吉凶之事祖廟之中沃盥執燭季冬陳玉以貞來嵗之媺惡若遷寳則奉之上春釁寳鎮寳器以神道敬之也以祖廟守蔵之官而使之沃盥執燭致敬於神也季冬建丑之月乃除舊布新之時陳玉禮神以貞來嵗之􅍇惡敬神之命也寳鎮寳器蔵於祖廟奚以遷為冇故而遷因以奉之雖遷勿失也若祭天之司民司禄而獻民數榖數則受而蔵之王者以民為天民以食為天此民數榖數之登于天府者所以必待乎祭天之司民司禄也考之天文志司民為軒轅角其十七星之兩角有大民小民司祿為文昌三䏻之第六星天有是星先王以是而名官又使之以民數榖數而登之于天府其知國本之所在矣典瑞掌玉瑞玉器之蔵辨其名物與其用事設其服飾典瑞所掌之玉瑞玉器即大宗伯之以玉作六瑞以玉作六器之類名物即鎮圭之類用事即朝日之類服飾即繅藉之類王晉大圭執鎮圭繅藉五采五就以朝日大圭不琢象天道之質朝日次於祀天故普之鎮圭琢四鎮之山有鎮安四方之義用以朝日故執之玉人曰大圭長三尺杼上終葵首天子服之服之者普之也又曰鎮圭尺有二寸天子守之守之者執之也繅藉謂之服飾則成於組織用以藉玉備五色則謂之五采采色一成為一就五就則五采皆成以日為衆陽之宗上有以參天地之功故用大圭鎮圭繅藉以朝日古之王者春朝朝日秋莫夕月備隂陽之義也此皆言朝日而不及夕月者明尊陽卑隂之義而已春秋於月食不書而日食則書之與此意同然則郊之祭也大報天而主日主日以為報天之禮則尊陽卑隂可知矣然朝日以大圭鎮圭而祀日月以圭璧是朝禮與祀禮異也言祀及月而朝不及月雖有尊卑之辨然夕月對朝日而言可互文見之耳公執桓圭侯執信圭伯執躬圭繅皆三采三就子執榖璧男執蒲璧繅皆二采再就以朝覲宗遇㑹同于王諸侯相見亦如之此圭璧繼於鎮圭之後即大宗伯之以玉作六瑞者也其義已詳於前矣然上公九命故桓圭九寸侯伯七命故信圭躬圭七寸子男五命故榖璧蒲璧五寸此命數也若桓圭信圭躬圭之繅藉皆三采三就榖璧蒲璧之繅藉皆二采再就則非命數也用以藉圭璧而隆殺寓焉瑑圭璋璧琮繅皆二采一就以覜聘此諸侯遣臣聘覜於天子者也然公侯伯以圭而其臣亦以圭子男以璧而其臣亦以璧不特此而已圭之外又加以璋璧之外又加以琮臣非可以踰乎君其用異也鄭氏謂璋以聘后夫人以琮享之學者遂因以推圭璋之文殊不知玉人曰璧琮九寸諸侯以享夫人又曰瑑圭璋八寸璧琮八寸以覜聘所謂瑑圭璋璧琮者與圭璋璧琮固自不同也明矣五等諸侯以桓及蒲榖飾其圭璧而其臣特瑑之而已五等諸侯或三采三就或二采再就而其臣特二采一就而已此所以為尊卑之分四圭有邸以祀天旅上帝兩圭有邸以祀地旅四望玉人言四圭尺有二寸兩圭五寸是二者各為一器初不言有邸今此言有邸者謂邸以璧琮則猶托宿之邸也鄭氏乃謂一玉俱成然璧之色蒼琮之色黄而圭之色青不應一玉可以俱成也邸以托宿為義則是四青圭而托於蒼璧兩青圭而托於黄琮以此求之方合玉人之制大宗伯之六器以蒼璧禮天以黄琮禮地而大司樂之職冬日至則禮天於圜丘夏日至則禮地於方丘謂之禮則禮之常也若夫四圭有邸兩圭有邸用之於祀亦用於旅然國有大故則旅上帝及四望有故而後稱旅乃與祀天地同其五祀豈禮之常者乎是不然璧圓象天而四圭以象天道之全琮方象地而兩圭以象地道之偶托之於邸用以祀天地則亦禮之常者旅特通用之而已盖旅以上帝四望為主而謂之大旅則天神地祇以下皆與于祭此所以兼用禮天地之玉也祼圭有瓉以肆先王以祼賔客祼圭有瓉謂酌鬱鬯之瓉也盖宗廟之六享皆以將瓉祼而後肆解牲體以為饋食大宗伯所謂肆獻祼享先王是已賓客亦有祼即大行人所謂王禮再祼一祼之莭賓客亦有肆即大行人所謂饗禮九獻七獻五獻之序於先王言肆於賓客言祼互文也圭璧以祀日月星辰璋邸射以祀山川以造贈賔客一圭而邸以璧故謂之圭璧璧圎固所以象天而一圭所邸則於天道為不足故以之祀日月星辰半圭為璋而邸以琮射以貫之故謂之璋邸射琮方固所以象地而半璧所邸則於地道為不足故以祀山川以造贈賓客日月星辰成象於天其用則一而山川賓客何以同其玉山川有阻固之功賓客有藩屏之功此所以不嫌其為同也土圭以致四時日月封國則以土地義並見大司徒之職珍圭以徴守以恤凶荒牙璋以起軍旅以治兵守珍圭以徴守以恤凶荒者王使其臣徴召諸侯或適列國𤼵倉廩以恵民則執珍圭以為符信珍有貴重之義不可輕也牙璋以起軍旅以治兵守者王使其臣起諸侯之軍旅治戎疆之兵守則執牙璋以為符信牙有森列之義不可亂也璧羨以起度古人之度在樂則起於黄鍾在禮則起於璧羨玉人之事曰璧羨度尺好三寸以為度爾雅亦謂肉倍好謂之璧好即孔也以肉倍好則璧之圓凡九寸以其旁之一寸而羨其上下則横徑八寸而袤十寸以十寸之尺而起度則十尺為丈十丈為引以八寸之尺而起度則八尺為尋倍尋為常使度或不存天下後世因璧羨而可攷則王者之五度信矣駔圭璋璧琮琥璜之渠眉疏璧琮以歛尸王者之孝莫大於嚴父故始死而歛也以禮天地四方之六器開渠為眉以組貫之附于尸之六方圭在左璋在首琥在右璜在足璧在背琮在腹盖取方明神之象以神之將配於天地也䟽璧琮則使通於神示焉榖圭以和難以聘女榖善也圭之飾若粟文故謂之榖圭和難若調人和仇讎之類聘女若媒氏納純帛之類此特用於萬民而已若天子遣人和諸侯之難及遣人聘女於諸侯皆以榖圭行之則可以釋諸侯之善惡可以圖諸侯之交好所謂善者盖取諸此琬圭以治徳以結好琰圭以易行以除慝凡圭形皆上鋭琬圭則圓其鋭而無鋒芒之利以和順為義者也琰圭則剡其末而有鋒􅉭之利以剛斷為義者也凡諸侯之善徳者天子遣人以琬圭旌表之及諸侯使其臣来聘則亦執此以命事行人言時聘以結諸侯之好是也凡諸侯之有過行者天子遣人以琰圭詰責之及諸侯使其臣來覜則亦執此以命事行人言時覜以除邦國之慝是也然交好本於執徳之不回故治徳為大而結好次之邪慝生於率行之不謹故易行為大而除慝次之此其先後之序大祭祀大旅凡賔客之事共其玉器而奉之大䘮共飯玉含玉贈玉凡玉器出則共奉之共者共其物也奉者奉其事也此職皆言玉瑞玉器之名物用事而於職末言共之奉之者重其事也典命掌諸侯之五儀諸臣之五等之命命猶天之命也天子制命於上諸侯諸臣承命於下而皆有儀焉諸侯之五儀則公侯伯子男之異其名諸臣之五命則四命三命再命一命不命之異其數然諸侯未嘗無命以儀為貴故也諸臣未嘗無儀以以命為節故也此設官典命之意上公九命為伯其國家宫室車旗衣服禮儀皆以九為節侯伯七命其國家宫室車旗衣服禮儀皆以七為節子男五命其國家宫室車旗衣服禮儀皆以五為節上公九命在周唯宋杞為上公之爵而宋杞未嘗為二伯也當時所謂二伯者自陕以東周公主之自陜以西召公主之是周召謂八命之三公加命則為九命之上公王制所謂三公一命巻是已其國家宫室車旗衣服禮儀皆以九為節者國之城方九里宫方九百歩貳車九乗建常九斿冕服九章桓圭九寸樊纓九就介九人禮九牢朝位賓主之間九十步凡此皆以九為節此禮也亦儀也自上公以下降殺以兩故侯伯七命子男五命其數皆以七以五為節王之三公八命其卿六命其大夫四命及其出封皆加一等其國家宫室車旗衣服禮儀亦如之王之三公八命其卿六命其大夫四命不言孤者孤卿同乎六命也推而下之則王之上士三命中士再命下士一命此雖不見於典命而公侯伯之士一命則王之士可以類舉也盖自三命以下無出封之制其爵為卑雖以陽數命之而不嫌惟五七九為陽數之竒故以命五等諸侯六四八為隂數之偶故以命公卿大夫之三等而及其出封以其國皆加一等則三公為九命之上公卿為七命之侯伯大夫為五命之子男其國家宫室車旗衣服禮儀亦如之者亦眂其出封之命數故也成周之制有以公卿大夫而出封者齊魯普衛是也有以諸侯而入為天子之公卿大夫者芮伯彤伯衛侯毛公是也或出或入乃成周内外相權之制典命止言出封加一等而無入朝加減之文詩之無衣云豈曰無衣七兮不如子之衣安且吉兮豈曰無衣六兮不如子之衣安且燠兮七則諸侯七章之服也六則孤卿六章之服也是出服諸侯之服而入服公卿之服則入減出加之義明矣凡諸侯之適子誓于天子攝其君則下其君之禮一等未誓則以皮帛繼子男諸侯得以世爵象賢也世必以嫡正分也曲禮曰孤子當室文王世子曰正室守太廟此嫡子之所以為重盖均出於父也均之為兄弟也嫡庶不正禍莫大焉於是死則嫡子繼之嫡子死則嫡孫繼之杜僣亂之原定上下之志莫先於此然使諸侯自以嫡繼而不禀王命則何以奔走天下故周之王者雖不廢萬世之定分而亦未嘗無輕重隆殺之權凡世子受命於王則有文告之辭申戒飭之意故謂之誓已誓者攝其君而至其待之之禮降其君之禮一等若未誓則未有嗣諸侯之義故以皮帛繼子男而無正禮所以尊天子之命也上以尊天子之命下以定萬世之分而王政行矣公之孤四命以皮帛眡小國之君其卿三命其大夫再命其士一命其宫室車旗衣服禮儀各眡其命之數侯伯之卿大夫士亦如之子男之卿再命其大夫一命其士不命其宫室車旗衣服禮儀各眡其命之數公之孤四命則上同乎天子之大夫執皮帛以眡小國之君則又上同乎天子之孤然天子之孤執帛而加以虎皮大國之孤執帛而加以豹皮此其辨也其卿大夫士則同乎侯伯之卿大夫士卿三命大夫再命士一命宫室車旗衣服禮儀則各眡其命之數子男之卿大夫士則又遞降公侯伯之卿大夫士一等卿再命大夫一命士不命宫室車旗衣服禮儀則亦各眡其命之數且子男之士不命則亦何以眡其命之數盖當時有不命之數則亦表異乎不為士者矣司服掌王之吉凶衣服辨其名物與其用事吉凶人事之常也故自王以下皆有吉凶衣服名物則冕服衰服之類用事則祀事䘮事之類凡諸侯以至公卿大夫士莫不皆備其制而曰王之吉凶衣服者禮自王始故也王之吉服祀昊天上帝則服大裘而冕祀五帝亦如之享先王則衮冕享先公饗射則鷩冕祀四望山川則毳冕祭社稷五祀則希冕祭羣小祀則𤣥冕王之吉服六自衮冕而下皆有章數惟大裘無章以黒羔皮為之冕即元冠無旒之冕是冕與裘之尚乎質也然司裘以大裘為祀天之服而此則言祀昊天上帝而兼及五帝者天道尚質其用一而已若衮冕以下之五冕則人道以文為貴書稱舜曰予欲觀古人之象日月星辰山龍華蟲作繢宗彛藻火粉米黼黻絺繡此天子十二章之服也其來逺矣故此職下文亦曰公之服自衮冕而下如王之服知衮冕而下為山龍等之章則知衮冕而上為日月星辰之章此王章十二之明文成周用之無可疑者鄭氏徒見左氏載臧哀伯三辰旂旗之説遂謂王者相變至周則以日月星辰畫於旌旗故天子亦冕服九章是不然且交龍為旂而周之冕服未嘗無龍之餙鳥隼為旟而周之冕服未嘗無華蟲之餙熊虎為旗而周之冕服未嘗無虎蜼之飾何獨謂登三辰扵旂旗而遂去身章之日月星辰哉玉藻云王被衮象天戴璪十有二旒則天數也是冕旒之與衣章一也所戴之冕既有十二旒之數則所服之服何獨止於九章之飾若曰王服九章之衮則冕旒之數亦當依身章而用九不特衮冕而已如服鷩冕毳冕希冕𤣥冕亦當有七旒五旒三旒無旒之别然弁師掌王之五冕則曰皆𤣥冕朱裏延紐五采繅十有二旒皆五采玉十有二知五冕之玉與繅其數皆十二則五服之皆十二章為可知况以類求之國十有二門馬十有二閑大常十有二斿樊纓十有二就凡天子之制無非備物十二果何取於一章三章五章七章以至九章為天子之服耶賈氏云舊説天子九章據大章而言其章别小章章依命數則皆十二為節是舊説誠為可據若此則王者衮冕以下之五服有小章有大章大章則衮冕以九鷩冕以七毳冕以五希冕𤣥冕以三以一惟小章備其制則皆合乎天數之十二也其説正與下文合不特天子之五服而已知希冕為孤之服𤣥冕為卿大夫之服皮弁為士之服此以爵論也然王之孤六命而公之孤四命王之卿六命而公侯伯之卿三命子男之卿再命王之大夫四命而公侯伯之大夫再命子男之大夫一命王之士有上中下三等之命而公侯伯之士一命子男之士不命茍非有大章小章之異則何以别其命之數又不特諸侯諸臣之命服而已如天子之孤執皮帛公之孤亦執皮帛所異者虎皮豹皮之别也天子之卿大夫執羔鴈而諸侯之卿大夫亦執羔鴈所異者飾繢飾布之别也知命服因其爵而章數眡其命然後知天子雖兼用諸侯之五服而其大章小章備十二之數也明矣凡兵事韋弁服眡朝則皮弁服凡甸冠弁服吉服不同而同於用冕兵田眡朝之服不同而同於用弁所以尊首飾也然兵田之弁有時而用之惟皮弁視朝乃日眡朝之禮共用數矣故夏官弁師所以專言皮弁之制㑹五采玉璂象邸玉笄此王之皮弁也其服即記所謂三王皮弁素積是已若韋弁則爵弁也其服即記所謂爵弁經䊷衣是已冠弁元冠也其服即士冠禮所謂主人元冠朝服緇帶素韠是已韋弁冠弁雖弁師所不載考其制則與皮弁㣲有損益知皮弁朝服素積以為裳則冠弁韋弁之服亦可推矣凡凶事服弁服凡弔事弁絰服服弁服䘮冠也其服斬衰齊衰弁絰之服則鍚衰緦衰疑衰也凡䘮為天王斬衰為王后齊衰王為三公六卿鍚衰為諸侯緦衰為大夫士疑衰其首服皆弁絰經書天王惟於此䘮事一見之與春秋書天王崩同意謹終之義也故天王有父道王后有母道諸侯羣臣為天王服斬衰為王后服齊衰亦猶人子之為父母服也而父母於子亦有服焉故王於諸侯羣臣則有鍚衰緦衰疑衰之差然至尊不可以服言也其首服皆加弁絰既𦵏則除之爾大札大荒大烖素服素服䘮禮恐懼修省之意與膳夫言不舉之意同公之服自衮冕而下如王之服侯伯之服自鷩冕而下如公之服子男之服自毳冕而下如侯伯之服孤之服自希冕而下如子男之服卿大夫之服自𤣥冕而下如孤之服其凶服加以大功小功士之服自皮弁而下如大夫之服其凶服亦如之其齊服有𤣥端素端上經言王之吉服雖兼諸侯之五服而有大章小章之辨至此言諸侯諸臣之六服亦各以大章小章為等公之服自衮冕而下如王之服衮冕以上則日月星辰為王之衣章以下則山龍等九章如王之服也侯伯之服自鷩冕而下如公之服鷩冕以上則山龍為公之衣章以下則華蟲等七章如公之服也子男之服自毳冕而下如侯伯之服毳冕以上則華蟲為侯伯之衣章以下則虎蜼等五章如侯伯之服也至於孤之服自希冕而下如子男之服卿大夫之服自𤣥冕而下如孤之服士之服自皮弁而下如大夫之服此其等殺也然有王之孤卿大夫士有諸侯之孤卿大夫士盖其爵同於孤則同乎希冕爵同于卿大夫則同乎𤣥冕爵同於士則同乎皮弁而其命數之隆殺則有大章小章之辨此賈氏之説為可信也已見上文凡大祭祀大賓客共其衣服而奉之大䘮共其復衣服歛衣服奠衣服廞衣服皆掌其陳序祭祀賓客衣服上經所言者是也司服則共之奉之而已復衣服則始死復魂之用也歛衣服則大歛小歛之用也奠衣服則陳于座上者也廞衣服則興觀者之廞也掌其陳事則皆有先後之序典祀掌外祀之兆守皆有域掌其禁令若以時祭祀則帥其屬而修除徴役于司𨽻而役之及祭帥其屬而守其厲禁而蹕之外祀則國外之祀小宗伯所謂兆五帝于四郊四望四類亦如之兆山川丘陵墳衍各因其方是已既有兆域必有兆守守其兆域則當掌其禁令如修除兆域之廢毁者徴役于司𨽻而役之者帥其屬守厲禁而為之蹕者皆所謂禁令也守祧掌守先王先公之廟祧其遺衣服藏焉若將祭祀則各以其服授尸其廟則有司修除之其祧則守祧􅉳堊之既祭則藏其隋與其服凡尸之服服死者之上衣以象其生故王者以衮冕享先王以鷩冕享先公各隨其尸之服也守祧既蔵其遺衣服故祭祀則各以其服授尸凡宗廟皆月祭之故命有司為修除遷廟為祧不必修除也守祧􅉳堊之而已既祭則蔵其隋與其服隋謂尸所祭肺脊黍稷之屬蔵其隋則埋於西階之東蔵其服則復歸於廟祧也世婦掌女宫之宿戒及祭祀比其具詔王后之禮事帥六宫之人共齍盛相外内宗之禮事大賓客之饗食亦如之大喪比外内命婦之朝暮哭不敬者而苛罰之凡王后有􅉔事於婦人則詔相凡内事有逹于外官者世婦掌之經有兩世婦之職天子二十七世婦則天官之世婦也每宫卿二人則春官之世婦也其實一而已鄭氏以比漢大長秋詹事等用士八人之數誤矣今以其職攷之女宫則刑女之役於宫中者六宫之人則女御以下之共婦職者外内宗則外内女之有爵而助后行禮者外内命婦則九嬪以下及外命婦之親者若此之類皆屬世婦豈可以外廷士人參預於其間哉然則何以復列世婦于春官之職曰王有祭祀賓客之事則后亞王行祼獻之禮賛后必用世婦此春官世婦之職即天官之世婦出而賛后行禮官之事者也内宗掌宗廟之祭祀薦加豆籩及以樂徹則佐傳豆籩賓客之饗食亦如之王后有事則從大喪叙哭者哭諸侯亦如之凡卿大夫之喪掌其弔臨外宗掌宗廟之祭祀佐王后薦玉豆眡豆籩及以樂徹亦如之王后以樂羞齍則賛凡王后之獻亦如之王后不與則賛宗伯小祭祀掌事賓客之事亦如之大喪則叙外内朝莫哭者哭諸侯亦如之内宗王同姓女之有爵者外宗王異姓女之有爵者婦人無外事惟以從后為職后亞王行宗廟之禮則内宗薦加豆籩及以樂徹則佐后傳豆籩於外若外宗異族於豆籩之薦與徹及羞齍酌獻則皆為之佐后賓客之饗亦然惟序哭於大䘮與哭諸侯之䘮則外内宗通聫其職至於弔臨卿大夫之䘮則内宗掌之外宗無與焉亦其職也冢人掌公墓之地辨其兆域而為之圖先王之塟居中以昭穆為左右凡諸侯居左右以前卿大夫士居後各以其族凡死于兵者不入兆域凡有功者居前以爵等為丘封之度與其𣗳數大䘮既有日請度甫竁遂為之尸及竁以度為丘隧共䘮之窆器及塟言鸞車象人及窆執斧以涖遂入藏凶器正墓位蹕墓域守墓禁凡祭墓為尸凡諸侯及諸臣塟於墓者授之兆為之蹕均其禁古者君臣分守雖嚴而義均休戚故塟同兆域謂之公墓辨其兆域而圖之則先王之塟居中以昭穆而左右之諸侯則居左右以前卿大夫士則居左右以後此定制也而亦有不可以定制拘者凡自絶於先王而至于大僇是死于兵者故棄之而不入兆域若以忠義而死於正則謂之有功既入兆域又居前列示勸而已凡此皆以其爵等為丘封𣗳數之度兆域之制其義如此於是大䘮及䘮則為之蹕墓域而守墓禁諸侯及諸臣之塟則為之授之兆為之蹕而均其禁生死之義備矣墓大夫掌凡邦墓之地域為之圖令國民族塟而掌其禁令正其位掌其度數使皆有私地域凡爭墓地者聴其獄訟帥其屬而巡墓厲居其中之室以守之一國之民族𦵏於四郊之外謂之邦墓之地為之圖則圖其地形以待𦵏者而已正其位則昭穆也掌其度數則多寡也使皆有私地域則族𦵏得以容聽其墓地之爭則族𦵏不至於相犯又帥其屬而巡墓禁且居中以守之使民之子孫皆得以盡追逺之情則本俗之教成矣職喪掌諸侯之喪及卿大夫士凡有爵者之喪以國之喪禮涖其禁令序其事凡國有司以王命有事焉則詔賛主人凡其喪祭詔其號治其禮凡公有司之所共職喪令之趣其事王者之於諸侯羣臣何其恩之至義之盡也其死也冢人為之掌其兆域之制職䘮為之掌其䘮紀之事是以五服有式殯歛虞祔塟祭皆有常禮不可過也不可不及也故曰以國之䘮禮涖其禁令序其事凡國有司以王命有事焉則詔賛主人以禮拜命也凡公有司之所共者此謂在鄉則鄉之有司共其物在國則國之有司共其物各有定制不待王命者則職䘮以其制令之趣其䘮事戒緩也則凶禮逹乎上下矣大司樂掌成均之灋以治建國之學政而合國之子弟焉凡有道者有徳者使教焉成者成其行之虧者也均者均其習之偏者也五帝即此以名學成周因之以為教國子弟之法其義一而已盖國之子弟安于富貴易以驕侈一誘于物良心或䘮則成均之教尤不可緩然成周之教國子弟必命之大司樂者以樂之入人也易感人也深使斯人鼔舞扵其中血氣和平志慮純一非僻不作動與理㑹此大司樂之職所以專掌成均之法其法令弗可攷矣有虞氏之世命后䕫典樂教胄子則猶可想見其一二直而温寛而栗剛而無虐簡而無傲即所以為成均之義詩言志歌永言聲依永律和聲即所以為成均之教今大司樂言掌成均之法則扵規程之中而寓性命之理是乃所以勉其為成均者又言治建國之學政則扵防檢之中而寓激勸之術是乃所以紏其不為成均者又命有道者有徳者使之表儀於上而訓廸於下如師氏之以三徳教國子保氏之養國子以道無非所以示其為成均焉然則成均者教人之名充之為道徳者教人之寔非于道徳之外而别有所謂成均也以是而行大司樂之教則為國子弟者習明于外行修于内舉前日之虧者偏者納于至善而皆足以為異時公卿大夫士之選成均之教著矣死則以為樂祖祭於瞽宗先王之待有道者與有徳者何其至也先則任大司樂成均之教死則祭之而名以樂祖是名也非特以為教者之報亦所以為學者之勸盖天下之有功者必有祭皆所以示不忘本之意田則祭田祖馬則祭馬祖使夫人之為耕為牧者知其本之所自則莫不相率而樂趨於事况於行國子弟之教者乎其謂之樂祖也固宜然必祭之於瞽宗者何也瞽宗殷學也鄭氏謂學禮樂於殷之學而當時命名之始則有取於瞽司聲樂之義故大司樂之教有所謂樂徳有所謂樂語有所謂樂舞凡道徳之所教者聲樂之本衆瞽之所習者聲樂之文必能為衆瞽之所宗然後可以行道徳之教此祭于瞽宗之意也大胥曰春入學舍采合舞入學則瞽宗之學舍采則樂祖之祭合舞則合國子弟之教職之相聫者如此以樂徳教國子中和祗庸孝友以樂語教國子興道諷誦言語以樂舞教國子舞雲門大巻大咸大㲈大夏大濩大武樂樂也出於性分者為樂徳形于聲歌者為樂語見於𤼵揚蹈厲者為樂舞先王以六舞動其容以六語宣其情二者寔相關而六徳何與焉曰是乃所以見先王教國子之本也夫徳一而已喜怒哀樂未𤼵謂之中𤼵而中節謂之和即其中和而體之以至誠謂之祗即其至誠而達之於日用常行謂之庸庸用也用無不通之謂也由是推之扵事親從兄之際謂之孝友此古聖賢君子踐履之實行而大司樂乃以為教國子之樂徳者孟子謂仁之實事親是也義之實從兄是也禮之寔節文斯二者是也樂之實樂斯二者是也樂之生而至于烏可已則舉天下之事事物物何者非吾反身而樂之理先王為是之故又教之之以樂語樂語者非若後世所謂樂章等語使學者尋行數墨以為傳授之習要皆樂徳之寓者也興即詩之托興者道即詩之陳古者諷即㣲言以動其心者誦即疊奏而申其意者言即句剖以眀其訓者語即講析以示其義者此六者使之涵泳浸漬自然感𤼵而中和祗庸孝友之念有不可禦者正與后䕫典樂所謂詩言志歌永言聲依永律和聲同意然教之以樂語而不合之以樂舞則亦何以見其為樂之至雲門大巻大咸大㲈大夏大濩大武無非所以形容帝王之盛徳𤼵暢天地之和氣而措生人于理故大司樂以為國子之教大胥又以六樂之㑹正舞位是周人以樂徳之全者望國子也以六徳為樂之本以樂語樂舞為六徳之用則中和祗庸孝友之教成矣以六律六同五聲八音六舞大合樂以致鬼神示以和邦國以諧萬民以安賓客以説逺人以作動物大極函三為一至和之本也播為十二辰則為十二律陽聲之所合者凡六謂之六律黄鍾大簇姑洗㽔賓夷則無射是已隂聲之所合者凡六謂之六同大吕應鍾南吕函鍾小吕夾鍾是已五聲宫商角徴羽也八音金石土革絲木匏竹也數者備而後合以六代之樂舞是樂舞所以宣五聲節八音而十二律之所由辨也且六代之樂惟舜為可攷祖考來格則幽足以致鬼神示羣后徳讓則眀足以和邦國庶尹允諧則内足以諧萬民虞賓在位則外足以安賓客三苖来格則逺足以説逺人鳥獸蹌蹌鳯凰來儀百獸率舞則㣲足以作動物是數者皆不出吾至和之化况于六代之樂兼舉而用之乎自其分樂者觀之則見其為致鬼神示自其一變至六變者觀之則見其為作動物致鬼神示者所以言其始作動物者所以言其終舉始終以包其中則邦國萬民賓客可以類推矣乃分樂而序之以祭以享以祀乃奏黄鍾歌大吕舞雲門以祀天神乃奏太簇歌應鍾舞咸池以祭地示乃奏姑洗歌南吕舞大㲈以祀四望乃奏㽔賓歌函鍾舞大夏以祭山川乃奏夷則歌小吕舞大濩以享先妣乃奏無射歌夾鍾舞大武以享先祖凡六樂者文之以五聲播之以八音上經言大合樂而曰以致鬼神示者為大神大鬼大示設也此言分樂則用於鬼神示之次者以祭以享以祀則六律六同以至六舞皆分而序之乃奏黄鍾歌大吕舞雲門以祀天神者雲以象天之施黄帝氏之樂也黄帝氏徳與天合故雲門之樂起於黄鍾之子應以大吕之丑是黄鍾為六律之首大吕為六同之首雲門為六舞之首以祀天神類也乃奏太簇歌應鍾舞咸池以祭地示者池以象地之澤唐堯氏之樂也唐堯氏徳與地合故咸池之樂起於太簇之寅應以應鍾之亥是太簇為六律之次應鍾為六同之次咸池為六舞之次以祭地示類也乃奏姑洗歌南吕舞大㲈以祀四望者㲈紹也言舜之紹堯而䏻紹其道也故大㲈之樂起於姑洗之辰而應以南吕之酉以舜之柴望于方嶽而四嶽四鎮四海四瀆之咸秩以祀四望亦其類也乃奏㽔賓歌函鍾舞大夏以祭山川者夏大也言禹之治水而䏻大中國也故大夏之樂起于㽔賓之午而應以函鍾之未以禹之奠髙山大川而懐襄昏墊之患始息以祀山川亦其類也乃奏夷則歌小吕舞大濩以享先妣者濩養也言成湯弔伐而養天下也故大濩之樂起于夷則之申而應以小吕之已以享先妣而序於先祖之上盖主乎姜嫄而先后與焉謂子孫之養皆原於此亦其類也乃奏無射歌夾鍾舞大武以享先祖者武功也言武王偃武而卒其伐功也故大武之樂起于無射之戍而應以夾鍾之夘以享先祖而序于先妣之下盖主乎后稷而先公與焉謂王業之大實基于此亦其類也言六律則以左旋為序言六同則以右轉為序言六舞則以厯代之先後為序奏若儀禮之所謂笙也歌若儀禮之所謂歌也皆文之以五聲播之以八音義見大師凡六變者一變而致羽物及川澤之示再變而致臝物及山林之示三變而致鱗物及丘陵之示四變而致毛物及墳衍之示五變而致介物及土示六變而致象物及天神冬十二月舉六代之樂行大蜡之禮其神以日月星辰為主而四方百物之神與焉一變而致羽物及川澤之示以羽物為輕川澤為虚故也臝物比羽物為重山林比川澤為實致之稍難故俟乎再變鱗物又重於臝物丘陵又實於山林致之亦難故俟乎三變毛物又重于鱗物墳衍又實于丘陵致之亦難故俟乎四變介物又重於毛物土示又實於墳衍致之亦難故俟乎五變若象物則麟鳯龜龍之有象于天者及在天之神皆逺人而尊致之為尤難故獨俟乎六變變猶更也樂成則更奏也下經六成則告備是已凡樂圜鍾為宫黄鍾為角太簇為徴姑洗為羽靁鼔靁鼗孤竹之管雲和之琴瑟雲門之舞冬日至於地上之圜丘奏之若樂六變則天神皆降可得而禮矣凡樂函鍾為宫大簇為角姑洗為徴南吕為羽靈鼓靈鼗孫竹之管空桑之琴瑟咸池之舞夏日至于澤中之方丘奏之若樂八變則地示皆出可得而禮矣凡樂黄鍾為宫大吕為角太簇為徴應鍾為羽路鼓路鼗隂竹之管龍門之琴瑟九徳之歌九㲈之舞于宗廟之中奏之若樂九變則人鬼可得而禮矣凡樂事大祭祀宿縣遂以聲展之王出入則令奏王夏尸出入則令奏肆夏牲出入則令奏昭夏帥國子而舞祭前之夕謂之宿宿縣則祭前之夕縣樂于筍簴也以聲展之則十二聲皆以詞其器也三夏樂章也其文不傳而其名見于鍾師或意推之謂王言其大王之出入乎廟門則奏王夏肆言其直而遂尸之出入乎廟門則奏肆夏昭者精明之至致味所以歆鬼神牲之出入乎廟門則奏昭夏此不必泥存之而已然則奏三夏者鍾師也令其奏者大司樂也帥國子而舞所以宣道其樂之和而已大饗不入牲其他皆如祭祀大饗者大賓客之饗禮也饗禮行于廟中則禮欲盡其誠不入牲於廟門則禮欲致其稱是待賓客以祭祀之禮而不䏻盡如祭祀之禮也且祭祀以牲為重所謂入牲者其牽牲歟當是之時君執紼卿大夫從夫人薦涚水宗婦執盎從而大司樂為之奏昭夏之樂若大饗則有司從牲之後即殺牲于廟門之外禮欲其稱而已雖無入牲之禮而其他祼獻之節皆如祭祀酌其同異而行之以稱亦所以盡其誠也大射王出入令奏王夏及射令奏騶虞詔諸侯以弓矢舞大射者諸侯貢士于天子天子將祭擇士而射于西郊之虞庠者也王出入令奏王夏者與上經祭祀之出入同義及射令奏騶虞者先儒以騶虞為義獸非矣考之月令則田獵而七騶咸駕大司馬之冬狩而虞人莱所田之野是騶者射義所謂樂官備是已觀其庶類蕃殖而蒐田以時此所以為騶虞之仁仁如騶虞而王道成此所以為天子之射節詔諸侯以弓矢舞者按大射以諸侯為六耦命三耦取弓矢于次三耦皆次第執弓搢矢當西階升降以為舞節皆所以致敬于君者也然則舞其射禮之盛者歟王大食三侑皆令奏鐘鼓玉藻曰天子日食少牢朔月大牢大牢其大食而少牢其常食歟常食以樂侑之見于膳夫之一侑而已大食則三侑以樂皆令奏鐘鼓則樂之節也王師大獻則令奏愷樂凡師之出也冝于社造于祖各載其主以行及其有功則皆獻之以愷樂鄭氏以此為獻捷于祖盖以大司馬獻社而推之殊不知大司馬之執律秉鉞以獻于社特先乎愷樂而已非主其樂者也大司樂樂官也凡社與祖之愷樂皆大司樂有以令其奏焉凡日月食四鎮五嶽崩大傀異烖諸侯薨令去樂大札大凶大烖大臣死凡國之大憂令弛縣數者之變皆王者之憂以天下者也憂之日短則去樂憂之日長則弛縣或曰異烖或曰大烖異則非常矣大則非小矣去樂弛縣亦稱其事變而已矣凡建國禁其滛聲過聲凶聲慢聲姦聲感人而逆氣應之正聲感人而順氣應之逆順既形治亂判焉此所以禁滛聲過聲凶聲慢聲記有之鄭音好濫滛志晉音燕安溺志衛音趨數煩志齊音傲僻驕志是四者非聲之正故謂之滛非聲之中故謂之過以其亂世之音故謂之慢以其為亡國之音故謂之凶效之必然無可疑者大喪涖廞樂噐及塟藏樂噐亦如之王者事亡如事存故於大喪有明噐之樂廞興也藏瘞也大司樂涖之敬其事也

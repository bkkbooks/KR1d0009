body:
  text: 周官總義卷二十九宋易袚撰陶人爲甗實二鬴厚半寸脣寸盆實二鬴厚半寸脣寸甑實二鬴厚半寸脣寸七穿鬲實五觳厚半寸脣寸庾實二觳厚半寸脣寸陶所以凝土而爲器者也古之所尚者瓦器所謂有虞氏尚陶是已後世之文靡矣然陶復陶穴見於興王之初泰尊山罍不忘反始之意此陶人所由設也甗無底而用之以蒸者也盆分物而用之以盛者也甑有底而亦用以蒸者也鬲用以烹者所以通水火之氣也庾用以量物所以共蒸烹之用也鬲獻其氣甗能受焉故無底以爲用鬲通水火之氣而甑能通火氣焉故有底而爲七穿其深淺厚薄陶人皆有定制鬴者傳以四區爲鬴則鬴之所容六㪷四升也甗甑與盆皆實二鬴則倍於六㪷四升矣觳者經以爲豆實三而成觳則觳之所容三㪷也鬲實五觳則爲十五㪷庾實二觳則爲六㪷矣惟庾之實經傳多異據經庾實二觳爲六㪷若孔子言與之庾而馬註以爲十六㪷申豐言粟五千庾而杜註亦以爲十六㪷即爾雅所謂二釡有半謂之庾者也要之庾有二灋不可以一律論旄人爲簋實一觳崇尺厚半寸脣寸豆實三而成觳崇尺簋以盛黍稷簠以盛稻粱稻粱加膳也而貴者用之黍稷常食也而上下通用之掌客之待諸侯用簠有差而簋皆十有二其别如此此旊人所以獨言爲簋以其爲常用之器故也簋實一觳繼以豆實三而成觳者豆謂瓦豆非金木之豆周家金木之豆皆四升即齊晏子所言與醢人言四豆之實是也惟梓人之瓦豆爲十升以旊人所言爲梓人十升之瓦豆豆實三而成觳則簋實一觳爲所容三㪷矣凡陶旊之事髺墾薜㬥不入市器中膞豆中縣膞崇四尺方四寸搏埴之功柔則坯剛則甈貴於剛柔得中而已髺如髪之髺言其聚而亂墾如土之墾言其𤼵而分薜言其破裂而不全㬥言其墳起而不堅皆非剛柔之得中者也於是器欲中膞豆欲中縣膞者植木於鈞之旁既拊泥而轉其鈞則擬度以爲灋欲其與膞相應此器之所以爲正若夫爲豆則其本在柄縣繩於其側欲其柄之直與繩相應此豆之所以爲善然中縣易見而中膞難知不可過於崇亦不可過於方故曰膞崇四尺方四寸梓人爲筍虡天下之大獸五脂者膏者臝者羽者鱗者宗廟之事脂者膏者以爲牲臝者羽者鱗者以爲筍虡外骨内骨卻行仄行連行紆行以脰鳴者以注鳴者以旁鳴者以翼鳴者以股鳴者以胸鳴者謂之小蟲之屬以爲雕琢厚脣弇口出目短耳大胸燿後大體短脰若是者謂之臝屬恒有力而不能走其聲大而宏有力而不能走則於任重宜聲大而宏則於鍾宜若是者以爲鍾虡是故擊其所縣而由其虡鳴鋭喙決吻數目顅脰小體騫腹若是者謂之羽屬恒無力而輕其聲清揚而逺聞無力而輕則於任輕宜其聲清揚而逺聞於磬宜若是者以爲磬虡故擊其所縣而由其虡鳴小首而長摶身而鴻若是者謂之鱗屬以爲筍禮書曰植者爲虡横者爲筍筍之上有崇牙所以縣之也虡之上設業以象業成於上而樂作於下也業之上植羽以羽爲南方之屬而禮樂文明之象也詩所謂設業設虡崇牙樹羽是已盖樂之在天下笙管之屬其聲尚鳥鼓鏞之屬其聲尚獸非特其聲也其形然也是故天下之大獸五脂者膏者臝者羽者鱗者脂凝而膏釋即牛羊與豕之屬其味可以祭故取以爲牲而用之於宗廟梓人必先言脂與膏者所以别臝與鱗羽之爲筍虡也臝者先儒以爲虎豹貔􅣝之屬或以爲毛物而非臝物然以下經考之則正謂虎豹貔􅣝之屬以至羽者爲禽鳥之屬鱗者爲龍魚之屬三者皆施之筍虡以致其飾又不特此三者而已凡天下之㣲而謂之小蟲者外骨龜之屬内骨鼈之屬卻行螾衍之屬仄行蠏之屬連行螘之屬紆行蛇之屬脰鳴鼃黽之屬注鳴精蛚之屬旁鳴蜩蜺之屬翼鳴𤼵皇之屬股鳴蚣蝑之屬胸鳴榮原之屬皆極其工巧而見於雕琢之用亦足以見其樂之至和者無㣲而不備也此經既詠言筍虡之飾故復詳言所以爲筍虡之制鍾者樂器之重者也非其聲之大而宏恒有力而任重者宜不足以稱之故臝物以爲鍾虡磬者樂器之輕者也非其聲之清揚而逺聞恒無力而任輕者宜不足以稱之故取羽物以爲磬虡筍之横貫於虡之中者欲其纎而圓也非小首而長摶身而鴻者不足以稱之故取鱗物以爲筍夫筍虡之制既象鳥獸之形及擊其所縣則亦若鳥獸之聲與之相應昔后夔之言樂曰鳥獸蹌蹌及樂之成則又曰鳯凰來儀百獸率舞雖至和所感如此亦其樂制之善以類感類宜爾哉凡攫閷援簭之類必深其爪出其目作其鱗之而深其爪出其目作其鱗之而則於眡必撥爾而怒苟撥爾而怒則於任重宜且其匪色必似鳴矣爪不深目不出鱗之而不作則必穨爾如委矣茍穨爾如委則加任焉則必如將廢措其匪色必似不鳴矣梓人之爲筍虡必飾以鳥獸之形者取其形也亦取其聲焉盖鳥獸之聲出於天機之自然而非人力之所能爲今擊其所縣而由其虡鳴則虡之鳴與樂相應此攫閷援簭之類古人必審其形而不苟於制作也攫言其便捷而攫物閷言其纖利而閷物援言其力之攀而取簭言其吻之嚙而食深其爪則爪必長而曲出其目則目必露而瞪作其鱗之而則頰􅝋之間其勢起而直如是則勇敢摯速之狀與夫踴躍奮迅之勢盖已黙寓於制作之間及其用之非特其力足以任重且其匪然之色著見於文采則擊其所縣而必似鳥獸之鳴非果鳴也制作侔乎造化則物之無聲者亦疑於有聲者矣梓人爲飲器勺一升爵一升觚三升獻以爵而酬以觚一獻而三酬則一豆矣食一豆肉飲一豆酒中人之食也凡試梓飲器鄉衡而實不盡梓師罪之飲器所以行禮也勺言其所受也故曰勺一升爵言資於尊者也故曰爵一升惟觚之說先儒以為觶盖引韓詩之說曰一升曰爵二升曰觚三升曰觶苟以爲觚則一獻三酬不足以當一斗之數故改觚爲觶其說誠當且天下之禮主獻賔賔酢主人主人復酬賔今止言一獻三酬爲一斗之實而不及酢者專以待賔為義且為中人之食設也盖中人之食以一獻三酬為一斗不當言豆故先儒改豆為斗此却不必改也古之為豆有三有以金為之者有以木為之者有以瓦爲之者以金爲豆其實四升齊晏子所言是也以木爲豆其實亦四升醢人四豆之實是也惟考工記所言以瓦爲豆者與金木不同其實乃至十升旊人言豆實三而成觳是也梓人之豆十升即瓦豆矣先儒不知瓦豆之制異於金木之豆而或者又泥於旊人十升之說且謂金木之豆皆十升尤非通論是知十升之瓦豆誠天下之中制所以爲中人之食不可過也不可不及也凡試梓飲器鄉衡而實不盡梓師罪之者梓師梓人之長也衡平也向口既平而中之所實尚不盡則其制必不中乎度梓師罪之求其器之善而已矣梓人爲侯廣與崇方參分其廣而鵠居一焉上兩个與其身三下兩个半之上綱與下綱出舌尋縜寸焉梓人爲侯者三射之侯也古者天子之禮有燕射有賔射有大射而梓人所言者主乎大射之侯何以知之以其言鵠而知之也鄭康成曰大射之侯用鵠賔射之侯用正燕射之侯用質不言賔射之正燕射之質而獨言大射之鵠舉一以該三者也廣與崇方謂侯中也以大射九十弓言之六尺爲弓合九十弓則天子虎侯凡五丈四尺取弓之二寸以爲侯中則凡丈有八尺高與廣等故三分其廣而鵠居一鵠棲侯中以爲的者也以皮爲之居侯中三分之一則鵠凡六尺矣上兩个與其身三下兩个半之者身即躬也个即幹也鄉射禮曰倍中以爲躬倍弓以爲左右舌下舌半上舌即所以爲兩个也身在中而居一分兩个在左右而居二分故曰與其身三倍中以爲躬則躬之廣凡三丈有六尺倍弓以爲左右舌則上兩个之廣凡七丈二尺侯之制上廣而下狹上兩个各出丈八尺下兩个半之各出九尺除兩畔之丈八尺正合五丈四尺之制則躬夾中个夾躬在上下各一幅先儒謂用布三十六丈是已此以天子虎侯爲言者也若夫糝侯七十弓則其中爲丈四尺其躬爲二丈八尺其兩个爲五丈六尺其鵠爲四尺三分寸之二豻侯五十弓則其中爲丈其躬爲二丈其兩个爲四丈其鵠爲三尺三寸三分寸之一矣非特大射三侯爲然雖賔射燕射之侯用正用質之不同而其廣狹短長皆可以類推之若夫上綱與下綱出舌尋縜寸焉者此又三射之後與夫三侯二侯一侯之所同也綱所以持侯而繫於植縜所以持綱而繫於侯上綱與下綱出舌皆八尺者以象人張臂之義縜寸者以象人伸指之義盖臂爲尋而指爲寸皆近取諸身者也至於侯制上廣下狹後鄭亦以爲取象於人張臂八尺張足六尺是矣張皮侯而棲鵠則春以功張五采之侯則逺國屬張獸侯則王以息燕此正言三射之侯也大射謂之皮侯者司裘所謂熊虎豹之類是已賔射謂之五采之侯者射人所謂五正之類是已燕射謂之獸侯者鄉射記所謂天子熊侯白質諸侯麋侯赤質之類是已於皮侯而棲鵠則知五采之侯其中為朱獸侯之中爲熊麋虎豹鹿豕之象方其春之擇士於射宮也以觀諸侯貢士之實其春以功歟方其行賔射以待諸侯之朝覲也以示吾文德洽四國之意其逺國屬歟至於燕射而用獸侯也以見去天下之害而享天下之樂其王以息燕歟餘見司裘大射義祭侯之禮以酒酺醢其辭曰惟若寜侯毋或若女不寜侯不屬於王所故抗而射女強飲強食詒女曾孫諸侯百福侯之爲侯非止射侯而已内能受矢外能蔽人者爲射之侯屏蔽王室所愾者亦爲天子之侯使諸侯而安其爲侯則幾矣其或不能安其爲侯不能奉承乎王命則司馬九伐之法在所必及故託其辭於祭侯曰抗而射女爾諸侯可不知所戒乎誠能安其爲侯謹守臣節則富貴可以長守故曰強飲强食詒女曽孫諸侯百福然天子能與人以福而不能與人以非所當福諸侯能𫉬福於天子而不能違分以求福此詒女百福雖曰詒之自上而所謂惟若寜侯者實諸侯之自求多福者也廬人爲廬器戈柲六尺有六寸殳長尋有四尺車㦸常酋矛常有四尺夷矛三尋兵有五而弓矢不與焉曰戈曰殳曰㦸曰酋矛曰夷矛凡五也先王之軍制五人爲伍即一伍之中而五兵具焉若弓矢則夫人皆有之字說云凡伍用兵逺則弓矢射之近則矛者勾之勾之矣然後殳者擊之戈㦸刺之則弓矢爲五兵之用可知矣夫弓矢之官在夏官則有司弓矢掌之在攷工則有弓人矢人爲之其兵車則又輿人輪人輈人等為之其五兵則又有攻金之工冶氏等爲之今廬人雖言五兵六建然廬器非兵車亦非專言五兵也特爲五兵之廬器而巳廬器謂柲也柲柄也序言秦無廬而鄭氏謂秦多細木善作矜柲賈氏亦謂柄之長短皆通刄爲尺數而言八尺曰尋倍尋曰常皆約車有六等之數以四尺爲差而知之也凡利兵莫短於戈莫長於夷矛故戈柲六尺有六寸車㦸常則丈有六尺矣矛所以勾則宜長於㦸故酋矛常有四尺則其長二丈矣夷矛三尋則其長二丈四尺矣殳持以擊則長短宜適中故長尋有四尺酋言就也以夷矛三尋爲長之極酋矛之長則近而就之矣故曰酋矛夷言傷也以夷矛極長句則有及而傷物爲易故曰夷矛此有夷矛而不言車軫故輿人同謂之六建序言車軫而不言夷矛故輿人同爲六等之數是序言其用而廬人言其制也惟廬人言其制故五兵無一之不備惟序言其用故迤其戈柲以寓止戈之意去其夷矛以示無傷人之心由是推之先王豈樂於用五兵哉凡兵無過三其身過三其身弗能用也而無已又以害人故攻國之兵欲短守國之兵欲長攻國之人衆行地逺食飲飢且渉山林之阻是故兵欲短守國之人寡食飲飽行地不逺且不渉山林之阻是故兵欲長五兵之制必其器有便於人而安於其用也故人長八尺自戈柲既建而迤之上皆以四尺爲差至夷矛三尋而後三其身故云無過三其身此定制也不及乎此則人不便於器過乎此則器反爲人之害其長短不可易矣今此言攻國守國復有長短之制非於定制之中而復有増損於其間也兵莫短於戈與殳故攻國者用之兵莫長於㦸與矛故守國者用之各欲其器之便於人而已凡兵句兵欲無彈刺兵欲無蜎是故句兵椑刺兵摶􅌛兵同彊舉圍欲細細則校刺兵同彊舉圍欲重重欲傅人傅人則宻是故侵之句兵指矛而言也刺兵指戈㦸而言也􅌛兵指殳而言也鄭氏以戈㦸爲句兵以矛爲刺兵復謂􅌛兵爲改句言􅌛其失甚矣字說曰矛者句之殳者􅌛之戈㦸者刺之盖舉此經所謂句兵􅌛兵刺兵而言之也句兵欲無彈彈謂掉也掉則不能引之使來故欲無彈刺兵欲無蜎蜎謂撓也撓則不能中之使深故欲無蜎惟欲無彈故句兵椑謂方而隋圓者也惟欲無蜎故刺兵搏謂圎而不滯者也至於殳則又謂之􅌛兵以長丈有二尺而上無刄焉止可以􅌛人故曰􅌛兵􅌛兵同彊者謂上下及中央皆同於堅勁也所謂舉圍者又自人之所操用者言之操細以􅌛則便而能敵校者能敵之謂也操重以刺則着而無失傅言其着也密言其無失也是故侵之侵之者勝之也廬器至此可謂其制精其用利矣凡爲殳五分其長以其一爲之被而圍之參分其圍去一以爲晉圍五分其晉圍去一以爲首圍凡爲酋矛參分其長二在前一在後而圍之五分其圍去一以爲晉圍參分其晉圍去一以爲刺圍此經言殳與酋矛而不言戈㦸夷矛以類推之而已鄭氏以廬器爲矜柲柲言其柄而矜言所執之地也凡爲殳五分其長以其一爲之被而圍之正其所執之地以手所被故曰被其實矜也以殳之被爲所執之地則酋矛之三分其長二在前一在後而圍之者亦所執之地也圍之者圜之也於此圜之則非所執之地其不圜也明矣非所執之地而不圜即鄭氏所謂凡矜八觚是也舉殳與酋矛之圜則戈也㦸也夷矛也其圜亦可知即鄭氏所謂戈㦸之矜所圍如殳夷矛如酋矛是也殳之被圍二尺四寸矣三分去一以爲晉圍則一尺六寸矣矛與戈㦸雖長短不同皆可以是推焉所謂晉圍者指其在下言之也所謂首圍者指其在上言之也所謂刺圍者指其上銳者言之也於殳言首以其上無刄直指其首而已於矛言刺以上有所入故以銳名之鄭氏以矛爲刺兵其誤正本諸此晉之爲言進也其用在下故以爲名記曰進戈者前其鐏進矛㦸者前其鐓不以刄向人也銳底曰鐏平底曰鐓其實皆晋也知此則五兵皆可知矣凡試廬事置而揺之以眡其蜎也灸諸墻以眡其橈之均也横而摇之以眡其勁也六建既備車不反覆謂之國工考工言車有六等之數而後言察車之道廬人言六建既備言試廬之事其實一也置猶植也植於地而以手揺之所以審其體之橈也灸猶柱也柱諸兩墻之間所以審其體之勻也横執其首而摇之所以審其體之堅勁與否也五兵與人既建於車而無反覆之患非常工之所能爲也故曰國工與輪人所謂國工同匠人建國水地以縣置槷以縣眡以景爲規識日出之景與日入之景畫參諸日中之景夜攷之極星以正朝夕匠人建國主王國而言也大司徒之建國以土圭之灋測土深以正日景日至之景尺有五寸謂之地中此則贊大司徒求地中而已水地以縣置槷以縣者此二縣字有先後之序先於造成之處以求平地於四旁立四柱以䋲縣之其䋲附柱不偏量其四旁適均則其地平矣方於中立八尺之表表即槷也復以繩縣之其繩附柱不偏而後眡表之景又於四旁之地爲規圜之勢畫以識之日出於東其景在西則識其出景之端日入於西其景在東則識其入景之端景之兩端既定中屈其所量之繩而兩者相合則地中可騐又慮其所規之不正也復以出入之景與日中之景三者相參故曰參又慮其所參之或偏也復以日中之景與極星之度兩者相考且極星之度何與於日中之景凡以騐日景之中而已盖夏至日在南陸躔於東井去極六十六度有竒而其景尺有五寸冬至日在北陸躔於牽牛去極一百一十六度有竒而其景丈有三尺春分日在西陸躔於婁秋分日在東陸躔於角去極九十一度有竒而其景均焉觀日躔去極之逺近以騐四時攷四時日影之短長以求地中則東西可正故曰以正朝夕朝夕東西也經所謂行人之儀不朝不夕記所謂為朝夕必因日月是已東西既正然後度日景兩交之間屈其繩之半以指槷而求合乎規圜之勢則南北亦正矣匠人營國方九里匠人建國者建城於始也匠人營國者營宮室於後也皆所以相成也方九里則總言王國之制皆開方之九里然成周天子制度無適而非十二之數天子用十二則上公九命其數用九典命曰上公九命為伯其國家宮室車旗衣服禮儀皆以九爲節則營國方九里者乃上公之制非天子之制也何謂非天子之制詩言文王曰築城伊淢笺謂方十里曰成淢其溝也文王為西伯築城豐邑其方十里與淢同其制大於諸侯小於天子言小於天子則知天子為十二里言大於諸侯則知上公為九里鄭氏亦謂公之城盖方九里侯伯七里子男五里并據文王有聲詩箋差之天子當十二里此云九里者按下經有夏殷則此九里通異代也然殷之季世文王之城十里言小於天子之制則殷天子之制亦十二里或者禹卑宮室而九里其夏后氏之制乎要之考工記出於秦火之餘非周家之全書或取異代之灋似未可信旁三門國中九經九緯經涂九軌城之一旁為三門四旁凡十二門也每旁之門各有涂則男由左女由右車從中央每門又有三涂焉每門三涂則旁之三門凡九涂矣南北之道為經則其涂為九經東西之道為緯則其涂為九緯九經九緯言四旁之道路縱横皆九也所謂經涂九軌者軌即轍之廣也盖六尺有六寸之輪其崇與輿廣同車輿外旁出輿兩箱各七寸則取於軫轛七寸之數兩箱共尺有四寸則軌廣凡八尺九軌則積七丈二尺矣言經涂九軌則緯涂亦九軌可知涂而度以軌者車從中央亦因其車之行而定其制者也左祖右社靣朝後市市朝一夫左右前後據王宮而言也古者建國王宮居中左者人道所親故立祖廟於王宮之左右者地道所尊故立國社於王宮之右朝者義之所在必靣而鄉之故立朝於王宮之南市者利之所在必後而背之故立市於王宮之北左右前後之位皆建國之定灋也若夫市朝一夫則方各百歩以開方言之則四方各百歩為百畆此固一夫之地而為市朝之制然朝者官吏之所㑹市者商賈之所集處以一夫之地則為太狹矣或曰此經既言夏后氏之制則禹之卑宮室而盡力乎溝洫是一夫之地在溝洫為甚利在市朝不為不足是固然也不亦幾於太卑乎盖嘗謂王朝有三市亦有三朝燕朝在路門之内治朝在路門之外外朝在庫門之外此三朝之别也大市居中則日昃而市朝市居東則朝時而市夕市居西則夕時而市此三市之别也以三朝三市各一夫之地庶乎可矣夏后氏世室堂修二七廣四修一五室三四歩四三尺九階四旁兩夾窻白盛門堂三之二室三之一殷人重屋堂修七尋堂崇三尺四阿重屋周人明堂度九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵明堂之中有世室有重屋夏曰世室殷曰重屋周曰明堂各舉其一而言之先儒徒見記之言曰魯公之廟文世室也武公之廟武世室也以魯之世室為夏之世室遂謂世室為宗廟又謂重屋為王居正堂之路寢明堂為布政教之堂説者亦謂世室以事神為尚重屋以安身為尚明堂以接人為尚抑不思三代之制一也豈於事神安身接人而有異尚乎故嘗以世室重屋考之二者皆有所謂堂則知其為明堂也於夏言堂修廣而不言崇於殷言堂修崇而不言廣夏周不言四阿殷周不言階窻白盛互明其制而巳然屋則不止乎室也堂則不止乎屋也夏之世室殷之重屋周之明堂其地彌大故也且夏度以歩則歩凡六尺也所謂堂修二七者為十有四歩是堂之南北其修為八丈四尺也所謂廣四修一者以十有四歩四分而増一為十有七歩半是堂之東西其廣為十丈五尺也所謂五室三四步者言五室南北之修其中為四歩其旁各三歩也所謂四三尺者言五室東西之廣其中四歩則增四尺其旁各三歩則各増三尺也盖五室所以象五行木室於東北火室於東南金室於西南水室於西北土室於中央惟土室居中央號大室其制為最大四旁之室皆於土室外接四角而為之其中四歩而旁各三歩為十歩是南北之三室其修為六丈也若五室東西之廣其中四歩増四尺其旁各三歩各增三尺共增十尺是東西之三室其廣為七丈也所謂九階者非九等之階盖世室以南靣為正如明堂位所謂中階之前阼階之東西階之西是南靣三階而餘三靣各二階也所謂四旁兩夾窻者窻助户以為明每室四户每户夾以兩窻則凡八窻也所謂白盛者以蜃灰堊其墻壁而飾之也所謂門堂三之二者言門側之堂取數於正堂之制正堂之南北其修為十有四歩三分取二則門側之堂其修為九歩二尺正堂之東西其廣為十七歩半三分取二則門側之堂其廣為十一歩四尺此門堂之制也所謂室三之一者言門堂之室取數於正室之制正室之南北其修為十歩三分取一則門堂之室其修為三歩二尺正室之東西其廣為十一歩有四尺三分取一則門堂之室其廣為三歩五尺三寸三分寸之一此門室之制也夏后氏之制如此而殷人則倣而為之殷人度以尋則尋凡八尺也世室之制大抵南北狹東西長知堂之南北其修七尋為五丈六尺則知堂之東西其廣九尋為七丈二尺也所謂堂崇三尺者言其等之高也所謂四阿重屋者言重屋之四柱皆重也殷人之制如此而周人則又倣而為之周人度以筵則筵凡九尺也東西九筵則堂之廣為八丈一尺南北七筵則堂之修為六丈三尺堂崇一筵則其高凡九尺五室凡室二筵則每室深廣皆方丈有八尺與夏殷異也夏之世室殷之重屋周之明堂雖深淺廣狹之不同而其大概則堂室階窻其制則一然其丈尺廣袤之制則有可疑者且一夫受五畆之宅以二畆半為廬舎以二畆半為保城是二畆半之地為二百五十歩凡一百有五十丈一夫所居其制如此何世室重屋明堂曽不及其數今言夏之世室其中為二丈四尺其旁為丈八尺東西所加者亦不過一尺至周人明堂則每室修廣皆丈有八尺夫宗廟所以行祼獻之禮丈有八尺之地其不能容也必矣鄭氏但執禹卑宮室之說謂明堂崇九尺重屋崇三尺世室崇一尺無所經見抑何卑宮室之甚耶案書傳云周人路寢南北七雉東西九雉室居二雉以雉長三丈言之則南北之修為二十一丈東西之廣為二十七丈矣此路寝之制也古人寝不踰廟則世室重屋明堂之制固宜大於路寝之制今路寝之制且極六丈孰謂世室重屋明堂之室而止於丈八尺乎此鄭氏諸儒所以不能無疑至陸氏則欲廣三代之制謂周人明堂東西九筵南北七筵言其一靣也即堂之内左右各取二筵為室内虚五筵其說非經之明文要之考工一編非周之全書在他經無所騐不可臆說室中度以几堂上度以筵宮中度以尋野度以歩涂度以軌廟門容大扄七个闈門容小扄參个路門不容乘車之五个應門二徹參个此一節據周而言故其文備於周而畧於夏殷盖夏殷尚質夏度以歩殷度以尋無他制也至周人尚文則各因其物之宜以為度之所起慿几而坐者宜於室故室中度以几用筵而行禮者宜於堂故堂上度以筵人之張臂為八尺此八尺之尋宜於宮中故宮中度以尋人之舉足為六尺此六尺之歩宜於野故野度以歩涂有三道車從中央而車軌廣八尺故涂度以軌大扃者牛鼎之扃先儒約以漢制其長三尺廟門宜於大扃故容大扃七个則其廣凡二丈一尺也小扃者膷鼎之扃先儒約以漢制其長二尺闈門宜於小扃故容小扃參个則其廣凡六尺也路門者大寝之門乘車行焉乘車廣六尺六寸五个則為三丈三尺言不容乘車之五个則路門不及三丈三尺也應門者正朝之門乘車行焉乘車二徹之内其廣凡八尺言二徹三个則應門為二丈四尺也然嘗疑之明堂之室止於丈八尺而廟門乃二丈一尺應門乃至二丈四尺路門乃幾於三丈三尺則其制為大廣鄭氏疑其說以為路門不容乘車五个乃兩門共容三丈三尺則是路門為丈有六尺五寸其制反小於應門且非經之明文是必有差學者畧其長短之數而取其因物擬物之度斯可矣内有九室九嬪居之外有九室九卿朝焉内外之九室指王宮后宮相對而言也在后宮則九嬪上賛三夫人以佐后下則帥世婦以及女御故九嬪居於内之九室在王宮則九卿上賛三公以佐王下則帥大夫以及士故九卿居於外之九室言九嬪而不及三夫人言九卿而不及三公以三公三夫人在周官皆不列於職事此所以獨言九卿九嬪也九室之義於經未詳九分其國以為九分九卿治之周制王之三公八命其卿六命而不言三孤是三孤與六卿同謂之九卿故同於六命然六卿分六職三孤無正職貳公宏化而已安得分九卿而且言九分其國耶以經之文意攷之恐有衍文要之攷工非成周之全書取其營國之大槩可也王宮門阿之制五雉宮隅之制七雉城隅之制九雉經涂九軌環涂七軌野涂五軌門阿之制以為都城之制宮隅之制以為諸侯之城制環涂以為諸侯經涂野涂以為都經涂此總言營國之制也盖諸侯之制降於天子都鄙之制降於諸侯而其降殺皆以兩焉嘗以天子之制攷之雉髙一丈王宮門阿之制五雉則其髙凡五丈矣以至宮隅之七雉為七丈城隅之九雉為九丈髙下之制也軌廣八尺經涂九軌則其廣凡七丈二尺矣以至環涂之七軌為五丈六尺野涂之五軌為四丈廣狹之制也此天子之制曰五曰七曰九各適其宜而已若夫諸侯之國降乎天子故有取乎數之七以宮隅之七雉為諸侯之城制則知諸侯之宮隅為五雉以環涂之七軌為諸侯之經涂則知諸侯之環涂為五軌此諸侯之制兼五而止於七也至於公卿大夫之都鄙則又降乎諸侯故有取乎數之五以門阿之五雉為都之城制以野涂之五軌為都之經涂此都鄙之制所以止於五也然亦有可疑者周制天子之數皆用十二而此何以言九雉九軌之制典命曰上公九命侯伯七命而此何以例言七雉七軌之制又曰三公八命卿六命大夫四命而此何以例言五雉五軌之制若然則天子之九雉九軌反下同於上公之命數乎五命之子男用七雉七軌則其數反過於八命之三公六命之孤卿乎八命之三公用五雉五軌則其數反下於七命之侯伯五命之子男乎先儒疑之皆不得其說以天子既用九為數遂謂七為上公之制而非侯伯子男之制五為大都之制而非小都之制且言諸侯則侯伯子男與焉何止於上公言都則小都與焉何止於大都其說亦非經見不足據也盖嘗謂古者之制近君者其勢屈逺君者其勢伸都鄙在王畿之中近乎君者也雖有八命六命四命之不同而其制例以五諸侯在王畿之外逺乎君者也雖有九命七命五命之不同而其制例以七雖然此亦異代之制而已若夫成周之制則上公九命侯伯七命子男五命其國家宮室各眂其命之數三公八命孤卿六命大夫四命其宮室亦眂其命之數其制與匠人不合益信其非成周之全書也若夫天子之九雉九軌則見於上經營國方九里之義詳矣

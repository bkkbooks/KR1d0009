body:
  text: 周官總義卷七宋易袚撰地官司徒第二惟王建國辨方正位體國經野設官分職以為民極乃立地官司徒使帥其屬而掌邦教以佐王安擾邦國教官之屬大司徒卿一人小司徒中大夫二人鄉師下大夫四人上士八人中士十有六人旅下士三十有二人府六人史十有二人胥十有二人徒百有二十人鄉老二鄉則公一人鄉大夫每鄉卿一人州長每州中大夫一人黨正毎黨下大夫一人族師每族上士一人閭胥毎閭中士一人比長五家下士一人天下達尊三鄉老兼焉在朝稱公在鄉稱老不列以職故上與天子坐而不為偪下與百姓相親而不為䙝惟道所在方其在鄉稱老則三年大比乃與鄉大夫帥其吏與其衆寡而行賔興賢能之禮則三公北面而州長百姓得與其列建外朝之位則三公面三槐而州長衆庶亦在其後盖州長即鄉大夫以下也百姓衆庶即前日賔興所帥之衆寡也道之所在下親乎民上親乎君超衆職之表而能宰制衆職者乎封人中士四人下士八人府二人史四人胥六人徒六十人鼓人中士六人府二人史二人徒二十人舞師下士二人胥四人舞徒四十人牧人下士六人府一人史二人徒六十人牛人中士二人下士四人府二人史四人胥二十人徒二百人充人下士二人史四人胥四人徒四十人載師上士二人中士四人府二人史四人胥六人徒六十人閭師中士二人史二人徒二十人縣師上士二人中士四人府二人史四人胥八人徒八十人遺人中士二人下士四人府二人史四人胥四人徒四十人均人中士二人下士四人府二人史四人胥四人徒四十人師氏中大夫一人上士二人府二人史二人胥十有二人徒百有二十人保氏下大夫一人中士二人府二人史二人胥六人徒六十人司諫中士二人史二人徒二十人司救中士二人史二人徒二十人調人下士二人史二人徒十人媒氏下士二人史二人徒十人司市下大夫二人上士四人中士八人下士十有六人府四人史八人胥十有二人徒百有二十人質人中士二人下士四人府二人史四人胥二人徒二十人廛人中士二人下士四人府二人史四人胥二人徒二十人胥師二十肆則一人皆二史賈師二十肆則一人皆二史司虣十肆則一人司稽五肆則一人胥二肆則一人肆長每肆則一人泉府上士四人中士八人下士十有六人府四人史八人賈八人徒八十人泉府宜列於天官今乃列於地官司徒之屬者以其掌市之征布故爾司門下大夫二人上士四人中士八人下士十有六人府二人史四人胥四人徒四十人每門下士二人府一人史二人徒四人司闗上士二人中士四人府二人史四人胥八人徒八十人每闗下士二人府一人史二人徒四人掌節上士二人中士四人府二人史四人胥二人徒二十人遂人中大夫二人遂師下大夫四人上士八人中士十有六人旅下士三十有二人府四人史十有二人胥十有二人徒百有二十人遂大夫每遂中大夫一人縣正每縣下大夫一人鄙師每鄙上士一人酇長每酇中士一人里宰每里下士一人鄰長五家則一人旅師中士四人下士八人府二人史四人胥八人徒八十人旅如羈旅商旅之類皆託宿於外未安其居新甿亦然故以旅名稍人下士四人史二人徒十有二人委人中士二人下士四人府二人史四人徒四十人土均上士二人中士四人下士八人府二人史四人胥四人徒四十人草人下士四人史二人徒十有二人掌土化之法而名官以草人者草乃所以為化也稻人上士二人中士四人下士八人府二人史四人胥十人徒百人土訓中士二人下士四人史二人徒八人誦訓中士二人下士四人史二人徒八人山虞每大山中士四人下士八人府二人史四人胥八人徒八十人中山下士六人史二人胥六人徒六十人小山下士二人史一人徒二十人林衡每大林麓下士十有二人史四人胥十有二人徒百有二十人中林麓如中山之虞小林麓如小山之虞川衡每大川下士十有二人史四人胥十有二人徒百有二十人中川下士六人史二人胥六人徒六十人小川下士二人史一人徒二十人澤虞每大澤大藪中士四人下士八人府二人史四人胥八人徒八十人中澤中藪如中川之衡小澤小藪如小川之衡迹人中士四人下士八人史二人徒四十人卝人中士二人下士四人府二人史二人胥四人徒四十人金玉之函於石者謂之卝取玉則破卝而得取金則煆卝而成怪石黄金非卝所出總名以卝人舉其類言之也角人下士二人府一人徒八人羽人下士二人府一人徒八人掌葛下士二人府一人史一人胥二人徒二十人掌染草下士二人府一人史二人徒八人掌炭下士二人史二人徒二十人掌茶下士二人府一人史一人徒二十人掌蜃下士二人府一人史一人徒八人囿人中士四人下士八人府二人胥八人徒八十人場人每場下士二人府一人史一人徒二十人廩人下大夫二人上士四人中士八人下士十有六人府八人史十有六人胥三十人徒三百人舍人上士二人中士四人府二人史四人胥四人徒四十人倉人中士四人下士八人府二人史四人胥四人徒四十人司禄中士四人下士八人府二人史四人徒四十人司稼下士八人史四人徒四十人舂人奄二人女舂抭二人奚五人饎人奄二人女饎八人奚四十人槀人奄八人女槀每奄二人奚五人大司徒之職掌建邦之土地之圖與其人民之數以佐王安擾邦國以天下土地之圖周知九州之地域廣輪之數辨其山林川澤丘陵墳衍原隰之名物而辨其邦國都鄙之數制其畿疆而封溝之設其社稷之壝而樹之田主各以其野之所宜木遂以名其社與其野以土㑹之灋辨五地之物生一曰山林其動物宜毛物其植物宜皁物其民毛而方二曰川澤其動物宜鱗物其植物宜膏物其民黑而津三曰丘陵其動物宜羽物其植物宜覈物其民專而長四曰墳衍其動物宜介物其植物宜莢物其民晳而瘠五曰原隰其動物宜臝物其植物宜叢物其民豐肉而庳因此五物者民之常而施十有二教焉一曰以祀禮教敬則民不茍二曰以陽禮教讓則民不爭三曰以隂禮教親則民不怨四曰以樂禮教和則民不乖五曰以儀辨等則民不越六曰以俗教安則民不愉七曰以刑教中則民不虣八曰以誓教恤則民不怠九曰以度教節則民知足十曰以世事教能則民不失職十有一曰以賢制爵則民慎徳十有二曰以庸制禄則民興功有宫室墳墓衣服之俗有兄弟師儒朋友之俗安於本俗人倫自厚以土宜之灋辨十有二土之名物以相民宅而知其利害以阜人民以蕃鳥獸以毓草木以任土事辨十有二壤之物而知其種以教稼穡樹藝鳥獸則土㑹所謂動物草木則土㑹所謂植物土㑹辨之而已土宜則各因其宜而後可以蕃毓之也以土均之灋辨五物九等制天下之地征以作民職以令地貢以斂財賦以均齊天下之政均之者何以頒田之法推之上地家百畝中地家二百畝下地家三百畝是中地倍於上地下地兩倍於上地而地之所獲皆與上地等五物九等之所以制地征者亦然以土圭之灋測土深正日景以求地中日南則景短多暑日北則景長多寒日東則景夕多風日西則景朝多隂日至之景尺有五寸謂之地中天地之所合也四時之所交也風雨之所㑹也隂陽之所和也然則百物阜安乃建王國焉制其畿方千里而封樹之凡建邦國以土圭土其地而制其域諸公之地封疆方五百里其食者半諸侯之地封疆方四百里其食者參之一諸伯之地封疆方三百里其食者參之一諸子之地封疆方二百里其食者四之一諸男之地封疆方百里其食者四之一此所謂土其地者特依倣王國之法以定東西南北之勢然後為之制其小大廣狹之封如是而已非謂百里至五百里而别測日景之長短凡造都鄙制其地域而封溝之以其室數制之不易之地家百畮一易之地家二百畮再易之地家三百畮乃分地職奠地守制定貢而頒職事焉以為地灋而待政令以荒政十有二聚萬民一曰散利二曰薄征三曰緩刑四曰弛力五曰舍禁六曰去幾七曰𤯝禮八曰殺哀九曰蕃樂十曰多昏十有一曰索鬼神十有二曰除盜賊緩刑若朝士於邦凶荒則慮刑貶是也以保息六養萬民一曰慈㓜二曰養老三曰振窮四曰恤貧五曰寛疾六曰安富息有生生不窮之義保其息而使之有所養者聖人也以本俗六安萬民一曰媺宫室二曰族墳墓三曰聫兄弟四曰聫師儒五曰聫朋友六曰同衣服正月之吉始和布教於邦國都鄙乃縣教象之灋于象魏使萬民觀教象挾日而斂之乃施教灋於邦國都鄙使之各以教其所治民令五家為比使之相保五比為閭使之相受四閭為族使之相𦵏五族為黨使之相救五黨為州使之相賙五州為鄉使之相賓頒職事十有二于邦國都鄙使以登萬民一曰稼穡二曰樹藝三曰作材四曰阜蕃五曰飭材六曰通材七曰化材八曰斂材九曰生材十曰學藝十有一曰世事十有二曰服事以鄉三物教萬民而賓興之一曰六徳知仁聖義忠和二曰六行孝友睦婣任恤三曰六藝禮樂射御書數六徳藴於内六行形於外隨所寓而見皆可得而指言之惟道隱於六藝之中不可以指言故總而名之曰道藝所謂六徳者非曰六鄉萬民之衆皆可以為聖知為仁義為忠和也取其明而不惑者謂之知公而不私者謂之仁通變能化者謂之聖制變得宜者謂之義誠實不欺者謂之忠喜怒中節者謂之和此六徳為天下之全徳由是推之於六行則自孝而友自友而睦自睦而婣以至任於朋友恤於鄉閭而皆得乎親疎内外逺近之序則此徳之所𤼵見也若夫五禮六樂之見於玉帛鐘鼓者為六藝之首五射六御之見於弓矢綏䇿者為六藝之次六書九數之見於文字籌算者為六藝之末是雖藝成而下寔有形而上者之道充之以徳行則為天下全才之士然先王以全才望天下而不以全才律天下或以徳進或以事舉或以言揚曲藝皆誓之茍有一善之可名無不撫而納諸程度繩墨之中以鄉八刑糾萬民一曰不孝之刑二曰不睦之刑三曰不婣之刑四曰不弟之刑五曰不任之刑六曰不恤之刑七曰造言之刑八曰亂民之刑以五禮防萬民之偽而教之中以六樂防萬民之情而教之和凡萬民之不服教而有獄訟者與有地治者聴而㫁之其附於刑者歸於士祀五帝奉牛牲羞其肆享先王亦如之大賓客令野修道委積大喪帥六鄉之衆庶屬其六引而治其政令大軍旅大田役以旗致萬民而治其徒庶之政令若國有大故則致萬民於王門令無節者不行於天下大荒大札則令邦國移民通財舍禁弛力薄征緩刑嵗終則令教官正治而致事正嵗令於教官曰各共爾職修乃事以聴王命其有不正則國有常刑大司徒以旗致民致之於比閭族黨州鄉之聨也大司馬以旗致民致之於平列陳之際也小司徒之職掌建邦之教灋以稽國中及四郊都鄙之夫家九比之數以辨其貴賤老㓜廢疾凡征役之施舍與其祭祀飲食喪紀之禁令稽國中及四郊都鄙者舉王畿千里言之也不言六鄉六遂邦甸者舉上下以見其中夫謂上地中地下地皆一廛舉其凡也家謂上地七人中地六人下地五人則其目也乃頒比灋於六鄉之大夫使各登其鄉之衆寡六畜車輦辨其物以嵗時入其數以施政教行徴令六畜以備公家之用車輦以待師田之役亦且登之以籍而辨其可用之物入其數則衆寡六畜車輦皆有一定之數施政教則據其數而舉飲射之類行徴令則據其數而起師旅之類及三年則大比大比則受邦國之比要乃㑹萬民之卒伍而用之五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍以起軍旅以作田役以比追胥以令貢賦㑹聚也小司徒以軍制聚萬民自伍兩以至師軍咸在焉獨言㑹萬民之卒伍者先王之軍制調兵必五數出兵必百數不五數不足以調兵故積數起於五人之伍不百數不足以出兵故積數起於百人之卒以百人之卒成一小陣五百人之旅成一中陣二千五百人之師成一大陣萬二千五百人之軍成五大陣乃均土地以稽其人民而周知其數上地家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人凡起徒役毋過家一人以其餘為羨唯田與追胥竭作凡用衆庶則掌其政教與其戒禁聴其辭訟施其賞罰誅其犯命者用衆庶者正之以政導之以教則無殃民之失飭之以戒止之以禁則無視成之暴如是不服而有辭訟則為之聴其辭訟用命者有功而不共命者有過又為之施其賞罰焉凡國之大事致民大故致餘子乃經土地而井牧其田野九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都以任地事而令貢賦凡税斂之事乃分地域而辨其守施其職而平其政六鄉六遂公邑都鄙之地域皆有山林川澤丘陵墳衍原隰之地守既分其域必奠其守然後施之以職王畿如此邦國亦然如是皆以貢賦税斂令之則逺近輕重各得其均故曰平其政凡小祭祀奉牛羞其肆小賓客令野修道委積大軍旅帥其衆庶小軍旅廵役治其政令大喪帥邦役治其政教凡建邦國立其社稷正其畿疆之封凡民訟以地比正之即大宰八成比居之法地訟以圖正之即大宰八成版圖之法嵗終則考其屬官之治成而誅賞令羣吏正要㑹而致事小司徒致事致之於大司徒大司徒致事致之於冡宰正嵗則帥其屬而觀教象之灋狥以木鐸曰不用灋者國有常刑令羣吏憲禁令修灋糾職以待邦治及大比六鄉四郊之吏平教治正政事考夫屋及其衆寡六畜兵器以待政令

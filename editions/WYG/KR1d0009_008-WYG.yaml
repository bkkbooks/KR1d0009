body:
  text: 周官總義卷八宋易祓撰鄉師之職各掌其所治鄉之教而聽其治鄉師下大夫四人則二人共主三鄉故曰各掌其所治鄉之教以國比之灋以時稽其夫家衆寡辨其老幼貴賤廢疾馬牛之物辨其可任者與其施舍者掌其戒令糾禁聽其獄訟稽其夫家衆寡謂其可任者辨其老幼貴賤廢疾謂其可施舍者牛以力而載馬以力而駕不能無老壯强弱之異亦有可任可施舍者鄉師皆從而辨之先之以戒令次之以糾禁終之以聽獄訟是固聽其治而非所以為教然逆折其萌於未爭未有過之始乃所以為治鄉之教也大役則帥民徒而至治其政令既役則受州里之役要以攷司空之辟以逆其役事凡邦事令作秩序大祭祀羞牛牲共茅蒩大軍旅㑹同正治其徒役與其輂輦戮其犯命者大喪用役則帥其民而至遂治之及葬執纛以與匠師御匶而治役及窆執斧以涖匠師凡四時之田前期出田灋于州里簡其鼓鐸旗物兵器修其卒伍及期以司徒之大旗致衆庶而陳之以旗物辨鄉邑而治其政令刑禁巡其前後之屯而戮其犯命者斷其爭禽之訟大旗鄭氏以為熊虎之旗據司常所言司徒卿也卿當建旜必建旗者蓋九旗之為用有所將者有所畫無所將者無所畫通帛為旜則無所畫熊虎為旗則有所畫司徒雖卿其於師田則為軍吏而有所將矣所以建熊虎之旗而謂之大旗下文辨鄉邑之旗非司徒之旗也鄉即六鄉邑即公邑之屬鄉邑既聚則旗之相類者衆矣衆則揉雜而未易辨故於大旗之外各辨以鄉邑之名或鄉邑各為之名司常所謂州里各象其名是也凡四時之徵令有常者以木鐸狥于市朝以歲時巡國及野而賙萬民之囏阨以王命施惠巡國及野包六鄉之内外言也歲終則考六鄉之治以詔廢置正歲稽其鄉器比共吉凶二服閭共祭器族共喪器黨共射器州共賔器鄉共吉凶禮樂之器若國大比則攷教察辭稽器展事以詔誅賞賢能出於鄉教之成也然有行僻而堅學非而博者於此攷之則賢能見矣賢能稱於鄉辭之公也然有言偽而辨順非而澤者於此察之則賢能審矣鄉大夫之職各掌其鄉之政教禁令正月之吉受教灋于司徒退而頒之于其鄉吏使各以教其所治以攷其徳行察其道藝以歲時登其夫家之衆寡辨其可任者國中自七尺以及六十野自六尺以及六十有五皆征之其舍者國中貴者賢者能者服公事者老者疾者皆舍以歲時入其書三年則大比攷其德行道藝而興賢者能者鄉老及鄉大夫帥其吏與其衆寡以禮禮賔之厥明鄉老及鄉大夫羣吏獻賢能之書于王王拜受之登于天府内史貳之退而以鄉射之禮五物詢衆庶一曰和二曰容三曰主皮四曰和容五曰興舞射以觀德古者諸侯貢士於天子天子試之于射宫大射猶然則鄉射為可知今以其禮推之凡射之儀天子與諸侯卿大夫尊卑雖異而皆發乘矢乘矢四矢也皆有樂以為之節射義所謂何以射何以聽是已蓋天子騶虞九節則四節以射五節以聽諸侯貍首七節則四節以射三節以聽卿大夫士采蘋采蘩五節則四節以射一節以聽方其未射其聽審矣内志正而其節比於樂是之謂和外體直而其容比於禮是之謂容及其射也持弓矢審固而以中鵠為主鵠以皮為之是之謂主皮乘矢皆循聲而發發而不失正鵠禮樂交作而前之和容備焉是之謂和容及其已射皆有舞以為發揚蹈厲之舉是之謂興舞且射之物有五而其節有三曰和曰容見於未射之時曰主皮曰和容見於射侯之際曰興舞特見於既射之後此射之序以此推鄉射其禮可攷矣此謂使民興賢出使長之使民興能入使治之賢者在位則服休足以長民居於本所則分𫝑不足以相臨故出於其鄉以長之所以任其教也能者在職則服采足以治乎民居於他所則事情必至於不相諳故入於其鄉以治之所以任其事成周賔興賢能出於鄉不過賔之於鄉而亦用之於鄉此正所謂出使長之入使治之者也歲終則令六鄉之吏皆㑹政致事正歲令羣吏攷灋于司徒以退各憲之於其所治政其要也事其詳也大詢于衆庶則各帥其鄉之衆寡而致于朝衆庶超出乎利害之外而深察乎是非之理況漸陶乎司徒之教為有素其詢之也宜矣若小司寇外朝之位而州長百姓亦得與其後百姓即六鄉所帥之衆庶國有大政則令民各守其閭以待政令以旌節傳令則達之州長各掌其州之教治政令之灋正月之吉各屬其州之民而讀灋以考其徳行道藝而勸之以糾其過惡而戒之若以歲時祭祀州社則屬其民而讀灋亦如之春秋以禮㑹民而射于州序序皆鄉學之名五百家之黨以禮而屬飲者既謂之序二千五百家之州以禮而㑹射者又謂之序萬二千五百家之鄉既有鄉射之名則其學安得不謂之序耶不以序言舉州黨以該之凡州之大祭祀大喪皆涖其事若國作民而師田行役之事則帥而致之掌其戒令與其賞罰歲終則㑹其州之政令正歲則讀教灋如初三年大比則大攷州里以贊鄉大夫廢興黨正各掌其黨之政令教治及四時之孟月吉日則屬民而讀邦灋以糾戒之春秋祭禜亦如之國索鬼神而祭祀則以禮屬民而飲酒于序以正齒位壹命齒于鄉里再命齒于父族三命而不齒凡其黨之祭祀喪紀婚冠飲酒教其禮事掌其戒禁凡作民而師田行役則以其灋治其政事歲終則㑹其黨政帥其吏而致事正歲屬民讀灋而書其德行道藝以歲時涖校比及大比亦如之以上臨下謂之涖族師各掌其族之戒令政事月吉則屬民而讀邦灋書其孝弟睦婣有學者春秋祭酺亦如之以邦比之灋帥四閭之吏以時屬民而校登其族之夫家衆寡辨其貴賤老幼廢疾可任者及其六畜車輦五家為比十家為聯五人為伍十人為聯四閭為族八閭為聯使之相保相受刑罰慶賞相及相共以受邦職以役國事以相葬埋若作民而師田行役則合其卒伍簡其兵器以鼓鐸旗物帥而至掌其治令戒禁刑罰歲終則㑹政致事閭胥各掌其閭之徵令以歲時各數其閭之衆寡辨其施舍凡春秋之祭祀役政喪紀之數聚衆庶既比則讀灋書其敬敏任䘏者凡事掌其比觵撻罰之事徵令乃奔走之事屬於庶人在官之徒宰夫所謂徒掌官令以徵令是也閭胥掌之數其閭之衆寡而辨其施舍特以贊族師之校登也比長各掌其比之治五家相受相和親有辠奇衺則相及徙于國中及郊則從而授之若徙于他則為之旌節而行之若無授無節則唯圜土内之封人掌設王之社壝為畿封而樹之凡封國設其社稷之壝封其四疆造都邑之封域者亦如之令社稷之職凡祭祀飾其牛牲設其楅衡置其絼共其水槀歌舞牲及毛炮之豚凡喪紀賔客軍旅大盟則飾其牛牲喪紀有奠牛賔客有牢禮積膳之牛軍旅有犒牛大盟有載書之牛其牲皆如祭祀之飾敬其事也鼓人掌教六鼓四金之音聲以節聲樂以和軍旅以正田役教為鼓而辨其聲用以六鼓聲用攷之惟雷鼓專用於天神鼛鼓專用於役事若靈鼓用於社祭至㝠氏則用之以毆猛獸矣路鼔用於鬼享至大司馬則用之於教戰大僕則用之以待達窮者與遽令矣以至辟雍作樂之鼖鼔維鏞仲春蒐田軍將晉鼓則又鼖鼓不止乎軍事晉鼓不止乎金奏矣要之聲用各有所主所以不容不辨以雷鼓鼓神祀以靈鼓鼓社祭以路鼓鼓鬼享以鼖鼓鼓軍事以鼛鼓鼓役事以晉鼓鼓金奏鼖鼓即大司馬所謂諸侯執賁鼓是也以金錞和鼓以金鐲節鼓以金鐃止鼓以金鐸通鼓凡祭祀百物之神鼓兵舞帗舞者舞師言凡小祭祀則不興舞今以兵帗而用於百物之神何歟茍有功於民載於祀典則非小祭祀也凡軍旅夜鼓鼜軍動則鼓其衆田役亦如之救日月則詔王鼓大喪則詔太僕鼓舞師掌教兵舞帥而舞山川之祭祀教帗舞帥而舞社稷之祭祀教羽舞帥而舞四方之祭祀教皇舞帥而舞旱暵之事皇舞用於旱暵之事則有陰陽相濟之義凡野舞則皆教之教之備鄉遂之舞所以待國事凡小祭祀則不興舞鼓人於祭祀百物之神教兵舞帗舞此言不興舞者謂其神雖在祀典而功不足以形容也牧人掌牧六牲而阜蕃其物以供祭祀之牲牷凡陽祀用騂牲毛之陰祀用黝牲毛之望祀各以其方之色牲毛之騂者赤色之盛黝者黑色之微凡時祀之牲必用牷物養牲為有素故必用牷物凡外祭毁事用尨可也按校人云凡將事于四海山川則飾黃駒何用尨之有攷之肆師與祝侯禳于畺及郊是畺郊外祭也侯禳毁事也豈與所過山川者例言之歟凡祭祀共其犧牲以授充人繫之繫之充人潔之也所以致敬於神也凡牲不繫者共奉之牛人掌養國之公牛以待國之政令凡祭祀共其享牛求牛以授職人而芻之凡賓客之事共其牢禮積膳之牛饗食賔射共其膳羞之牛軍事共其犒牛喪事共其奠牛凡㑹同軍旅行役共其兵車之牛與其牽徬以載公任器凡祭祀共其牛牲之互與其盆簝以待事以待事則或剥或亨或肆或將皆待之為有素充人掌繫祭祀之牲牷充人受牛人牧人所授者而繫之也祀五帝則繫于牢芻之三月享先王亦如之凡㪚祭祀之牲繫于國門使養之展牲則告牷碩牲則贊載師掌任土之灋以物地事授地職而待其政令有土斯有物或宜於九穀或宜於果蓏或宜於鳥獸之類凡所謂地事者以此物之有事斯有職或職以耕事或職以牧養之事凡所謂地職者以此授之以待其令則令其所有如園廛二十而一之類以待其政則正其所為如凡宅不毛者有里布之類以下經證之則地法可攷以廛里任國中之地以場圃任園地以宅田士田賈田任近郊之地以官田牛田賞田牧田任逺郊之地以公邑之田任甸地以家邑之田任稍地以小都之田任縣地以大都之田任畺地惟内諸侯以禄為主故所任之地與郊甸同謂之田凡任地國宅無征園廛二十而一近郊十一遠郊二十而三甸稍縣都皆無過十二唯漆林之征二十而五凡宅不毛者有里布凡田不耕者出屋粟凡民無職事者出夫家之征以時徵其賦徵其賦者謂任地之正賦若里布屋粟以及夫家之征當時不常有故不立為一定之法閭師掌國中及四郊之人民六畜之數以任其力以待其政令以時徵其賦牛以力而載馬以力而駕雞豚狗彘之畜無失其時八口之家可以無飢則知其力之為有餘由是任民則農圃之事以至虞衡之事皆其力之所及耕植之貢以至山川之貢皆其力之所出凡任民任農以耕事貢九穀任圃以樹事貢草木任工以飭材事貢器物任商以市事貢貨賄任牧以畜事貢鳥獸任嬪以女事貢布帛任衡以山事貢其物任虞以澤事貢其物大宰言任民則任之以其職閭師言任民則任之以其貢惟閭師以貢而論則山澤之職無慮數萬此所以列虞衡為二疏材之利毫末而已此所以不言臣妾然九職以虞衡為次此以虞衡為後亦山澤之利與民共之凡無職者出夫布凡庶民不畜者祭無牲不耕者祭無盛不樹者無椁不蠶者不帛不績者不衰人孰不念其先亦孰不愛其身於此缺焉能無愧乎玉藻云惰游之冠垂緌五寸亦皆所以愧之也愧之也者勉其怠而作其力也縣師掌邦國都鄙稍甸郊里之地域而辨其夫家人民田萊之數及其六畜車輦之稽三年大比則以考羣吏而以詔廢置若將有軍旅㑹同田役之戒則受灋于司馬以作其衆庶及馬牛車輦㑹其車人之卒伍使皆備旗皷兵器以帥而至戒者戒其豫備凡造都邑量其地辨其物而制其域以歲時徵野之賦貢遺人掌邦之委積以待施惠鄉里之委積以恤民之囏阨門關之委積以養老孤郊里之委積以待賔客野鄙之委積以待羈旅縣都之委積以待凶荒凡賔客㑹同師役掌其道路之委積凡國野之道十里有廬廬有飲食三十里有宿宿有路室路室有委五十里有市市有候館候館有積凡委積之事巡而比之以時頒之均人掌均地政均地守均地職均人民牛馬車輦之力政凡均力政以歲上下豐年則公旬用三日焉中年則公旬用二日焉無年則公旬用一日焉凶札則無力政無財賦不收地守地職不均地政三年大比則大均

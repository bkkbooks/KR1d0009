body:
  text: 周官總義卷九宋易袚撰師氏掌以􅍇詔王以三徳教國子一曰至徳以為道本二曰敏徳以為行本三曰孝徳以知逆惡教三行一曰孝行以親父母二曰友行以尊賢良三曰順行以事師長居虎門之左司王朝掌國中失之事以教國子弟凡國之貴㳺子弟學焉凡祭祀賔客㑹同䘮紀軍旅王舉則從聴治亦如之使其屬帥四夷之隸各以其兵服守王之門外且蹕朝在野外則守内列四翟之民即南方之蠻東南之閩東方之夷東北之貉其服屬為有素非西戎北狄比盖周自文王之世西有昆夷之患北有玁狁之難惟東南之地王化先及以基王業至周公攝政制禮作樂推原乎王化之所始南方曰象則有象胥之職以待蕃國之使東夷之樂曰韎則有韎師之職以為宗廟之樂及此四翟之𨽻司𨽻亦帥之以備王室之守也保氏掌諌王惡而飬國子以道乃教之六藝一曰五禮二曰六樂三曰五射四曰五馭五曰六書六曰九數乃教之六儀一曰祭祀之容二曰賔客之容三曰朝廷之容四曰䘮紀之容五曰軍旅之容六曰車馬之容凡祭祀賔客㑹同䘮紀軍旅王舉則従聴治亦如之使其屬守王闈司諫掌糾萬民之徳而勸之朋友正其行而彊之道藝廵問而觀察之以時書其徳行道藝辨其能而可任于國事者以考鄉里之治以詔廢置以行赦宥司救掌萬民之衺惡過失而誅讓之以禮防禁而救之如鄉飲鄉射祭社祭禜祭酺之類無非救之以禮而納之於善凡民之有衺惡者三讓而罰三罰而士加明刑耻諸嘉石役諸司空其有過失者三讓而罰三罰而歸於圜土凡嵗時有天患民病則以節廵國中及郊野而以王命施恵調人掌司萬民之難而諧和之凡過而殺傷人者以民成之鳥獸亦如之凡和難父之讐辟諸海外兄弟之讐辟諸千里之外従父兄弟之讐不同國君之讐眡父師長之讐眡兄弟主友之讐眡従父兄弟弗辟則與之瑞節而以執之凡殺人有反殺者使邦國交讐之凡殺人而義者不同國令勿讐之讐之則死凡有鬪怒者成之不可成者則書之先動者誅之媒氏掌萬民之判凡男女自成名以上皆書年月日名焉命男三十而娶女二十而嫁凡娶判妻入子者皆書之中春之月令㑹男女於是時也奔者不禁若無故而不用令者罰之司男女之無夫家者而㑹之凡嫁子娶妻入幣純帛無過五兩禁遷葬者與嫁殤者凡男女之隂訟聴之於勝國之社其附于刑者歸之于士司市掌市之治教政刑量度禁令以次叙分地而經市以陳肆辨物而平市以政令禁物靡而均市以商賈阜貨財而行布以量度成賈而徴儥以質劑結信而止訟以賈民禁偽而除詐以刑罰禁虣而去盗以泉府同貨而斂賖大市日昃而市百族為主朝市朝時而市商賈為主夕市夕時而市販夫販婦為主凡市入則胥執鞭度守門市之羣吏平肆展成奠賈上旌于思次以令市市師涖焉而聴大治大訟胥師賈師涖于介次而聴小治小訟凡萬民之期于市者辟布者量度者刑戮者各於其地之叙凡得貨賄六畜者亦如之三日而舉之凡治市之貨賄六畜珍異亡者使有利者使阜害者使亡靡者使㣲凡通貨賄以璽節出入之國凶荒札䘮則市無征而作布凡市偽餙之禁在民者十有二在商者十有二在賈者十有二在工者十有二市刑小刑憲罰中刑狥罰大刑扑罰其附于刑者歸于士國君過市則刑人赦夫人過市罰一幕世子過市罰一帟命夫過市罰一盖命婦過市罰一帷凡㑹同師役市司帥賈師而從治其市政掌其賣儥之事質人掌成市之貨賄人民牛馬兵器珍異凡賣儥者質劑焉大市以質小市以劑掌稽市之書契同其度量壹其淳制廵而攷之犯禁者舉而罰之契之為物人執其一予者執左見其予之之仁取者執右見其取之之義合之以為騐示其取予之信而已凡治質劑者國中一旬郊二旬野三旬都三月邦國期期内聴期外不聴廛人掌歛市絘布總布質布罰布廛布而入于泉府凡屠者斂其皮角筋骨入于玉府凡珍異之有滯也者斂而入于膳府胥師各掌其次之政令而平其貨賄憲刑禁焉察其詐偽餙行儥慝者而誅罰之聴其小治小訟而斷之憲刑禁使之知所趨避賈師各掌其次之貨賄之治辨其物而均平之展其成而奠其賈然後令市凡天患禁貴儥者使有恒賈四時之珍異亦如之凡國之賣儥各帥其屬而嗣掌其月凡師役㑹同亦如之司虣掌憲市之禁令禁其鬬囂者與其虣亂者出入相􅇒犯者以屬遊飲食于市者若不可禁則搏而戮之虣則以强虐物亂則以私逆理出入相陵犯則縱惡害人者以屬逰飲食于市則恣情以亂俗者司稽掌廵市而察其犯禁者與其不物者而搏之掌執市之盗賊以狥且刑之胥各掌其所治之政執鞭度而廵其前掌其坐作出入之禁令襲其不正者凡有罪者撻戮而罰之撻以示威戮以示辱是固惡夫罔利而陷扵罪戾也肆長各掌其肆之政令陳其貨賄名相近者相逺也實相近者相邇也而平正之實相近者如布帛之實異而衣被則一所以為相邇也斂其總布掌其戒禁總布乃别肆之税凡商旅之貿易賣儥或以斗斛受之或以權度受之總而名之曰總布泉府掌以市之征布斂市之不售貨之滯扵民用者以其賈買之物掲而書之以待不時而買者買者各従其抵都鄙從其主國人郊人從其有司然後予之有司則從其鄉遂之官凡賒者祭祀無過旬日䘮紀無過三月凡民之貸者與其有司辨而授之以國服為之息凡國之財用取具焉嵗終則㑹其出入而納其餘司門掌授管鍵以啓閉國門㡬出入不物者正其貨賄凡財物犯禁者舉之以其財飬死政之老與其孤祭祀之牛牲繫焉監門飬之此則授之扵充人者也故充人則責之司門而司門則責之監門凡嵗時之門受其餘祭門不敢用散祭祀之牲特受其共牲之餘者而用之凡四方之賔造焉則以告司闗掌國貨之節以聮門市司貨賄之出入者掌其治禁與其征廛孟子云市廛而不征法而不廛説者謂或賦其地之廛而不征其貨或治以市官之法而不賦其廛廛則坐賈之所輸征則行商之所出故廛人掌斂市之廛布而入於泉府泉府又以市之征布而斂不售之貨是市有征布又有廛布若闗則無廛布而有征布何者司闗掌貨賄出入是有行商之征布闗無市官之法安得有市宅之廛布然此所謂征廛者是辨其合征合廛者而闗白焉故司闗征之又五百里至於國門國門雖有不物之㡬而無貨賄之征盖市則行商有征布坐賈有廛布此司闗所以掌其征斂而聮門市也凡貨不出扵闗者舉其貨罰其人凡所達貨賄者則以節傳出之國㐫札則無門闗之征猶㡬凡四方之賔客敂闗則為之告有外内之送令則以節傳出内之掌節掌守邦節而辨其用以輔王命守邦國者用玉節守都鄙者用角節玉則羙在其中而暢達扵外諸侯之象角則致力扵内而捍禦扵外公卿大夫之象守則守節之義凡邦國之使節山國用虎節土國用人節澤國用龍節皆金也以英簜輔之門闗用符節貨賄用璽節道路用旌節皆有期以反節凡通達于天下者必有節以傳輔之無節者有㡬則不達金以為之鑄象有堅而不變之義簜而加以英餙有儀文相接之禮遂人掌邦之野以土地之圖經田野造縣鄙形體之灋五家為鄰五鄰為里四里為鄼五鄼為鄙五鄙為縣五縣為遂小不曰鄰言鄙之成則鄰之成可知大不曰遂言縣之成則遂之成在其中言縣鄙則舉中以見上下皆有地域溝樹之使各掌其政令刑禁以嵗時稽其人民而授之田野簡其兵器教之稼穡上言形體之法度地居民之法此言各掌其政令刑禁則命六遂之吏因縣鄙之法而推行井地之法凡治野以下劑致甿以田里安甿以樂昏擾甿以土宜教甿稼穡以興耡利甿以時器勸甿以疆予任甿以土均平政辨其野之土上地中地下地以頒田里上地夫一廛田百畮菜五十畮餘夫亦如之中地夫一㕓田百畮菜百畮餘夫亦如之下地夫一㕓田百畮菜二百畮餘夫亦如之或曰上地人數之損則將遷之中地下地乎下地人數之増亦將遷之上地中地乎中地増損亦然曰非遷其人也因其人之損益為田之進退而已遂師以時登其夫家之衆寡遂大夫以時稽其夫家之衆寡然後遂人以嵗時稽其人民而授之田野正為是也凡治野夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有涂千夫有澮澮上有道萬夫有川川上有路以達于畿以嵗時登其夫家之衆寡及其六畜車輦辨其老幼廢疾與其施舍者知夫家衆寡之數則上地任三人而舍其四下地任二人而舍其三凡祖父子孫之不可分而兄弟夫婦之交相飬者舉在是知六畜車輦之數則老得以食肉祭得以用牲車得以供服乗輦得以載任器者舉在是至於辨老幼廢疾與其施舍者則敬老慈幼與夫飬萬民之疾病禄庶人之在官者又非一端而已以頒職事以令貢賦以令師田以起政役先職事貢賦而後及于師田政役無非因其財力而用之先王豈徒用其財力哉愛飬斯民於是乎在若起野役則令各帥其所治之民而至以遂之大旗致之其不用命者誅之凡國祭祀共野牲令野職遂人掌邦之野故此數節皆謂之野牲曰野牲以六牲出於野共而入於牧人職曰野職以薪芻疏材木材出於野而令委人斂之凡賔客令修野道而委積大䘮帥六遂之役而致之掌其政令及葬帥而屬六綍及窆陳役凡事致野役而師田作野民帥而至掌其政治禁令遂師各掌其遂之政令戒禁政若頒職作事以起政役之類令若令野職野賦令野修道之類戒與禁則輔此而已以時登其夫家之衆寡六畜車輦辨其施舍與其可任者經牧其田野辨其可食者周知其數而任之以徴財征作役事則聴其治訟遂之三地有田皆有萊為萊則不耕為田則可以耕而食辨其可食而後可以周知井牧田野之數既知其數然後可以頒地任民取其財謂之財征用其力謂之役事二者周知其數而任之故征不病民財役不傷民力征不均則有治治不服則有訟遂師聴之廵其稼穡而移用其民以救其時事水溢旱乾非一遂之民所能勝故移用他民以救之亦如五黨相救之法然則與大司徒之役民何别曰大司徒移民者移之使有餘財遂師移用其民者移之使有餘力凡國祭祀審其誓戒共其野牲入野職野賦于玉府賔客則廵其道修庀其委積大䘮使帥其屬以幄帟先道野役及窆抱磨共其丘籠及蜃車之役軍旅田獵平野民掌其禁令比叙其事而賞罰如大司馬狩田之禮陳車徒有司平之遂大夫各掌其遂之政令以嵗時稽其夫家之衆寡六畜田野辨其可任者與其可施舍者以教稼穡以稽功事掌其政令戒禁聴其治訟鄉大夫辨其可任者國中自七尺以及六十野自六尺以及六十有五皆征之則遂大夫所謂可任者猶是鄉大夫言其可舍者國中貴者賢者能者服公事者老者疾者皆舍則遂大夫所謂可施舍者亦猶是黍稌髙下穜稑先後以教稼穡有如此者田萊之荒治牧畜之登耗以稽功事有如此者掌其政令戒禁則制之於未然聴其治訟則决之於已然此雖鄉大夫之所不言然六鄉有井牧之制卒伍之制有貢賦税斂之事舉此可以見彼令為邑者歳終則㑹政致事為邑之吏有政有事一歳之政嵗終必㑹一嵗之事嵗終必致吏之勤怠善否皆可於嵗終攷之正嵗簡稼器修稼政簡之修之於正嵗之始先期而為之具也三嵗大比則帥其吏而興甿明其有功者屬其地治者小雅曰或耘或耔黍稷薿薿攸介攸止烝我髦士求髦士扵或耘或耔之間得非六遂興甿之遺意歟凡為邑者以四達戒其功事而誅賞廢興之六遂之所稽者功事功事則農事之著扵功者也為邑者以四達而戒之所以見王政之公通行於天下四達即所謂四達而不悖為公邑者四達扵邦甸之地為家邑者四達於家削之地為都邑者四達於大都小都之地四達而戒其功事則民無不趨於事事無不著於功行之以誅賞廢興則功事之戒無非教矣縣正各掌其縣之政令徴比以頒田里以分職事掌其治訟趨其稼事而賞罰之頒田里所以安民也分以職事聴其治獄亦所以安之而已然人情安則狃於故常而不知勉故為之趨其稼事而賞罰行焉賞罰雖不可詳先王之時入其疆而田野治則有慶入其疆而土地荒蕪則有讓賞罰之行於上也耕耨者有秩叙之賜不耕者有祭無盛之耻賞罰之行於下也然急於勸民而作之以不自已則民無不舉之職事若將用野民師田行役移執事則帥而至治其政令既役則稽功㑹事而誅賞衆之所集多寡不等則移民以執事治其政令所以用之簡之任之也鄙師各掌其鄙之政令祭祀凡作民則掌其戒令戒令所以肅衆志軍法以百家為一小陣應調𤼵之數故鄼長以旗鼓兵革帥其民而至至五百家為一中陣然後鄙師為之掌其戒令以時數其衆庶而察其媺惡而誅賞嵗終則㑹其鄙之政而致事周官校登稽比之政皆言衆寡鄙師獨言衆庶盖至扵五百家則利足以同營害足以同禦斯可以言庶矣衆至於庶則有媺有惡鄙師以時而數之又從而察之媺謂成扵鄉三物者因民之所好而興之非有心於賞之也惡謂陷於鄉八刑者因民之所惡而去之非有心於誅之也其終至殺之而不怨利之而不庸民日遷善而不知為之孰謂遂官専於耕而非教耶項氏曰縣正稽功㑹事審其功也鄙師察其媺惡審其行也在外則縣正誅賞之在内則鄙師誅賞之蔑有容其奸矣鄼長各掌其鄼之政令以時校登其夫家比其衆寡以治其䘮紀祭祀之事若作其民而用之則以旗鼔兵革帥而至先王寓兵扵民而其器亦出於民無事則蔵之器無不完有事則出之器無不利盖至於百家而後兵器始備若作民而師田行役則族師以旗鼔兵革帥而至鄼長亦以旗鼓兵革帥而至盖以是帥之以是用之所謂不教而殃民者無有矣若嵗時簡器與有司數之凡嵗時之戒令皆聴之趨其耕耨稽其女功里宰掌比其邑之衆寡與其六畜兵噐治其政令以嵗時合耦于耡以治稼穡趨其耕耨行其秩叙耡非公田也周之井田皆為長􅅕其長百歩其廣一步中間為􅍒不易之地一畝三􅍒一易之地一畝二􅍒兩易之地一畝一􅍒􅍒廣一尺壟髙一尺二人各執其耦而共𤼵之合二人之耕則耜廣五寸二耜為耦正合一􅍒之地於是而合耦則兩兩相助謂以兩家之民而耡兩夫之田十夫百夫皆然以待有司之政令而徴斂其財賦前言治其政令里宰之所以稽乎下後言待有司之政令里宰之所以聴乎上盖邑之衆寡與夫六畜兵噐皆里宰所掌故政令可得而治焉若財賦之事則遂人既已令之遂師又從而征之非里宰所専所以必待有司之政令又見先王取民之有制也鄰長掌相糾相受凡邑中之政相賛徙扵他邑則從而授之相賛則左右前後相與利而導之有貢賦税斂焉五家相與賛其財有師田行役焉五家相與賛其力此上之政令所以為易共也五家如此先王之政推而達之天下矣

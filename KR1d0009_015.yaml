body:
  text: 周官總義卷十五宋易袚撰典庸器掌藏樂器庸器及祭祀帥其屬而設筍簴陳庸器饗食賔射亦如之大喪廞筍簴庸功也庸器即伐國所獲之寶器明堂位所言崇鼎貫鼎及左氏傳所謂作林鍾而銘魯功之類是已且周自文王伐四國武王克殷之後所獲玉鎮大寶器藏之天府皆足以昭先王之功然天府藏之而典庸器復藏之者藏其器物之可以備聲樂之飾者也樂器即梓人之筍虡所以縣鐘磬之屬橫曰筍植曰簴上設板謂之業亦所以明王者之業未有無其業而可以作樂者典庸器之所掌如此祭祀賔客出而陳之以示先王之道足以勝淫然後皆俘而有之後世子孫德足以紹先然後能傳而守之其所以貽謀于後者逺矣司干掌舞器祭祀舞者既陳則授舞器既舞則受之賔饗亦如之大喪廞樂器及葬奉而藏之司干掌舞器而不明其為何器是所掌者干戈之舞而兼及羽籥之舞也羽籥文舞也干戈武舞也賈氏亦謂二者之器皆司干掌之言司干者以周尚武故以干為職首其籥師則教而不掌故其職曰掌教國子舞羽吹籥然文王世子之篇曰春夏學干戈秋冬學羽籥皆於東序是舞勺舞象所用之器也又曰小樂正學干大胥贊之籥師學戈籥師丞贊之若是則籥師教羽籥而未嘗不教干戈司干掌干戈而未嘗不掌羽籥特籥師以教國子為主故名官以籥司干以周所尚為主故名官以干其實一也然干與戈相配不言戈者言祭祀受舞者器則干與羽籥而已司兵司戈盾亦曰祭祀授舞者兵非干與戈皆於此受而其文互見者乎大卜掌三兆之法一曰玉兆二曰瓦兆三曰原兆其經兆之體皆百有二十其頌皆千有二百以龜占象之謂卜以火灼龜其象可占之謂兆三兆之法專掌於大卜占龜故也而兼及於三易三夢者易與夢亦占也其屬有簭人占夢而大卜為之長故兼掌其法以三兆為主玉兆瓦兆原兆鄭氏以璺罅今考其義不過隂陽竒耦與夫象之上下左右而已詩以乃生男子為載弄之璋則凡以玉名者皆陽也故卜得陽數之竒而其象在上在左者曰玉兆詩以乃生女子為載弄之瓦則凡以瓦名者皆隂也故卜得隂數之耦而其象在下在右曰瓦兆易之比曰比吉原筮原之為言再也或隂陽竒耦之錯列上下左右之未定再以其變推之曰原兆經常也其經兆之體皆百有二十則燋龜之體也頌繇也其頌皆千有二百則占兆之書也自百有二十以至千有二百則以十日十二辰之數與夫四時五行休王相乘之法推之三易三夢之占倣此掌三易之法一曰連山二曰歸藏三曰周易其經卦皆八其别皆六十有四宓戲氏始畫八卦歷代傳之以為易夏得人統其易以艮為首謂之連山言艮為山如山之相連而不絶也殷得地統其易以坤為首謂之歸藏言地勢坤萬物歸而藏乎其中也周得天統其易以乾為首謂之周易言乾為天天道變易而不可窮也其經卦皆八其别皆六十有四然傳記所載文王重易為六十四卦今此三易之别皆六十有四則是六十四卦非文王重之也易大傳十三卦言包犧氏之罔罟取諸離黃帝堯舜氏垂衣裳取諸乾坤此固經卦之名曰益曰噬嗑曰隨曰豫曰渙曰小過曰暌曰大壯曰大過曰夬此即重卦之名是知上古已有六十四卦之别矣但夏殷之易以七八不變者為占周易以九六之變者為占襄九年左氏傳所載東宫之筮遇艮之八八即艮之六二為隨杜氏以為雜用連山歸藏二易皆以七八為占是連山歸藏已有隨卦之義此夏殷六十四别之證也或曰必戲氏畫八卦因而重之掌三夢之法一曰致夢二曰觭夢三曰咸陟其經運十其别九十夢者人之精神所感者也至人無夢謂其游心淡泊無所役於事若出而涉世則不能無夢髙宗夢得說文主夢臧丈人武王夢帝與九齡皆即其所感者占之此大占所以有三夢之法曰致曰觭曰咸陟鄭氏謂未詳其義或以為致者有所使而然思慮所形非出於自至故曰致夢角一俯一仰為觭晝之俯仰與事相接夜形諸夢雖非出於思慮皆有所自而得故曰觭夢無心感物為咸所謂陟者升也升則無所拘自然而然初無所自故曰咸陟此雖意解義或可據經即占夢所謂歲時日月星辰也運即歲時日月星辰之運也聖人即經運十以占其常即其别九十以占其變則吉凶應矣以邦事作龜之八命一曰征二曰象三曰與四曰謀五曰果六曰至七曰雨八曰瘳以八命者贊三兆三易三夢之占以觀國家之吉凶以詔救政八命者命龜之辭賈氏謂凡命龜大夫以上有三士有二而况邦之大事故曰以邦事作龜之八命一曰征者謂王師出征而卜其久速二曰象者謂天象變動而卜其妖祥三曰與者事與人共而卜其成虧四曰謀者謀决於人而卜其得失五曰果者卜其行之果與否六曰至者卜所俟之至與否七曰雨者卜雩祈之雨與否八曰瘳者卜疾疢之瘳與否此所謂作龜之八命以龜兆占之可也而兼言三易三夢者其占一而已簭人曰凡國之大事先簭而後卜則簭與卜而相應泰誓曰朕夢協朕卜襲於休祥則夢與卜而相參以此贊三兆三易三夢之占而觀國家之吉凶此王者恐懼修省之誠以詔救政莫切於此凡國大貞卜立君卜大封則視髙作龜大祭祀則視髙命龜凡小事涖卜國大遷大師則貞龜凡旅陳龜凡喪事命龜占龜之事凡六皆有輕重存焉國大貞卜立君卜大封其事為至重故視其龜骨之髙以示涖卜者然後以火灼之而親作其兆大祭祀亦重事次於大貞雖不作龜亦視其龜骨之髙以示涖卜者然後親命龜以所卜之事國大遷大師亦重事次於大祭祀雖不命龜亦親奠龜西面而正於卜涖此大卜所以任其勞也凡旅非大旅為之陳龜則輕於貞龜凡喪非大喪為之命龜則輕於視髙命龜此大卜所以任其要也若凡小事用卜則屬之卜師以下大卜特涖之而已此其輕重之辨卜師掌開龜之四兆一曰方兆二曰功兆三曰義兆四曰弓兆鄭氏謂開龜者開出其占書也經兆百有二十體此言四兆者分之為四部若易之二篇金縢開籥見書是與鄭亦以為疑辭方功義弓則云未聞嘗考之三兆之法有開龜之四兆以四兆為開龜之法則龜之兆而已劉氏中義曰開龜之下體去其外甲其下甲中有直文者所以分左右隂陽也橫有五文以分十二位者象五行與辰坎也去其上下不可以為兆可開鑿而燋以為兆者上下各四故曰四兆焉曰方曰功曰義曰弓則自上及下此去古既逺難以指名其義要之下經言辨龜之上下左右隂陽以授命龜者是知其為開龜之兆而非占兆之書明矣凡卜事視髙揚火以作龜致其墨凡卜辨龜之上下左右隂陽以授命龜者而詔相之大卜於大貞大祭則視其龜骨之髙以示涖卜者於大事則任其勞也卜師則凡卜事皆任其勞焉揚火則爇灼之而作其龜之兆致其墨則墨之大而明者可以言吉辨龜之上下左右隂陽則辨開龜之四兆以授命龜者而詔相之則詔相大卜以所命之事謂大卜於喪祭皆命龜故也龜人掌六龜之屬各有名物天龜曰靈屬地龜曰繹屬東龜曰果屬西龜曰靁屬南龜曰獵屬北龜曰若屬各以其方之色與其體辨之六龜言屬各有名物以其非一也天龜俯地龜仰西龜左倪北龜右倪皆其首然也東龜前弇南龜後弇皆其甲然也爾雅曰俯曰靈仰曰繹前弇果後弇獵左倪不類右倪不若以經推之俯者其形如天俯而向地有神降為靈之義故天龜曰靈屬仰者其形如地仰而向天有始而續終之義故地龜曰繹屬前弇者前長而弇象東方發生有果於必為之義故東龜曰果屬後弇者後長而弇象南方假大有獵而相較之義故南龜曰獵屬左倪者左有餘而向乎陽在西方則於靁為不類亦甚言其為類也故西龜曰靁屬右倪者右有餘而向乎隂在北方為順而言不若亦甚言其為若也故北龜曰若屬辨其色謂𤣥黃青白赤黑也辨其體謂俯仰前後左右也凡取龜用秋時攻龜用春時各以其物入于龜室上春釁龜祭祀先卜若有祭祀則奉龜以往旅亦如之喪亦如之凡物以隂而凝以陽而熙取龜用秋時欲其凝而堅攻龜用春時欲其熙而解六龜各有室色以其物而各入于龜室上春殺牲以釁乃所以神其龜之用先卜謂前期以卜奉龜以往待其卜也菙氏掌其燋契以待卜事凡卜以明火爇燋遂吹其焌契以授卜師遂役之燋即莊子所謂爝火之爝灼龜之木也契即詩所謂爰契我龜之契開龜之鑿也二者皆所以待卜事之用凡爇爝必用明火者以鑽鐩之火未足為明日者純陽之精以夫遂取之明之至也焌者契之鋭頭也以此焌契柱於燋火吹之使熾以授卜師遂投之以卜師揚火以作龜致其墨故也占人掌占龜以八簭占八頌以八卦占簭之八故以視吉凶凡卜簭君占體大夫占色史占墨卜人占坼簭以蓍卜以龜占體占色占墨占坼皆龜也而曰凡卜簭者蓋凡國之大事先簭而後卜以卜為主故也色謂兆之氣墨謂兆之廣坼謂兆之璺體謂色墨坼之全君為尊故占體周公為武王卜曰體王其罔害此君所以占體也凡國之卜事君無親涖之文而執事者咸與焉其次則有大夫之占春官大史大卜皆下大夫而此經自有卜史之占則非此之大夫此大夫次於君其上大夫卿如大宰大宗伯大司馬之涖卜者歟其次小宗伯肆師亦以大夫涖卜此大夫所以占色也其次又有史與卜人之占大史之職曰大祭祀與執事卜日先儒謂執事為大卜之屬與之者當視墨此史所以占墨卜人所以占坼也玉藻言卜人定龜史定墨君定體則先後之序此經言君占體而後及於色墨坼則尊卑之序凡卜簭既事則繫幣以比其命嵗終則計其占之中否幣謂禮神之幣命謂命龜之辭既事則書其辭於幣而繫之於龜以俟嵗終則計其所占之中否而進退占人也簭人掌三易以辨九簭之名一曰連山二曰歸藏三曰周易九簭之名一曰巫更二曰巫咸三曰巫式四曰巫目五曰巫易六曰巫比七曰巫祠八曰巫參九曰巫環以辨吉凶三易之義已見太卜簭亦有九者之名鄭氏以義推之更謂筮遷都邑也咸謂筮衆心歡不也式謂筮制作法式也目謂筮事衆之要也易謂筮民衆所改易也比謂筮與民和比也祠謂筮牲與日也參謂筮御與右也環謂筮可致師否也亦或可據若改巫為筮則非古者占簭謂之巫筮世本云巫咸作筮殷有巫咸後世有神巫季咸皆祖其名奚以改為哉凡國之大事先簭而後卜上春相簭凡國事共簭鄭氏謂當用卜者先筮之即事有漸也於筮之凶則止不卜蓋因曲禮所謂卜筮不相襲若筮不吉而又卜是謂卜襲筮其說正且大矣若大卜以龜之八命贊三易謂筮吉而後卜非相襲也然洪範言龜從筮從又言龜筮共違於人或先卜而後筮或筮不吉而又卜何也曰此箕子所陳之殷法非周制也不然左氏所載晉獻公卜之不吉筮之吉公從筮卜人曰筮短龜長不如從長以是推之不特筮之凶則止不卜筮雖吉而卜不吉亦不可從也聖人之心豈若後世之徼福者為哉占夢掌其嵗時觀天地之㑹辨陰陽之氣以日月星辰占六夢之吉凶嵗十二嵗也時每嵗之四時也天地之㑹謂建厭之所㑹隂陽之氣謂五行生死休王之氣又參之以日月所次及合辰所在此其為占夢之法以此占六夢左氏傳所載昭三十一年十二月辛亥朔日有食之是夜晉趙簡子夢童子羸而歌旦而占諸史墨曰六年及此月也吳其入郢乎終亦弗克入郢必以庚辰或謂知其入郢之期者以日月食於辰尾而推之也知其必入郢者以庚午之日日始有謫其災在楚即日月之變氣占之也又知其在六年者以辛亥為水水數生於一而成於六故也又知其弗克者以午火庚金火勝金故也其入郢而夢見於晉者以晉楚同盟趙簡子為執政之卿故也其說若近乎附㑹然皆以日月星辰而參諸天地之㑹隂陽之氣必成周占夢之遺法其法今亡矣尚可以此考其大略一曰正夢二曰噩夢三曰思夢四曰寤夢五曰喜夢六曰懼夢夢之所形關乎天地隂陽之變此占夢所以有六夢之法正夢者平安自夢若髙宗恭默思道而夢帝賚良弼是也噩夢者驚悸而夢若文王寢疾武王夢帝與九齡是也思夢者覺時思之而夢若孔子之夢周公是也寤夢者覺時道之而夢若狐突之夢太子申生是也喜夢者喜悅而夢若文帝夢黃頭郎推之上天是也懼夢者恐懼而夢若光武夢乘龍上天而心悸是也此六者惟正夢為正曰噩曰思曰寤曰喜曰懼之五者皆謂之變以日月星辰占之則吉凶可推矣季冬聘王夢獻吉夢于王王拜而受之乃舍萌于四方以贈惡夢遂令始難毆疫聘如聘女之聘迎之而使來也贈如贈言之贈送之而使往也二者皆禱禳之法且一嵗未嘗無夢何待於季冬然後聘之贈之耶季冬之時王者為之行除舊布新之政故占夢舉前日之吉夢聘而迎之以增益其福祥又獻之于王王拜而受之以敬神之所貺又舉前日之惡夢贈而送之以弭除其烖殃且舍菜於四方謂之舍萌則除其萌孽之始遂令方相氏始難毆疫始難固所以迎和氣也毆疫亦所以送戾氣也視祲掌十輝之法以觀妖祥辨吉凶一曰祲二曰象三曰鐫四曰監五曰暗六曰瞢七曰彌八曰叙九曰隮十曰想掌安宅叙降正嵗則行事嵗終則弊其事輝者日之光氣也日以光為主是謂太陽隂邪侵之則為祲此視祲占象所以有十輝之法祲謂隂氣薄於日而浸淫相侵也象謂隂氣附日而凝結成象也鐫謂隂氣刺日如童子所佩之鐫也監謂隂氣抱日如冠珥而佩璚也暗謂隂氣蔽日方晝而暗者也瞢謂隂氣蒙蔽日光瞢然也彌謂隂氣貫日彌天不竟也叙謂隂氣不常以叙而至也隮謂隂氣自下而升於上也想謂隂氣無迹形似可想也以洪範五行推之陽者君子而隂者小人陽者中國而隂者夷狄妖祥禍福可以類求安宅則使之安其居叙降則叙之而使降正嵗行事而嵗終弊其事則反禍為福轉妖為祥寧不在茲乎大祝掌六祝之辭以事鬼神示祈福祥求永貞一曰順祝二曰年祝三曰吉祝四曰化祝五曰瑞祝六曰策祝福祥一也永長也貞正也謂降年有永而得正命也祈如祈天永命求如自求多福皆王者藴誠明之德接三才之奧然後大祝得以薦信於鬼神而有是六祝之辭一曰順祝者謂天人和同納于大順也二曰年祝者謂五氣時若常大有年也三曰吉祝者謂斂時五福吉無不利也四曰化祝者謂化被六極以為和氣也五曰瑞祝者謂天不愛道地不愛寶而形為上瑞也六曰策祝者謂龜筮不違於人是謂大同也此六者皆大事故謂之大祝先鄭乃以小祝侯禳等事以解六祝之義非也大祝所祝者六事之大故曰以事鬼神示豈小祝侯禳等而已哉掌六祈以同鬼神示一曰類二曰造三曰禬四曰禜五曰攻六曰說六祝大事故因祭享祀而祝之此特為六祈以祈之而已類則合其類而祭若類上帝是也造則即其所而祭若造于祖是也禬所以除烖變禬國之凶荒民之札喪是也禜所以禱水旱春秋祭禜是也攻則治去其害翦氏以攻禜攻之是也說謂以辭責之庶民以攻譮之是也是六者蓋與鬼神合其吉凶故曰同鬼神示作六辭以通上下親疏逺近一曰祠二曰命三曰誥四曰㑹五曰禱六曰誄先鄭以祠為辭令也通上下親疏逺近則皆以其用於人者言之祠謂言辭之辭堯言之類是也命謂命令之辭說命之類是也誥謂誥戒之辭洛誥之類是也㑹謂㑹同之辭王㑹之類是也禱謂慶賀言福祥之辭張老之善頌善禱是也誄謂積纍生時德行之辭孔子卒哀公誄之是也上下以位言親疏以情言逺近以勢言辭以通之一而已矣辨六號一曰神號二曰鬼號三曰示號四曰牲號五曰齍號六曰幣號辨六號者謂易其常名以為美稱尊天而曰昊天上帝是謂神號尊祖而曰皇祖伯某是謂鬼號尊地而曰皇地后祗是謂示號牛曰一元大武豕曰剛鬛羊曰柔毛雞曰翰音犬曰羮獻是謂牲號黍曰薌合梁曰薌萁稻曰嘉蔬稷曰明粢是謂齍號玉曰嘉玉幣曰量幣是謂幣號是六者尊卑小大不等而同謂之號以其致美於牲齍幣乃所以致敬於鬼神示也辨九祭一曰命祭二曰衍祭三曰炮祭四曰周祭五曰振祭六曰擩祭七曰絶祭八曰繚祭九曰共祭先鄭謂周祭以上皆祭鬼神示之事振祭以下乃生人祭食之禮然生人祭食不應與鬼神同科天神人鬼地示已見大宗伯非大祝所辨劉氏中義皆以為皇尸祭食之法其義或然蓋天子祭禮不存以諸侯大夫少牢饋食之禮明之其一謂妥尸尸坐祝始命尸取韭葅遍擩于三豆祭于豆間故曰命祭其二謂上佐食取黍稷及切肺授尸尸受而同祭于豆間賔尸所謂兼祭以其衍多故曰衍祭其三謂次賔羞羊燔尸擩鹽以祭故曰炮祭其四謂依殽之序而遍祭之故曰周祭其五謂凡牢翰魚臘骼肩皆擩鹽而振之擬祭弗奠故曰振祭其六謂凡取菹以擩于醢而祭者曰擩祭其七謂刌肺以絶其本而祭曰絶祭其八謂刲肺之大本而紾之以為繚祭大夫以下絶而不繚以上繚而又絶曰繚祭其九謂凡尸之食祭皆上佐食工祝共之所以尊尸也曰共祭已上九者皆以饋食觀之則天子之禮可推矣辨九􅉔一曰稽首二曰頓首三曰空首四曰振動五曰吉􅉔六曰凶􅉔七曰竒􅉔八曰褒􅉔九曰肅􅉔以享右祭祀拜者上下交相敬之禮不特下之施於上亦有上之施於下者其目凡九而皆有輕重之義荀卿曰平衡曰拜下衡曰稽首至地曰稽顙稽之為義一也知喪非至哀不稽顙則知禮非至尊不稽首書言稽首必拜手拜手則手至于地也稽首則首下於衡至地而稽留也記曰大夫之臣不稽首避君也孟武伯曰非天子寡君無所稽首知武子曰天子在君稽首寡君懼矣是稽首者諸侯於天子大夫士於其君之禮也然考之於古君亦有稽首於其臣者書稱太甲之於伊尹成王之於周公是也大夫士亦有稽首於非其君者儀禮君勞賔賔再拜稽首勞介介再拜稽首是也蓋君子行禮於其所敬者無所不用其至君稽首於其臣者尊師道也大夫士稽首於非其君者尊主人也其次則頓首許慎曰頓下首也首頓于手而已春秋晉穆嬴頓首於趙宣子魯季平子頓首於叔孫則敵已皆用之非施於尊者之禮空首者鄭氏謂頭至于手恐非其義正謂不至於手空其首而已振動者鄭氏引王動色變為義恐非所以為振動之拜正謂以首叩地施於事變之不常者而已吉拜謂朞以下之喪者拜而後稽顙凶拜謂三年之喪者稽顙而後拜蓋拜則致敬于人者也稽顙則致哀於已者也拜而後稽顙頽乎其順也以其先致敬故也稽顙而後拜頎乎其至也以其先致哀故也少儀曰三年之喪以其喪拜非三年之喪以吉拜此吉拜凶拜之辨竒拜一拜也儀禮鄉飲射聘禮士相見禮凡禮之殺者皆一拜是也褒拜再拜也鄭氏謂褒讀為報拜神與尸之享獻則有再拜之禮是也肅拜者俯其首而肅之也少儀曰婦人吉事雖君賜肅拜為喪主則不手拜不手拜者謂婦人於夫與長子之喪當稽顙餘喪則手至于地肅拜手不至於地俯其首而已是九者始於朝聘燕饗達於昏冠喪祭皆人情交際之禮而必曰以享右祭祀者何也享謂朝踐獻尸之類右謂侑食勸尸之類祭祀謂祀天神祭地示之類古人之禮惟無愧於神祗祖考而後其禮四達於天下九拜以享右祭祀為主則其施於上下者可推矣凡大禋祀肆享祭示則執明水火而號祝隋釁逆牲逆尸令鐘鼓右亦如之來瞽令臯舞相尸禮既祭令徹大祝之六祝六號用於大禋祀肆享祭示禮也然必執明水火者取其清明之至可以薦其誠而已因其薦誠復使之奉隋釁焉隋謂尸祭之餘釁謂薦血之事二者以誠為主故亦取乎明水火之用先儒以隋釁在逆牲逆尸之前既未逆尸安得有尸祭之餘既未逆牲安得有薦血之事遂謂凡血祭曰釁謂如大宗伯以血祭祭社稷五祀五嶽者且小祝於大祭祀逆齍盛送逆尸沃尸盥贊隋贊徹奠無非所以佐大祝者豈有小祝施於大祭祀而大祝乃施於血祭等禮乎是知隋釁繼號祝之文而迎牲迎尸以後方言祭祀之禮逆牲則奏昭夏之所逆者逆尸則奏肆夏之所逆者右則尸食而侑之者皆令奏鐘鼓以為聲歌之節來瞽令臯舞則樂師詔之大祝來而令之相尸禮則贊其出入坐作之儀祭訖則為之令其徹是數者見於祝號之後亦所以薦其誠也大喪始崩以肆鬯渳尸相飯贊斂徹奠言甸人讀禱付練祥掌國事肆陳也渳浴也相飯謂含也贊斂徹奠始死之斂與奠也既殯之後為禱辭與甸人故言甸人讀禱也付謂卒哭後祔祭祖廟練謂小祥練祭祥謂大祥除衰杖皆國事也故掌之國有大故天烖彌祀社稷禱祠大師宜于社造于祖設軍社類上帝國將有事于四望及軍歸獻於社則前祝大㑹同造于廟宜于社過大山川則用事焉反行舍奠曰宜曰造曰類祭之名也曰有事曰用事祭之事也宜于社造于祖則在國內之禮設軍社類上帝則在國外之禮國將有事于四望則軍行所過山川之禮及軍歸獻于社則王師有功愷獻之禮大祝皆為之前祝前羣祝也大㑹同造于廟宜于社過大山川則用事以王之㑹諸侯於國外故也反行舍奠則告至而已大師先社而後祖大㑹同先廟而後社軍禮賔禮各有所主也建邦國先告后土用牲幣禁督逆祀命者頒祭號于邦國都鄙此皆所以贊大宗伯也大宗伯言告后土而已大祝辨牲幣之號則為之用牲幣大宗伯言頒祀而已大祝辨鬼神示之號則為之禁督逆祀命者蓋邦國都鄙之祀皆命之於天子命而弗祀與非所命而祀者皆謂之逆是以當祀者在所督弗當祀者在所禁所謂頒祭號者如此小祝掌小祭祀將事侯禳禱祠之祝號以祈福祥順豐年逆時雨寧風旱彌烖兵逺罪疾大祝所掌者大祭祀之祝號小祝所掌者小祭祀侯禳禱祠之祝號侯所以候迎喜祥也禳所以却弭殃氣也禱則先事而求之也祠則後事而報之也皆所以祈福祥故以福祥為先其次則順豐年謂順民心以祈來嵗之豐其次則逆時雨欲其無常雨之患又其次則寧風旱欲其無常風常暘之患又其次則彌烖兵以見無心於用兵又其次則逺罪疾以見有心於恤百姓此六者小祝掌其祝號而已大祭祀逆齍盛送逆尸沃尸盥贊隋贊徹贊奠凡事佐大祝小祝所以佐大祝大祝逆牲而小祝逆齍盛者齍盛輕於牲者也大祝逆尸而小祝亦逆尸而復言送者送逆詳於逆者也大祝相尸禮而小祝沃尸盥沃盥小於相禮者也以至贊隋贊徹贊奠皆所以佐大祝大喪贊渳設熬置銘及葬設道齍之奠分禱五祀贊渳者大祝以肆鬯渳尸而小祝贊之也設熬置銘道奠分禱則小祝專焉大師掌釁祈號祝有寇戎之事則保郊祀於社春秋傳曰君以軍行祓社釁鼓祝奉以從此小祝掌號祝又掌釁祈之事也寇戎之事則保郊保其神壝之在郊者祀于社則社在國之右無所事保祀之而已凡外內小祭祀小喪紀小㑹同小軍旅掌事焉大祝掌其大事小祝掌其小事皆祝號之事也喪祝掌大喪勸防之事及辟令啓及朝御匶乃奠及祖飾棺乃載遂御及葬御匶出宫乃代及壙說載除飾小喪亦如之掌喪祭祝號曰勸謂執纛居匶前以勸率六引也防謂執披居旁以防其傾側也又役人辟除其塗則令啓棺菆也又昧爽載匶至廟則居前以御匶也又及祖廟設祖祭之禮加帷荒以飾棺乃移所載匶車於庭中遂為之御六引也又祖廟大奠之後則御匶出宫至於外則鄉遂師代之也又至壙說載除飾便於窆也小喪謂王后及世子以下之喪亦如其殯葬次第喪祭謂虞祭既葬則以虞易奠皆有祝號焉王弔則與巫前掌勝國邑之社稷之祝號以祭祀禱祠焉凡卿大夫之喪掌事而斂飾棺焉王弔則君臨臣喪以巫祝桃茢執戈惡之也所以異於生也勝國邑之社稷者周勝於商取其社而祭之亳社是也卿大夫之喪則禮有降殺勸防之事皆掌之而兼其斂事焉甸祝掌四時之田表貉之祝號舍奠于祖廟禰亦如之師甸致禽于虞中乃屬禽及郊饁獸舍奠于祖禰乃斂禽禱牲禱馬皆掌其祝號四時之田大司馬行之設禡祭於所表之地田表貉甸祝則掌其祝號者也甸以教兵亦皆以遷祖行故舍奠以祖為先禰亦如之師甸則用師以田也致禽于虞中乃屬禽則山澤之虞也及郊饁獸則大司馬也舍奠于祖禰則告至也斂禽即小宗伯之頒禽也禱牲禱馬則禱牲與馬之祭也其祝號則甸祝皆掌之詛祝掌盟詛類造攻說禬禜之祝號作盟詛之載辭以叙國之信用以質邦國之劑信㰱血以詔明神謂之盟渝盟則詔明神以戒之謂之詛類造攻說禬禜乃大祝之六祈而盟詛亦用之夫王者以信待人故天下不期信而自信烏用是㰱血之盟與夫渝盟之詛哉君子屢盟亂是用長侯詛侯祝靡届靡究皆列國矯誣之事而先王何取乎爾先王之所先施於民者信而已然後以盟詛輔之故以盟詛而載之辭則曰載辭使人用之而有先後之序則曰叙國之信用行之邦國則又有以信其約故曰質邦國之劑信信由中出盟詛何惡焉司巫掌羣巫之政令若國大旱則帥巫而舞雩國有大烖則帥巫而造巫恆祭祀則共匰主及道布及蒩館凡祭事守瘞凡喪事掌巫降之禮司巫為羣巫之長故掌羣巫之政令若大旱則帥巫而舞雩所以為旱祭也大烖則帥女巫而造巫恆作常道以彌烖患也祭祀共匰主及道布及蒩館者匰以藏木主道布為神巾蒩以茅為蒩而藉也館承茅之器也凡祭祀守瘞謂祭地示則守瘞坎以待埋牲玉也凡喪事掌巫降之禮以人之精神陟於天巫為之降其神也男巫掌望祀望衍授號旁招以茅冬堂贈無方無算春招弭以除疾病王弔則與祝前巫所以佐祝也祝有祀禮有衍祭之禮男巫掌望祀望衍則又為望其方而降之謂求其神於誕謾慌惚之中而亦皆有號焉詛祝又授之以神號冬堂贈謂嵗終則設祭於堂以贈送鬼神之為不祥者無方則惟巫之所至無算則惟巫之所用此序官所以言男巫無數蓋巫雖不可必而亦先王不廢也送之於冬而招之於春以春陽之來則吉祥可招邪祟可弭疾病除矣王弔則與祝前義見喪祝女巫掌嵗時祓除釁浴旱暵則舞雩若王后弔則與祝前凡邦之大烖則歌哭而請祓祓除邪氣也釁浴則浴去其汙穢也旱暵舞雩陽亢而隂不足女巫所以助隂氣也王后弔則與祝前與天官女祝前后如王之禮也大烖歌哭而請則祈哀是已

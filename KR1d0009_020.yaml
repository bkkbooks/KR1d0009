body:
  text: 周官總義卷二十宋易袚撰職方氏掌天下之圗以掌天下之地辨其邦國都鄙四夷八蠻七閩九貉五戎六狄之人民與其財用九穀六畜之數要周知其利害乃辨九州之國使同貫利言邦國則王畿之外五等諸侯之國言都鄙則王畿之内三等食采之地此二者舉中國言之辨人民以知其剛柔緩急之異俗辨財用以知其衣食器械之異齊以至九穀六畜數者職方氏皆以圖而攷其數復以數而總其要又以數要而周知其利害利如土宜土化之類凡利於民者害如地慝之類凡害於民者職方氏既已周知而厯数然後大司馬以九畿之籍而施邦國之政職使九州之國各共其職以任其政無有不同之貫利此其官所以列於大司馬之屬而謂之職方氏東南曰揚州禹貢揚州之域東距海北據淮故曰淮海惟揚州殷人以淮入徐故揚州止謂之江南周人復以淮入揚而循禹之舊不言淮海而曰東南者變禹貢之文也然禹貢以帝都所在故首言冀州周都鎬京在雍州之域而乃以揚州為先焉周人建國東南先服王化之始故以東南為首稱而正南次之亦猶禹之治水既載壺口則以冀州為首記其功之所自始不特帝都而已其山鎮曰㑹稽稽計也吳越春秋曰禹巡守天下㑹計修國之道以㑹稽名山漢志屬㑹稽之山隂縣唐為越州㑹稽縣山在州東南二十里今州為紹興府其澤藪曰具區孔安國㑹稽郡具區澤在西古文以為震澤是吳南太湖名唐屬蘇州今為平江府其川三江書曰三江既入震澤厎定震澤太湖也堯時洪水泛濫有此水勢與周之職方不同而孔安國乃云江至彭蠡分為三入於震澤是求合乎禹貢之説似矣然書以江漢所滙之處為彭蠡澤在今江州湖口縣界江至湖口合三為一未聞其分一為三也又太湖在蘇湖常三州之間自不與江水相通彭蠡所滙之江何從而入之耶班固知大江與震澤不相通又附㑹為之説曰南江自震澤東南入海中江自蕪湖東至陽羡入海北江自毘陵北東入海毘陵今常州也今以大江之在毘陵北東者以當北江正與書合者謂南江自震澤東南入海則非經之所謂南江矣又謂蕪湖有水東至陽羡以為中江其矢為特甚陽羡今常州宜興也與建康之溧陽接境兩境中髙水皆東西分流其東流而下陽羡者固可通海而蕪湖之水乃皆西北流北向以流入于江初非上陽羡也其為誤有如此者至桑欽所言北江與固同其叙南江中江則其謬滋甚史記正義又曰太湖傍有三水遂以為三江之證皆非禹之所謂三江也然則經之三江將孰從乎以經證經自有明文漢水出於嶓冢者為北江江水出於岷山者為中江既有北江又有中江則必有南江近代儒者謂南江自豫章而入于彭蠡此説誠可信此則三江已合於荆揚之間至揚州末流復言三江豈果分為三乎揚瀕海為支川之下流必言三江所以紀水之所入也知此則知三江震澤之説其浸五湖具區是澤五湖是浸澤浸豈可混而為一攷經意既謂五湖則不止一湖今如丹陽彭蠡以湖名者甚衆皆在古揚州恐别有五湖之名但經無明文不可臆説其利金錫竹箭考工記曰吳粤之金錫爾雅曰㑹稽之竹箭禹貢於揚州亦曰惟金三品又曰瑶琨篠簜信乎為揚州之地利其民二男五女其畜宜鳥獸此等畜多産於南方亦時見有之其穀宜稻稻生於水澤之地經言稼下地是已揚州居東南之極及支川下流之所歸厥土為塗泥為沮洳故其穀冝稻正南曰荆州禹貢荆及衡陽惟荆州殷之荆州南不言衡陽循禹之舊也其北境則曰漢南以地志攷之荆山在南郡臨沮縣即今荆門軍當陽縣之地漢水又在其北正屬襄陽言漢南則殷之荆州寔跨荆山之北至周復以荆門之北屬豫復禹封域以荆及衡陽為荆州荆山即南條衡山即南嶽皆在正南之地故曰正南其山鎮曰衡山漢志長沙國湘南縣衡山在東南唐屬衡州衡陽縣本酃縣地要之衡山連亘數邑凡酃縣之東北以至湘南縣之東南則皆衡山也其澤藪曰雲瞢漢志華容縣有雲瞢澤在南然司馬相如言雲夢澤方八九百里則雲夢非止一澤隨所在而為之名左傳定公四年楚子涉睢濟江至於雲中則知在江之北者為雲又昭公三年楚子鄭伯田江南之夢則知在江之南者為夢禹貢言雲土夢作乂葢南北髙下不等故江北之雲方見土而江南之夢已作乂其勢然也其川江漢漢志蜀郡湔氐道岷山在西徼外江水所出今攷唐元和志則岷山近在茂州而江源逺出西徼在松州之境案松州交川縣江源鎮江水之迹始見于此南流至翼州翼水縣又南流至茂州汶山縣汶山即岷山禹導江所始之地又南流至成都府成都縣有沱江鎮禹貢東别為沱是也又西南流至眉州通義縣又南流至戎州𤏡道縣今為叙州宜賓縣又東流至瀘州瀘川縣又東流至渝州巴縣又東流至涪州涪陵縣又東流至忠州臨江縣又東流至萬州南浦縣又東流至䕫州奉節縣又東流至歸州秭歸縣又東流至峽州夷陵縣又東流至江陵府江陵縣又東流入澧州界即禹貢東至于澧之地至岳州巴陵縣有洞庭湖即禹貢九江水經云九江在長沙下雋縣正其地也又東陵即巴陵江水至此自東而迤北至鄂州江夏縣又東流至江州潯陽縣今為徳化縣有彭蠡澤即禹貢江漢滙澤之地又東北流至池州秋浦縣今為貴池縣又東北流至潤州丹徒縣州今為鎮江府北對揚州江都乃漢志所謂東至江都入海者也漢志不知漢水所自誤認嶓冢山之西嘉陵江為西漢水與禹貢漾漢大異攷之唐元和志興元府金華縣今為鎮𨽻三泉縣嶓冡山在縣西三十里漾水所出東流至洋州興道縣又東流至金州西城縣又東流至均州武當縣有滄浪州即禹貢滄浪之水又東流至襄陽府襄陽縣又東流至鄂州長壽縣又東南流至復州竟陵縣今為景陵縣有滲參水即禹貢三澨也又東南流至沔州漢陽今縣為漢陽軍有大别山即禹貢至于大别以入于江之地禹貢所記江漢皆發源于梁州周禮不載梁州山川故至荆州而後言其川江漢江自今歸州之秭歸縣以至鄂州之武昌縣凡一千四百餘里漢江自今均州之武當縣以至漢陽軍之漢陽縣凡一千四百餘里皆荆州之地江漢分流于其間至是合流詩曰滔滔江漢南國之紀是也其浸潁湛左氏傳昭元年王使劉定公勞趙孟于潁杜氏謂潁水出陽城縣案漢志縣屬潁川郡即今河南府潁陽縣又襄十六年楚公子格帥師及晉師戰于湛阪杜氏謂襄城昆陽縣北有湛水東入汝案地志襄城即今汝州之襄城縣昆陽故城今在汝州之葉縣已上二者皆古豫州之域經以為荆州之浸必有脱誤處其利丹銀齒革其民一男二女其畜宜鳥獸其穀宜稻禹貢荆州言礪砥砮丹惟金三品羽毛齒革其地利古今然也然荆州亦言金與簵楛則未嘗無金錫竹箭揚州亦言齒革及惟金三品則未嘗無丹銀齒革特以其産之多者言之河南曰豫州禹貢荆河惟豫州其封在大河之南南條荆山之北故曰荆河殷之豫州則南境距漢北境接河故曰河南周人於豫州亦曰河南而南境則仍禹貢之舊不曰荆河互文以見也其山鎮曰華山漢志京兆華隂縣華山在其南後漢華隂屬𢎞農郡唐及今為華陽縣其澤藪曰圃田漢志河南郡中牟縣圃田澤在西唐以縣屬鄭州今屬開封府圃田澤一名原圃其川滎洛禹貢導沇水東流為齊入于河溢為滎厥後濟不溢河滎澤遂枯漢志河南郡雖有滎陽縣而不言滎澤唐元和志於鄭州滎陽縣云縣西北四里有故瀆恐未必然蓋水北為陽縣當在澤北不應澤在縣北也漢志𢎞農郡上洛縣洛水出冡嶺山東北至鞏入河又盧氏縣熊耳山在東禹導洛始此而洛水實出于上洛之冡嶺山今攷之唐商州洛南縣冡嶺山在縣南七十里洛水所出也又東流至本州之上洛縣又東流至虢州盧氏縣界熊耳山在縣南五十里又東流至河南府之鞏縣㑹伊瀍澗之水以入于河其浸波溠其利林漆絲枲其民二男三女其畜宜六擾其穀宜五種鄭康成曰波讀為嶓孔安國言禹貢有播水無波水音與播同古字從山從番讀為嶓冡之嶓康成誠有所見而然爾雅云水自洛出為波度其地其盧氏鞏縣之間即今商虢州河南府之地左氏傳莊四年楚令尹鬭祁莫敖屈重除道梁溠營軍臨隨杜氏以為溠水在義陽厥縣西東南入鄖水義陽即今信陽軍之西去隨甚近唐志隨州隨縣溠水出縣西四十里此正古豫州之地鄭康成乃謂溠宜屬荆州在此非也葢漢人誤以南陽郡為荆州不知古荆在荆山之南康成徇漢地志之説誤矣正東曰青州禹貢有青有兖有徐殷并青於徐而徐兼揚州之淮故江南曰揚州周復以淮歸揚而并徐於青正在畿東故曰正東其山鎮曰沂山唐沂州沂水縣本漢東筦縣屬瑯琊郡沂山在縣北一百二十四里其澤藪曰望諸唐宋州虞城縣漢屬沛郡今屬南京應天府孟諸澤西北十里俗號盟諸故書謂之孟諸周禮謂之望諸漢志謂之盟諸史記謂之盟都其實一也其川淮泗禹貢導淮自桐柏漢志南陽郡平氏縣桐柏大復山在東南唐以其地為桐柏縣屬唐州淮水所出東流至蔡州之真陽又至申州之義陽縣今為信陽軍信陽縣又東流至光州定城縣又東北流至濠州招信縣今屬泗州本漢臨淮郡淮陵縣地乃古徐州之域即漢志所謂淮至淮陵入海者也又東北經楚州之旴眙縣今為盱眙軍與泗州隔淮相對又至楚州山陽縣入海漢志濟隂郡乘氏縣泗水東南至睢陵入淮此孔安國引以證禹貢者漢乘氏屬濟隂郡唐以郡為曹州今為興仁府縣屬焉睢陵即今泗州招信縣之北境然漢志所載自有兩泗水其一即自此乘氏至毘陵入淮者又一泗水出魯國辨縣西南至方與入沛唐元和志辨與方與皆在兖州今襲慶府泗水縣東陪尾山泗水出焉其源有四西南流至本州曲阜縣北分為二流北為洙南為泗其間即夫子設教之地又西南三十五里至本州瑕丘縣西二十五里洙復與泗合又南流至本州魚臺縣界縣本漢方與地屬山陽郡即所謂自方與入沛者也又東南流經徐州沛縣漢屬沛郡即所謂自沛入淮者也又東南經徐州彭城縣又至泗州以入于淮徐兖泗皆古徐州之境周并於青其浸沂沭漢志泰山郡蓋縣沂水南至下邳入泗蓋縣在唐及今皆兖州之境下邳唐屬泗州今為淮陽軍沂經下邳分為二水一水於城北西南入泗又一水經城東亦注泗謂之小沂水漢志瑯琊郡東筦縣沭水南至下邳入泗唐志沂州沂水縣本漢東筦縣地沭水所出東南至泗州下邳縣又東北流至泗州漣水縣今為漣水軍至此與泗合而入淮其利蒲魚其民二男二女其畜宜雞狗其穀宜稻麥禹貢於徐州言淮夷蠙珠暨魚周并徐於青其餘皆兼此二州而言河東曰兖州夏殷皆言濟河惟兖州謂東河之東濟水之北也周人以青兼徐而兖州又得越乎濟之東南故徐之岱山職方以為兖之山鎮徐之大野職方以為兖之澤藪是也故曰河東其山鎮曰岱山漢志泰山郡博縣泰山在西北博在唐為乾封屬兖州今為襲慶府奉符縣泰山一曰岱山禹貢海岱惟青州海岱及淮惟徐州是青州在岱山東北徐州在岱山東南周并徐入青而不以岱屬青州兖在西北實兼有其地其澤藪曰大野漢志泰山郡鉅野縣大野澤在縣北唐以縣屬鄆州今屬濟州案禹貢徐州言大野既豬周無徐州故以屬兖其川河泲禹貢言導河積石案漢志金城郡河闗縣積石山在西自唐及今為積石軍然禹之導河始於積石其實河源逺在西塞之外漢張騫班固及水經山海經等皆不知其地唐穆宗長慶元年劉元鼎使吐蕃歸踰湟水湟水出蒙谷抵龍泉與河合溯河之上流繇洪濟渠西南行二千里水益狹其南三百里三山中髙而四下曰紫山古所謂崑崙者也其地盖劒南之西虜曰穆穆哩山河源其間色赤行益逺他水并注則濁自此東北直穆克依額音磧尾入吐谷渾以至積石東北流至鄯州龍天縣界又東流至河州枹罕縣界又東流至蘭州五泉縣又東北流至㑹州㑹寜縣又東北流至靈州廽樂縣又東北流至三受降城又東迆南至朔州之鄯陽縣又南流至嵐州合阿縣又南流至石州臨泉縣又南流至隰州永和縣又南流至慈州吉昌縣又南流至絳州龍門縣今以縣屬河中府乃龍門口即禹貢所謂至于龍門者也又南流至陜州陜州對河為華州華隂縣太華山在縣西八里河經太華之北故曰華隂即禹貢所謂南至于華隂也至此方自南迆東至陜州陜右縣今為陜縣有厎柱山在黄河中禹貢所謂東至于厎柱也又東流至河南府之王屋縣又東流經本府之河陽縣今為孟州府有孟津禹貢所謂東至于孟津是也又東流經本府之鞏縣有洛水入河禹貢所謂東過洛汭是也又東流至衛州汲縣其黎陽縣有黎山即禹貢所謂至于大伾是也又東北流至桐州臨河縣又東北流至澶州頓丘縣又北流至魏州貴鄉縣今省入于大名府之元城縣又東北流至貝州經城縣今省入大名之宗城縣又東北流至冀州南宫縣禹貢降水亦入河以禹河東徙故自入海而不入于河降水故瀆在縣東南六里禹貢所謂北過降水是也又冀州西北接邢趙深三州三州皆有大陸澤禹貢所謂至于大陸是也又東北流至滄州饒安縣即禹貢北播于九河同為逆河入于海之地大抵河行萬餘里豈獨為兖州之川禹貢濟河為兖州即其地考之自魏至至滄凡一千三百餘里其河之東境皆兖之域泲水在經及漢志皆以此字从水从􅙻按説文从水从􅙻注出兖州之川惟禹貢从水从齊又案漢志从水从齊其水出常山郡房子縣贊皇山乃别是一水名則此二字音同實異後世雖例以从水从齊者為兖州之川其實乃字之誤當以古文為正按禹貢道沇水東流為濟攷之則在河東郡之垣曲縣王屋山在縣北沇水所出伏流至河内郡之軹縣唐為濟源縣以濟水出平地有二源故名濟源南流入于河禹貢入河復截河而南溢為滎在鄭州滎澤縣本漢滎陽縣北寔受溢河之濟水濟水自春秋後不復截河而入于滎矣今雖有滎澤而故瀆湮塞不可攷又東至汴州又東北至曹州為陶丘又東北至菏澤在廣濟軍之東北自河至此凡七百餘里皆古濟所經之地今不復有濟水但存其名而已又菏澤雖不受濟水亦自有源仍舊東流世俗因其舊名亦以濟名之然東南至兖州金鄉魚臺入徐州沛縣與泗水合而入淮又一派禹貢濟水至菏澤即東北㑹于汶汶水出兖州乾符縣今襲慶府奉符縣凡北流至鄆州須昌縣又東北流至齊州臨邑縣又東北流至淄州髙苑縣又東流至青州博昌縣以入乎海自汶水源至此皆古濟之地實古兖州之域也其浸廬維鄭康成曰廬維當為雷雍葢濮州雷澤縣雷夏澤在北又灉沮二水源俱出雷夏澤正兖州之境顔師古曰盧水在濟北盧縣康成讀曰雷非也唐以盧縣屬鄆州今廢入陽穀其利蒲魚其民二男三女其畜宜六擾其穀宜四種利與青州同民畜與豫州同正西曰雍州禹貢有雍有梁故梁為正西而雍為西北殷周皆省梁入雍故雍州為正西其山鎮曰嶽山漢志有扶風汧縣吳山在西古文以為汧山雍州山然案唐隴州汧源縣而岍山北與隴山接禹貢導岍是也此正岍山非所謂呉山呉山同在隴州卻自有吳山縣在州西北一百二十里吳山又在縣西南五十里周都五嶽之外以此特近故為嶽山秦都咸陽亦為西嶽唐為國之西鎮山謂之西吳其澤藪曰弦蒲漢志有扶風汧縣北有蒲谷鄉有弦中谷雍州藪今屬隴州汧源縣其川涇汭漢志安定郡涇陽縣开頭山在西涇水所出唐以涇陽源為平涼屬原州今屬渭州又東南流至涇州臨涇保定二縣又東南流至邠州之宜禄新平永壽三縣又東北流至京兆府之醴泉髙陵雲陽三縣以入渭汭水者非禹貢所謂汭也禹貢言汭皆水北之汭此所謂汭者雍州之川名漢志右扶風汧縣汭水出西北東入涇此正公劉居豳之地詩所謂芮鞠之即徐廣曰新平漆縣東北有豳亭其國城在邠州東北二十九里三水縣界古豳城是也正與公劉詩合又唐志涇州臨涇縣有汭水西自隴州華亭縣流入一名宜禄川然涇隴二州在邠州之西則非邠州之汭要皆雍州之川也其浸渭洛漢志隴西郡首陽縣鳥䑕同穴山在西南渭水所出唐省首陽入渭源後省今置渭源堡屬熙州鳥䑕山在縣西渭水有三源正東㣲南流至本州之襄武縣又東流五十里至鞏州之隴西縣又東流至秦州上邽縣又東流至隴州南田縣今省入吳山又東流至鳳翔府岐山縣又東流至京兆府萬年縣又東流至華州華隂縣東北入于河謂之渭口禹貢所謂汭是也洛水别是雍州一浸非禹貢導洛自熊耳之洛鄭康成曰洛出懐徳釋者引詩之瞻彼洛矣為證案漢志左馮翊懐徳縣之疆梁源即洛水懐徳即京兆府之富平縣今縣屬耀州即漢左馮翊之地北條荆山在縣西正漢志洛水之源也孔安國注禹貢東㑹漆沮之下曰漆沮二水名亦曰洛水出馮翊北孔𨽻逹引水志云出馮翊懐徳縣東南入渭正與漢志合又一洛水出慶州洛源縣在唐之京兆西北五百餘里攷之地志非一源案唐志慶州洛源縣本漢歸徳縣地屬北地郡有於向山在縣北三十里洛水所出因以名縣東流至鄜州洛交縣又東南流至京兆府雲陽縣之東境又經同州澄城縣之西境此去富平之懐徳亦為甚近不應言兩洛水以其異源而下流同入于渭故皆以洛水名之如冀之清漳濁漳青之大沂小沂徐亦有兩泗水以其同入不害其為名稱之同其利玉石其民三男二女其畜宜牛馬其穀宜黍稷禹貢於雍州言厥貢球琳琅玕孔氏謂球琳皆玉名琅玕石而似玉東北曰幽州舜十二州本有幽州水土既平以冀為帝都省幽入冀殷人南都河南之亳復舜幽州之名周人又以幽州兼殷之營州實禹貢青州隔海東北之境故曰東北其山鎮曰醫無閭後漢志遼東郡無慮縣有醫無閭山唐地志營平乃漢遼西郡則其山又為營平之東北其澤藪曰貕養漢志琅琊郡長廣縣貕養澤在西唐萊州昌陽縣本漢縣屬東萊郡今為萊陽縣貕養澤在縣東北四十里葢此澤介乎東萊瑯琊兩郡之間也其川河泲經於兖州言其川河泲蓋兖州北距河而南據泲禹貢言濟河惟兖州則惟兖州之川宜也幽州逺在東北於河泲何與蓋幽州雖跨有遼水為東北而實西南越海兼有青州之東北境所以琅琊郡之貕養澤泰山郡之淄水千乘郡之時水皆在幽州之域光武十三年以遼東屬青州二十四年還屬幽州是知幽州實可以有青州王璜張楫云九河陷海中是九河未陷之前凡登萊海岸及濱滄二州之東境皆在幽州之地與兖州東南分界故其川同於河泲其浸菑時漢志泰山郡萊蕪縣原山淄水所出東至博昌入泲攷輿地記則襲慶府萊蕪縣淄水所出其地即漢之泰山郡東北流入淄川縣漢萊蕪故城在東北過臨淄縣東又東北過利津縣又東北入于海與漢志入泲不同盖入泲乃禹川之舊自濟之上流既涸故淄水入海漢志千乘郡博昌縣時水東北至鉅鹿縣入馬車瀆乃今青州之境青州臨淄縣有時水本漢千乘郡之地其利魚鹽其民一男三女其畜宜四擾其穀宜三種幽州跨海有魚鹽之利河内曰冀州舜十有二州有幽有并有冀水土既平之後以冀為都省十有二州之幽并入焉以餘州準之則知禹貢冀州東西南之三面皆距河而北境則越乎常山今之燕雲營平諸州皆其地也殷人復以冀州北境復舜之幽州而東西南皆禹迹之舊葢東河之西西河之東南河之北也故曰兩河間周人又分冀而復舜之并州故曰河内而已其山鎮曰霍山漢志河東郡彘縣霍太山在東唐及今晉州霍邑本漢彘縣霍山一名太岳在縣東三十里其澤藪曰楊紆鄭康成曰楊紆所在未聞顔師古引爾雅云秦有楊紆李巡又以為在扶風而此乃以為冀州未詳其義及所在其川漳漢志上黨郡長子縣鹿合山濁漳水所出東至鄴入清漳又沾縣大黽谷清漳水所出東北至邑成入大河是二漳皆出於上黨也唐志濁漳水出潞州長子縣本漢縣有發鳩山濁漳水所出東北流至本州所理之上黨縣又東北流至本州之潞城縣漳水一名潞水又東北經本州之垣縣黎城縣又東流至相州之鄴縣又東北流至磁州澄陽縣又東北流經潞州之洛水縣有衡漳故瀆俗名阿難渠則知合清漳而謂之衡漳清漳出大原府之樂平縣本漢沾縣少山在縣西南清漳所出東南流至儀州之和順縣又東南流至潞州黎城縣之東北又東北流至洛州之洛水縣又東北與濁漳合而至貝州之寰城縣又東北流至徳州之長河縣乃漳之南岸其北岸即瀛州之平舒縣自此東入于海其浸汾潞漢志太原郡汾陽縣北山汾水所出西南至汾隂入河攷唐嵐州靜樂縣今屬澤州即漢汾陽縣之地汾水東南流入太原府之交城陽曲太原清源文水五縣又東南流至汾州温城介休靈石汾西四縣又東南流入晉州之霍邑趙城洪洞臨汾四縣又東南流至絳州之正平稷山龍門三縣又南流至河中府寳鼎縣北入于河唐潞州潞城縣本漢潞縣屬上黨郡漳水一名潞水在縣北闞駰曰潞水在縣北為冀州浸即漳水也蓋周以濁漳為潞清漳為漳其利松柏其民五男三女其畜宜牛羊其穀宜黍稷兾州多山山氣多男故五男三女禹貢冀州厥木惟條條長也其利松柏宜矣正北曰并州舜有并州禹貢以并入冀州殷因之周復分冀復舜并州以天下之勢言之冀州在西河之東雍州在西河之西并州介乎雍冀之間故曰正北其山鎮曰恒山漢志恒山郡上曲陽縣常山谷在西北按唐定州恒陽縣有北嶽今改為中山府縣為曲陽即漢之舊也其澤藪曰昭餘祁其川虖池嘔夷漢志代郡齒城縣虖池河東至參合又東至文安入海此言參合則屬髙栁縣漢髙栁縣𨽻代郡唐貞觀以後為黙啜所破州縣俱廢開元十年改定襄為雲中有髙栁故城則齒城又當在髙栁之北虖池河源未之詳其河自鴈門縣西南流入崞與唐林二縣又西南流至忻州秀容縣又西南流入定襄縣又南流至太原府孟縣又東流至恒州之靈壽真定九門藁城穀城五縣又東流至定州無極縣又東流入深州之饒陽鹿城安平三縣又東南流入瀛州之髙陽河間二縣又東流入莫州之唐興及莫縣以至任丘文安縣即漢志所謂至文安入海者也康成曰嘔夷祁夷也出平舒漢志代郡平舒縣有祁夷水唐蔚州興唐縣本代郡地嘔夷一名滱水出縣西北髙氏山東北流至興唐縣又東流至瀛州之博野東流入于河其浸淶易漢志代郡廣昌縣淶水東南至容城入河案唐蔚州飛狐縣即漢廣昌縣地有飛狐口淶水所出東南流至易州易縣又東北流至淶水縣又南流入容城縣漢志所謂東至容城入河者也漢志涿郡故安縣閻鄉易水所出東至范陽入濡并州寢水亦至范陽入淶此言易出故安則近幽州之境案唐蔚州飛狐縣周屬并州自縣北入嬀州之懐戎即古飛狐口易水所出東南流至易州易縣至北方是漢涿郡故安縣之地又東流至涿州之歸義縣又東北流至涿州范陽之南界即漢志所謂至范陽入淶者也其利布帛其民二男三女其畜宜五擾其穀宜五種九州之説其來尚矣孔安國以禹貢九州為帝堯之制遂謂治水之後舜分冀州為幽州并州分青州為營州餘乃堯舊非也考之舜典其説甚明始言肇十有二州次言咨十有二牧然後命禹平水土是則平水土之命與夫十有二州之建其先後次第自有可攷而不誣者禹别九州書以貢名在治水之後禹貢於逐州之下雖各列隨山濬川之説然皆追求其治水蹤迹而後辨山川之險易量其道里逺近以定賦貢之髙下不得以舜之十二州為後也善乎班固之言曰堯遭洪水懐山襄陵天下分絶為十二州使禹治之水既平更别九州列五服其先後次序正所以發明當時置州之意乃辨九服之邦國方千里曰王畿其外方五百里曰侯服又其外方五百里曰甸服又其外方五百里曰男服又其外方五百里曰采服又其外方五百里曰衛服又其外方五百里曰蠻服又其外方五百里曰夷服又其外方五百里曰鎮服又其外方五百里曰藩服凡邦國千里封公以方五百里則四公方四百里則六侯方三百里則七伯方二百里則二十五子方百里則百男以周知天下凡邦國小大相維王設其牧制其職各以其所能制其貢各以其所有王將巡狩則戒于四方曰各修平乃守攷乃職事無敢不敬戒國有大刑及王之所行先道帥其屬而巡戒令王殷國亦如之其要専在建牧一事周制九牧實舜之咨十有二牧之遺制皆所以統天下之邦國使之攷禮正刑以尊天子土方氏掌土圭之灋以致日景以土地相宅而建邦國都鄙以辨土宜土化之灋而授任地者王巡守則樹王舍樹植也立也王巡守則有四方之舍土方氏既為之土地相宅而知利害之所在然後掌舍為之設梐枑再重為車宫轅門為壇壝宫棘門而土方氏植立之懐方氏掌來逺方之民致方貢致逺物而送逆之逹之以節治其委積館舍飲食合方氏掌達天下之道路通其財利同其數器壹其度量除其怨惡同其好善道路逹財利通此合方之事也未及夫政焉同數器而九儀之命皆有定守一度量而五則之制亦有定用此合方之政也未及夫教焉至於除其怨惡同其好善則講信修睦無有異志合方之為教也大矣訓方氏掌道四方之政事與其上下之志誦四方之傳道正嵗則布而訓四方而觀新物合方氏之同好善因人心之善還以道之而已至此一職專以訓方為事亦非於人心好善之外别有所謂訓也道四方之政事則政事固有良而平者矣與其上下之志則志固有醇而正者矣誦四方之傳道古今之事亦有格言大訓可以為法者矣此皆人心自有之善訓方從而訓道之也形方氏掌制邦國之地域而正其封疆無有華離之地使小國事大國大國比小國山師掌山林之名辨其物與其利害而頒之于邦國使致其珍異之物川師掌川澤之名辨其物與其利害而頒之于邦國使致其珍異之物邍師掌四方之地名辨其丘陵墳衍邍隰之名物之可以封邑者匡人掌逹灋則匡邦國而觀其慝使無敢反側以聴王命人之不善隠微而未露者謂之慝如土訓之道地慝誦訓之道方慝皆隠微之謂使其邪慝未革雖有八法八則將何所正此所以先觀其慝撢人掌誦王志道國之政事以巡天下之邦國而語之使萬民和説而正王面都司馬掌都之士庶子及其衆庶車馬兵甲之戒令以國灋掌其政學以聴國司馬家司馬亦如之政即都家車馬兵甲之戒令也學則學其戒令而肄習于都家之學者也政以任國子之已命者經所謂士是已學以待國子之未命者經所謂庶子是已然國子所以守禦而戒令同乎衆庶則立法公矣教以都家之政學而掌之以國法則兵政一矣

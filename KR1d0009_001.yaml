body:
  text: 周官總義卷一宋易袚撰天官冢宰第一惟王建國辨方正位體國經野設官分職以為民極極中也此經並列於六官之首者言六官所掌之事無非示中于天下取中于王國也詩曰商邑翼翼四方之極古者建國皆本于此然周都鎬京而復宅洛邑者取其居天下之中而已昔者成王之世制禮作樂立一王之法乃卜澗水東瀍水西而作王城又卜瀍水東而作下都以遷殷之頑民新邑既成乃時會諸侯於洛是知中天下而立定四海之民斯王之所以建國歟辨方則以日景北極辨東南西北之方正位則以祖社朝市正左右前後之位體國則宫城門塗之度皆如人之有體經野則丘甸溝洫之畫皆如絲之有經四者既備而後治道舉焉故設官則六典之官各處以職分職則六官之職各命以事無非所以任推行民極之責也所謂民極者于書可以互見營洛之始召公相宅乃作召誥其説曰王來紹上帝自服于土中及洛邑告成周公還政乃作洛誥其説曰其自時中乂萬邦咸休周召二公相與維持以成周家一代之治者要皆中道之所寓至于周官之作則成王親政開物成務之書也觀當時有官君子無非推行成王之德意則所謂設官分職以為民極者可得而悉矣六典所載自周官出所以並列于六官之首乃立天官冢宰使帥其屬而掌邦治以佐王均邦國冢宰大宰也鄭氏謂進退異名蓋所主一官不兼他事則與六官同謂之大是退異名也上佐天子而百官總焉尊于六官獨謂之冢是進異名也書曰冢宰掌邦治統百官均四海與此佐王均邦國同意謂之佐王均邦國則非三公不足以任之故周公以三公兼冢宰見于蔡仲之命公薨而召公亦以三公兼冢宰見於康王之誥其佐王均邦國而謂之冢宰者在周典亦間見其一二大宰之職曰凡邦之小治則冢宰聽之是對王之大治而稱冢也宰夫之職曰以官刑詔冢宰而誅之是主王之官刑而稱冢也司會曰以詔王及冢宰廢置是廢置參乎王而稱冢也內府曰凡王及冢宰之好賜豫則共之是好賜豫參乎王而稱冢也御史曰掌邦國都鄙及萬民之治令以贊冢宰是治令逹夫天下而稱冢也凡此數者事大體重故謂之道揆而兼以三公之職公羊氏之傳春秋曰天子之相何以三自陜而東周公主之自陜而西召公主之一相處乎內乃冢宰之任初非别置一相即周公召公之所兼者是也若夫成周設官之兼冢宰者職掌雖一而體統異矣此序官所以先列冢宰而後言大宰於治官之屬治官之屬大宰卿一人小宰中大夫二人宰夫下大夫四人上士八人中士十有六人旅下士三十有二人大宰所以長治官而乃列於治官之屬者言其分職聮事亦所以相屬也故以卿一人為之然卿乃上下之通稱上聮三孤則為九卿下設中大夫而卿亦上大夫故大宰卿一人即以中大夫二人贊之此小宰所以為治官之二小宰中大夫即以下大夫四人贊之此宰夫所以為治官之考以至八人之上士十有六人之中士三十有二人之下士凡六等其數皆以倍即鄭氏所謂轉相副二者在六官皆然然六官及遂師其下士獨謂之旅者何也衆也他如行夫之下士亦三十有二未嘗不衆也而不得言旅不得同乎六官鄉遂之尊故也今自旅下士等而上之以至于卿在大宰一官凡六十有三推之於五官又推至於三百六十職則不啻數百倍又以六卿推之為中大夫者凡三十人為下大夫者一百八十八人為士者萬八千七百五十人推之於六遂又推之於四等公邑三等采地則亦不啻數十倍何其繁也大抵成周官不必備非特三公之職自一命以上無非兼官以行事鄭氏釋大司馬序官曰凡軍帥不特置選於六卿之吏自卿以下德可任者使兼官焉自軍帥不特置者推之則知六職之不常有者亦不特置也自卿以下兼官者推之則知其他列於六屬者亦皆兼官也況成周之制卿大夫則制以邑三等之士則授以田設官雖多總攝有道是殆不可以泛觀之矣餘見地官序府六人史十有二人胥十有二人徒百有二十人周官府史胥徒設職甚多而不詳所出在天官者凡二千六百六十有六在春官者凡二千二百四十有一在夏官者凡三千二百六十有五在秋官者凡二千六百五十有七冬官雖散落無紀亦可類見唯地官無常職凡職於山林川澤者其數不可勝計杜氏通典總言其為六萬三千六百七十五人不調諸民其誰實為之或謂出於間民然間民轉移執事乃九職之一豈足以備六萬三千六百七十五人之數孟子所言與庶人在官者同祿謂在官而受田者非于百姓受田之外而别置府史胥徒之職考之周典自有成説大司徒之頒職事其十有二曰服事鄭氏謂其服公家之事者也鄉大夫登其夫家之衆寡其舍者服公事者鄭氏謂其吏之有復除者也又鄭氏釋府史則曰皆其官長所自辟除非所謂吏之有復除者乎釋胥徒則曰此民之給徭役者非所謂服公家之事者乎今以鄭氏之説而考論成周之制古者王畿千里提封百萬井受田者凡九百萬夫其間有德行道藝之民及三年大比則升于司徒而不征于鄉餘則老疾之外皆有所服之事此府史胥徒之所從出者也宫正上士二人中士四人下士八人府二人史四人胥四人徒四十人宫伯中士二人下士四人府一人史二人胥二人徒二十人膳夫上士二人中士四人下士八人府二人史四人胥十有二人徒百有二十人庖人中士四人下士八人府二人史四人賈八人胥四人徒四十人內饔中士四人下士八人府二人史四人胥十人徒百人外饔中士四人下士八人府二人史四人胥十人徒百人亨人下士四人府一人史二人胥五人徒五十人甸師下士二人府一人史二人胥三十人徒三百人獸人中士四人下士八人府二人史四人胥四人徒四十人漁人中士二人下士四人府二人史四人胥三十人徒三百人鱉
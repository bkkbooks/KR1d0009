之以均萬民均謂至公而不私詳於平者也五曰刑典以詰邦國者辭命常有以相戒之謂詰然刑必先於警百官而推之以糾萬民糾謂纎悉而不差詳於詰者也六曰事典以富邦國者財利常有以相資之謂富然事必先於任百官而推之以生萬民生謂惠養而不窮詳於富者也詳內略外其序如此方其在六典也五官與大宰各司其一大宰所掌特専於治典而已及其佐王論道則五官聽焉曰教曰禮曰政曰刑曰事雖各列其目而統於大宰則皆謂之治故曰佐王治邦國所以見當時治本之悉出於一者如此以八法治官府一曰官屬以舉邦治二曰官職以辨邦治三曰官聨以會官治四曰官常以聽官治五曰官成以經邦治六曰官法以正邦治七曰官刑以糾邦治八曰官計以弊邦治法亦典也詳於典故曰法官府者朝廷百官所居之府所以行法守者也大宰嵗終則令百官府各正其治受其會謂之百官府則非特治官而已凡六官之職皆在所統一曰官屬者即小宰之六屬使之各揚其職故曰舉邦治二曰官職者即小宰之六職使之各任其事故曰辨邦治三曰官聨者即小宰之六聨使之上下相承故曰會官治四曰官常者即宰夫治數之官常使之多寡相稽故曰聽官治五曰官成者即小宰八成之書使其條目不相侵紊故曰經邦治六曰官法者即小宰七事之法使其戒懼不至廢弛故曰正邦治七曰官刑者即小宰所徇之常刑用以警戒人心故曰糾邦治八曰官計者即小宰所弊之六計用以亷察人才故曰弊邦治是八者其六為邦治其二為官治蓋聨事者百官之事常數者百官之數非若六者之關於邦治也大宰以是而統三百六十職之任使其尊卑大小無非八法之是守故曰治官府以八則治都鄙一曰祭祀以馭其神二曰法則以馭其官三曰廢置以馭其吏四曰祿位以馭其士五曰賦貢以馭其用六曰禮俗以馭其民七曰刑賞以馭其威八曰田役以馭其衆則亦法也以法為式故曰則都鄙者王子弟及公卿大夫所食之采地或為家邑或為小都或為大都以其皆有邑都則曰都以其在國之鄙則曰鄙都鄙之則其目凡八一曰祭祀者謂都鄙有社稷五祀及其先君之廟典秩髙下不可踰越故曰馭其神二曰法則者謂都鄙有伍兩殷輔與夫家臣之屬職守嚴整不相紊亂故曰馭其官三曰廢置者謂都鄙之吏任治於外則必有勤怠功過舉其能者而措其不能者故曰馭其吏四曰祿位者謂都鄙之士從乎政學則當考察其藝養之以祿而後定其位故曰馭其士五曰賦貢者謂都鄙以其田賦之十一者取於民而又以稍縣都之十二者輸于王然後為之制其用度豐殺之數故曰馭其用六曰禮俗者謂都鄙有稍縣都之民則必有昏冠喪祭之俗因其俗而制其禮文輕重之節故曰馭其民七曰刑賞者都士家士為之掌其獄訟則必有刑賞以治其下故曰馭其威八曰田役者都司馬家司馬為之掌車馬甲兵之戒令則必有田役以作其怠故曰馭其衆是八者皆謂之馭乃所以馭都鄙也故秋官設都則之職専掌此八則之法然謂之都則不言家則者何也考大宗伯九儀之命惟五命以上然後賜則王之大夫四命雖馭之以八則而未與賜則之數故采邑謂之家而不謂之都若卿以六命為小都公以八命為大都此所以置都則焉由是觀之八則通用於三等采邑而以都為主故總而言之曰治都鄙以八柄詔王馭羣臣一曰爵以馭其貴二曰祿以馭其富三曰豫以馭其幸四曰置以馭其行五曰生以馭其福六曰奪以馭其貧七曰廢以馭其罪八曰誅以馭其過六典八法八則大宰不言詔王而八柄言詔王此正大宰論道經邦明天下威福之柄以綱維斯世者也故八柄馭羣臣惟天子得専之惟大宰則詔之詔之者何人臣非爵無以貴之也必有德而後任故曰馭其貴人臣非祿無以富之也必有功而後授故曰馭其富豫者豫之以財也則必以恩而後得故曰馭其幸置者置諸其位也位必以敘而後進故曰馭其行罪至於可殺而有八議之辟賜之更生所以福之也故曰馭其福罪至於不可貸而有削邑之罰奪其所有所以貧之也故曰馭其貧廢言棄也臣有罪戾不可委任禠其爵而棄之故曰馭其罪誅言詰也臣有過失非其故為以官刑而詰之故曰馭其過是八者不徒馭之而已自一至五則為慶賞自六至八則為刑罰廢者置之反也奪者豫之反也誅者曰爵曰祿曰生之反也慶賞詳而列於先刑罰簡而列於後知所先後詳略矣以八統詔王馭萬民一曰親親二曰敬故三曰進賢四曰使能五曰保庸六曰尊貴七曰達吏八曰禮賔八統亦所以詔王也雖曰馭萬民而實本於王者之躬行故曰統言統於上而係屬於下者也親親則睦九族之類敬故則燕朋友之類進賢則興其德行使能則任其道藝保庸則安其有功者尊貴則崇其有爵者達吏則察舉勤勞之吏禮賔則接遇諸侯之禮此皆王者之事而何與乎萬民然馭以親親則民莫遺其親馭以敬故則民莫慢其故馭以進賢則民知德之不可不務馭以使能則民知能之不可不勉馭以保庸則民知功實之不可害馭以尊貴則民知爵命之不可陵馭以達吏則民知交通之情馭以禮賔則民知交際之義上作而下應猶絲之牽物約其渙散而歸之於統故曰八統馭萬民以九職任萬民一曰三農生九穀二曰園圃育草木三曰虞衡作山澤之材四曰藪牧養蕃鳥獸五曰百工飭化八材六曰商賈阜通貨賄七曰嬪婦化治絲枲八曰臣妾聚斂疏材九曰間民無常職轉移執事先王之時凡民皆受田凡受田皆為農今三農特居九職之一而復有園圃虞衡之職又有藪牧百工商賈之職又有嬪婦臣妾間民之職此非出於三農之外即民數之不足於受田者與受田而有餘力者為之也蓋井田之制一夫受田百畝百畝之家上地七人中地六人下地五人以至家十人則受兩下地家十有二人則受兩中地家十有四人則受兩上地其餘參錯於三地之間等而上之皆以是為差惟上農夫食九人上次食八人中食七人則受田而有餘力者又四人以下則數之不足於受田者若是二者之民先王皆有道以處之居則使之任草木絲枲疏材之事出則使之任山澤鳥獸八材貨賄轉移之事是以無一職之不得其養而亦無一民之不任其職故曰九職任萬民賈氏以九職之間民為不營已業之遊民非也遊民乃惰而自安者間民則其數不足於受田者蓋家四人以下其數不足於受田而謂之間民亦有田之未授於民而謂之間田經雖不明言間田之制而王制言天子之縣內凡九十三國名山大澤不以朌其餘以為間田此謂田之未封邑者若夫鄉遂都鄙夫家衆寡有耗有登登謂十六受田耗謂六十歸田其田在四等公邑之間天子使吏治之以待授民亦謂之間田間民亦然前解所謂四人以下不足于受田者先王處以間民之職使之耕間田而輸間粟餘則使之轉移八職而執其事如是則間田以待授民而非曠土間民以待授田而非遊民不然間民何以列于九職之末耶以九賦斂財賄一曰邦中之賦二曰四郊之賦三曰邦甸之賦四曰家削之賦五曰邦縣之賦六曰邦都之賦七曰關市之賦八曰山澤之賦九曰幣餘之賦九賦之法與上經九職不同九職所以任萬民九賦則非取于任民者也鄭氏皆以為民賦且援漢口率出泉之制其説一立王制不明學者惑之不容不辨一曰邦中之賦者即載師以㕓里任國中之地以場圃任園地蓋王城內外之地也二曰四郊之賦者即載師以宅田士田賈田任近郊之地官田牛田賞田牧田任逺郊之地蓋六鄉百里之內而外距六遂之地也三曰邦甸之賦者即載師以公邑之田任甸地蓋距國中二百里六遂之餘地天子使吏治之者也四曰家削之賦者即載師以家邑之田任稍地蓋距國中三百里大夫所食之采地也五曰邦縣之賦者即載師以小都之田任縣地蓋距國中四百里卿及王子弟之疏者所食之采地也六曰邦都之賦者即載師以大都之田任疆地蓋距國中五百里公及王子弟之親者所食之采地也七曰關市之賦者若與九職之商賈同然商賈主乎貨賄阜通此則如司市所言市之征司關所言關門之征是也八曰山澤之賦者若與九職之虞衡同然虞衡作山澤之材此則如丱人所取金錫玉石角人所取齒角骨物之類是也九曰幣餘之賦者如職幣所言斂官府都鄙用邦財者之幣振掌事者之餘財是也前六者皆任地之賦以其田賦之十一者取於民又於一分之中復以十一十二二十而三輸之於王如是而已後三者雖非任地然有司所掌利歸公上故亦謂之賦而繼於任地之後詳考大府一職既有九賦之式又别有邦國及萬民之貢則九賦非任民之賦可知矣以九式均節財用一曰祭祀之式二曰賔客之式三曰喪荒之式四曰羞服之式五曰工事之式六曰幣帛之式七曰芻秣之式八曰匪頒之式九曰好用之式大宰之制國用有三曰九職曰九賦曰九式而九式之均節財用特見於九賦之後是専為九賦設也故大府有九賦之式而不言九職九貢之式非無式也大宰三十年之通制國用若九貢不在頒用之數則以之待吊用九職不在頒用之數則以之充府庫此成周備先具之道非若九賦為國家之經費也惟九賦為國家之經費故大府之式法曰關市之賦以待王之膳服邦中之賦以待賔客四郊之賦以待稍秣家削之賦以待匪頒邦甸之賦以待工事邦縣之賦以待幣帛邦都之賦以待祭祀山澤之賦以待喪紀幣餘之賦以待賜豫是九者責之有司皆有式法焉以式法待之論之則自賓客以至賜豫皆有司之事以式法待之可也若王之膳服則何拘乎式法若拘以式法則膳夫何以不會王之膳外府何以不會王之服以至膳禽飲酒裘與皮事亦何以皆為之不會是數者皆至尊所御不可以有司之法會之也若大宰佐王論道則善服有式乃養成君德之大者此大府列膳服於九式之先豈無意哉以九貢致邦國之用一曰祀貢二曰嬪貢三曰器貢四曰幣貢五曰材貢六曰貨貢七曰服貢八曰斿貢九曰物貢九賦任地九職任民二者皆行于王畿千里之間而王畿千里之外隨其地之逺近小大立為邦國九等之貢九貢之目雖不詳見考之鄭氏自有成説因二鄭之説而參之禹貢則有可以類推者禹之甸服實維兾州其外八州别為侯綏要荒無因其地之所宜責其地之所有故曰任土作貢用人以九貢致邦國之用亦若是而已祀貢即浮磬菁茅之類嬪貢即絲枲絺紵之類器貢即銀鏤砮丹之類幣貢即纎縞織皮之類材貢即栝柏篠簜之類貨貢即金玉蠙珠之類服貢即玄纁纎纊之類斿貢即羽毛璣組之類物貢即魚鹽橘柚之類是九物者雖禹貢任土之舊亦可推見成周九貢之法然大宰之于邦國謂九貢而秋官大行人之六貢亦同九貢之目者何也蓋有歲之常貢者有因朝而貢者因朝而貢則大行人之六貢也嵗之常貢則大宰之九貢也小行人又有所謂令諸侯春入貢其此之九貢歟以九兩繫邦國之民一曰牧以地得民二曰長以貴得民三曰師以賢得民四曰儒以道得民五曰宗以族得民六曰主以利得民七曰吏以治得民八曰友以任得民九曰藪以富得民兩聮也屬也蓋人心以類相合而皆聽命于上不為之兩則渙散暌異莫相統一聽其自兩而無所繫乎其間則人心莫知所從相違相尤為患滋甚孟子曰得天下有道得其民斯得天下矣得其民有道得其心斯得民矣其要在于所欲與聚所惡弗施非兩相聨屬而何成周于是設大宰之官自六典以至九貢特先王維持天下之法制至此總攝人心而歸之于一然後有所謂九兩牧即施典于邦國而建其牧者長即施則于都鄙而建其長者師即學校之傳道授業者儒即道德之化民成俗者宗如正室門子之類可以收三族之親踈者主如郊甸任地之類不屬乎吏而自為之主者吏如鄉遂公邑之吏各分其職而治民之事者以至友如鄉田同井之友藪如養蕃鳥獸之藪是九者皆有得民之實惟先王繫之有道故其權一出于上而納天下于皇極之世粵自上失其道民散久矣陵夷至于春秋之後齊晉吳楚迭主夏盟六卿三家顓執國政道術分裂而田駢慎到之徒人自為師儒學不明而畏壘之人乃有尸祝社稷之事田懷屈景之族蟠據國中繕甲京城或以不義而好勇至于朱郭任俠脫人之急刁卓殖貨富擬封君然後知九者得民固不可使之奔軼四出而無所聨屬于上此先王所以為固結人心之本不容一日釋者也然曰牧曰長曰主與吏曰宗與藪無非𫝑與利之所在後之有天下者猶得以操其柄而制其變若儒與師友疑似不辨或至于陷溺人心此夫子以儒道設教于洙泗之間七十子之徒師友淵源萬世宗主亦可以驗其得民之效然則大宰列是三者于九兩之中則知先王之繫民勢與利云乎哉正月之吉始和布治于邦國都鄙乃縣治象之法于象魏使萬民觀治象挾日而斂之近代為期年一變之説者引此經以為證殊不知此非變法也特新之而已鄭氏謂重治法新王事是也鄭氏又謂正月朔日布王治之事於天下至正嵗又書而縣于象魏使萬民觀焉蓋以小宰互文推之其理殊不然小宰正歲所觀不言縣治象則知非大宰縣治象之時也大宰縣治象繼于正月始和之下是以周正建子示萬民以更始之意何必就合乎小宰之説至謂象魏為闕尤所未安據左氏哀三年魯災季桓子御公立于象魏之外命藏象魏若此未可據謂之闕也魏即巍巍之貌也蓋治見于象者為治象書治象之法者為象魏兩觀之縣象魏者為魏闕縣之十日即斂而藏之至小宰于正歲帥屬而觀則觀之于已斂之後此其序也教官政官刑官倣此乃施典于邦國而建其牧立其監設其參傅其伍陳其殷置其輔乃施則于都鄙而建其長立其兩設其伍陳其殷置其輔乃施法于官府而建其正立其二設其考陳其殷置其輔大宰之六典佐王治邦國八則治都鄙八法治官府前已敘之矣今又曰乃施典于邦國乃施則于都鄙乃施法于官府者前舉其凡以見大宰之所職今更為之申敕亦以見施行之次第也牧者何大宗伯云八命作牧九命作伯此不言伯者伯亦為牧舜于十二州為十二牧禹之九州為九牧殷于八州為八伯外有二伯周設二伯復為九牧以統九州之諸侯書所謂以倡九牧是也監者何王制云天子使其大夫為三監監于方伯之國國三人武王之初亦設三監皆殷之制成王以三監作亂而令諸侯為監以司糾察之任書所謂王啓監厥亂為民是也設其參者鄭氏以為卿三人王制所謂大國次國三卿是也傅其伍者鄭氏以為五大夫王制所謂大國次國小國下大夫五人是也陳其殷者鄭氏以為衆士即上士中士下士之類置其輔者鄭氏以為庶人在官即府史胥徒之類此六者各設其職乃所以施其典于邦國者也長者即公卿大夫及王子弟之食采者立于畿內為內諸侯是之謂長有長必有屬故為之立其兩兩即鄭氏所謂兩丞之類以至殷亦衆士輔亦府史胥徒即都家宗人都家司馬之所掌者是也正者何即六官之長如天官冢宰之類各帥其屬以舉邦治是之謂正有正必有屬故為之立其二設其考即鄭氏所謂小宰宰夫之類以至殷亦衆士輔亦府史胥徒即宫伯宫正以下凡六品所掌者是也然周自武王克殷之後立爵惟五分土惟三建官惟賢位事惟能所謂邦國之君臣都鄙之長屬官府之正二固已截然有一定之制初不待太宰之所建所立以至陳之置之也當是時也周公攝政制禮作樂典章文物粲然大備于是設為六典八法八則之制以作新天下之治前所謂申敕之者是矣凡治以典待邦國之治以則待都鄙之治以法待官府之治以官成待萬民之治以禮待賔客之治上經言施典法則于邦國官府都鄙而邦國官府都鄙之有所治于大宰者又復以此待其治猶以為未焉復舉所謂官成賓禮而待之且八法之官成本以治官府而此則曰待萬民之治八統之禮賓本以馭萬民而此則曰待賓客之治何也官成雖用于官府而八成所謂政役閭里師田稱責無非民也禮賓雖以馭萬民而大小行人司儀掌客之所職者無非賓客之事也蓋有國斯有禮有土斯有民邦國官府都鄙雖不同而二者之治則亦相參而用之耳祀五帝則掌百官之誓戒與其具修前期十日帥執事而卜日遂戒及執事視滌濯及納亨贊王牲事及祀之日贊玉幣爵之事祀大神示亦如之享先王亦如之贊玉几玉爵大朝覲會同贊玉幣玉獻玉几玉爵祀天大禮也其次五帝也大宰言祀五帝而不言祀天以王者祀天不敢指而名之故大宰所掌者祀五帝而已言祀五帝則祀天可以類舉也蓋蒼蒼正色者天也主宰萬物者帝也帝之與天名異而實同上古之君德同乎天萬世推之尊以祀配帝天亦謂之帝月令所謂其帝大昊其帝炎帝其帝黃帝其帝少昊其帝顓頊是已若鄭氏言帝出于緯書蓋指五精之君以經意推之其殆大宗伯所謂青圭赤璋白琥玄璜所禮之四方者耶經于四方初不言帝故器與牲幣各放其方之色大宰所謂五帝則牲玉幣爵與上帝同其用然後信大宰所謂五帝者即月令之五人帝也方其祀事之始百官在列大宰臨之誓者警之以言戒者敕之以事具謂備其牲牢鼎俎之物修謂嚴其掃除糞灑之事如此則恭敬誠慤之念固已素孚于未祀之先矣于是前期十日帥執事而卜日遂戒至祀前一日及執事視滌濯又至納亨之夕王袒而迎牲射牲割牲大宰則剪其毛而贊之焉及至于行事授以奠焉五帝之祀如此則祀大神示可知也祀大神示如此則享先王可知也故皆曰亦如之惟玉几所以依神玉爵所以薦神獨于享先王用之人事尚文故耳大喪贊贈玉含玉作大事則戒于百官贊王命君薨百官聽于冡宰不以天下忘乎親也故雖國政之大者亦委而聽焉含玉施于始死之時贈玉施于既窆之後此喪禮之末共于典瑞専于大宰職也而必曰贊云者是知百官雖聽于冢宰而冢宰實未嘗一日而廢乎王命也王視治朝則贊聽治視四方之聽朝亦如之凡邦之小治則冢宰聽之待四方之賔客之小治朝儀有內外邦治有大小此二事最相關屬皆所以為大臣之體治朝在路門之外日朝以聽國事者也四方之聽朝者天子巡狩征伐諸侯各朝于方嶽之下者也二者天下之大權皆天子親之冢宰特贊之而已二者之外則冢宰為之決其小治或謂小治如八法八則九貢九賦之類不以詔王者皆小治也以此為小孰為之大故嘗謂天子視路門之朝則冢宰為之聽其小治如宰夫所言禁令之類天子聽方嶽之朝則冢宰為之待四方賓客之小治如職方氏所言戒令之類是謂政無大小皆所兼統內外得其宜矣嵗終則令百官府各正其治受其會聽其致事而詔王廢置三嵗則大計羣吏之治而誅賞之嵗終受其會者受百官府所致之會也有小宰焉以官府之敘受羣吏之要贊冢宰受嵗會嵗終則令羣吏致事又有宰夫焉嵗終則令羣吏正嵗會月終則令正月要旬終則令正日成而以考其治蓋有官必有事有事必有考有考必有時日之有成日考之也宰夫受之月之有要月考之也宰夫令之而小宰受之嵗之有會嵗考之也小宰贊之而大宰受之考績設官其序如此是以嵗終之際大宰則以是令之于百官府使之各正其治謂之百官府則六官皆總而不止乎治官之屬所以為大宰統百官之任何謂統百官之任曰會曰要曰成雖考于三官而實散見于三百六十職之中酒正之日入其成月入其要司會之以參互考日成以月要考月成以嵗會考嵗成司書及事成則又入要二焉此見于治官之屬者然也至於司徒則正要會鄉師則受役要司馬于要則受之士師于要則正之此見于六官之屬者然也不特此而已王制曰司會以嵗之成質于天子冢宰齋戒受質大樂正大司冦市三官以其成從質于天子大司徒大司馬大司空齋戒受質百官各以其成質于三官大司徒大司馬大司空以百官之成質于天子百官齋戒受質夫司會天官也大司徒之與市三官地官也大樂正大司馬大司冦大司空則四時之官也司會質其成矣三官乃從司會而質于天子冢宰贊天子受其質矣三官則以百官之成質于天子以是知六官之屬皆在所考六官之長皆預考績冢宰則統百官而操其柄焉以是受其會則兼總乎三百六旬之成以是聽其致事則兼決乎三百六十職之事于是嵗終則詔王行廢置之法至三嵗之久則又大計羣吏之治而行誅賞之法夫三嵗之誅賞固大于嵗終之廢置也廢置詔王而誅賞不以詔王者何耶嵗終之考核方嚴則行之以天子之命三嵗之考核既審則守之以一代之法司會曰以周知四國之治以詔王及冢宰廢置則廢置之詔王可知也宰夫曰凡失財用物辟名者以官刑詔冢宰而誅之其足用長財善物者賞之則誅賞之責于大宰可知也會計之法一舉而上下體統得其正矣
